            margin: 0;

            color: white;

            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #4a5568;
            color: white;

        .btn-secondary:hover {
            background: #2d3748;

            resize: none;
        }

        #markdown-input:focus {
            outline: none;
        }

        .slide-container {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .slide {
            background: white;

            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

            position: relative;

        @keyframes slideIn {

            to {

            background: #667eea;
            border-radius: 10px;
        }

        }

        .slide li {

        }

        .slide pre code {

        .slide code {

            border-collapse: collapse;
            margin: 1.5rem 0;

        .warning {
            background: #fffaf0;
            border-left: 4px solid #f6ad55;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;

        .warning strong {

        }

            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;
        }

        .info strong {

        }

        .success {
            background: #f0fff4;
            border-left: 4px solid #48bb78;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;
        }

        .success strong {
            color: #22543d;
        }

        .danger {
            background: #fff5f5;
            border-left: 4px solid #f56565;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;
        }

        .danger strong {
            color: #742a2a;
        }

            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;

            color: #744210;
        }

            background: rgba(255, 255, 255, 0.9);

            height: 50px;

            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;

            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

            padding-bottom: 0.5rem;
            border-bottom: 2px solid #667eea;

            font-size: 1.2rem;
            margin: 0;
        }

            background: none;

        }

        }

            border-radius: 8px;

            transition: all 0.2s;

            margin-bottom: 0.5rem;

            max-height: 4.2rem;
            overflow: hidden;

        }

        .slide-thumbnail-content::after {

        .slide-thumbnail.active .slide-thumbnail-content::after {
            background: linear-gradient(to right, transparent, #f7faff);
        }

        .slide-thumbnail-title {
            font-weight: 600;

        }

        .mermaid {

#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 13</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>Події та обробники подій</h1>\n<p><strong>Web-технології в автоматизованих системах</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🖱️ Що таке події у браузері — концепція подієво-орієнтованої моделі</li>\n<li>🔗 Способи призначення обробників — <code>onclick</code>, <code>addEventListener</code></li>\n<li>📦 Об'єкт події <code>event</code> — властивості та методи</li>\n<li>🌊 Поширенн -align: center;\"><span class=\"nodeLabel \"><p>📄 DOM</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<p><strong>Категорії подій:</strong></p>\n<table>\n<thead>\n<tr>\n<th>Категорія</th>\n<th>Приклади подій</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🖱️ Миша</td>\n<td><code>click</code>, <code>dblclick</code>, <code>mouseover</code>, <code>mouseout</code></td>\n</tr>\n<tr>\n<td>⌨️ Клавіатура</td>\n<td><code>keydown</code>, <code>keyup</code></td>\n</tr>\n<tr>\n<td>📝 Форми</td>\n<td><code>submit</code>, <code>change</code>, <code>input</code>, <code>focus</code>, <code>blur</code></td>\n</tr>\n<tr>\n<td>📄 Документ</td>\n<td><code>DOMContentLoaded</code>, <code>load</code>, <code>resize</code>, <code>scroll</code></td>\n</tr>\n<tr>\n<td>👆 Дотик</td>\n<td><code>touchstart</code>, <code>touchend</code>, <code>touchmove</code></td>\n</tr>\n</tbody></table>\n","<h1>🔗 Способи призначення обробників</h1>\n<p><strong>Головна ідея:</strong> Існують три способи призначити обробник події, але <code>addEventListener</code> є єдиним рекомендованим підходом у сучасному JavaScript.</p>\n<h2>📌 Спосіб 1 — HTML-атрибут (застарілий)</h2>\n<pre><code class=\"language-html hljs language-xml\" data-highlighted=\"yes\"><span class=\"hljs-comment\">&lt;!-- ❌ Не рекомендується — змішує HTML і JavaScript --&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onclick</span>=<span class=\"hljs-string\">\"alert('Клік!')\"</span>&gt;</span>Натисни<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span></code></pre><h2>📌 Спосіб 2 — Властивість DOM-елемента (обмежений)</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ⚠️ Можна призначити лише ОДИН обробник — наступний перезапише попередній</span>\n<span class=\"hljs-keyword\">const</span> btn = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#myBtn'</span>);\nbtn.<span class=\"hljs-property\">onclick</span> = <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Клік!'</span>);\n};\n<span class=\"hljs-comment\">// Якщо призначити ще раз — перший обробник буде втрачений</span>\nbtn.<span class=\"hljs-property\">onclick</span> = <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Другий клік — перший замінено!'</span>);\n};</code></pre><h2>📌 Спосіб 3 — <code>addEventListener</code> (✅ рекомендований)</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> btn = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#myBtn'</span>);\n\n<span class=\"hljs-comment\">// Можна призначити КІЛЬКА обробників на одну подію</span>\nbtn.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'click'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Перший обробник'</span>);\n});\n\nbtn.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'click'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Другий обробник — обидва спрацюють!'</span>);\n});\n\n<span class=\"hljs-comment\">// Видалення обробника (функція має бути збережена у змінній)</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">handleClick</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Обробник, який можна видалити'</span>);\n}\nbtn.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'click'</span>, handleClick);\nbtn.<span class=\"hljs-title function_\">removeEventListener</span>(<span class=\"hljs-string\">'click'</span>, handleClick); <span class=\"hljs-comment\">// Видаляємо</span></code></pre><div class=\"tip\"><strong>💡 Сигнатура addEventListener</strong> <p><code>element.addEventListener(тип, функція-обробник, опції)</code> — перший аргумент це назва події <strong>без префікса <code>on</code></strong>: <code>'click'</code>, а не <code>'onclick'</code>.</p>\n</div>\n\n","<h1>📦 Об'єкт події <code>event</code></h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Об'єкт <code>event</code></strong> — об'єкт, який браузер автоматично передає як перший аргумент обробнику події. Він містить усю інформацію про подію: що сталось, де, які клавіші були натиснуті тощо.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Через об'єкт <code>event</code> обробник отримує повний контекст події та може гнучко реагувати залежно від обставин.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#btn'</span>).<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'click'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">event</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(event.<span class=\"hljs-property\">type</span>);       <span class=\"hljs-comment\">// 'click' — тип події</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(event.<span class=\"hljs-property\">target</span>);     <span class=\"hljs-comment\">// елемент, на якому відбулась подія</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(event.<span class=\"hljs-property\">currentTarget</span>); <span class=\"hljs-comment\">// елемент, до якого прив'язаний обробник</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(event.<span class=\"hljs-property\">clientX</span>, event.<span class=\"hljs-property\">clientY</span>); <span class=\"hljs-comment\">// координати кліку</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(event.<span class=\"hljs-property\">timeStamp</span>);  <span class=\"hljs-comment\">// час виникнення події (мс від завантаження)</span>\n});</code></pre><h2>📊 Ключові властивості об'єкта <code>event</code></h2>\n<table>\n<thead>\n<tr>\n<th>Властивість</th>\n<th>Тип</th>\n<th>Що містить</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>type</code></td>\n<td><code>string</code></td>\n<td>Назва події: <code>'click'</code>, <code>'keydown'</code> тощо</td>\n</tr>\n<tr>\n<td><code>target</code></td>\n<td><code>Element</code></td>\n<td>Елемент, на якому безпосередньо відбулась подія</td>\n</tr>\n<tr>\n<td><code>currentTarget</code></td>\n<td><code>Element</code></td>\n<td>Елемент, до якого прив'язаний обробник</td>\n</tr>\n<tr>\n<td><code>clientX/Y</code></td>\n<td><code>number</code></td>\n<td>Координати миші відносно вікна браузера</td>\n</tr>\n<tr>\n<td><code>key</code></td>\n<td><code>string</code></td>\n<td>Натиснута клавіша: <code>'Enter'</code>, <code>'a'</code> тощо</td>\n</tr>\n<tr>\n<td><code>preventDefault</code></td>\n<td><code>method</code></td>\n<td>Скасовує стандартну дію браузера</td>\n</tr>\n<tr>\n<td><code>stopPropagation</code></td>\n<td><code>method</code></td>\n<td>Зупиняє поширення події по DOM (у будь-якій фазі)</td>\n</tr>\n</tbody></table>\n<h2>🚫 <code>event.preventDefault()</code></h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Заборонити стандартну відправку форми</span>\nform.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'submit'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">event</span>) {\n  event.<span class=\"hljs-title function_\">preventDefault</span>(); <span class=\"hljs-comment\">// Сторінка не перезавантажиться</span>\n  <span class=\"hljs-comment\">// Тепер можна самостійно обробити дані форми</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Форма перехоплена!'</span>);\n});\n\n<span class=\"hljs-comment\">// Заборонити перехід за посиланням</span>\nlink.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'click'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">event</span>) {\n  event.<span class=\"hljs-title function_\">preventDefault</span>();\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Перехід заблоковано'</span>);\n});</code></pre>","<h1>🌊 Три фази поширення події</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p>Кожна подія у браузері проходить <strong>три фази</strong>: <strong>Capturing</strong> (занурення від кореня вниз до цілі) → <strong>Target</strong> (спрацювання на цільовому елементі) → <strong>Bubbling</strong> (спливання від цілі вгору до кореня). За замовчуванням <code>addEventListener</code> реєструє обробник у фазі bubbling.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Розуміння фаз пояснює не лише чому обробник батька спрацьовує при кліку на дитину, а й дає інструмент для перехоплення подій <strong>до</strong> того, як вони досягнуть цільового елемента.</p>\n\n<div class=\"mermaid\" data-source=\"graph TB\n    HTML[&quot;🌐 html&quot;] --&gt;|&quot;Фаза 1: Capturing ↓&quot;| BODY[&quot;body&quot;]\n    BODY --&gt; DIV[&quot;div#container&quot;]\n    DIV --&gt; BTN[&quot;🎯 button -- target&quot;]\n    BTN --&gt;|&quot;Фаза 3: Bubbling ↑&quot;| DIV2[&quot;div#container&quot;]\n    DIV2 --&gt; BODY2[&quot;body&quot;]\n    BODY2 --&gt; HTML2[&quot;🌐 html&quot;]\n    style BTN fill:#fce4ec,stroke:#c2185b\n    style HTML fill:#e3f2fd,stroke:#1565c0\n    style HTML2 fill:#e3f2fd,stroke:#1565c0\n    style DIV fill:#e8f5e9,stroke:#388e3c\n    style DIV2 fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1774461554032-5-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 201.953125px;\" viewBox=\"0 0 201.953125 696\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1774461554032-5-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1774461554032-5-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1774461554032-5-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1774461554032-5-0 .error-icon{fill:#552222;}#exp-1774461554032-5-0 .error-text{fill:#552222;stroke:#552222;}#exp-1774461554032-5-0 .edge-thickness-normal{stroke-width:1px;}#exp-1774461554032-5-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1774461554032-5-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1774461554032-5-0 .edge-thickness-in ransform=\"translate(100.9765625, 32)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-52.0703125\" y=\"-24\" width=\"104.140625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-28.0703125, -12)\"><rect></rect><foreignObject width=\"56.140625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🌐 html</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-BODY-1\" transform=\"translate(100.9765625, 152)\"><rect class=\"basic label-container\" style=\"\" x=\"-42.2734375\" y=\"-24\" width=\"84.546875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-18.2734375, -12)\"><rect></rect><foreignObject width=\"36.546875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>body</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-DIV-3\" transform=\"translate(100.9765625, 250)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-73.6875\" y=\"-24\" width=\"147.375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-49.6875, -12)\"><rect></rect><foreignObject width=\"99.375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>div#container</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-BTN-5\" transform=\"translate(100.9765625, 348)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-92.9765625\" y=\"-24\" width=\"185.953125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-68.9765625, -12)\"><rect></rect><foreignObject width=\"137.953125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🎯 button -- target</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-DIV2-7\" transform=\"translate(100.9765625, 468)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-73.6875\" y=\"-24\" width=\"147.375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-49.6875, -12)\"><rect></rect><foreignObject width=\"99.375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>div#container</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-BODY2-9\" transform=\"translate(100.9765625, 566)\"><rect class=\"basic label-container\" style=\"\" x=\"-42.2734375\" y=\"-24\" width=\"84.546875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-18.2734375, -12)\"><rect></rect><foreignObject width=\"36.546875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>body</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-HTML2-11\" transform=\"translate(100.9765625, 664)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-52.0703125\" y=\"-24\" width=\"104.140625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-28.0703125, -12)\"><rect></rect><foreignObject width=\"56.140625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🌐 html</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<blockquote>\n<p>💡 На схемі capturing і bubbling зображені як два окремих шляхи для наочності — насправді це один і той самий DOM-ланцюжок, пройдений у різних напрямках.</p>\n</blockquote>\n<h2>🫧 Bubbling — за замовчуванням</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#parent'</span>).<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'click'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">e</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Батько — bubbling'</span>); <span class=\"hljs-comment\">// Спрацює навіть при кліку на дитину</span>\n});\n\n<span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#child'</span>).<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'click'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">e</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Дочірній елемент'</span>);\n  e.<span class=\"hljs-title function_\">stopPropagation</span>(); <span class=\"hljs-comment\">// Зупиняє bubbling — батько НЕ спрацює</span>\n});</code></pre><h2>📡 Capturing — перехоплення до цілі</h2>\n<p>Третій параметр <code>{ capture: true }</code> (або просто <code>true</code>) реєструє обробник у фазі capturing — він спрацює <strong>раніше</strong>, ніж обробники на самому елементі.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Capturing: спрацює ДО того, як подія досягне #child</span>\n<span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#parent'</span>).<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'click'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">e</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Батько — capturing, ще до кліку на дитину'</span>);\n}, { <span class=\"hljs-attr\">capture</span>: <span class=\"hljs-literal\">true</span> });</code></pre><h2>📋 Коли capturing справді потрібен</h2>\n<table>\n<thead>\n<tr>\n<th>Сценарій</th>\n<th>Чому capturing, а не bubbling</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong><code>focus</code> / <code>blur</code> на дочірніх полях</strong></td>\n<td>Ці події <strong>не спливають</strong>, тому делегування через bubbling не спрацює. Або використовують capturing, або bubbling-аналоги <code>focusin</code> / <code>focusout</code></td>\n</tr>\n<tr>\n<td><strong>Перехоплення кліків до обробки дочірніми</strong></td>\n<td>Батьківський компонент може скасувати подію (<code>stopPropagation</code>) раніше, ніж дочірній її отримає</td>\n</tr>\n<tr>\n<td><strong>Глобальне логування подій</strong></td>\n<td><code>document.addEventListener('click', log, true)</code> — перехопить усі кліки на сторінці у першій фазі</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Різниця між target і currentTarget</strong> <p><code>event.target</code> — елемент, на якому реально клацнули. <code>event.currentTarget</code> — елемент, до якого прив'язаний обробник. При bubbling або capturing вони <strong>відрізняються</strong>.</p>\n</div>\n\n\n\n\n\n<div class=\"tip\"><strong>💡 focusin / focusout замість capturing</strong> <p>Якщо потрібно делегувати <code>focus</code>/<code>blur</code> — простіше використати <code>focusin</code>/<code>focusout</code>: вони є bubbling-аналогами і не вимагають capturing. Це поширеніший підхід у реальних проєктах.</p>\n</div>\n\n","<h1>🎯 Делегування подій</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Делегування подій (Event Delegation)</strong> — патерн, при якому один обробник призначається на батьківський елемент замість призначення окремих обробників на кожен дочірній. Завдяки bubbling, події від дітей \"спливають\" до батька.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Делегування економить пам'ять і автоматично працює для елементів, доданих у DOM динамічно — без потреби призначати нові обробники.</p>\n<h2>❌ Без делегування — неефективно</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Окремий обробник для кожного елементу — погано для великих списків</span>\n<span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelectorAll</span>(<span class=\"hljs-string\">'.task-item'</span>).<span class=\"hljs-title function_\">forEach</span>(<span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">item</span>) {\n  item.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'click'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\"></span>) {\n    item.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">toggle</span>(<span class=\"hljs-string\">'done'</span>);\n  });\n});\n<span class=\"hljs-comment\">// Проблема: нові елементи, додані пізніше, обробника НЕ матимуть</span></code></pre><h2>✅ З делегуванням — правильно</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Один обробник на батьківський елемент</span>\n<span class=\"hljs-keyword\">const</span> list = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#task-list'</span>);\n\nlist.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'click'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">event</span>) {\n  <span class=\"hljs-comment\">// Перевіряємо, чи клацнули саме на .task-item</span>\n  <span class=\"hljs-keyword\">const</span> item = event.<span class=\"hljs-property\">target</span>.<span class=\"hljs-title function_\">closest</span>(<span class=\"hljs-string\">'.task-item'</span>);\n  <span class=\"hljs-keyword\">if</span> (!item) <span class=\"hljs-keyword\">return</span>; <span class=\"hljs-comment\">// Клік був не на елементі списку</span>\n\n  item.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">toggle</span>(<span class=\"hljs-string\">'done'</span>);\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Клікнуто:'</span>, item.<span class=\"hljs-property\">textContent</span>);\n});\n\n<span class=\"hljs-comment\">// Новий елемент — обробник вже є, нічого не потрібно!</span>\n<span class=\"hljs-keyword\">const</span> newItem = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">'li'</span>);\nnewItem.<span class=\"hljs-property\">className</span> = <span class=\"hljs-string\">'task-item'</span>;\nnewItem.<span class=\"hljs-property\">textContent</span> = <span class=\"hljs-string\">'Нове завдання'</span>;\nlist.<span class=\"hljs-title function_\">appendChild</span>(newItem);</code></pre><div class=\"tip\"><strong>💡 <code>closest()</code> — ключовий метод делегування</strong> <p><code>element.closest(selector)</code> повертає найближчого предка (включно з самим елементом), що відповідає селектору. Якщо такого немає — повертає <code>null</code>. Це дозволяє коректно обробляти кліки навіть по вкладених елементах всередині цільового.</p>\n</div>\n\n","<h1>🕹️ Часто використовувані події</h1>\n<p><strong>Головна ідея:</strong> Знання конкретних подій та їх особливостей дозволяє будувати точну і передбачувану взаємодію з користувачем.</p>\n<h2>⌨️ Клавіатурні події</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'keydown'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">event</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(event.<span class=\"hljs-property\">key</span>);    <span class=\"hljs-comment\">// 'Enter', 'Escape', 'a', 'ArrowUp' тощо</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(event.<span class=\"hljs-property\">code</span>);   <span class=\"hljs-comment\">// 'KeyA', 'Enter', 'Space' — фізична клавіша</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(event.<span class=\"hljs-property\">ctrlKey</span>); <span class=\"hljs-comment\">// true, якщо затиснуто Ctrl</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(event.<span class=\"hljs-property\">shiftKey</span>); <span class=\"hljs-comment\">// true, якщо затиснуто Shift</span>\n\n  <span class=\"hljs-keyword\">if</span> (event.<span class=\"hljs-property\">key</span> === <span class=\"hljs-string\">'Escape'</span>) {\n    <span class=\"hljs-title function_\">closeModal</span>(); <span class=\"hljs-comment\">// умовна функція — закриває модальне вікно</span>\n  }\n  <span class=\"hljs-keyword\">if</span> (event.<span class=\"hljs-property\">ctrlKey</span> &amp;&amp; event.<span class=\"hljs-property\">key</span> === <span class=\"hljs-string\">'s'</span>) {\n    event.<span class=\"hljs-title function_\">preventDefault</span>(); <span class=\"hljs-comment\">// Блокуємо стандартне \"Зберегти сторінку\"</span>\n    <span class=\"hljs-title function_\">saveData</span>(); <span class=\"hljs-comment\">// умовна функція — зберігає дані</span>\n  }\n});</code></pre><h2>📝 Події форм</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> input = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#search'</span>);\n\n<span class=\"hljs-comment\">// input — спрацьовує на КОЖНУ зміну символу</span>\ninput.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'input'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">event</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Поточне значення:'</span>, event.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">value</span>);\n});\n\n<span class=\"hljs-comment\">// change — спрацьовує після втрати фокусу (якщо значення змінилось)</span>\ninput.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'change'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">event</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Підтверджене значення:'</span>, event.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">value</span>);\n});\n\n<span class=\"hljs-comment\">// focus / blur</span>\ninput.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'focus'</span>, <span class=\"hljs-function\">() =&gt;</span> input.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">add</span>(<span class=\"hljs-string\">'active'</span>));\ninput.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'blur'</span>, <span class=\"hljs-function\">() =&gt;</span> input.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">remove</span>(<span class=\"hljs-string\">'active'</span>));</code></pre><div class=\"note\"><strong>📝 <code>input</code> vs <code>change</code></strong> <p><code>input</code> реагує миттєво на кожен введений символ — підходить для пошуку в реальному часі. <code>change</code> спрацьовує лише після завершення редагування (втрата фокусу) — підходить для валідації поля.</p>\n</div>\n\n","<h1>📝 Практичний приклад — форма з валідацією в реальному часі</h1>\n<p><strong>Головна ідея:</strong> Поєднання <code>input</code>, <code>submit</code>, <code>focus</code>, <code>blur</code> та делегування дозволяє реалізувати повноцінну інтерактивну форму без фреймворків.</p>\n<pre><code class=\"language-html hljs language-xml\" data-highlighted=\"yes\"><span class=\"hljs-meta\">&lt;!DOCTYPE <span class=\"hljs-keyword\">html</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">html</span> <span class=\"hljs-attr\">lang</span>=<span class=\"hljs-string\">\"uk\"</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">head</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">charset</span>=<span class=\"hljs-string\">\"UTF-8\"</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">title</span>&gt;</span>Форма реєстрації<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">title</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">style</span>&gt;</span><span class=\"language-css\">\n    <span class=\"hljs-selector-class\">.field</span> { <span class=\"hljs-attribute\">margin-bottom</span>: <span class=\"hljs-number\">16px</span>; }\n    <span class=\"hljs-selector-tag\">label</span> { <span class=\"hljs-attribute\">display</span>: block; <span class=\"hljs-attribute\">margin-bottom</span>: <span class=\"hljs-number\">4px</span>; <span class=\"hljs-attribute\">font-weight</span>: bold; }\n    <span class=\"hljs-selector-tag\">input</span> { <span class=\"hljs-attribute\">width</span>: <span class=\"hljs-number\">300px</span>; <span class=\"hljs-attribute\">padding</span>: <span class=\"hljs-number\">8px</span>; <span class=\"hljs-attribute\">border</span>: <span class=\"hljs-number\">2px</span> solid <span class=\"hljs-number\">#ccc</span>; <span class=\"hljs-attribute\">border-radius</span>: <span class=\"hljs-number\">4px</span>; }\n    <span class=\"hljs-selector-tag\">input</span><span class=\"hljs-selector-class\">.valid</span>   { <span class=\"hljs-attribute\">border-color</span>: <span class=\"hljs-number\">#388e3c</span>; }\n    <span class=\"hljs-selector-tag\">input</span><span class=\"hljs-selector-class\">.invalid</span> { <span class=\"hljs-attribute\">border-color</span>: <span class=\"hljs-number\">#c62828</span>; }\n    <span class=\"hljs-selector-class\">.hint</span> { <span class=\"hljs-attribute\">font-size</span>: <span class=\"hljs-number\">13px</span>; <span class=\"hljs-attribute\">color</span>: <span class=\"hljs-number\">#c62828</span>; <span class=\"hljs-attribute\">margin-top</span>: <span class=\"hljs-number\">4px</span>; <span class=\"hljs-attribute\">display</span>: none; }\n    <span class=\"hljs-selector-class\">.hint</span><span class=\"hljs-selector-class\">.visible</span> { <span class=\"hljs-attribute\">display</span>: block; }\n  </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">style</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">head</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">form</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"reg-form\"</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span> <span class=\"hljs-attr\">class</span>=<span class=\"hljs-string\">\"field\"</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">label</span> <span class=\"hljs-attr\">for</span>=<span class=\"hljs-string\">\"username\"</span>&gt;</span>Ім'я користувача<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">label</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">input</span> <span class=\"hljs-attr\">type</span>=<span class=\"hljs-string\">\"text\"</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"username\"</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">\"username\"</span> <span class=\"hljs-attr\">placeholder</span>=<span class=\"hljs-string\">\"Від 3 символів\"</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span> <span class=\"hljs-attr\">class</span>=<span class=\"hljs-string\">\"hint\"</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"username-hint\"</span>&gt;</span>Мінімум 3 символи<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span> <span class=\"hljs-attr\">class</span>=<span class=\"hljs-string\">\"field\"</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">label</span> <span class=\"hljs-attr\">for</span>=<span class=\"hljs-string\">\"email\"</span>&gt;</span>Email<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">label</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">input</span> <span class=\"hljs-attr\">type</span>=<span class=\"hljs-string\">\"email\"</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"email\"</span> <span class=\"hljs-attr\">name</span>=<span class=\"hljs-string\">\"email\"</span> <span class=\"hljs-attr\">placeholder</span>=<span class=\"hljs-string\">\"user@example.com\"</span>&gt;</span>\n      <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span> <span class=\"hljs-attr\">class</span>=<span class=\"hljs-string\">\"hint\"</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"email-hint\"</span>&gt;</span>Введіть коректний email<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">type</span>=<span class=\"hljs-string\">\"submit\"</span>&gt;</span>Зареєструватись<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">form</span>&gt;</span>\n\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n    <span class=\"hljs-comment\">// Валідація поля імені в реальному часі</span>\n    <span class=\"hljs-keyword\">const</span> usernameInput = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#username'</span>);\n    usernameInput.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'input'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">e</span>) {\n      <span class=\"hljs-keyword\">const</span> value = e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">value</span>;\n      <span class=\"hljs-keyword\">const</span> isValid = value.<span class=\"hljs-property\">length</span> &gt;= <span class=\"hljs-number\">3</span>;\n      e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">toggle</span>(<span class=\"hljs-string\">'valid'</span>, isValid);\n      e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">toggle</span>(<span class=\"hljs-string\">'invalid'</span>, !isValid &amp;&amp; value.<span class=\"hljs-property\">length</span> &gt; <span class=\"hljs-number\">0</span>);\n      <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#username-hint'</span>).<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">toggle</span>(<span class=\"hljs-string\">'visible'</span>, !isValid &amp;&amp; value.<span class=\"hljs-property\">length</span> &gt; <span class=\"hljs-number\">0</span>);\n    });\n\n    <span class=\"hljs-comment\">// Валідація email при втраті фокусу — використовуємо вбудований метод браузера</span>\n    <span class=\"hljs-keyword\">const</span> emailInput = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#email'</span>);\n    emailInput.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'blur'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">e</span>) {\n      <span class=\"hljs-keyword\">const</span> isValid = e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">validity</span>.<span class=\"hljs-property\">valid</span> &amp;&amp; e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">value</span>.<span class=\"hljs-property\">length</span> &gt; <span class=\"hljs-number\">0</span>;\n      e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">toggle</span>(<span class=\"hljs-string\">'valid'</span>, isValid);\n      e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">toggle</span>(<span class=\"hljs-string\">'invalid'</span>, !isValid &amp;&amp; e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">value</span>.<span class=\"hljs-property\">length</span> &gt; <span class=\"hljs-number\">0</span>);\n      <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#email-hint'</span>).<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">toggle</span>(<span class=\"hljs-string\">'visible'</span>, !isValid &amp;&amp; e.<span class=\"hljs-property\">target</span>.<span class=\"hljs-property\">value</span>.<span class=\"hljs-property\">length</span> &gt; <span class=\"hljs-number\">0</span>);\n    });\n\n    <span class=\"hljs-comment\">// Перехоплення відправки форми</span>\n    <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#reg-form'</span>).<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'submit'</span>, <span class=\"hljs-keyword\">function</span> (<span class=\"hljs-params\">e</span>) {\n      e.<span class=\"hljs-title function_\">preventDefault</span>(); <span class=\"hljs-comment\">// Зупиняємо стандартну відправку</span>\n      <span class=\"hljs-keyword\">const</span> username = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#username'</span>).<span class=\"hljs-property\">value</span>;\n      <span class=\"hljs-keyword\">const</span> email = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#email'</span>).<span class=\"hljs-property\">value</span>;\n      <span class=\"hljs-keyword\">if</span> (username.<span class=\"hljs-property\">length</span> &gt;= <span class=\"hljs-number\">3</span> &amp;&amp; email.<span class=\"hljs-title function_\">includes</span>(<span class=\"hljs-string\">'@'</span>)) {\n        <span class=\"hljs-title function_\">alert</span>(<span class=\"hljs-string\">`✅ Реєстрація: <span class=\"hljs-subst\">${username}</span> (<span class=\"hljs-subst\">${email}</span>)`</span>);\n      } <span class=\"hljs-keyword\">else</span> {\n        <span class=\"hljs-title function_\">alert</span>(<span class=\"hljs-string\">'❌ Заповніть форму коректно'</span>);\n      }\n    });\n  </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">html</span>&gt;</span></code></pre><div class=\"note\"><strong>📝 Архітектурне рішення</strong> <p>У прикладі навмисно використані окремі обробники на кожне поле — для наочності. У реальних проєктах схожу логіку варто делегувати на <code>&lt;form&gt;</code> або винести у функцію-валідатор, щоб уникнути дублювання коду.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>Подієво-орієнтована модель</strong> — браузер генерує події у відповідь на дії користувача, а JavaScript реагує на них через обробники</p>\n</li>\n<li><p><strong><code>addEventListener</code></strong> — єдиний рекомендований спосіб призначення обробників; дозволяє додавати кілька обробників на одну подію та видаляти їх через <code>removeEventListener</code></p>\n</li>\n<li><p><strong>Об'єкт <code>event</code></strong> — передається обробнику автоматично, містить тип, ціль, координати, клавіші; <code>preventDefault()</code> скасовує стандартну дію браузера</p>\n</li>\n<li><p><strong>Три фази поширення події</strong> — Capturing (зверху вниз), Target, Bubbling (знизу вгору); за замовчуванням обробники працюють у фазі bubbling; <code>stopPropagation()</code> зупиняє поширення у будь-якій фазі</p>\n</li>\n<li><p><strong>Делегування подій</strong> — один обробник на батьківському елементі замість обробників на кожному дочірньому; працює завдяки bubbling та методу <code>closest()</code></p>\n</li>\n<li><p><strong><code>input</code> vs <code>change</code></strong> — <code>input</code> спрацьовує миттєво на кожен символ, <code>change</code> — після завершення редагування і втрати фокусу</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Чим <code>addEventListener</code> кращий за <code>onclick</code>-властивість? Коли один спосіб витісняє можливості іншого?</p>\n</li>\n<li><p>🤔 Що таке bubbling і як це впливає на поведінку вкладених обробників? Як зупинити поширення події?</p>\n</li>\n<li><p>🤔 Яка різниця між <code>event.target</code> і <code>event.currentTarget</code>? У яких ситуаціях вони збігаються, а в яких — ні?</p>\n</li>\n<li><p>🤔 Для чого використовується <code>event.preventDefault()</code>? Наведіть два практичних приклади.</p>\n</li>\n<li><p>🤔 Що таке делегування подій? Чому воно особливо корисне при роботі з динамічно доданими елементами?</p>\n</li>\n<li><p>🤔 Яка різниця між подіями <code>input</code> і <code>change</code>? Для яких задач підходить кожна?</p>\n</li>\n<li><p>🤔 Як видалити обробник події? Що потрібно враховувати при передачі функції у <code>removeEventListener</code>?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Подія</td>\n<td>Event</td>\n<td>Сигнал браузера про дію користувача або зміну стану документа</td>\n</tr>\n<tr>\n<td>Обробник події</td>\n<td>Event Handler</td>\n<td>Функція, що виконується у відповідь на конкретну подію</td>\n</tr>\n<tr>\n<td>Спливання події</td>\n<td>Event Bubbling</td>\n<td>Поширення події від цільового елемента вгору по DOM-дереву</td>\n</tr>\n<tr>\n<td>Захоплення події</td>\n<td>Event Capturing</td>\n<td>Поширення події від кореня DOM вниз до цільового елемента</td>\n</tr>\n<tr>\n<td>Делегування подій</td>\n<td>Event Delegation</td>\n<td>Патерн обробки подій через батьківський елемент замість кожного дочірнього окремо</td>\n</tr>\n<tr>\n<td>Стандартна дія</td>\n<td>Default Action</td>\n<td>Вбудована поведінка браузера для певних елементів (перехід, відправка форми тощо)</td>\n</tr>\n<tr>\n<td>Фокус</td>\n<td>Focus</td>\n<td>Стан елемента форми, готового приймати введення з клавіатури</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>DOM</td>\n<td>Document Object Model</td>\n<td>Об'єктна модель документа</td>\n</tr>\n<tr>\n<td>HTML</td>\n<td>HyperText Markup Language</td>\n<td>Мова розмітки гіпертексту</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
