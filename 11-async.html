<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Асинхронний JavaScript</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"><style>* {

        .slide::-webkit-scrollbar-thumb {

        .slide h1 {

        .slide h3 {

        .slide p {
            color: #2d3748;

        .slide ul, .slide ol {
            margin-left: 2rem;

        .slide li {

        .slide pre {

        .mermaid {

        /* Запобігаємо обрізанню останньої літери в нодах Mermaid через зміну font-weight після розрахунку розміру */

        /* Повноекранний режим - зберігаємо оригінальний фон */

#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 15</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>Асинхронний JavaScript</h1>\n<p><strong>Web-технології в автоматизованих системах</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>⏱️ Синхронний vs асинхронний код — у чому різниця</li>\n<li>🔁 Подієвий цикл — Event Loop</li>\n<li>📞 Функції зворотного виклику — Callbacks</li>\n<li>😱 Проблема вкладених callbacks — Callback Hell</li>\n<li>🤝 Проміси — Promise</li>\n<li>⛓️ Ланцюжки промісів та обробка помилок</li>\n<li>✨ Сучасний синтаксис — <code>async</code> / <code>await</code></li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>⏱️ Синхронний vs Асинхронний код</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Синхронний код</strong> — виконується послідовно, рядок за рядком. Наступна операція починається лише після завершення попередньої.</p>\n<p><strong>Асинхронний код</strong> — дозволяє запустити тривалу операцію і продовжити виконання інших інструкцій, не чекаючи на результат.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> JavaScript є однопотоковою мовою — він виконує лише одну операцію одночасно. Асинхронність дозволяє не «заморожувати» сторінку під час тривалих операцій.</p>\n<h2>📊 Порівняння підходів</h2>\n<table>\n<thead>\n<tr>\n<th>Характеристика</th>\n<th>Синхронний</th>\n<th>Асинхронний</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Порядок виконання</td>\n<td>Суворо послідовний</td>\n<td>Запуск послідовний, завершення — ні</td>\n</tr>\n<tr>\n<td>Блокування потоку</td>\n<td>✅ Так</td>\n<td>❌ Ні</td>\n</tr>\n<tr>\n<td>Де застосовується</td>\n<td>Прості обчислення</td>\n<td>Мережеві запити, таймери, файли</td>\n</tr>\n<tr>\n<td>Складність коду</td>\n<td>Простий для читання</td>\n<td>Потребує особливих патернів</td>\n</tr>\n</tbody></table>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// 🔴 Синхронний — виконується по черзі</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Крок 1\"</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Крок 2\"</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Крок 3\"</span>);\n<span class=\"hljs-comment\">// Виведе: Крок 1 → Крок 2 → Крок 3</span>\n\n<span class=\"hljs-comment\">// 🟢 Асинхронний — setTimeout не блокує потік</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Старт\"</span>);\n<span class=\"hljs-built_in\">setTimeout</span>(<span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Таймер!\"</span>), <span class=\"hljs-number\">2000</span>); <span class=\"hljs-comment\">// Через 2 секунди</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Фініш\"</span>);\n<span class=\"hljs-comment\">// Виведе: Старт → Фініш → Таймер!</span></code></pre><div class=\"note\"><strong>📝 Де виникає асинхронність?</strong> <p>Типові асинхронні операції: <code>setTimeout</code> / <code>setInterval</code>, мережеві запити (<code>fetch</code>), читання файлів, запити до бази даних, операції з буфером обміну.</p>\n</div>\n\n","<h1>🔁 Подієвий цикл — Event Loop</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Event Loop</strong> (подієвий цикл) — механізм виконання JavaScript, що безперервно перевіряє чергу завдань і виконує їх після того, як основний стек викликів звільниться.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Браузер виконує JS у єдиному потоці, але асинхронні операції передаються зовнішнім API браузера, а їхні callback-функції ставляться у чергу і виконуються, коли стек вільний.</p>\n<h2>🏗️ Архітектура Event Loop</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    CODE[&quot;📝 Ваш код&quot;] --&gt; STACK[&quot;📚 Call Stack&quot;]\n    STACK --&gt; |&quot;Async API&quot;| WEBAPI[&quot;🌐 Web APIs: setTimeout, fetch&quot;]\n    WEBAPI --&gt; QUEUE[&quot;📬 Callback Queue&quot;]\n    QUEUE --&gt; |&quot;Стек порожній?&quot;| LOOP[&quot;🔄 Event Loop&quot;]\n    LOOP --&gt; STACK\n ate(-100, -24)\"><rect></rect><foreignObject width=\"200\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>🌐 Web APIs: setTimeout, fetch</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-QUEUE-5\" transform=\"translate(855.125, 44)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-93.140625\" y=\"-24\" width=\"186.28125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-69.140625, -12)\"><rect></rect><foreignObject width=\"138.28125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📬 Callback Queue</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-LOOP-7\" transform=\"translate(1198.3359375, 79.5)\"><rect class=\"basic label-container\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\" x=\"-76.5546875\" y=\"-24\" width=\"153.109375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-52.5546875, -12)\"><rect></rect><foreignObject width=\"105.109375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🔄 Event Loop</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<h2>📋 Покроковий приклад</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"1️⃣ Старт\"</span>); <span class=\"hljs-comment\">// → Call Stack → виконується одразу</span>\n\n<span class=\"hljs-built_in\">setTimeout</span>(<span class=\"hljs-function\">() =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"3️⃣ Таймер\"</span>); <span class=\"hljs-comment\">// → Web API → Queue → виконається після 0 мс,</span>\n}, <span class=\"hljs-number\">0</span>); <span class=\"hljs-comment\">//   але лише коли стек звільниться</span>\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"2️⃣ Фініш\"</span>); <span class=\"hljs-comment\">// → Call Stack → виконується одразу</span>\n\n<span class=\"hljs-comment\">// Результат: 1️⃣ Старт  →  2️⃣ Фініш  →  3️⃣ Таймер</span></code></pre><div class=\"warning\"><strong>⚠️ Важливо</strong> <p><code>setTimeout(fn, 0)</code> <strong>не означає «одразу»</strong> — це означає «якомога швидше, але лише після того, як стек викликів стане порожнім». Event Loop завжди чекає звільнення стеку.</p>\n</div>\n\n","<h1>📞 Функції зворотного виклику — Callbacks</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Callback</strong> (функція зворотного виклику) — функція, яка передається як аргумент в іншу функцію і викликається нею після завершення асинхронної операції.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Callbacks — перший і найпростіший механізм керування асинхронним кодом у JavaScript.</p>\n<h2>🔧 Базовий приклад callback</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Функція, яка приймає callback як параметр</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">loadData</span>(<span class=\"hljs-params\">url, onSuccess, onError</span>) {\n  <span class=\"hljs-built_in\">setTimeout</span>(<span class=\"hljs-function\">() =&gt;</span> {\n    <span class=\"hljs-keyword\">if</span> (url) {\n      <span class=\"hljs-title function_\">onSuccess</span>({ <span class=\"hljs-attr\">id</span>: <span class=\"hljs-number\">1</span>, <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">\"Data loaded\"</span> }); <span class=\"hljs-comment\">// Успіх</span>\n    } <span class=\"hljs-keyword\">else</span> {\n      <span class=\"hljs-title function_\">onError</span>(<span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">\"URL is not provided\"</span>)); <span class=\"hljs-comment\">// Помилка</span>\n    }\n  }, <span class=\"hljs-number\">1000</span>);\n}\n\n<span class=\"hljs-comment\">// Виклик з callback-функціями</span>\n<span class=\"hljs-title function_\">loadData</span>(\n  <span class=\"hljs-string\">\"https://api.example.com/data\"</span>,\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">data</span>) =&gt;</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"✅ Успіх:\"</span>, data),\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">err</span>) =&gt;</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"❌ Помилка:\"</span>, err.<span class=\"hljs-property\">message</span>),\n);\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"⏳ Очікуємо відповідь...\"</span>);\n<span class=\"hljs-comment\">// Виведе: ⏳ Очікуємо відповідь...</span>\n<span class=\"hljs-comment\">//         ✅ Успіх: { id: 1, name: \"Data loaded\" }</span></code></pre><h2>📋 Стандарт Node.js: Error-First Callbacks</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Перший аргумент завжди — помилка (або null, якщо все добре)</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">readFile</span>(<span class=\"hljs-params\">path, callback</span>) {\n  <span class=\"hljs-built_in\">setTimeout</span>(<span class=\"hljs-function\">() =&gt;</span> {\n    <span class=\"hljs-title function_\">callback</span>(<span class=\"hljs-literal\">null</span>, <span class=\"hljs-string\">\"file content\"</span>); <span class=\"hljs-comment\">// null = немає помилки</span>\n  }, <span class=\"hljs-number\">500</span>);\n}\n\n<span class=\"hljs-title function_\">readFile</span>(<span class=\"hljs-string\">\"data.txt\"</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">err, data</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">if</span> (err) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">\"Помилка:\"</span>, err);\n    <span class=\"hljs-keyword\">return</span>;\n  }\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Дані:\"</span>, data);\n});</code></pre><div class=\"tip\"><strong>💡 Конвенція error-first</strong> <p>У Node.js та більшості бібліотек прийнята угода: перший параметр callback — завжди об'єкт помилки (або <code>null</code>), другий — результат. Це дозволяє уніфіковано обробляти помилки.</p>\n</div>\n\n","<h1>😱 Проблема вкладених callbacks — Callback Hell</h1>\n<p><strong>Головна ідея:</strong> Вкладені callback-функції швидко утворюють нечитабельну структуру коду з глибокою горизонтальною вкладеністю, яку важко підтримувати та налагоджувати.</p>\n<h2>🔺 Класична вкладена структура callbacks</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Завантажити користувача → замовлення → деталі → доставку</span>\n<span class=\"hljs-title function_\">fetchUser</span>(userId, <span class=\"hljs-function\">(<span class=\"hljs-params\">err, user</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">if</span> (err) <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(err);\n\n  <span class=\"hljs-title function_\">fetchOrders</span>(user.<span class=\"hljs-property\">id</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">err, order</span>) =&gt;</span> {\n    <span class=\"hljs-keyword\">if</span> (err) <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(err);\n\n    <span class=\"hljs-title function_\">fetchDetails</span>(order.<span class=\"hljs-property\">id</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">err, details</span>) =&gt;</span> {\n      <span class=\"hljs-keyword\">if</span> (err) <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(err);\n\n      <span class=\"hljs-title function_\">fetchDelivery</span>(details.<span class=\"hljs-property\">id</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">err, delivery</span>) =&gt;</span> {\n        <span class=\"hljs-keyword\">if</span> (err) <span class=\"hljs-keyword\">return</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(err);\n\n        <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"✅ Всі дані:\"</span>, user, order, details, delivery);\n        <span class=\"hljs-comment\">// ← Кожен рівень вкладеності = +2 пробіли зліва</span>\n      });\n    });\n  });\n});</code></pre><h2>❌ Проблеми Callback Hell</h2>\n<table>\n<thead>\n<tr>\n<th>Проблема</th>\n<th>Наслідок</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Глибока вкладеність</td>\n<td>Код читається справа наліво, важко розуміти</td>\n</tr>\n<tr>\n<td>Дублювання помилок</td>\n<td><code>if (err) return</code> повторюється на кожному рівні</td>\n</tr>\n<tr>\n<td>Складне налагодження</td>\n<td>Стек викликів заплутується</td>\n</tr>\n<tr>\n<td>Важке тестування</td>\n<td>Ізолювати кожен рівень майже неможливо</td>\n</tr>\n</tbody></table>\n<div class=\"danger\"><strong>🚫 Антипатерн</strong> <p>Callback hell — антипатерн, що виникає через вкладену асинхронну логіку. Саме для його вирішення були введені <strong>Promise</strong> і надалі <strong>async/await</strong>.</p>\n</div>\n\n","<h1>🤝 Проміси — Promise</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Promise</strong> (проміс) — об'єкт, що представляє результат асинхронної операції, яка ще не завершилась. Проміс гарантує, що в майбутньому він перейде в один із двох станів: <strong>fulfilled</strong> (виконано) або <strong>rejected</strong> (відхилено).</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Promise — це «обіцянка» повернути результат. Замість передачі callback у функцію, ми отримуємо об'єкт, з яким можемо взаємодіяти.</p>\n<h2>📊 Три стани Promise</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    PENDING[&quot;⏳ pending -- Очікування&quot;] --&gt; |&quot;resolve()&quot;| FULFILLED[&quot;✅ fulfilled -- Виконано&quot;]\n    PENDING --&gt; |&quot;reject()&quot;| REJECTED[&quot;❌ rejected -- Відхилено&quot;]\n    style PENDING fill:#fff9c4,stroke:#f9a825\n    style FULFILLED fill:#e8f5e9,stroke:#388e3c\n    style REJECTED fill:#fce4ec,stroke:#c2185b\"><svg id=\"exp-1774891288800-6-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 605.046875px;\" viewBox=\"0 0 605.046875 162\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1774891288800-6-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1774891288800-6-0 .edge-animation-slow{stroke-dasharray:9,5!import ormal\">resolve()</tspan></tspan></text></g></g></g><g class=\"edgeLabel\" transform=\"translate(306.03125, 130)\"><g class=\"label\" data-id=\"L_PENDING_REJECTED_0\" transform=\"translate(0, -10)\"><g><rect class=\"background\" style=\"\" x=\"-28.3671875\" y=\"-1\" width=\"56.734375\" height=\"22\"></rect><text y=\"-10.1\" text-anchor=\"middle\" style=\"\"><tspan class=\"text-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"><tspan font-style=\"normal\" class=\"text-inner-tspan\" font-weight=\"normal\">reject()</tspan></tspan></text></g></g></g></g><g class=\"nodes\"><g class=\"node default  \" id=\"flowchart-PENDING-0\" transform=\"translate(127.5703125, 81)\"><rect class=\"basic label-container\" style=\"fill:#fff9c4 !important;stroke:#f9a825 !important\" x=\"-119.5703125\" y=\"-24\" width=\"239.140625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-95.5703125, -12)\"><rect></rect><foreignObject width=\"191.140625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>⏳ pending -- Очікування</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-FULFILLED-1\" transform=\"translate(480.984375, 32)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-110.84375\" y=\"-24\" width=\"221.6875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-86.84375, -12)\"><rect></rect><foreignObject width=\"173.6875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>✅ fulfilled -- Виконано</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-REJECTED-3\" transform=\"translate(480.984375, 130)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-116.0625\" y=\"-24\" width=\"232.125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-92.0625, -12)\"><rect></rect><foreignObject width=\"184.125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>❌ rejected -- Відхилено</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<h2>🔧 Створення та використання Promise</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Створення Promise</span>\n<span class=\"hljs-keyword\">const</span> myPromise = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Promise</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">resolve, reject</span>) =&gt;</span> {\n  <span class=\"hljs-built_in\">setTimeout</span>(<span class=\"hljs-function\">() =&gt;</span> {\n    <span class=\"hljs-keyword\">const</span> success = <span class=\"hljs-literal\">true</span>;\n    <span class=\"hljs-keyword\">if</span> (success) {\n      <span class=\"hljs-title function_\">resolve</span>(<span class=\"hljs-string\">\"✅ Data loaded!\"</span>); <span class=\"hljs-comment\">// Перехід у fulfilled</span>\n    } <span class=\"hljs-keyword\">else</span> {\n      <span class=\"hljs-title function_\">reject</span>(<span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">\"Something went wrong\"</span>)); <span class=\"hljs-comment\">// Перехід у rejected</span>\n    }\n  }, <span class=\"hljs-number\">1000</span>);\n});\n\n<span class=\"hljs-comment\">// Використання Promise</span>\nmyPromise\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">result</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(result); <span class=\"hljs-comment\">// \"✅ Дані отримано!\"</span>\n  })\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">error</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(error.<span class=\"hljs-property\">message</span>);\n  })\n  .<span class=\"hljs-title function_\">finally</span>(<span class=\"hljs-function\">() =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"🏁 Операція завершена (завжди)\"</span>);\n  });</code></pre><div class=\"note\"><strong>📝 <code>.finally()</code></strong> <p>Блок <code>.finally()</code> виконується <strong>завжди</strong> — незалежно від того, чи був проміс виконаний успішно чи відхилений. Використовується для закриття з'єднань, приховування індикатора завантаження тощо.</p>\n</div>\n\n","<h1>⛓️ Ланцюжки промісів</h1>\n<p><strong>Головна ідея:</strong> Проміси можна об'єднувати у ланцюжки через <code>.then()</code>, уникаючи глибокої вкладеності. Кожен <code>.then()</code> повертає новий проміс.</p>\n<h2>🔗 Порівняння: Callbacks vs Promise chain</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ✅ Те саме завдання, але через ланцюжок Promise</span>\n<span class=\"hljs-title function_\">fetchUser</span>(userId)\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">user</span>) =&gt;</span> <span class=\"hljs-title function_\">fetchOrders</span>(user.<span class=\"hljs-property\">id</span>))\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">order</span>) =&gt;</span> <span class=\"hljs-title function_\">fetchDetails</span>(order.<span class=\"hljs-property\">id</span>))\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">details</span>) =&gt;</span> <span class=\"hljs-title function_\">fetchDelivery</span>(details.<span class=\"hljs-property\">id</span>))\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">delivery</span>) =&gt;</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"✅ Готово:\"</span>, delivery))\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">err</span>) =&gt;</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">\"❌ Помилка на будь-якому кроці:\"</span>, err));</code></pre><h2>🚀 Паралельне виконання Promise.all</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Запустити кілька промісів одночасно і дочекатись усіх</span>\n<span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">all</span>([\n  <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">\"https://api.example.com/users\"</span>),\n  <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">\"https://api.example.com/orders\"</span>),\n  <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">\"https://api.example.com/products\"</span>),\n])\n  .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">[users, orders, products]</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"✅ Всі три запити завершено\"</span>);\n  })\n  .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">err</span>) =&gt;</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">\"❌ Хоча б один запит провалився:\"</span>, err);\n  });</code></pre><h2>📊 Методи Promise</h2>\n<table>\n<thead>\n<tr>\n<th>Метод</th>\n<th>Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>Promise.all(arr)</code></td>\n<td>Чекає на всі; відхиляється при першій помилці</td>\n</tr>\n<tr>\n<td><code>Promise.allSettled(arr)</code></td>\n<td>Чекає на всі; повертає результат кожного незалежно</td>\n</tr>\n<tr>\n<td><code>Promise.race(arr)</code></td>\n<td>Повертає результат того, хто завершився першим</td>\n</tr>\n<tr>\n<td><code>Promise.any(arr)</code></td>\n<td>Повертає перший успішний; відхиляється лише якщо всі впали</td>\n</tr>\n</tbody></table>\n","<h1>✨ <code>async</code> / <code>await</code></h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong><code>async</code></strong> — ключове слово перед функцією, що перетворює її на асинхронну. Така функція завжди повертає Promise.</p>\n<p><strong><code>await</code></strong> — ключове слово, що «призупиняє» виконання <code>async</code>-функції до завершення Promise, не блокуючи основний потік.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> <code>async/await</code> — синтаксичний цукор над Promise, що дозволяє писати асинхронний код у стилі синхронного — зрозуміло та лінійно.</p>\n<h2>🔧 Синтаксис async/await</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Аналог попереднього ланцюжка .then(), але читається як синхронний код</span>\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">loadAll</span>(<span class=\"hljs-params\">userId</span>) {\n  <span class=\"hljs-keyword\">const</span> user = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetchUser</span>(userId);\n  <span class=\"hljs-keyword\">const</span> order = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetchOrders</span>(user.<span class=\"hljs-property\">id</span>);\n  <span class=\"hljs-keyword\">const</span> details = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetchDetails</span>(order.<span class=\"hljs-property\">id</span>);\n  <span class=\"hljs-keyword\">const</span> delivery = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetchDelivery</span>(details.<span class=\"hljs-property\">id</span>);\n\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"✅ Готово:\"</span>, delivery);\n}\n\n<span class=\"hljs-title function_\">loadAll</span>(<span class=\"hljs-number\">42</span>);</code></pre><h2>🛡️ Обробка помилок через try/catch</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">getData</span>(<span class=\"hljs-params\">url</span>) {\n  <span class=\"hljs-keyword\">try</span> {\n    <span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(url); <span class=\"hljs-comment\">// Чекаємо відповідь сервера</span>\n\n    <span class=\"hljs-keyword\">if</span> (!response.<span class=\"hljs-property\">ok</span>) {\n      <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`HTTP помилка: <span class=\"hljs-subst\">${response.status}</span>`</span>);\n    }\n\n    <span class=\"hljs-keyword\">const</span> data = <span class=\"hljs-keyword\">await</span> response.<span class=\"hljs-title function_\">json</span>(); <span class=\"hljs-comment\">// Чекаємо парсинг JSON</span>\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"✅ Дані:\"</span>, data);\n    <span class=\"hljs-keyword\">return</span> data;\n  } <span class=\"hljs-keyword\">catch</span> (err) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">\"❌ Помилка:\"</span>, err.<span class=\"hljs-property\">message</span>); <span class=\"hljs-comment\">// Будь-яка помилка потрапляє сюди</span>\n    <span class=\"hljs-keyword\">throw</span> err; <span class=\"hljs-comment\">// Прокидаємо далі, якщо потрібно</span>\n  } <span class=\"hljs-keyword\">finally</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"🏁 Запит завершено\"</span>); <span class=\"hljs-comment\">// Виконується завжди</span>\n  }\n}</code></pre><div class=\"tip\"><strong>💡 await — лише всередині async</strong> <p><code>await</code> можна використовувати <strong>лише всередині <code>async</code>-функції</strong>. Спроба використати <code>await</code> на верхньому рівні звичайного скрипта призведе до синтаксичної помилки (окрім ES-модулів, де дозволений Top-level await).</p>\n</div>\n\n","<h1>⚖️ Порівняння: Callback → Promise → async/await</h1>\n<p><strong>Головна ідея:</strong> Три підходи вирішують одне завдання, але відрізняються за читабельністю та зручністю обробки помилок.</p>\n<h2>📝 Одне завдання — три підходи</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// 📞 Callbacks — вкладено, важко читати</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">step1Callback</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-title function_\">operation1</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">err, res1</span>) =&gt;</span> {\n    <span class=\"hljs-keyword\">if</span> (err) <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">handleError</span>(err);\n    <span class=\"hljs-title function_\">operation2</span>(res1, <span class=\"hljs-function\">(<span class=\"hljs-params\">err, res2</span>) =&gt;</span> {\n      <span class=\"hljs-keyword\">if</span> (err) <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">handleError</span>(err);\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Результат:\"</span>, res2);\n    });\n  });\n}\n\n<span class=\"hljs-comment\">// 🤝 Promise chain — плоско, один catch</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">step2Promise</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-title function_\">operation1</span>()\n    .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">res1</span>) =&gt;</span> <span class=\"hljs-title function_\">operation2</span>(res1))\n    .<span class=\"hljs-title function_\">then</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">res2</span>) =&gt;</span> <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Результат:\"</span>, res2))\n    .<span class=\"hljs-title function_\">catch</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">err</span>) =&gt;</span> <span class=\"hljs-title function_\">handleError</span>(err));\n}\n\n<span class=\"hljs-comment\">// ✨ async/await — як синхронний код</span>\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">step3Async</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">try</span> {\n    <span class=\"hljs-keyword\">const</span> res1 = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">operation1</span>();\n    <span class=\"hljs-keyword\">const</span> res2 = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">operation2</span>(res1);\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Результат:\"</span>, res2);\n  } <span class=\"hljs-keyword\">catch</span> (err) {\n    <span class=\"hljs-title function_\">handleError</span>(err);\n  }\n}</code></pre><h2>📊 Коли що обирати</h2>\n<table>\n<thead>\n<tr>\n<th>Підхід</th>\n<th>Коли використовувати</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Callbacks</td>\n<td>Проста одноразова асинхронна дія, стара кодова база</td>\n</tr>\n<tr>\n<td>Promise chain</td>\n<td>Послідовні або паралельні операції, <code>Promise.all</code></td>\n</tr>\n<tr>\n<td>async/await</td>\n<td><strong>Більшість сучасного коду</strong> — найкраща читабельність</td>\n</tr>\n</tbody></table>\n","<h1>🛠️ Практичний приклад: завантаження даних</h1>\n<p><strong>Головна ідея:</strong> Поєднання <code>async/await</code> з обробкою помилок — стандартна техніка для роботи з мережею в реальних застосунках.</p>\n<pre><code class=\"language-html hljs language-xml\" data-highlighted=\"yes\"><span class=\"hljs-meta\">&lt;!DOCTYPE <span class=\"hljs-keyword\">html</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">html</span> <span class=\"hljs-attr\">lang</span>=<span class=\"hljs-string\">\"uk\"</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">head</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">charset</span>=<span class=\"hljs-string\">\"UTF-8\"</span> /&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">title</span>&gt;</span>Async Demo<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">title</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">head</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"loadBtn\"</span>&gt;</span>📥 Завантажити користувача<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">div</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"output\"</span>&gt;</span>Результат з'явиться тут...<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">div</span>&gt;</span>\n\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n      <span class=\"hljs-comment\">// Імітуємо асинхронний запит до API</span>\n      <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">fetchUser</span>(<span class=\"hljs-params\">id</span>) {\n        <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Promise</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">resolve, reject</span>) =&gt;</span> {\n          <span class=\"hljs-built_in\">setTimeout</span>(<span class=\"hljs-function\">() =&gt;</span> {\n            <span class=\"hljs-keyword\">if</span> (id &gt; <span class=\"hljs-number\">0</span>) {\n              <span class=\"hljs-title function_\">resolve</span>({ id, <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">\"Олена Коваль\"</span>, <span class=\"hljs-attr\">role</span>: <span class=\"hljs-string\">\"Студент\"</span> });\n            } <span class=\"hljs-keyword\">else</span> {\n              <span class=\"hljs-title function_\">reject</span>(<span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">\"Invalid user ID\"</span>));\n            }\n          }, <span class=\"hljs-number\">1500</span>);\n        });\n      }\n\n      <span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">loadUser</span>(<span class=\"hljs-params\"></span>) {\n        <span class=\"hljs-keyword\">const</span> output = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">\"output\"</span>);\n        <span class=\"hljs-keyword\">const</span> btn = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">\"loadBtn\"</span>);\n\n        <span class=\"hljs-keyword\">try</span> {\n          btn.<span class=\"hljs-property\">disabled</span> = <span class=\"hljs-literal\">true</span>;\n          output.<span class=\"hljs-property\">textContent</span> = <span class=\"hljs-string\">\"⏳ Завантажується...\"</span>;\n\n          <span class=\"hljs-keyword\">const</span> user = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetchUser</span>(<span class=\"hljs-number\">1</span>); <span class=\"hljs-comment\">// Чекаємо 1.5 секунди</span>\n\n          output.<span class=\"hljs-property\">textContent</span> = <span class=\"hljs-string\">`✅ <span class=\"hljs-subst\">${user.name}</span> — <span class=\"hljs-subst\">${user.role}</span>`</span>;\n        } <span class=\"hljs-keyword\">catch</span> (err) {\n          output.<span class=\"hljs-property\">textContent</span> = <span class=\"hljs-string\">`❌ Помилка: <span class=\"hljs-subst\">${err.message}</span>`</span>;\n        } <span class=\"hljs-keyword\">finally</span> {\n          btn.<span class=\"hljs-property\">disabled</span> = <span class=\"hljs-literal\">false</span>; <span class=\"hljs-comment\">// Кнопка завжди стає активною знову</span>\n        }\n      }\n\n      <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">\"loadBtn\"</span>).<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">\"click\"</span>, loadUser);\n    </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">html</span>&gt;</span></code></pre><div class=\"note\"><strong>📝 Що демонструє цей приклад</strong> <p>Реальна практика: блокування кнопки під час запиту, індикатор завантаження, обробка помилок у <code>catch</code>, гарантоване розблокування у <code>finally</code>. Цей шаблон застосовується в будь-якому застосунку, що працює з API.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>Синхронний vs асинхронний код</strong> — JavaScript однопотоковий, але Event Loop дозволяє не блокувати виконання під час очікування</p>\n</li>\n<li><p><strong>Event Loop</strong> — безперервно перевіряє чергу задач і виконує callbacks після звільнення стеку викликів</p>\n</li>\n<li><p><strong>Callbacks</strong> — перший механізм асинхронності; зручні для простих сценаріїв, але при вкладеності призводять до надмірно складної структури коду (Callback Hell)</p>\n</li>\n<li><p><strong>Promise</strong> — об'єкт з трьома станами (pending → fulfilled / rejected); ланцюжки <code>.then().catch()</code> роблять код плоским та читабельним</p>\n</li>\n<li><p><strong><code>Promise.all</code></strong> — запускає кілька промісів паралельно і чекає на всі результати одночасно</p>\n</li>\n<li><p><strong><code>async/await</code></strong> — сучасний синтаксис над Promise; дозволяє писати асинхронний код у лінійному стилі</p>\n</li>\n<li><p><strong><code>try/catch/finally</code></strong> — стандартний спосіб обробки помилок в <code>async</code>-функціях; <code>finally</code> виконується завжди</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Чому JavaScript є однопотоковою мовою? Як Event Loop вирішує проблему асинхронності?</p>\n</li>\n<li><p>🤔 Що таке callback-функція? Наведіть приклад її використання для асинхронної операції.</p>\n</li>\n<li><p>🤔 Що таке «Callback Hell» і чому це вважається антипатерном? Як його уникнути?</p>\n</li>\n<li><p>🤔 Які три стани може мати Promise? Чи може Promise перейти зі стану <code>fulfilled</code> назад у <code>pending</code>?</p>\n</li>\n<li><p>🤔 Яка різниця між <code>Promise.all()</code> і <code>Promise.allSettled()</code>? Коли доцільно використовувати кожен?</p>\n</li>\n<li><p>🤔 Що станеться, якщо використати <code>await</code> поза межами <code>async</code>-функції?</p>\n</li>\n<li><p>🤔 Навіщо використовувати блок <code>finally</code> в <code>async/await</code>? Наведіть практичний приклад.</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Асинхронне програмування</td>\n<td>Async programming</td>\n<td>Стиль написання коду, при якому тривалі операції не блокують виконання програми</td>\n</tr>\n<tr>\n<td>Подієвий цикл</td>\n<td>Event Loop</td>\n<td>Механізм виконання JS, що обробляє чергу завдань після звільнення стеку</td>\n</tr>\n<tr>\n<td>Стек викликів</td>\n<td>Call Stack</td>\n<td>Структура даних, що відстежує порядок виклику функцій</td>\n</tr>\n<tr>\n<td>Функція зворотного виклику</td>\n<td>Callback</td>\n<td>Функція, що передається як аргумент і викликається після завершення операції</td>\n</tr>\n<tr>\n<td>Проміс</td>\n<td>Promise</td>\n<td>Об'єкт, що представляє майбутній результат асинхронної операції</td>\n</tr>\n<tr>\n<td>Ланцюжок промісів</td>\n<td>Promise chain</td>\n<td>Послідовне з'єднання промісів через <code>.then()</code></td>\n</tr>\n<tr>\n<td>Вкладені callbacks</td>\n<td>Callback Hell</td>\n<td>Антипатерн глибоко вкладених callback-функцій</td>\n</tr>\n<tr>\n<td>Паралельне виконання</td>\n<td>Parallel execution</td>\n<td>Одночасний запуск кількох асинхронних операцій</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>JS</td>\n<td>JavaScript</td>\n<td>JavaScript</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>HTTP</td>\n<td>HyperText Transfer Protocol</td>\n<td>Протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td>JSON</td>\n<td>JavaScript Object Notation</td>\n<td>Текстовий формат обміну даними</td>\n</tr>\n<tr>\n<td>URL</td>\n<td>Uniform Resource Locator</td>\n<td>Уніфікований локатор ресурсу</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}

function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
