\n<td><code>200 OK</code>, <code>404 Not Found</code></td>\n</tr>\n<tr>\n<td>Заголовки</td>\n<td>Метадані відповіді</td>\n<td><code>Content-Type: application/json</code></td>\n</tr>\n<tr>\n<td>Тіло</td>\n<td>Повернені дані</td>\n<td>JSON, HTML, текст</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Синхронна vs асинхронна модель</strong> <p>До появи сучасних інструментів кожен запит до сервера спричиняв повне перезавантаження сторінки. Сьогодні <code>fetch</code> дозволяє відправляти запити у фоні та оновлювати лише потрібні частини DOM — це основа сучасних веб-застосунків.</p>\n</div>\n\n","<h1>📡 HTTP-методи</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>HTTP-метод</strong> — це дієслово, яке вказує, яку дію слід виконати над ресурсом, розташованим за вказаним URL. Набір методів та їхня семантика визначені стандартом RFC 9110.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Кожна операція з даними (читання, створення, оновлення, видалення) відповідає конкретному HTTP-методу. Ця відповідність є основою REST API.</p>\n<h2>📊 Основні HTTP-методи</h2>\n<table>\n<thead>\n<tr>\n<th>Метод</th>\n<th>Призначення</th>\n<th>Тіло запиту</th>\n<th>Ідемпотентний</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>GET</code></td>\n<td>Отримати ресурс</td>\n<td>❌ Немає</td>\n<td>✅ Так</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td>Створити новий ресурс</td>\n<td>✅ Є</td>\n<td>❌ Ні</td>\n</tr>\n<tr>\n<td><code>PUT</code></td>\n<td>Замінити ресурс повністю</td>\n<td>✅ Є</td>\n<td>✅ Так</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td>Частково оновити ресурс</td>\n<td>✅ Є</td>\n<td>⚠️ Залежить від реалізації</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td>Видалити ресурс</td>\n<td>❌ Рідко</td>\n<td>✅ Так</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Ідемпотентність</strong> <p>Ідемпотентний метод — такий, що дає однаковий результат при повторних викликах з однаковими параметрами. <code>GET /users/1</code> завжди повертає одного користувача. <code>POST /users</code> щоразу створює нового — тому він не є ідемпотентним.</p>\n</div>\n\n\n\n<h2>🔗 CRUD та HTTP-методи</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    C[&quot;➕ Create&quot;] --&gt;|&quot;POST /users&quot;| API[&quot;🔌 REST API&quot;]\n    R[&quot;📖 Read&quot;] --&gt;|&quot;GET /users/1&quot;| API\n    U[&quot;✏️ Update&quot;] --&gt;|&quot;PUT /users/1&quot;| API\n    D[&quot;🗑️ Delete&quot;] --&gt;|&quot;DELETE /users/1&quot;| API\n    style C fill:#e8f5e9,stroke:#388e3c\n    style R fill:#e3f2fd,stroke:#1565c0\n    style U fill:#fff3e0,stroke:#ef6c00\n    style D fill:#fce4ec,stroke:#c2185b\n    style API fill:#f3e5f5,stroke:#7b1fa2\"><svg id=\"exp-1775495611462-3-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 444.6953125px;\" viewBox=\"0 0 444.6953125 358\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1775495611462-3-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1775495611462-3-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1775495611462-3-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1775495611462-3-0 .error-icon{fill:#552222;}#exp-1775495611462-3-0 .error-text{fill:#552222;stroke:#552222;}#exp-1775495611462-3-0 .edge-thickness-normal{stroke-width:1px;}#exp-1775495611462-3-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1775495611462-3-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1775495611462-3-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1775495611462-3-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1775495611462-3-0 .edge-pattern-dotted{stroke-dasharray: "basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-57.60546875\" y=\"-24\" width=\"115.2109375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-33.60546875, -12)\"><rect></rect><foreignObject width=\"67.2109375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>fetch(url)</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1775495611476-4-0-flowchart-R-1\" data-look=\"classic\" transform=\"translate(310.5859375, 32)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-84.453125\" y=\"-24\" width=\"168.90625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-60.453125, -12)\"><rect></rect><foreignObject width=\"120.90625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Response object</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1775495611476-4-0-flowchart-D-3\" data-look=\"classic\" transform=\"translate(720.9375, 32)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-85.0625\" y=\"-24\" width=\"170.125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-61.0625, -12)\"><rect></rect><foreignObject width=\"122.125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Дані (JS-об'єкт)</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1775495611476-4-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1775495611476-4-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Крок 1: чекаємо на отримання заголовків відповіді</span>\n<span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'https://api.example.com/users'</span>);\n\n<span class=\"hljs-comment\">// Крок 2: чекаємо на завантаження та парсинг тіла</span>\n<span class=\"hljs-keyword\">const</span> users = <span class=\"hljs-keyword\">await</span> response.<span class=\"hljs-title function_\">json</span>();</code></pre><div class=\"warning\"><strong>⚠️ Чому два await?</strong> <p>Отримання відповіді відбувається у два етапи: спочатку сервер надсилає <strong>заголовки</strong> (метадані — статус, тип контенту), і тільки потім — <strong>тіло</strong> (самі дані). <code>fetch</code> резолвить <code>Promise</code> вже після отримання заголовків, тому для читання тіла потрібен другий <code>await response.json()</code>.</p>\n</div>\n\n\n\n<h2>📋 Методи читання тіла відповіді</h2>\n<table>\n<thead>\n<tr>\n<th>Метод</th>\n<th>Тип результату</th>\n<th>Коли використовувати</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>response.json()</code></td>\n<td>Об'єкт / масив</td>\n<td>JSON-відповідь від API</td>\n</tr>\n<tr>\n<td><code>response.text()</code></td>\n<td>Рядок</td>\n<td>HTML, CSV, звичайний текст</td>\n</tr>\n<tr>\n<td><code>response.blob()</code></td>\n<td>Blob</td>\n<td>Зображення, файли</td>\n</tr>\n<tr>\n<td><code>response.arrayBuffer()</code></td>\n<td>ArrayBuffer</td>\n<td>Бінарні дані</td>\n</tr>\n</tbody></table>\n","<h1>📦 Формат JSON</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>JSON</strong> (JavaScript Object Notation) — текстовий формат обміну даними, заснований на синтаксисі об'єктів JavaScript. Є стандартом де-факто для REST API.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> JSON описує структуровані дані у вигляді тексту. JavaScript надає два методи для конвертації між JSON-рядком та JS-об'єктом.</p>\n<h2>🔄 Серіалізація та десеріалізація</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// JS-об'єкт → JSON-рядок (серіалізація)</span>\n<span class=\"hljs-keyword\">const</span> user = { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-number\">1</span>, <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">'Антон'</span>, <span class=\"hljs-attr\">active</span>: <span class=\"hljs-literal\">true</span> };\n<span class=\"hljs-keyword\">const</span> jsonString = <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(user);\n<span class=\"hljs-comment\">// → '{\"id\":1,\"name\":\"Антон\",\"active\":true}'</span>\n\n<span class=\"hljs-comment\">// JSON-рядок → JS-об'єкт (десеріалізація)</span>\n<span class=\"hljs-keyword\">const</span> parsed = <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">parse</span>(jsonString);\n<span class=\"hljs-comment\">// → { id: 1, name: 'Антон', active: true }</span></code></pre><h2>📋 Допустимі типи даних у JSON</h2>\n<table>\n<thead>\n<tr>\n<th>JSON-тип</th>\n<th>JS-еквівалент</th>\n<th>Приклад у JSON</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>string</td>\n<td>string</td>\n<td><code>\"hello\"</code></td>\n</tr>\n<tr>\n<td>number</td>\n<td>number</td>\n<td><code>42</code>, <code>3.14</code></td>\n</tr>\n<tr>\n<td>boolean</td>\n<td>boolean</td>\n<td><code>true</code>, <code>false</code></td>\n</tr>\n<tr>\n<td>null</td>\n<td>null</td>\n<td><code>null</code></td>\n</tr>\n<tr>\n<td>array</td>\n<td>array</td>\n<td><code>[1, 2, 3]</code></td>\n</tr>\n<tr>\n<td>object</td>\n<td>object</td>\n<td><code>{\"key\": \"value\"}</code></td>\n</tr>\n</tbody></table>\n<div class=\"danger\"><strong>🚫 Обмеження JSON</strong> <p><code>undefined</code>, функції та <code>Symbol</code> <strong>не можуть</strong> бути серіалізовані в JSON — <code>JSON.stringify</code> мовчки їх ігнорує. Також <code>JSON</code> не підтримує коментарі та замкнені посилання (circular references). Завжди перевіряйте структуру даних перед серіалізацією.</p>\n</div>\n\n\n\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ Небезпечно — undefined зникне!</span>\n<span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>({ <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">'Антон'</span>, <span class=\"hljs-attr\">fn</span>: <span class=\"hljs-function\">() =&gt;</span> {} });\n<span class=\"hljs-comment\">// → '{\"name\":\"Антон\"}'  (fn зникла без помилки)</span>\n\n<span class=\"hljs-comment\">// ✅ Форматований вивід для відлагодження</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(user, <span class=\"hljs-literal\">null</span>, <span class=\"hljs-number\">2</span>));</code></pre>","<h1>📥 Обробка HTTP-відповідей — статус-коди</h1>\n<p><strong>Головна ідея:</strong> Статус-код — це тризначне число, що вказує на результат обробки запиту сервером. Правильна перевірка статус-коду є обов'язковою частиною роботи з <code>fetch</code>.</p>\n<h2>📊 Категорії статус-кодів</h2>\n<table>\n<thead>\n<tr>\n<th>Діапазон</th>\n<th>Категорія</th>\n<th>Типові приклади</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>1xx</td>\n<td>Інформаційні</td>\n<td><code>100 Continue</code></td>\n</tr>\n<tr>\n<td>2xx</td>\n<td>✅ Успіх</td>\n<td><code>200 OK</code>, <code>201 Created</code>, <code>204 No Content</code></td>\n</tr>\n<tr>\n<td>3xx</td>\n<td>Перенаправлення</td>\n<td><code>301 Moved Permanently</code>, <code>304 Not Modified</code></td>\n</tr>\n<tr>\n<td>4xx</td>\n<td>❌ Помилка клієнта</td>\n<td><code>400 Bad Request</code>, <code>401 Unauthorized</code>, <code>404 Not Found</code></td>\n</tr>\n<tr>\n<td>5xx</td>\n<td>🔥 Помилка сервера</td>\n<td><code>500 Internal Server Error</code>, <code>503 Service Unavailable</code></td>\n</tr>\n</tbody></table>\n<h2>⚠️ Критична особливість Fetch API</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ НЕБЕЗПЕЧНО: fetch не кидає помилку при 4xx/5xx!</span>\n<span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'https://api.example.com/users/999'</span>);\n<span class=\"hljs-comment\">// Якщо сервер повернув 404 — Promise все одно РЕЗОЛВИТЬСЯ!</span>\n\n<span class=\"hljs-comment\">// ✅ ПРАВИЛЬНО: завжди перевіряти response.ok</span>\n<span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'https://api.example.com/users/1'</span>);\n\n<span class=\"hljs-keyword\">if</span> (!response.<span class=\"hljs-property\">ok</span>) {\n  <span class=\"hljs-comment\">// response.ok === true лише для 2xx</span>\n  <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`HTTP помилка: <span class=\"hljs-subst\">${response.status}</span>`</span>);\n}\n\n<span class=\"hljs-keyword\">const</span> user = <span class=\"hljs-keyword\">await</span> response.<span class=\"hljs-title function_\">json</span>();</code></pre><div class=\"danger\"><strong>🚫 Найпоширеніша помилка</strong> <p><code>fetch</code> <strong>не кидає виняток</strong> при отриманні відповідей з кодами 4xx або 5xx. <code>Promise</code> резолвиться з об'єктом <code>Response</code>, а <code>response.ok</code> буде <code>false</code>. Виняток кидається тільки при мережевій помилці (відсутність з'єднання, невалідний URL). Завжди перевіряйте <code>response.ok</code> або <code>response.status</code>.</p>\n</div>\n\n\n\n<h2>🔍 Об'єкт Response</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'https://api.example.com/data'</span>);\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(response.<span class=\"hljs-property\">status</span>);     <span class=\"hljs-comment\">// 200</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(response.<span class=\"hljs-property\">statusText</span>); <span class=\"hljs-comment\">// \"OK\"</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(response.<span class=\"hljs-property\">ok</span>);         <span class=\"hljs-comment\">// true (для 200–299)</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(response.<span class=\"hljs-property\">headers</span>.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">'Content-Type'</span>)); <span class=\"hljs-comment\">// \"application/json\"</span></code></pre>","<h1>✍️ Надсилання даних на сервер</h1>\n<p><strong>Головна ідея:</strong> Для POST, PUT та PATCH запитів необхідно передати другий аргумент до <code>fetch</code> — об'єкт налаштувань з методом, заголовками та тілом запиту.</p>\n<h2>📤 POST-запит — створення ресурсу</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">createUser</span>(<span class=\"hljs-params\">userData</span>) {\n  <span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'https://api.example.com/users'</span>, {\n    <span class=\"hljs-attr\">method</span>: <span class=\"hljs-string\">'POST'</span>,\n    <span class=\"hljs-attr\">headers</span>: {\n      <span class=\"hljs-string\">'Content-Type'</span>: <span class=\"hljs-string\">'application/json'</span>,\n    },\n    <span class=\"hljs-attr\">body</span>: <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(userData), <span class=\"hljs-comment\">// JS-об'єкт → JSON-рядок</span>\n  });\n\n  <span class=\"hljs-keyword\">if</span> (!response.<span class=\"hljs-property\">ok</span>) {\n    <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`Помилка створення: <span class=\"hljs-subst\">${response.status}</span>`</span>);\n  }\n\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">await</span> response.<span class=\"hljs-title function_\">json</span>(); <span class=\"hljs-comment\">// сервер повертає створений об'єкт</span>\n}\n\n<span class=\"hljs-keyword\">const</span> newUser = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">createUser</span>({ <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">'Антон'</span>, <span class=\"hljs-attr\">role</span>: <span class=\"hljs-string\">'student'</span> });\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(newUser.<span class=\"hljs-property\">id</span>); <span class=\"hljs-comment\">// ID, присвоєний сервером</span></code></pre><h2>🔧 PUT-запит — повна заміна ресурсу</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">updateUser</span>(<span class=\"hljs-params\">id, userData</span>) {\n  <span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">`https://api.example.com/users/<span class=\"hljs-subst\">${id}</span>`</span>, {\n    <span class=\"hljs-attr\">method</span>: <span class=\"hljs-string\">'PUT'</span>,\n    <span class=\"hljs-attr\">headers</span>: { <span class=\"hljs-string\">'Content-Type'</span>: <span class=\"hljs-string\">'application/json'</span> },\n    <span class=\"hljs-attr\">body</span>: <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(userData),\n  });\n\n  <span class=\"hljs-keyword\">if</span> (!response.<span class=\"hljs-property\">ok</span>) <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`Помилка оновлення: <span class=\"hljs-subst\">${response.status}</span>`</span>);\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">await</span> response.<span class=\"hljs-title function_\">json</span>();\n}</code></pre><h2>🗑️ DELETE-запит — видалення ресурсу</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">deleteUser</span>(<span class=\"hljs-params\">id</span>) {\n  <span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">`https://api.example.com/users/<span class=\"hljs-subst\">${id}</span>`</span>, {\n    <span class=\"hljs-attr\">method</span>: <span class=\"hljs-string\">'DELETE'</span>,\n  });\n\n  <span class=\"hljs-comment\">// 204 No Content — сервер нічого не повертає</span>\n  <span class=\"hljs-keyword\">if</span> (!response.<span class=\"hljs-property\">ok</span>) <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`Помилка видалення: <span class=\"hljs-subst\">${response.status}</span>`</span>);\n}</code></pre><div class=\"tip\"><strong>💡 PATCH vs PUT</strong> <p><code>PUT</code> замінює ресурс <strong>повністю</strong> — необхідно надіслати всі поля. <code>PATCH</code> оновлює лише <strong>передані поля</strong>, залишаючи решту без змін. Для часткових оновлень профілю, налаштувань тощо використовуйте <code>PATCH</code>.</p>\n</div>\n\n","<h1>⚠️ Обробка помилок при мережевих запитах</h1>\n<p><strong>Головна ідея:</strong> Мережеві запити можуть завершитись невдачею з двох різних причин — мережева помилка (виняток) або HTTP-помилка (статус 4xx/5xx). Необхідно обробляти обидва випадки.</p>\n<h2>🔄 Два типи помилок у Fetch API</h2>\n\n<div class=\"mermaid\" data-source=\"graph TD\n    F[&quot;fetch(url)&quot;] --&gt; NET{&quot;Мережа доступна?&quot;}\n    NET --&gt;|&quot;❌ Ні&quot;| EX[&quot;⚡ Виняток (TypeError)&quot;]\n    NET --&gt;|&quot;✅ Так&quot;| RESP[&quot;Response отримано&quot;]\n    RESP --&gt; OK{&quot;response.ok?&quot;}\n    OK --&gt;|&quot;✅ 2xx&quot;| DATA[&quot;📦 Читаємо дані&quot;]\n    OK --&gt;|&quot;❌ 4xx / 5xx&quot;| ERR[&quot;🚫 HTTP-помилка&quot;]\n    style EX fill:#fce4ec,stroke:#c2185b\n    style ERR fill:#fce4ec,stroke:#c2185b\n    style DATA fill:#e8f5e9,stroke:#388e3c\n    style F fill:#e3f2fd,stroke:#1565c0\"><svg id=\"exp-1775495611489-8-0\" width=\"100%\" xmlns=\"http://www.w3.or >);\n      }\n      <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`Помилка сервера: <span class=\"hljs-subst\">${response.status}</span>`</span>);\n    }\n\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">await</span> response.<span class=\"hljs-title function_\">json</span>();\n\n  } <span class=\"hljs-keyword\">catch</span> (err) {\n    <span class=\"hljs-keyword\">if</span> (err <span class=\"hljs-keyword\">instanceof</span> <span class=\"hljs-title class_\">TypeError</span>) {\n      <span class=\"hljs-comment\">// Мережева помилка — сервер недосяжний</span>\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">'Мережева помилка:'</span>, err.<span class=\"hljs-property\">message</span>);\n    } <span class=\"hljs-keyword\">else</span> {\n      <span class=\"hljs-comment\">// HTTP-помилка або помилка парсингу</span>\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">'Помилка запиту:'</span>, err.<span class=\"hljs-property\">message</span>);\n    }\n    <span class=\"hljs-keyword\">throw</span> err; <span class=\"hljs-comment\">// Перекидаємо помилку вгору</span>\n  }\n}</code></pre><div class=\"tip\"><strong>💡 Розрізнення типів помилок</strong> <p><code>fetch</code> кидає <code>TypeError</code> лише при мережевих збоях (відсутність з'єднання, невалідний URL тощо). Для всіх HTTP-помилок (404, 500 тощо) <code>Promise</code> <strong>резолвиться</strong> — тому їх треба перевіряти через <code>response.ok</code>. Ця асиметрія є ключовою особливістю <code>fetch</code>, яку важливо засвоїти.</p>\n</div>\n\n","<h1>🔑 Заголовки запитів та автентифікація</h1>\n<p><strong>Головна ідея:</strong> HTTP-заголовки дозволяють передавати метадані разом із запитом — тип контенту, мову, токен автентифікації тощо. Bearer-токени є стандартом автентифікації для REST API.</p>\n<h2>📋 Найважливіші заголовки запиту</h2>\n<table>\n<thead>\n<tr>\n<th>Заголовок</th>\n<th>Призначення</th>\n<th>Приклад значення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>Content-Type</code></td>\n<td>Формат тіла запиту</td>\n<td><code>application/json</code></td>\n</tr>\n<tr>\n<td><code>Authorization</code></td>\n<td>Токен автентифікації</td>\n<td><code>Bearer eyJhbGci...</code></td>\n</tr>\n<tr>\n<td><code>Accept</code></td>\n<td>Очікуваний формат відповіді</td>\n<td><code>application/json</code></td>\n</tr>\n</tbody></table>\n<h2>🔐 Автентифікація через Bearer-токен</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable constant_\">TOKEN</span> = <span class=\"hljs-string\">'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'</span>;\n\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">getProtectedData</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'https://api.example.com/profile'</span>, {\n    <span class=\"hljs-attr\">headers</span>: {\n      <span class=\"hljs-string\">'Authorization'</span>: <span class=\"hljs-string\">`Bearer <span class=\"hljs-subst\">${TOKEN}</span>`</span>,\n      <span class=\"hljs-string\">'Content-Type'</span>: <span class=\"hljs-string\">'application/json'</span>,\n    },\n  });\n\n  <span class=\"hljs-keyword\">if</span> (response.<span class=\"hljs-property\">status</span> === <span class=\"hljs-number\">401</span>) {\n    <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">'Токен недійсний або прострочений'</span>);\n  }\n\n  <span class=\"hljs-keyword\">if</span> (!response.<span class=\"hljs-property\">ok</span>) {\n    <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`Помилка: <span class=\"hljs-subst\">${response.status}</span>`</span>);\n  }\n\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">await</span> response.<span class=\"hljs-title function_\">json</span>();\n}</code></pre><h2>🏗️ Клас Headers для зручного управління</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> headers = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Headers</span>();\nheaders.<span class=\"hljs-title function_\">append</span>(<span class=\"hljs-string\">'Content-Type'</span>, <span class=\"hljs-string\">'application/json'</span>);\nheaders.<span class=\"hljs-title function_\">append</span>(<span class=\"hljs-string\">'Authorization'</span>, <span class=\"hljs-string\">`Bearer <span class=\"hljs-subst\">${TOKEN}</span>`</span>);\n\n<span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'https://api.example.com/data'</span>, {\n  <span class=\"hljs-attr\">method</span>: <span class=\"hljs-string\">'POST'</span>,\n  headers,\n  <span class=\"hljs-attr\">body</span>: <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>({ <span class=\"hljs-attr\">query</span>: <span class=\"hljs-string\">'test'</span> }),\n});</code></pre><div class=\"warning\"><strong>⚠️ Безпека токенів</strong> <p>Ніколи не зберігайте токени автентифікації в коді репозиторію або публічно доступних файлах. У навчальних прикладах токени вказуються як змінні — у реальних застосунках вони зберігаються у <code>localStorage</code>, <code>sessionStorage</code> або <code>HttpOnly</code> cookies.</p>\n</div>\n\n","<h1>🌍 REST API — принципи роботи</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>REST</strong> (Representational State Transfer) — архітектурний стиль побудови веб-сервісів, що визначає набір принципів взаємодії клієнта та сервера через HTTP. API, що дотримується принципів REST, називається RESTful API.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> REST API організовує доступ до ресурсів через URL та HTTP-методи. Розуміння структури URL дозволяє інтуїтивно будувати запити.</p>\n<h2>🔗 Структура RESTful URL</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">https://api.example.com/v1/users\n                        ↑   ↑\n                   версія  ресурс (іменник у множині)</code></pre><table>\n<thead>\n<tr>\n<th>URL</th>\n<th>Метод</th>\n<th>Дія</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>/users</code></td>\n<td><code>GET</code></td>\n<td>Список усіх користувачів</td>\n</tr>\n<tr>\n<td><code>/users</code></td>\n<td><code>POST</code></td>\n<td>Створити нового користувача</td>\n</tr>\n<tr>\n<td><code>/users/42</code></td>\n<td><code>GET</code></td>\n<td>Отримати користувача з ID 42</td>\n</tr>\n<tr>\n<td><code>/users/42</code></td>\n<td><code>PUT</code></td>\n<td>Замінити дані користувача 42</td>\n</tr>\n<tr>\n<td><code>/users/42</code></td>\n<td><code>PATCH</code></td>\n<td>Частково оновити користувача 42</td>\n</tr>\n<tr>\n<td><code>/users/42</code></td>\n<td><code>DELETE</code></td>\n<td>Видалити користувача 42</td>\n</tr>\n<tr>\n<td><code>/users/42/posts</code></td>\n<td><code>GET</code></td>\n<td>Всі пости користувача 42</td>\n</tr>\n</tbody></table>\n<h2>📦 Параметри запиту (Query String)</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Фільтрація, пагінація, сортування через URL-параметри</span>\n<span class=\"hljs-keyword\">const</span> params = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">URLSearchParams</span>({\n  <span class=\"hljs-attr\">page</span>: <span class=\"hljs-number\">2</span>,\n  <span class=\"hljs-attr\">limit</span>: <span class=\"hljs-number\">10</span>,\n  <span class=\"hljs-attr\">sort</span>: <span class=\"hljs-string\">'name'</span>,\n  <span class=\"hljs-attr\">role</span>: <span class=\"hljs-string\">'student'</span>,\n});\n\n<span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(\n  <span class=\"hljs-string\">`https://api.example.com/users?<span class=\"hljs-subst\">${params}</span>`</span>\n);\n<span class=\"hljs-comment\">// → GET /users?page=2&amp;limit=10&amp;sort=name&amp;role=student</span></code></pre><div class=\"tip\"><strong>💡 URLSearchParams</strong> <p>Клас <code>URLSearchParams</code> правильно кодує спеціальні символи (пробіли, кирилицю) у URL. Це безпечніша альтернатива ручному конкатенуванню рядка URL.</p>\n</div>\n\n","<h1>🛠️ Практичний приклад: публічний REST API</h1>\n<p><strong>Головна ідея:</strong> Публічні API (без автентифікації) є найкращим способом для навчальної практики. Розглянемо повноцінний приклад роботи з <code>jsonplaceholder.typicode.com</code>.</p>\n<h2>📡 Отримання та відображення списку</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Завантажує список постів та відображає у DOM</span>\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">loadPosts</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> container = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">'posts-container'</span>);\n  container.<span class=\"hljs-property\">textContent</span> = <span class=\"hljs-string\">'Завантаження...'</span>;\n\n  <span class=\"hljs-keyword\">try</span> {\n    <span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(\n      <span class=\"hljs-string\">'https://jsonplaceholder.typicode.com/posts?_limit=5'</span>\n    );\n\n    <span class=\"hljs-keyword\">if</span> (!response.<span class=\"hljs-property\">ok</span>) {\n      <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`Помилка: <span class=\"hljs-subst\">${response.status}</span>`</span>);\n    }\n\n    <span class=\"hljs-keyword\">const</span> posts = <span class=\"hljs-keyword\">await</span> response.<span class=\"hljs-title function_\">json</span>();\n\n    container.<span class=\"hljs-property\">innerHTML</span> = <span class=\"hljs-string\">''</span>;\n    posts.<span class=\"hljs-title function_\">forEach</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">post</span> =&gt;</span> {\n      <span class=\"hljs-keyword\">const</span> article = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">'article'</span>);\n      <span class=\"hljs-keyword\">const</span> title = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">'h3'</span>);\n      <span class=\"hljs-keyword\">const</span> body = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">'p'</span>);\n      <span class=\"hljs-comment\">// textContent безпечний: не інтерпретує HTML-теги з відповіді сервера</span>\n      title.<span class=\"hljs-property\">textContent</span> = post.<span class=\"hljs-property\">title</span>;\n      body.<span class=\"hljs-property\">textContent</span> = post.<span class=\"hljs-property\">body</span>;\n      article.<span class=\"hljs-title function_\">append</span>(title, body);\n      container.<span class=\"hljs-title function_\">appendChild</span>(article);\n    });\n\n  } <span class=\"hljs-keyword\">catch</span> (err) {\n    container.<span class=\"hljs-property\">textContent</span> = <span class=\"hljs-string\">`Помилка завантаження: <span class=\"hljs-subst\">${err.message}</span>`</span>;\n  }\n}\n\n<span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">'load-btn'</span>).<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">'click'</span>, loadPosts);</code></pre><h2>📤 Створення нового ресурсу</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">createPost</span>(<span class=\"hljs-params\">title, body</span>) {\n  <span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'https://jsonplaceholder.typicode.com/posts'</span>, {\n    <span class=\"hljs-attr\">method</span>: <span class=\"hljs-string\">'POST'</span>,\n    <span class=\"hljs-attr\">headers</span>: { <span class=\"hljs-string\">'Content-Type'</span>: <span class=\"hljs-string\">'application/json'</span> },\n    <span class=\"hljs-attr\">body</span>: <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>({ title, body, <span class=\"hljs-attr\">userId</span>: <span class=\"hljs-number\">1</span> }),\n  });\n\n  <span class=\"hljs-keyword\">if</span> (!response.<span class=\"hljs-property\">ok</span>) <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`Помилка: <span class=\"hljs-subst\">${response.status}</span>`</span>);\n\n  <span class=\"hljs-keyword\">const</span> created = <span class=\"hljs-keyword\">await</span> response.<span class=\"hljs-title function_\">json</span>();\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Створено з ID:'</span>, created.<span class=\"hljs-property\">id</span>); <span class=\"hljs-comment\">// 101</span>\n  <span class=\"hljs-keyword\">return</span> created;\n}</code></pre><div class=\"note\"><strong>📝 jsonplaceholder.typicode.com</strong> <p>Цей сервіс є \"фіктивним\" REST API для навчання та прототипування. Він приймає будь-які запити та повертає реалістичні відповіді, але насправді нічого не зберігає. Ідеально підходить для відпрацювання <code>fetch</code> без необхідності налаштовувати власний сервер.</p>\n</div>\n\n","<h1>🔄 Паралельні запити та Promise.all</h1>\n<p><strong>Головна ідея:</strong> Кілька незалежних запитів можна виконувати паралельно, а не послідовно. <code>Promise.all</code> запускає всі <code>fetch</code> одночасно та чекає завершення останнього — що значно скорочує загальний час очікування.</p>\n<h2>⏱️ Послідовно vs паралельно</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ❌ Послідовно — сумарний час = час1 + час2 + час3</span>\n<span class=\"hljs-keyword\">const</span> userResp = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'/users/1'</span>);\n<span class=\"hljs-keyword\">const</span> user = <span class=\"hljs-keyword\">await</span> userResp.<span class=\"hljs-title function_\">json</span>();\n<span class=\"hljs-keyword\">const</span> postsResp = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(<span class=\"hljs-string\">'/posts?userId=1'</span>);\n<span class=\"hljs-keyword\">const</span> posts = <span class=\"hljs-keyword\">await</span> postsResp.<span class=\"hljs-title function_\">json</span>();\n\n<span class=\"hljs-comment\">// ✅ Паралельно — сумарний час = max(час1, час2, час3)</span>\n<span class=\"hljs-keyword\">async</span> <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">fetchJson</span>(<span class=\"hljs-params\">url</span>) {\n  <span class=\"hljs-keyword\">const</span> response = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title function_\">fetch</span>(url);\n  <span class=\"hljs-keyword\">if</span> (!response.<span class=\"hljs-property\">ok</span>) <span class=\"hljs-keyword\">throw</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Error</span>(<span class=\"hljs-string\">`HTTP <span class=\"hljs-subst\">${response.status}</span>: <span class=\"hljs-subst\">${url}</span>`</span>);\n  <span class=\"hljs-keyword\">return</span> response.<span class=\"hljs-title function_\">json</span>();\n}\n\n<span class=\"hljs-keyword\">const</span> [user, posts, comments] = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">all</span>([\n  <span class=\"hljs-title function_\">fetchJson</span>(<span class=\"hljs-string\">'/users/1'</span>),\n  <span class=\"hljs-title function_\">fetchJson</span>(<span class=\"hljs-string\">'/posts?userId=1'</span>),\n  <span class=\"hljs-title function_\">fetchJson</span>(<span class=\"hljs-string\">'/comments?userId=1'</span>),\n]);</code></pre><h2>⚠️ Поведінка при помилці</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Promise.all відхиляється при першій помилці будь-якого запиту</span>\n<span class=\"hljs-keyword\">try</span> {\n  <span class=\"hljs-keyword\">const</span> [users, products] = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">all</span>([\n    <span class=\"hljs-title function_\">fetchJson</span>(<span class=\"hljs-string\">'/users'</span>),\n    <span class=\"hljs-title function_\">fetchJson</span>(<span class=\"hljs-string\">'/products'</span>),\n  ]);\n} <span class=\"hljs-keyword\">catch</span> (err) {\n  <span class=\"hljs-comment\">// Якщо хоча б один запит завершився з помилкою</span>\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">'Один з запитів не вдався:'</span>, err.<span class=\"hljs-property\">message</span>);\n}\n\n<span class=\"hljs-comment\">// Promise.allSettled — отримуємо результати всіх, навіть при помилках</span>\n<span class=\"hljs-keyword\">const</span> results = <span class=\"hljs-keyword\">await</span> <span class=\"hljs-title class_\">Promise</span>.<span class=\"hljs-title function_\">allSettled</span>([\n  <span class=\"hljs-title function_\">fetchJson</span>(<span class=\"hljs-string\">'/users'</span>),\n  <span class=\"hljs-title function_\">fetchJson</span>(<span class=\"hljs-string\">'/products'</span>),\n]);\n\nresults.<span class=\"hljs-title function_\">forEach</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">result</span> =&gt;</span> {\n  <span class=\"hljs-keyword\">if</span> (result.<span class=\"hljs-property\">status</span> === <span class=\"hljs-string\">'fulfilled'</span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">'Успіх:'</span>, result.<span class=\"hljs-property\">value</span>);\n  } <span class=\"hljs-keyword\">else</span> {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">'Помилка:'</span>, result.<span class=\"hljs-property\">reason</span>.<span class=\"hljs-property\">message</span>);\n  }\n});</code></pre><div class=\"tip\"><strong>💡 Promise.allSettled</strong> <p>Якщо потрібно отримати результати <strong>всіх</strong> запитів незалежно від того, чи деякі з них завершились помилкою — використовуйте <code>Promise.allSettled</code>. Він ніколи не відхиляється і повертає масив з результатами кожного запиту окремо.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>HTTP-методи</strong> — <code>GET</code> читає, <code>POST</code> створює, <code>PUT</code> замінює, <code>PATCH</code> частково оновлює, <code>DELETE</code> видаляє ресурс. Знання методів є основою роботи з будь-яким REST API</p>\n</li>\n<li><p><strong>Fetch API</strong> — вбудований браузерний інтерфейс для HTTP-запитів, що повертає <code>Promise</code>. Для отримання даних потрібно два <code>await</code>: один для заголовків, інший для тіла відповіді</p>\n</li>\n<li><p><strong>JSON</strong> — стандарт обміну даними між клієнтом і сервером. <code>JSON.stringify</code> серіалізує JS-об'єкт у рядок, <code>JSON.parse</code> — розбирає рядок назад в об'єкт</p>\n</li>\n<li><p><strong>response.ok</strong> — <code>fetch</code> <strong>не кидає виняток</strong> при 4xx/5xx. Завжди перевіряйте <code>response.ok</code> або <code>response.status</code> перед читанням даних</p>\n</li>\n<li><p><strong>Заголовки</strong> — <code>Content-Type: application/json</code> вказує формат тіла запиту; <code>Authorization: Bearer &lt;token&gt;</code> передає токен автентифікації</p>\n</li>\n<li><p><strong>Обробка помилок</strong> — два типи: мережева (виняток <code>TypeError</code>) та HTTP (перевірка <code>response.ok</code>). Обидва обробляються у блоці <code>try/catch</code></p>\n</li>\n<li><p><strong>Promise.all</strong> — запускає кілька незалежних запитів паралельно, скорочуючи загальний час очікування. <code>Promise.allSettled</code> — коли потрібні результати всіх запитів навіть при частковій помилці</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Які HTTP-методи використовуються для операцій CRUD? Чому для читання використовується <code>GET</code>, а не <code>POST</code>?</p>\n</li>\n<li><p>🤔 Чому для отримання даних через <code>fetch</code> потрібно два <code>await</code>? Що відбувається між ними?</p>\n</li>\n<li><p>🤔 Чому <code>fetch</code> не кидає виняток при отриманні відповіді зі статусом 404 або 500? Як правильно обробити такі випадки?</p>\n</li>\n<li><p>🤔 Навіщо вказувати заголовок <code>Content-Type: application/json</code> при POST-запиті? Що станеться, якщо його пропустити?</p>\n</li>\n<li><p>🤔 Яка різниця між <code>JSON.stringify</code> і <code>JSON.parse</code>? У якій ситуації кожен з них використовується?</p>\n</li>\n<li><p>🤔 Чим відрізняється <code>Promise.all</code> від <code>Promise.allSettled</code>? Коли доцільно використовувати кожен?</p>\n</li>\n<li><p>🤔 Що таке REST API? Які правила визначають структуру URL та вибір HTTP-методу в RESTful архітектурі?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Прикладний програмний інтерфейс</td>\n<td>API</td>\n<td>Набір правил і протоколів для взаємодії між програмами</td>\n</tr>\n<tr>\n<td>Передача даних репрезентативного стану</td>\n<td>REST</td>\n<td>Архітектурний стиль побудови мережевих сервісів на основі HTTP</td>\n</tr>\n<tr>\n<td>Нотація об'єктів JavaScript</td>\n<td>JSON</td>\n<td>Текстовий формат представлення структурованих даних</td>\n</tr>\n<tr>\n<td>Fetch API</td>\n<td>Fetch API</td>\n<td>Вбудований браузерний інтерфейс для виконання HTTP-запитів з JavaScript</td>\n</tr>\n<tr>\n<td>Статус-код</td>\n<td>Status Code</td>\n<td>Тризначний числовий код результату обробки HTTP-запиту</td>\n</tr>\n<tr>\n<td>Заголовок</td>\n<td>Header</td>\n<td>Метадані HTTP-запиту або відповіді (тип контенту, автентифікація тощо)</td>\n</tr>\n<tr>\n<td>Серіалізація</td>\n<td>Serialization</td>\n<td>Перетворення об'єкта в структуру даних (наприклад, JSON-рядок) для передачі</td>\n</tr>\n<tr>\n<td>Автентифікація</td>\n<td>Authentication</td>\n<td>Процес підтвердження особи або програми, що надсилає запит</td>\n</tr>\n<tr>\n<td>Ідемпотентність</td>\n<td>Idempotency</td>\n<td>Властивість операції давати однаковий результат при повторних викликах</td>\n</tr>\n<tr>\n<td>Паралельні запити</td>\n<td>Parallel Requests</td>\n<td>Одночасне виконання кількох незалежних HTTP-запитів</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>HTTP</strong></td>\n<td>HyperText Transfer Protocol</td>\n<td>Протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td><strong>HTTPS</strong></td>\n<td>HyperText Transfer Protocol Secure</td>\n<td>Захищений протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td><strong>API</strong></td>\n<td>Application Programming Interface</td>\n<td>Прикладний програмний інтерфейс</td>\n</tr>\n<tr>\n<td><strong>REST</strong></td>\n<td>Representational State Transfer</td>\n<td>Передача даних репрезентативного стану</td>\n</tr>\n<tr>\n<td><strong>JSON</strong></td>\n<td>JavaScript Object Notation</td>\n<td>Нотація об'єктів JavaScript</td>\n</tr>\n<tr>\n<td><strong>URL</strong></td>\n<td>Uniform Resource Locator</td>\n<td>Уніфікований локатор ресурсу</td>\n</tr>\n<tr>\n<td><strong>CRUD</strong></td>\n<td>Create, Read, Update, Delete</td>\n<td>Створення, читання, оновлення, видалення</td>\n</tr>\n<tr>\n<td><strong>JWT</strong></td>\n<td>JSON Web Token</td>\n<td>Токен автентифікації у форматі JSON</td>\n</tr>\n<tr>\n<td><strong>CORS</strong></td>\n<td>Cross-Origin Resource Sharing</td>\n<td>Міжсайтове використання ресурсів</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
