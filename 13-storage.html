code></li>\n<li>🧩 Управління станом додатку</li>\n<li>⚠️ Обмеження та безпека локального зберігання</li>\n<li>💻 Практичне завдання</li>\n</ol>\n","<h1>🗄️ Навіщо зберігати дані на клієнті?</h1>\n<p><strong>Головна ідея:</strong> Веб-додатки потребують способу \"запам'ятовувати\" дані між перезавантаженнями сторінки — без звернення до сервера.</p>\n<h2>🔍 Проблема без локального зберігання</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Користувач заповнив форму, налаштував тему, додав товари до кошика...</span>\n<span class=\"hljs-comment\">// Перезавантаження сторінки → все втрачено 😢</span>\n<span class=\"hljs-keyword\">let</span> theme = <span class=\"hljs-string\">\"dark\"</span>;\n<span class=\"hljs-keyword\">let</span> cartItems = [<span class=\"hljs-string\">\"ноутбук\"</span>, <span class=\"hljs-string\">\"мишка\"</span>];\n<span class=\"hljs-comment\">// Після F5: скрипт виконується заново — theme і cartItems зникають</span></code></pre><h2>📦 Що доцільно зберігати локально?</h2>\n<table>\n<thead>\n<tr>\n<th>Тип даних</th>\n<th>Приклади</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🎨 Налаштування інтерфейсу</td>\n<td>Тема, мова, розмір шрифту</td>\n</tr>\n<tr>\n<td>🛒 Стан сесії користувача</td>\n<td>Кошик, фільтри, позиція скролу</td>\n</tr>\n<tr>\n<td>📝 Чернетки та введені дані</td>\n<td>Форми, нотатки, to-do списки</td>\n</tr>\n<tr>\n<td>🔑 Токени автентифікації</td>\n<td>JWT-токени (з обережністю!)</td>\n</tr>\n<tr>\n<td>📊 Кешовані дані</td>\n<td>Результати запитів, що рідко змінюються</td>\n</tr>\n</tbody></table>\n<h2>🏗️ Варіанти клієнтського зберігання</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    CLIENT[&quot;🌐 Браузер&quot;] --&gt; LS[&quot;💾 localStorage&quot;]\n    CLIENT --&gt; SS[&quot;⏱️ sessionStorage&quot;]\n    CLIENT --&gt; CK[&quot;🍪 Cookies&quot;]\n    CLIENT --&gt; IDB[&quot;🗃️ IndexedDB&quot;]\n    LS --&gt; |&quot;Постійне, до 5–10 МБ&quot;| D1[&quot;Налаштуван ht=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🍪 Cookies</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1775675269293-2-0-flowchart-IDB-7\" data-look=\"classic\" transform=\"translate(279.00390625, 326)\"><rect class=\"basic label-container\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\" x=\"-73.37890625\" y=\"-24\" width=\"146.7578125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-49.37890625, -12)\"><rect></rect><foreignObject width=\"98.7578125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🗃️ IndexedDB</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1775675269293-2-0-flowchart-D1-9\" data-look=\"classic\" transform=\"translate(722.81640625, 32)\"><rect class=\"basic label-container\" style=\"\" x=\"-107.64453125\" y=\"-24\" width=\"215.2890625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-83.64453125, -12)\"><rect></rect><foreignObject width=\"167.2890625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Налаштування, кошик</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1775675269293-2-0-flowchart-D2-11\" data-look=\"classic\" transform=\"translate(722.81640625, 130)\"><rect class=\"basic label-container\" style=\"\" x=\"-112.64453125\" y=\"-24\" width=\"225.2890625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-88.64453125, -12)\"><rect></rect><foreignObject width=\"177.2890625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Тимчасовий стан форм</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1775675269293-2-0-flowchart-D3-13\" data-look=\"classic\" transform=\"translate(722.81640625, 228)\"><rect class=\"basic label-container\" style=\"\" x=\"-103.16015625\" y=\"-24\" width=\"206.3203125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-79.16015625, -12)\"><rect></rect><foreignObject width=\"158.3203125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Сесії, автентифікація</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1775675269293-2-0-flowchart-D4-15\" data-look=\"classic\" transform=\"translate(722.81640625, 326)\"><rect class=\"basic label-container\" style=\"\" x=\"-88.7421875\" y=\"-24\" width=\"177.484375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-64.7421875, -12)\"><rect></rect><foreignObject width=\"129.484375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Офлайн-додатки</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1775675269293-2-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1775675269293-2-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<div class=\"note\"><strong>📝 Фокус цієї лекції</strong> <p><code>localStorage</code> та <code>sessionStorage</code> — найпростіший і найпоширеніший спосіб клієнтського зберігання для більшості задач. Саме їх ми розглянемо детально.</p>\n</div>\n\n","<h1>💾 <code>localStorage</code> — постійне сховище</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong><code>localStorage</code></strong> — вбудований об'єкт браузера, що надає постійне сховище типу \"ключ–значення\" для конкретного домену. Дані зберігаються навіть після закриття вкладки або браузера — до явного видалення.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> <code>localStorage</code> — це словник рядків, прив'язаний до домену; всі операції з ним синхронні та прості.</p>\n<h2>🔧 Базовий API</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ✍️ Записати значення</span>\n<span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">setItem</span>(<span class=\"hljs-string\">\"theme\"</span>, <span class=\"hljs-string\">\"dark\"</span>);\n<span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">setItem</span>(<span class=\"hljs-string\">\"username\"</span>, <span class=\"hljs-string\">\"Олена\"</span>);\n\n<span class=\"hljs-comment\">// 📖 Прочитати значення</span>\n<span class=\"hljs-keyword\">const</span> theme = <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">getItem</span>(<span class=\"hljs-string\">\"theme\"</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(theme); <span class=\"hljs-comment\">// \"dark\"</span>\n\n<span class=\"hljs-comment\">// Якщо ключ не існує — повертає null</span>\n<span class=\"hljs-keyword\">const</span> missing = <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">getItem</span>(<span class=\"hljs-string\">\"nonexistent\"</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(missing); <span class=\"hljs-comment\">// null</span>\n\n<span class=\"hljs-comment\">// 🗑️ Видалити один запис</span>\n<span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">removeItem</span>(<span class=\"hljs-string\">\"username\"</span>);\n\n<span class=\"hljs-comment\">// 💣 Очистити все сховище для цього домену</span>\n<span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">clear</span>();\n\n<span class=\"hljs-comment\">// 📊 Кількість записів</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-property\">length</span>); <span class=\"hljs-comment\">// 0 (після clear)</span>\n\n<span class=\"hljs-comment\">// 🔑 Отримати ключ за індексом</span>\n<span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">setItem</span>(<span class=\"hljs-string\">\"a\"</span>, <span class=\"hljs-string\">\"1\"</span>);\n<span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">setItem</span>(<span class=\"hljs-string\">\"b\"</span>, <span class=\"hljs-string\">\"2\"</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">key</span>(<span class=\"hljs-number\">0</span>)); <span class=\"hljs-comment\">// \"a\" або \"b\" (порядок не гарантований)</span></code></pre><h2>📋 Ключові характеристики</h2>\n<table>\n<thead>\n<tr>\n<th>Характеристика</th>\n<th>Значення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Тип даних</td>\n<td>Лише рядки (<code>string</code>)</td>\n</tr>\n<tr>\n<td>Ліміт</td>\n<td>~5 МБ на домен (залежить від браузера)</td>\n</tr>\n<tr>\n<td>Область видимості</td>\n<td>Домен + протокол (http ≠ https)</td>\n</tr>\n<tr>\n<td>Час зберігання</td>\n<td>Постійно (без терміну дії)</td>\n</tr>\n<tr>\n<td>Синхронність</td>\n<td>Синхронний (блокує головний потік)</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Лише рядки!</strong> <p><code>localStorage</code> зберігає <strong>виключно рядки</strong>. Якщо записати число або об'єкт напряму, результат буде несподіваним:</p>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">setItem</span>(<span class=\"hljs-string\">\"count\"</span>, <span class=\"hljs-number\">42</span>);\n<span class=\"hljs-keyword\">const</span> count = <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">getItem</span>(<span class=\"hljs-string\">\"count\"</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-keyword\">typeof</span> count); <span class=\"hljs-comment\">// \"string\", а не \"number\"!</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(count + <span class=\"hljs-number\">1</span>); <span class=\"hljs-comment\">// \"421\", а не 43!</span></code></pre><p>Для зберігання складних типів даних необхідно використовувати серіалізацію через <code>JSON</code>.</p>\n</div>\n\n","<h1>⏱️ <code>sessionStorage</code> — сховище сесії</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong><code>sessionStorage</code></strong> — аналог <code>localStorage</code> з ідентичним API, але дані існують лише протягом однієї <strong>сесії браузера</strong>: вони видаляються при закритті вкладки.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> <code>sessionStorage</code> підходить для тимчасових даних, які не повинні зберігатися між сесіями — наприклад, проміжний стан багатокрокової форми.</p>\n<h2>🔧 API ідентичний <code>localStorage</code></h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Абсолютно той самий інтерфейс</span>\n<span class=\"hljs-variable language_\">sessionStorage</span>.<span class=\"hljs-title function_\">setItem</span>(<span class=\"hljs-string\">\"step\"</span>, <span class=\"hljs-string\">\"2\"</span>);\n<span class=\"hljs-variable language_\">sessionStorage</span>.<span class=\"hljs-title function_\">setItem</span>(<span class=\"hljs-string\">\"formData\"</span>, <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>({ <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">\"Іван\"</span> }));\n\n<span class=\"hljs-keyword\">const</span> step = <span class=\"hljs-variable language_\">sessionStorage</span>.<span class=\"hljs-title function_\">getItem</span>(<span class=\"hljs-string\">\"step\"</span>); <span class=\"hljs-comment\">// \"2\"</span>\n<span class=\"hljs-variable language_\">sessionStorage</span>.<span class=\"hljs-title function_\">removeItem</span>(<span class=\"hljs-string\">\"step\"</span>);\n<span class=\"hljs-variable language_\">sessionStorage</span>.<span class=\"hljs-title function_\">clear</span>();</code></pre><h2>⚖️ Порівняння <code>localStorage</code> vs <code>sessionStorage</code></h2>\n<table>\n<thead>\n<tr>\n<th>Характеристика</th>\n<th><code>localStorage</code></th>\n<th><code>sessionStorage</code></th>\n</tr>\n</thead>\n<tbody><tr>\n<td>♾️ Час зберігання</td>\n<td>Постійно</td>\n<td>До закриття вкладки</td>\n</tr>\n<tr>\n<td>🔗 Ізоляція вкладок</td>\n<td>Спільне для всіх вкладок домену</td>\n<td>Ізольоване для кожної вкладки</td>\n</tr>\n<tr>\n<td>📋 API</td>\n<td>Ідентичний</td>\n<td>Ідентичний</td>\n</tr>\n<tr>\n<td>💡 Типовий сценарій</td>\n<td>Налаштування, кошик</td>\n<td>Прогрес форми, тимчасовий стан</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Коли що використовувати</strong> <p>Запитайте себе: \"Якщо користувач закриє вкладку і відкриє її знову — дані повинні залишитися?\" Якщо <strong>так</strong> → <code>localStorage</code>. Якщо <strong>ні</strong> → <code>sessionStorage</code>.</p>\n</div>\n\n","<h1>🔄 Серіалізація даних</h1>\n<p><strong>Головна ідея:</strong> Оскільки сховища приймають лише рядки, масиви та об'єкти потрібно серіалізувати у JSON перед збереженням і десеріалізувати при зчитуванні.</p>\n<h2>📦 <code>JSON.stringify</code> та <code>JSON.parse</code></h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// --- ЗАПИС складних даних ---</span>\n<span class=\"hljs-keyword\">const</span> user = {\n  <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">\"Марія\"</span>,\n  <span class=\"hljs-attr\">age</span>: <span class=\"hljs-number\">22</span>,\n  <span class=\"hljs-attr\">courses</span>: [<span class=\"hljs-string\">\"HTML\"</span>, <span class=\"hljs-string\">\"CSS\"</span>, <span class=\"hljs-string\">\"JavaScript\"</span>],\n  <span class=\"hljs-attr\">isActive</span>: <span class=\"hljs-literal\">true</span>,\n};\n\n<span class=\"hljs-comment\">// Перетворення об'єкта на рядок JSON</span>\n<span class=\"hljs-keyword\">const</span> userJSON = <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(user);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(userJSON);\n<span class=\"hljs-comment\">// '{\"name\":\"Марія\",\"age\":22,\"courses\":[\"HTML\",\"CSS\",\"JavaScript\"],\"isActive\":true}'</span>\n\n<span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">setItem</span>(<span class=\"hljs-string\">\"currentUser\"</span>, userJSON);\n\n<span class=\"hljs-comment\">// --- ЧИТАННЯ складних даних ---</span>\n<span class=\"hljs-keyword\">const</span> storedJSON = <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">getItem</span>(<span class=\"hljs-string\">\"currentUser\"</span>);\n<span class=\"hljs-keyword\">const</span> restoredUser = <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">parse</span>(storedJSON);\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(restoredUser.<span class=\"hljs-property\">name</span>); <span class=\"hljs-comment\">// \"Марія\"</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(restoredUser.<span class=\"hljs-property\">courses</span>[<span class=\"hljs-number\">1</span>]); <span class=\"hljs-comment\">// \"CSS\"</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-keyword\">typeof</span> restoredUser.<span class=\"hljs-property\">age</span>); <span class=\"hljs-comment\">// \"number\" ✅</span></code></pre><h2>🛡️ Захищене читання з перевіркою</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">loadFromStorage</span>(<span class=\"hljs-params\">key, defaultValue = <span class=\"hljs-literal\">null</span></span>) {\n  <span class=\"hljs-keyword\">try</span> {\n    <span class=\"hljs-keyword\">const</span> raw = <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">getItem</span>(key);\n    <span class=\"hljs-keyword\">if</span> (raw === <span class=\"hljs-literal\">null</span>) <span class=\"hljs-keyword\">return</span> defaultValue;\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">parse</span>(raw);\n  } <span class=\"hljs-keyword\">catch</span> (err) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">`Помилка зчитування з localStorage (<span class=\"hljs-subst\">${key}</span>):`</span>, err.<span class=\"hljs-property\">message</span>);\n    <span class=\"hljs-keyword\">return</span> defaultValue;\n  }\n}\n\n<span class=\"hljs-comment\">// Використання</span>\n<span class=\"hljs-keyword\">const</span> settings = <span class=\"hljs-title function_\">loadFromStorage</span>(<span class=\"hljs-string\">\"settings\"</span>, { <span class=\"hljs-attr\">theme</span>: <span class=\"hljs-string\">\"light\"</span>, <span class=\"hljs-attr\">lang</span>: <span class=\"hljs-string\">\"uk\"</span> });\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(settings.<span class=\"hljs-property\">theme</span>); <span class=\"hljs-comment\">// \"light\" — якщо запису не існує</span></code></pre><div class=\"warning\"><strong>⚠️ <code>JSON.parse</code> може кинути виняток</strong> <p>Якщо в сховищі зберігається пошкоджений або некоректний JSON (наприклад, через ручне редагування в DevTools), <code>JSON.parse</code> кине <code>SyntaxError</code>. Завжди загортайте читання у <code>try...catch</code>.</p>\n</div>\n\n\n\n<h2>⚠️ Що не серіалізується у JSON</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> data = {\n  <span class=\"hljs-attr\">fn</span>: <span class=\"hljs-function\">() =&gt;</span> <span class=\"hljs-string\">\"функція\"</span>, <span class=\"hljs-comment\">// Функції → зникнуть</span>\n  <span class=\"hljs-attr\">date</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>(), <span class=\"hljs-comment\">// Date → стане рядком</span>\n  <span class=\"hljs-attr\">undef</span>: <span class=\"hljs-literal\">undefined</span>, <span class=\"hljs-comment\">// undefined → зникне</span>\n  <span class=\"hljs-attr\">map</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Map</span>([[<span class=\"hljs-string\">\"a\"</span>, <span class=\"hljs-number\">1</span>]]), <span class=\"hljs-comment\">// Map → {}</span>\n};\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(data));\n<span class=\"hljs-comment\">// '{\"date\":\"2024-11-01T10:00:00.000Z\"}'</span>\n<span class=\"hljs-comment\">// fn, undef, map — втрачені!</span></code></pre><div class=\"note\"><strong>📝 Дата після <code>JSON.parse</code></strong> <p>Навіть якщо ви збережете <code>new Date()</code> через <code>JSON.stringify</code>, після <code>JSON.parse</code> це буде знову рядком, а не об'єктом <code>Date</code>. Потрібно явно конвертувати: <code>new Date(parsed.date)</code>.</p>\n</div>\n\n","<h1>🧩 Управління станом додатку</h1>\n<p><strong>Головна ідея:</strong> \"Стан\" — це сукупність усіх даних, що описують поточний вигляд і поведінку інтерфейсу. Управління станом означає синхронізацію цих даних між пам'яттю, інтерфейсом та сховищем.</p>\n<h2>🏗️ Патерн: централізований стан</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Централізований об'єкт стану</span>\n<span class=\"hljs-keyword\">const</span> appState = {\n  <span class=\"hljs-attr\">theme</span>: <span class=\"hljs-string\">\"light\"</span>,\n  <span class=\"hljs-attr\">todos</span>: [],\n  <span class=\"hljs-attr\">filter</span>: <span class=\"hljs-string\">\"all\"</span>,\n};\n\n<span class=\"hljs-comment\">// --- Запис стану у сховище ---</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">saveState</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">setItem</span>(<span class=\"hljs-string\">\"appState\"</span>, <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(appState));\n}\n\n<span class=\"hljs-comment\">// --- Завантаження стану зі сховища ---</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">loadState</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> saved = <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">getItem</span>(<span class=\"hljs-string\">\"appState\"</span>);\n  <span class=\"hljs-keyword\">if</span> (saved === <span class=\"hljs-literal\">null</span>) <span class=\"hljs-keyword\">return</span>;\n  <span class=\"hljs-keyword\">try</span> {\n    <span class=\"hljs-keyword\">const</span> parsed = <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">parse</span>(saved);\n    <span class=\"hljs-title class_\">Object</span>.<span class=\"hljs-title function_\">assign</span>(appState, parsed);\n  } <span class=\"hljs-keyword\">catch</span> (err) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">\"Не вдалося відновити стан:\"</span>, err.<span class=\"hljs-property\">message</span>);\n  }\n}\n\n<span class=\"hljs-comment\">// --- Оновлення стану + автоматичне збереження ---</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">setState</span>(<span class=\"hljs-params\">updates</span>) {\n  <span class=\"hljs-title class_\">Object</span>.<span class=\"hljs-title function_\">assign</span>(appState, updates);\n  <span class=\"hljs-title function_\">saveState</span>();\n  <span class=\"hljs-title function_\">render</span>(); <span class=\"hljs-comment\">// Перемальовуємо інтерфейс</span>\n}\n\n<span class=\"hljs-comment\">// Ініціалізація при завантаженні</span>\n<span class=\"hlj \"\" transform=\"translate(-60.87109375, -12)\"><rect></rect><foreignObject width=\"121.7421875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🖥️ Рендеринг UI</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1775675269321-6-0-flowchart-EVENT-7\" data-look=\"classic\" transform=\"translate(1129.4140625, 32)\"><rect class=\"basic label-container\" style=\"\" x=\"-95.7265625\" y=\"-24\" width=\"191.453125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-71.7265625, -12)\"><rect></rect><foreignObject width=\"143.453125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🖱️ Дія користувача</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1775675269321-6-0-flowchart-UPDATE-9\" data-look=\"classic\" transform=\"translate(1374.43359375, 32)\"><rect class=\"basic label-container\" style=\"\" x=\"-99.29296875\" y=\"-24\" width=\"198.5859375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-75.29296875, -12)\"><rect></rect><foreignObject width=\"150.5859375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>✏️ Оновлення стану</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1775675269321-6-0-flowchart-SAVE-11\" data-look=\"classic\" transform=\"translate(1647.7265625, 61.5)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-124\" y=\"-36\" width=\"248\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-100, -24)\"><rect></rect><foreignObject width=\"200\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>💾 Збереження в localStorage</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1775675269321-6-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1775675269321-6-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<div class=\"tip\"><strong>💡 Принцип єдиного джерела правди</strong> <p>Завжди змінюйте стан через одну точку (<code>setState</code>), а не безпосередньо через <code>localStorage.setItem</code> в різних місцях коду. Це запобігає неузгодженості між тим, що зберігається, і тим, що відображається.</p>\n</div>\n\n","<h1>🛠️ Практичний приклад — нотатник</h1>\n<p><strong>Головна ідея:</strong> Повноцінний міні-додаток, що поєднує всі вивчені концепції.</p>\n<pre><code class=\"language-html hljs language-xml\" data-highlighted=\"yes\"><span class=\"hljs-meta\">&lt;!DOCTYPE <span class=\"hljs-keyword\">html</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">html</span> <span class=\"hljs-attr\">lang</span>=<span class=\"hljs-string\">\"uk\"</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">head</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">charset</span>=<span class=\"hljs-string\">\"UTF-8\"</span> /&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">title</span>&gt;</span>📝 Нотатник<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">title</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">head</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">h2</span>&gt;</span>📝 Мої нотатки<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">h2</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">input</span> <span class=\"hljs-attr\">type</span>=<span class=\"hljs-string\">\"text\"</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"noteInput\"</span> <span class=\"hljs-attr\">placeholder</span>=<span class=\"hljs-string\">\"Введіть нотатку...\"</span> /&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"addBtn\"</span>&gt;</span>Додати<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"clearBtn\"</span>&gt;</span>Очистити все<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">ul</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"noteList\"</span>&gt;</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">ul</span>&gt;</span>\n\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n      <span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable constant_\">STORAGE_KEY</span> = <span class=\"hljs-string\">\"notes_v1\"</span>;\n\n      <span class=\"hljs-comment\">// Завантажити нотатки зі сховища</span>\n      <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">loadNotes</span>(<span class=\"hljs-params\"></span>) {\n        <span class=\"hljs-keyword\">const</span> raw = <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">getItem</span>(<span class=\"hljs-variable constant_\">STORAGE_KEY</span>);\n        <span class=\"hljs-keyword\">if</span> (raw === <span class=\"hljs-literal\">null</span>) <span class=\"hljs-keyword\">return</span> [];\n        <span class=\"hljs-keyword\">try</span> {\n          <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">parse</span>(raw);\n        } <span class=\"hljs-keyword\">catch</span> {\n          <span class=\"hljs-keyword\">return</span> [];\n        }\n      }\n\n      <span class=\"hljs-comment\">// Зберегти нотатки у сховище</span>\n      <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">saveNotes</span>(<span class=\"hljs-params\">notes</span>) {\n        <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">setItem</span>(<span class=\"hljs-variable constant_\">STORAGE_KEY</span>, <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(notes));\n      }\n\n      <span class=\"hljs-comment\">// Відобразити нотатки в DOM</span>\n      <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">renderNotes</span>(<span class=\"hljs-params\">notes</span>) {\n        <span class=\"hljs-keyword\">const</span> list = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">\"noteList\"</span>);\n        list.<span class=\"hljs-property\">innerHTML</span> = <span class=\"hljs-string\">\"\"</span>;\n        notes.<span class=\"hljs-title function_\">forEach</span>(<span class=\"hljs-function\">(<span class=\"hljs-params\">note, index</span>) =&gt;</span> {\n          <span class=\"hljs-keyword\">const</span> li = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">\"li\"</span>);\n          li.<span class=\"hljs-property\">textContent</span> = note;\n\n          <span class=\"hljs-keyword\">const</span> delBtn = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">\"button\"</span>);\n          delBtn.<span class=\"hljs-property\">textContent</span> = <span class=\"hljs-string\">\"🗑️\"</span>;\n          delBtn.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">\"click\"</span>, <span class=\"hljs-function\">() =&gt;</span> {\n            notes.<span class=\"hljs-title function_\">splice</span>(index, <span class=\"hljs-number\">1</span>);\n            <span class=\"hljs-title function_\">saveNotes</span>(notes);\n            <span class=\"hljs-title function_\">renderNotes</span>(notes);\n          });\n\n          li.<span class=\"hljs-title function_\">appendChild</span>(delBtn);\n          list.<span class=\"hljs-title function_\">appendChild</span>(li);\n        });\n      }\n\n      <span class=\"hljs-comment\">// Ініціалізація</span>\n      <span class=\"hljs-keyword\">const</span> notes = <span class=\"hljs-title function_\">loadNotes</span>();\n      <span class=\"hljs-title function_\">renderNotes</span>(notes);\n\n      <span class=\"hljs-comment\">// Додавання нотатки</span>\n      <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">\"addBtn\"</span>).<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">\"click\"</span>, <span class=\"hljs-function\">() =&gt;</span> {\n        <span class=\"hljs-keyword\">const</span> input = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">\"noteInput\"</span>);\n        <span class=\"hljs-keyword\">const</span> text = input.<span class=\"hljs-property\">value</span>.<span class=\"hljs-title function_\">trim</span>();\n        <span class=\"hljs-keyword\">if</span> (!text) <span class=\"hljs-keyword\">return</span>;\n        notes.<span class=\"hljs-title function_\">push</span>(text);\n        <span class=\"hljs-title function_\">saveNotes</span>(notes);\n        <span class=\"hljs-title function_\">renderNotes</span>(notes);\n        input.<span class=\"hljs-property\">value</span> = <span class=\"hljs-string\">\"\"</span>;\n      });\n\n      <span class=\"hljs-comment\">// Очищення</span>\n      <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">\"clearBtn\"</span>).<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">\"click\"</span>, <span class=\"hljs-function\">() =&gt;</span> {\n        <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">removeItem</span>(<span class=\"hljs-variable constant_\">STORAGE_KEY</span>);\n        notes.<span class=\"hljs-property\">length</span> = <span class=\"hljs-number\">0</span>;\n        <span class=\"hljs-title function_\">renderNotes</span>(notes);\n      });\n    </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">html</span>&gt;</span></code></pre><div class=\"note\"><strong>📝 Що демонструє цей приклад</strong> <p><code>loadNotes</code> читає і десеріалізує дані при старті; <code>saveNotes</code> серіалізує і записує при кожній зміні; <code>renderNotes</code> синхронізує DOM зі станом. Після перезавантаження сторінки нотатки залишаться завдяки <code>localStorage</code>.</p>\n</div>\n\n","<h1>🔍 DevTools: інспекція сховища</h1>\n<p><strong>Головна ідея:</strong> Chrome DevTools дозволяє переглядати, редагувати та видаляти записи <code>localStorage</code> і <code>sessionStorage</code> прямо в браузері.</p>\n<h2>🛠️ Як відкрити</h2>\n<ol>\n<li>Відкрийте <strong>DevTools</strong> → <code>F12</code> або <code>Ctrl+Shift+I</code></li>\n<li>Перейдіть на вкладку <strong>Application</strong> (у більшості браузерів; у Firefox — <strong>Storage</strong>)</li>\n<li>У лівій панелі розгорніть <strong>Local Storage</strong> або <strong>Session Storage</strong></li>\n<li>Оберіть потрібний домен</li>\n</ol>\n<h2>📋 Можливості</h2>\n<table>\n<thead>\n<tr>\n<th>Дія</th>\n<th>Як виконати</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>👁️ Переглянути записи</td>\n<td>Оберіть домен — усі пари ключ/значення у таблиці</td>\n</tr>\n<tr>\n<td>✏️ Змінити значення</td>\n<td>Подвійний клік по значенню — редагування in-place</td>\n</tr>\n<tr>\n<td>➕ Додати запис</td>\n<td>Клік на порожній рядок у таблиці</td>\n</tr>\n<tr>\n<td>🗑️ Видалити запис</td>\n<td>Виділити рядок → кнопка Delete або клавіша <code>Del</code></td>\n</tr>\n<tr>\n<td>💣 Очистити все</td>\n<td>Кнопка 🚫 (Clear All) над таблицею</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Тестування через консоль</strong> <p>Пряме введення команд у Console DevTools — найшвидший спосіб перевірити роботу зі сховищем:</p>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Подивитись усе, що зберігається</span>\n<span class=\"hljs-keyword\">for</span> (<span class=\"hljs-keyword\">let</span> i = <span class=\"hljs-number\">0</span>; i &lt; <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-property\">length</span>; i++) {\n  <span class=\"hljs-keyword\">const</span> key = <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">key</span>(i);\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(key, <span class=\"hljs-string\">\"→\"</span>, <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">getItem</span>(key));\n}</code></pre></div>\n\n","<h1>⚠️ Обмеження та безпека</h1>\n<p><strong>Головна ідея:</strong> <code>localStorage</code> — зручний, але не універсальний інструмент; він має суттєві обмеження, які необхідно враховувати.</p>\n<h2>🚫 Технічні обмеження</h2>\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Перевірка доступності localStorage (може бути заблокований)</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">isStorageAvailable</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">try</span> {\n    <span class=\"hljs-keyword\">const</span> key = <span class=\"hljs-string\">\"__storage_test__\"</span>;\n    <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">setItem</span>(key, <span class=\"hljs-string\">\"1\"</span>);\n    <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">removeItem</span>(key);\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-literal\">true</span>;\n  } <span class=\"hljs-keyword\">catch</span> {\n    <span class=\"hljs-keyword\">return</span> <span class=\"hljs-literal\">false</span>; <span class=\"hljs-comment\">// Приватний режим, заблокований браузером</span>\n  }\n}\n\n<span class=\"hljs-comment\">// Обробка переповнення (QuotaExceededError)</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">safeSave</span>(<span class=\"hljs-params\">key, value</span>) {\n  <span class=\"hljs-keyword\">try</span> {\n    <span class=\"hljs-variable language_\">localStorage</span>.<span class=\"hljs-title function_\">setItem</span>(key, <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>(value));\n  } <span class=\"hljs-keyword\">catch</span> (err) {\n    <span class=\"hljs-keyword\">if</span> (err.<span class=\"hljs-property\">name</span> === <span class=\"hljs-string\">\"QuotaExceededError\"</span>) {\n      <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">\"Сховище переповнене. Очистіть застарілі дані.\"</span>);\n    }\n  }\n}</code></pre><h2>🔐 Безпекові обмеження</h2>\n<table>\n<thead>\n<tr>\n<th>Проблема</th>\n<th>Пояснення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🎯 XSS-атаки</td>\n<td>Шкідливий скрипт на сторінці може прочитати увесь <code>localStorage</code></td>\n</tr>\n<tr>\n<td>🔓 Незашифровані дані</td>\n<td>Вміст зберігається як звичайний текст — видимий у DevTools</td>\n</tr>\n<tr>\n<td>🚫 Без терміну дії</td>\n<td>На відміну від cookie, не можна задати час автоматичного видалення</td>\n</tr>\n<tr>\n<td>🚧 Блокування браузером</td>\n<td>У приватному режимі або при суворих налаштуваннях — недоступний</td>\n</tr>\n</tbody></table>\n<div class=\"danger\"><strong>🚫 Не зберігайте чутливі дані</strong> <p>Паролі, номери кредитних карток і персональні дані <strong>ніколи</strong> не слід зберігати у <code>localStorage</code>. Будь-який JS-код на сторінці (у тому числі шкідливий, підключений через XSS) має повний доступ до сховища. Для автентифікаційних токенів — використовуйте <code>HttpOnly</code> cookie.</p>\n</div>\n\n\n\n<h2>📊 Коли НЕ використовувати <code>localStorage</code></h2>\n<ul>\n<li>Чутливі дані (паролі, платіжні дані, медична інформація)</li>\n<li>Великі обсяги даних — понад 1–2 МБ краще зберігати в IndexedDB</li>\n<li>Дані, що мають надходити на сервер при кожному запиті — для цього призначені cookie</li>\n</ul>\n","<h1>🎯 Подія <code>storage</code></h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p>Подія <strong><code>storage</code></strong> — браузерна подія, що виникає в <strong>інших вкладках</strong> того самого домену, коли <code>localStorage</code> змінюється. Дозволяє синхронізувати стан між вкладками.</p>\n</div>\n\n\n\n<pre><code class=\"language-js hljs language-javascript\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Ця функція викликається в ІНШИХ вкладках при зміні localStorage</span>\n<span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">\"storage\"</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">event</span>) =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Змінено ключ:\"</span>, event.<span class=\"hljs-property\">key</span>);\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Старе значення:\"</span>, event.<span class=\"hljs-property\">oldValue</span>);\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Нове значення:\"</span>, event.<span class=\"hljs-property\">newValue</span>);\n\n  <span class=\"hljs-comment\">// Реагуємо тільки на потрібний ключ</span>\n  <span class=\"hljs-keyword\">if</span> (event.<span class=\"hljs-property\">key</span> === <span class=\"hljs-string\">\"theme\"</span>) {\n    <span class=\"hljs-title function_\">applyTheme</span>(event.<span class=\"hljs-property\">newValue</span>);\n  }\n});\n\n<span class=\"hljs-comment\">// Практичний сценарій: синхронізація виходу з системи</span>\n<span class=\"hljs-comment\">// Якщо користувач натискає \"Вийти\" в одній вкладці —</span>\n<span class=\"hljs-comment\">// інші вкладки теж реагують через подію storage</span>\n<span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-title function_\">addEventListener</span>(<span class=\"hljs-string\">\"storage\"</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">event</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">if</span> (event.<span class=\"hljs-property\">key</span> === <span class=\"hljs-string\">\"authToken\"</span> &amp;&amp; event.<span class=\"hljs-property\">newValue</span> === <span class=\"hljs-literal\">null</span>) {\n    <span class=\"hljs-comment\">// Токен видалено → перенаправити на сторінку входу</span>\n    <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-property\">location</span>.<span class=\"hljs-property\">href</span> = <span class=\"hljs-string\">\"/login\"</span>;\n  }\n});</code></pre><div class=\"note\"><strong>📝 Подія не виникає в тій самій вкладці</strong> <p><code>storage</code> не спрацьовує у вкладці, яка ініціювала зміну. Вона призначена саме для <strong>між-вкладкової</strong> комунікації.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>Клієнтське зберігання</strong> вирішує проблему втрати стану при перезавантаженні; <code>localStorage</code> і <code>sessionStorage</code> — найпростіший і найпоширеніший інструмент для цього</p>\n</li>\n<li><p><strong><code>localStorage</code></strong> зберігає дані постійно у межах домену; <strong><code>sessionStorage</code></strong> — лише до закриття вкладки; API у них ідентичний</p>\n</li>\n<li><p><strong>Лише рядки</strong>: обидва сховища приймають виключно рядкові значення — числа, масиви та об'єкти необхідно серіалізувати через <code>JSON.stringify</code> / <code>JSON.parse</code></p>\n</li>\n<li><p><strong>Захищене читання</strong>: <code>JSON.parse</code> може кинути виняток — завжди загортайте у <code>try...catch</code>, повертаючи значення за замовчуванням</p>\n</li>\n<li><p><strong>Централізований стан</strong>: змінюйте сховище через єдину функцію (<code>setState</code>), а не хаотично в різних місцях коду — це запобігає помилкам неузгодженості</p>\n</li>\n<li><p><strong>DevTools → Application</strong> — стандартний інструмент для інспекції та налагодження вмісту сховищ безпосередньо у браузері</p>\n</li>\n<li><p><strong>Безпека</strong>: <code>localStorage</code> не підходить для чутливих даних — весь вміст доступний будь-якому JS-коду на сторінці</p>\n</li>\n<li><p><strong>Подія <code>storage</code></strong> дозволяє реагувати на зміни сховища в інших вкладках того самого домену</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Чим <code>localStorage</code> відрізняється від <code>sessionStorage</code>? Наведіть конкретний сценарій використання кожного.</p>\n</li>\n<li><p>🤔 Чому запис об'єкта напряму через <code>localStorage.setItem(\"data\", myObject)</code> є помилкою? Що потрапить у сховище?</p>\n</li>\n<li><p>🤔 Навіщо загортати <code>JSON.parse</code> у <code>try...catch</code>? Коли саме виникне виняток?</p>\n</li>\n<li><p>🤔 Що таке \"стан додатку\" і навіщо його синхронізувати зі сховищем?</p>\n</li>\n<li><p>🤔 Що таке подія <code>storage</code> і в якій вкладці вона спрацьовує?</p>\n</li>\n<li><p>🤔 Чому не рекомендується зберігати паролі або токени в <code>localStorage</code>? Яка альтернатива?</p>\n</li>\n<li><p>🤔 Як перевірити та переглянути вміст <code>localStorage</code> без написання коду? Опишіть кроки.</p>\n</li>\n</ol>\n","<h1>💻 Практичне завдання</h1>\n<p><strong>Тема:</strong> Зберігання даних у браузері за допомогою <code>localStorage</code></p>\n<p><strong>Час виконання:</strong> ~20–25 хвилин</p>\n","<h2>📋 Завдання 1: Налаштування теми</h2>\n<p>Створіть HTML-сторінку <code>theme.html</code>, яка запам'ятовує обрану користувачем тему оформлення між перезавантаженнями.</p>\n<p><strong>Що повинна робити сторінка:</strong></p>\n<ol>\n<li>Відображати заголовок і два рядки тексту</li>\n<li>Мати кнопки «Світла тема» і «Темна тема»</li>\n<li>При натисканні на кнопку — змінювати фон і колір тексту</li>\n<li><strong>Зберігати обрану тему в <code>localStorage</code></strong></li>\n<li>При відкритті/перезавантаженні сторінки — автоматично відновлювати тему</li>\n</ol>\n<p><strong>Стартовий код:</strong></p>\n<pre><code class=\"language-html hljs language-xml\" data-highlighted=\"yes\"><span class=\"hljs-meta\">&lt;!DOCTYPE <span class=\"hljs-keyword\">html</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">html</span> <span class=\"hljs-attr\">lang</span>=<span class=\"hljs-string\">\"uk\"</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">head</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">charset</span>=<span class=\"hljs-string\">\"UTF-8\"</span> /&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">title</span>&gt;</span>Тема оформлення<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">title</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">style</span>&gt;</span><span class=\"language-css\">\n      <span class=\"hljs-selector-tag\">body</span> {\n        <span class=\"hljs-attribute\">font-family</span>: sans-serif;\n        <span class=\"hljs-attribute\">padding</span>: <span class=\"hljs-number\">30px</span>;\n        <span class=\"hljs-attribute\">transition</span>: all <span class=\"hljs-number\">0.3s</span>;\n      }\n      <span class=\"hljs-selector-class\">.light</span> {\n        <span class=\"hljs-attribute\">background</span>: <span class=\"hljs-number\">#ffffff</span>;\n        <span class=\"hljs-attribute\">color</span>: <span class=\"hljs-number\">#222222</span>;\n      }\n      <span class=\"hljs-selector-class\">.dark</span> {\n        <span class=\"hljs-attribute\">background</span>: <span class=\"hljs-number\">#1a1a2e</span>;\n        <span class=\"hljs-attribute\">color</span>: <span class=\"hljs-number\">#e0e0e0</span>;\n      }\n      <span class=\"hljs-selector-tag\">button</span> {\n        <span class=\"hljs-attribute\">margin</span>: <span class=\"hljs-number\">8px</span>;\n        <span class=\"hljs-attribute\">padding</span>: <span class=\"hljs-number\">10px</span> <span class=\"hljs-number\">20px</span>;\n        <span class=\"hljs-attribute\">cursor</span>: pointer;\n      }\n    </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">style</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">head</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">h1</span>&gt;</span>🎨 Налаштування теми<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">h1</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>Ця сторінка запам'ятовує вашу тему.<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>Спробуйте перезавантажити її після вибору.<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span>\n\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"btnLight\"</span>&gt;</span>☀️ Світла тема<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"btnDark\"</span>&gt;</span>🌙 Темна тема<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n      <span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable constant_\">THEME_KEY</span> = <span class=\"hljs-string\">\"preferred_theme\"</span>;\n\n      <span class=\"hljs-comment\">// TODO 1: Написати функцію applyTheme(theme),</span>\n      <span class=\"hljs-comment\">//         яка спочатку видаляє обидва класи з document.body,</span>\n      <span class=\"hljs-comment\">//         потім додає потрібний клас та зберігає вибір у localStorage</span>\n\n      <span class=\"hljs-comment\">// TODO 2: При завантаженні сторінки — прочитати збережену тему</span>\n      <span class=\"hljs-comment\">//         з localStorage. Якщо її немає — застосувати \"light\"</span>\n\n      <span class=\"hljs-comment\">// TODO 3: Додати обробники подій на кнопки,</span>\n      <span class=\"hljs-comment\">//         які викликають applyTheme з відповідним аргументом</span>\n    </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">html</span>&gt;</span></code></pre><p><strong>Перевірка:</strong></p>\n<ul>\n<li>Оберіть «Темна тема» → натисніть <code>F5</code> → сторінка повинна залишитися темною</li>\n<li>Відкрийте DevTools → Application → Local Storage → перевірте наявність запису</li>\n</ul>\n<div class=\"tip\"><strong>💡 Довідка по API — Завдання 1</strong> <table>\n<thead>\n<tr>\n<th>Виклик</th>\n<th>Що робить</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>localStorage.setItem(key, value)</code></td>\n<td>Зберігає рядок <code>value</code> під ключем <code>key</code></td>\n</tr>\n<tr>\n<td><code>localStorage.getItem(key)</code></td>\n<td>Повертає рядок або <code>null</code>, якщо ключ відсутній</td>\n</tr>\n<tr>\n<td><code>document.body.classList.remove(\"a\", \"b\")</code></td>\n<td>Видаляє перелічені класи (можна кілька одразу)</td>\n</tr>\n<tr>\n<td><code>document.body.classList.add(\"dark\")</code></td>\n<td>Додає клас до елемента</td>\n</tr>\n<tr>\n<td><code>element.addEventListener(\"click\", fn)</code></td>\n<td>Додає обробник кліку</td>\n</tr>\n</tbody></table>\n</div>\n\n","<h2>📋 Завдання 2: Лічильник відвідувань</h2>\n<p>Створіть HTML-сторінку <code>counter.html</code>, яка рахує кількість разів, коли користувач відкривав сторінку.</p>\n<p><strong>Що повинна робити сторінка:</strong></p>\n<ol>\n<li>Відображати текст: «Ви відвідали цю сторінку X разів»</li>\n<li>Лічильник збільшується на 1 при кожному відкритті або перезавантаженні</li>\n<li>Мати кнопку «Скинути лічильник», яка обнуляє значення</li>\n</ol>\n<p><strong>Стартовий код:</strong></p>\n<pre><code class=\"language-html hljs language-xml\" data-highlighted=\"yes\"><span class=\"hljs-meta\">&lt;!DOCTYPE <span class=\"hljs-keyword\">html</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">html</span> <span class=\"hljs-attr\">lang</span>=<span class=\"hljs-string\">\"uk\"</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">head</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">charset</span>=<span class=\"hljs-string\">\"UTF-8\"</span> /&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">title</span>&gt;</span>Лічильник відвідувань<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">title</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">style</span>&gt;</span><span class=\"language-css\">\n      <span class=\"hljs-selector-tag\">body</span> {\n        <span class=\"hljs-attribute\">font-family</span>: sans-serif;\n        <span class=\"hljs-attribute\">padding</span>: <span class=\"hljs-number\">30px</span>;\n      }\n      <span class=\"hljs-selector-id\">#counter</span> {\n        <span class=\"hljs-attribute\">font-size</span>: <span class=\"hljs-number\">2rem</span>;\n        <span class=\"hljs-attribute\">font-weight</span>: bold;\n        <span class=\"hljs-attribute\">color</span>: <span class=\"hljs-number\">#1565c0</span>;\n      }\n      <span class=\"hljs-selector-tag\">button</span> {\n        <span class=\"hljs-attribute\">margin-top</span>: <span class=\"hljs-number\">16px</span>;\n        <span class=\"hljs-attribute\">padding</span>: <span class=\"hljs-number\">10px</span> <span class=\"hljs-number\">20px</span>;\n        <span class=\"hljs-attribute\">cursor</span>: pointer;\n      }\n    </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">style</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">head</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">h1</span>&gt;</span>👋 Ласкаво просимо!<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">h1</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">p</span>&gt;</span>Ви відвідали цю сторінку <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">span</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"counter\"</span>&gt;</span>0<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">span</span>&gt;</span> разів<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">p</span>&gt;</span>\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"resetBtn\"</span>&gt;</span>🔄 Скинути лічильник<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n\n    <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n      <span class=\"hljs-keyword\">const</span> <span class=\"hljs-variable constant_\">COUNT_KEY</span> = <span class=\"hljs-string\">\"visit_count\"</span>;\n\n      <span class=\"hljs-comment\">// TODO 1: Прочитати поточне значення лічильника з localStorage.</span>\n      <span class=\"hljs-comment\">//         Якщо запису немає — вважати 0.</span>\n      <span class=\"hljs-comment\">//         Не забудьте привести тип: getItem повертає рядок!</span>\n\n      <span class=\"hljs-comment\">// TODO 2: Збільшити лічильник на 1 та зберегти назад у localStorage</span>\n\n      <span class=\"hljs-comment\">// TODO 3: Відобразити оновлене значення у span#counter</span>\n\n      <span class=\"hljs-comment\">// TODO 4: Додати обробник на кнопку resetBtn,</span>\n      <span class=\"hljs-comment\">//         який встановлює лічильник у 0, зберігає та оновлює відображення</span>\n    </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">html</span>&gt;</span></code></pre><p><strong>Перевірка:</strong></p>\n<ul>\n<li>Відкрийте сторінку — лічильник показує 1</li>\n<li>Натисніть <code>F5</code> — стає 2, 3, 4...</li>\n<li>Натисніть «Скинути лічильник» — лічильник повертається до 0</li>\n<li>Відкрийте DevTools → Console та виконайте: <code>localStorage.getItem(\"visit_count\")</code> — переконайтесь, що значення збігається з відображеним</li>\n</ul>\n<div class=\"tip\"><strong>💡 Довідка по API — Завдання 2</strong> <table>\n<thead>\n<tr>\n<th>Виклик</th>\n<th>Що робить</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>localStorage.getItem(key)</code></td>\n<td>Повертає рядок або <code>null</code>, якщо ключ відсутній</td>\n</tr>\n<tr>\n<td><code>localStorage.setItem(key, value)</code></td>\n<td>Зберігає значення (число автоматично стає рядком)</td>\n</tr>\n<tr>\n<td><code>Number(value)</code></td>\n<td>Перетворює рядок або <code>null</code> на число; <code>Number(null)</code> → <code>0</code>, <code>Number(\"3\")</code> → <code>3</code></td>\n</tr>\n<tr>\n<td>Оператор <code>||</code></td>\n<td><code>a || b</code> — повертає <code>b</code>, якщо <code>a</code> є <code>0</code>, <code>null</code> або <code>NaN</code></td>\n</tr>\n<tr>\n<td><code>document.getElementById(\"id\")</code></td>\n<td>Знаходить елемент за його <code>id</code></td>\n</tr>\n<tr>\n<td><code>element.textContent = value</code></td>\n<td>Встановлює текстовий вміст елемента</td>\n</tr>\n<tr>\n<td><code>element.addEventListener(\"click\", fn)</code></td>\n<td>Додає обробник кліку</td>\n</tr>\n</tbody></table>\n</div>\n\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Локальне сховище</td>\n<td>Local Storage</td>\n<td>Постійне браузерне сховище типу \"ключ–значення\" для конкретного домену</td>\n</tr>\n<tr>\n<td>Сховище сесії</td>\n<td>Session Storage</td>\n<td>Аналог localStorage, що очищується при закритті вкладки</td>\n</tr>\n<tr>\n<td>Серіалізація</td>\n<td>Serialization</td>\n<td>Перетворення об'єкта/масиву на рядок для збереження або передачі</td>\n</tr>\n<tr>\n<td>Десеріалізація</td>\n<td>Deserialization</td>\n<td>Відновлення об'єкта/масиву з рядкового представлення</td>\n</tr>\n<tr>\n<td>Стан додатку</td>\n<td>Application State</td>\n<td>Сукупність усіх даних, що описують поточний режим роботи інтерфейсу</td>\n</tr>\n<tr>\n<td>Сесія браузера</td>\n<td>Browser Session</td>\n<td>Проміжок часу від відкриття до закриття вкладки</td>\n</tr>\n<tr>\n<td>Переповнення сховища</td>\n<td>Quota Exceeded</td>\n<td>Помилка при спробі записати більше, ніж дозволяє ліміт сховища</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>JSON</strong> (JavaScript Object Notation)</td>\n<td>JavaScript Object Notation</td>\n<td>Текстовий формат обміну даними</td>\n</tr>\n<tr>\n<td><strong>XSS</strong> (Cross-Site Scripting)</td>\n<td>Cross-Site Scripting</td>\n<td>Міжсайтовий скриптинг — тип атаки на веб-додатки</td>\n</tr>\n<tr>\n<td><strong>JWT</strong> (JSON Web Token)</td>\n<td>JSON Web Token</td>\n<td>Стандарт токенів автентифікації у форматі JSON</td>\n</tr>\n<tr>\n<td><strong>DOM</strong> (Document Object Model)</td>\n<td>Document Object Model</td>\n<td>Програмний інтерфейс HTML-документа</td>\n</tr>\n<tr>\n<td><strong>API</strong> (Application Programming Interface)</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
