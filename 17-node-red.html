#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 20</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>Введення в платформу Node-RED</h1>\n<p><strong>Web-технології в автоматизованих системах</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🌊 Що таке Node-RED та парадигма потокового програмування</li>\n<li>🏭 Місце Node-RED в автоматизованих системах</li>\n<li>⚙️ Архітектура: runtime та редактор</li>\n<li>💻 Встановлення та запуск платформи</li>\n<li>🖥️ Інтерфейс редактора: палітра, робоча область, sidebar</li>\n<li>🎯 Перший потік: Inject → Debug</li>\n<li>🚀 Розгортання потоків (Deploy)</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🌊 Що таке Node-RED</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Node-RED</strong> — це візуальне середовище програмування, побудоване на платформі Node.js, призначене для з'єднання апаратних пристроїв, програмних сервісів та API в єдині потоки обробки даних без написання великого обсягу коду.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Замість того щоб писати десятки рядків коду для прийому HTTP-запиту, його обробки та відправки відповіді — ви візуально з'єднуєте готові блоки (ноди), кожен з яких виконує одну невелику задачу.</p>\n<h2>🎯 Для чого створено</h2>\n<table>\n<thead>\n<tr>\n<th>Сфера застосування</th>\n<th>Приклад задачі</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🌐 Інтеграція сервісів</td>\n<td>Об'єднання REST API різних систем в один потік</td>\n</tr>\n<tr>\n<td>🏭 Автоматизовані системи</td>\n<td>Збір даних з датчиків та формування звітів</td>\n</tr>\n<tr>\n<td>🏠 IoT та Smart Home</td>\n<td>Керування пристроями через MQTT, HTTP, Modbus</td>\n</tr>\n<tr>\n<td>⚡ Швидке прототипування</td>\n<td>Перевірка ідей без розгортання повноцінного бекенду</td>\n</tr>\n<tr>\n<td>🔄 Обробка потоків даних</td>\n<td>Трансформація, фільтрація, маршрутизація повідомлень</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Походження</strong> <p>Node-RED розроблено в <strong>IBM Emerging Technology</strong> у 2013 році для внутрішніх потреб інтеграції систем. У жовтні 2016 року проєкт передано організації <strong>JS Foundation</strong>, а у 2019 році, після злиття JS Foundation з Node.js Foundation, він став частиною <strong>OpenJS Foundation</strong> — нейтральної некомерційної організації, що супроводжує екосистему JavaScript. Сьогодні Node-RED входить до офіційних дистрибутивів Raspberry Pi та широко використовується в промисловості.</p>\n</div>\n\n","<h1>🔄 Парадигма потокового програмування</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Flow-based programming (FBP)</strong> — парадигма програмування, у якій програма представлена як мережа з'єднаних \"чорних скриньок\", що обмінюються повідомленнями (messages) через канали зв'язку. Кожна скринька працює незалежно та реагує на отримані дані.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Програма — це не послідовність інструкцій \"зверху вниз\", а <strong>граф обробників</strong>, через який течуть дані.</p>\n<h2>📊 Класичний код vs потокове програмування</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    subgraph CLASSIC[&quot;📜 Класичний підхід&quot;]\n        C1[&quot;Рядок 1: отримати дані&quot;] --&gt; C2[&quot;Рядок 2: обробити&quot;]\n        C2 --&gt; C3[&quot;Рядок 3: зберегти&quot;]\n        C3 --&gt; C4[&quot;Рядок 4: відповісти&quot;]\n    end\n    subgraph FLOW[&quot;🌊 Потоковий підхід&quot;]\n        F1[&quot;📥 Вхід&quot;] --&gt; F2[&quot;⚙️ Обробка&quot;]\n        F2 --&gt; F3[&quot;💾 Збереження&quot;]\n        F2 --&gt; F4[&quot;📤 Відповідь&quot;]\n    end\n    style C1 fill:#e3f2fd,stroke:#1565c0\n    style C2 fill:#e3f2fd,stroke:#1565c0\n    style C3 fill:#e3f2fd,stroke:#1565c0\n    style C4 fill:#e3f2fd,stroke:#1565c0\n    style F1 fill:#e8f5e9,stroke:#388e3c\n    style F2 fill:#e8f5e9,stroke:#388e3c\n    style F3 fill:#e8f5e9,stroke:#388e3c\n    style F4 fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1779170487771-3-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 445.953125px;\" viewBox=\"0 -1 445.953125 929\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1779170487771-3-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1779170487771-3-0 .edge-animation-slow{stroke-dasha p://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Рядок 4: відповісти</p></span></div></foreignObject></g></g></g></g></g></g></g><defs><filter id=\"exp-1779170487771-3-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779170487771-3-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<table>\n<thead>\n<tr>\n<th>Характеристика</th>\n<th>Класичний код</th>\n<th>Потокове програмування</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Одиниця логіки</td>\n<td>Функція або рядок</td>\n<td>Нода (обробник повідомлень)</td>\n</tr>\n<tr>\n<td>Спосіб опису</td>\n<td>Текстовий синтаксис</td>\n<td>Візуальний граф</td>\n</tr>\n<tr>\n<td>Виконання</td>\n<td>Послідовне, від рядка до рядка</td>\n<td>Реактивне, по надходженню даних</td>\n</tr>\n<tr>\n<td>Бар'єр входу</td>\n<td>Знання мови програмування</td>\n<td>Розуміння логіки потоку</td>\n</tr>\n<tr>\n<td>Типова сфера</td>\n<td>Загальне програмування</td>\n<td>Інтеграція, ETL, IoT, АС</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Чому це зручно для АС</strong> <p>В автоматизованих системах дані природно течуть від джерел (датчики, форми, API) до споживачів (бази даних, дашборди, виконавчі пристрої). Flow-based підхід відображає цю реальність напряму, без штучного перетворення в послідовний код.</p>\n</div>\n\n","<h1>🏭 Місце Node-RED в автоматизованих системах</h1>\n<p><strong>Головна ідея:</strong> Node-RED виступає <strong>інтеграційним шаром</strong> між різнорідними компонентами АС — пристроями нижнього рівня, базами даних, інтерфейсами користувача та зовнішніми сервісами.</p>\n<h2>🔌 Типова роль у системі</h2>\n\n<div cl eignObject></g></g><g class=\"node default  \" id=\"exp-1779170487816-4-0-flowchart-ALERT-9\" data-look=\"classic\" transform=\"translate(379.2578125, 312)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-102.203125\" y=\"-36\" width=\"204.40625\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-78.203125, -24)\"><rect></rect><foreignObject width=\"156.40625\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📧 Сповіщення<br>Email, Telegram, SMS</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779170487816-4-0-flowchart-STORE-11\" data-look=\"classic\" transform=\"translate(634.4765625, 312)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-103.015625\" y=\"-36\" width=\"206.03125\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-79.015625, -24)\"><rect></rect><foreignObject width=\"158.03125\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📊 Зберігання історії<br>часові ряди</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779170487816-4-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779170487816-4-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>🎯 Типові задачі в АС</h2>\n<table>\n<thead>\n<tr>\n<th>Задача</th>\n<th>Як вирішується в Node-RED</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>📥 Збір даних з пристроїв</td>\n<td>MQTT-ноди підписуються на topic та отримують повідомлення</td>\n</tr>\n<tr>\n<td>🔄 Перетворення форматів</td>\n<td>Function-нода або Change-нода трансформує <code>msg.payload</code></td>\n</tr>\n<tr>\n<td>🌐 Надання REST API</td>\n<td>HTTP In + HTTP Response формують endpoint</td>\n</tr>\n<tr>\n<td>📊 Візуалізація в реальному часі</td>\n<td>Dashboard-ноди виводять значення на gauge, chart, table</td>\n</tr>\n<tr>\n<td>🚨 Реакція на події</td>\n<td>Switch-нода маршрутизує дані за умовами</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Low-code підхід в індустрії</strong> <p>Платформи на кшталт Node-RED належать до категорії <strong>low-code</strong> інструментів. Замість повного коду розробник створює рішення з готових блоків, що скорочує час розробки інтеграційних задач у 5–10 разів. Це не заміна класичному програмуванню, а інструмент для <strong>конкретного класу задач</strong> — інтеграції систем та потокової обробки.</p>\n</div>\n\n","<h1>⚙️ Архітектура Node-RED</h1>\n<p><strong>Головна ідея:</strong> Node-RED — це <strong>серверний додаток</strong>, що складається з двох ключових частин: рушія виконання потоків (runtime) та веб-редактора для їх створення.</p>\n<h2>🏗️ Дві складові платформи</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    BROWSER[&quot;🌐 Браузер&lt;br&gt;веб-редактор&quot;] --&gt;|&quot;HTTP та WebSocket&quot;| RUNTIME\n    subgraph SERVER[&quot;💻 Сервер Node.js&quot;]\n        RUNTIME[&quot;🔴 Node-RED runtime&quot;]\n        RUNTIME --&gt; FLOWS[&quot;📦 flows.json&lt;br&gt;опис потоків&quot;]\n        RUNTIME --&gt; NODES[&quot;🧩 Встановлені ноди&quot;]\n    end\n    RUNTIME --&gt;|&quot;вхідні дані&quot;| EXTIN[&quot;📥 MQTT, HTTP, Serial&quot;]\n    RUNTIME --&gt;|&quot;вихідні дані&quot;| EXTOUT[&quot;📤 API, БД, пристрої&quot;]\n    style BROWSER fill:#e3f2fd,stroke:#1565c0\n    style RUNTIME fill:#fff9c4,stroke:#f9a825\n    style FLOWS fill:#fce4ec,stroke:#c2185b\n    s gn: center;\"><span class=\"nodeLabel \"><p>🔴 Node-RED runtime</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779170487835-5-0-flowchart-FLOWS-4\" data-look=\"classic\" transform=\"translate(845.4765625, 79)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-72.21875\" y=\"-36\" width=\"144.4375\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-48.21875, -24)\"><rect></rect><foreignObject width=\"96.4375\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📦 flows.json<br>опис потоків</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779170487835-5-0-flowchart-NODES-6\" data-look=\"classic\" transform=\"translate(845.4765625, 189)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-103.3359375\" y=\"-24\" width=\"206.671875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-79.3359375, -12)\"><rect></rect><foreignObject width=\"158.671875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🧩 Встановлені ноди</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779170487835-5-0-flowchart-EXTIN-8\" data-look=\"classic\" transform=\"translate(845.4765625, 352)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-106.4453125\" y=\"-24\" width=\"212.890625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-82.4453125, -12)\"><rect></rect><foreignObject width=\"164.890625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📥 MQTT, HTTP, Serial</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779170487835-5-0-flowchart-EXTOUT-10\" data-look=\"classic\" transform=\"translate(845.4765625, 450)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-101.078125\" y=\"-24\" width=\"202.15625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-77.078125, -12)\"><rect></rect><foreignObject width=\"154.15625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📤 API, БД, пристрої</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779170487835-5-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779170487835-5-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>📋 Що робить кожна частина</h2>\n<table>\n<thead>\n<tr>\n<th>Компонент</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🔴 <strong>Runtime</strong></td>\n<td>Виконує потоки, приймає та маршрутизує повідомлення між нодами</td>\n</tr>\n<tr>\n<td>🌐 <strong>Редактор (UI)</strong></td>\n<td>Веб-інтерфейс для візуального створення потоків у браузері</td>\n</tr>\n<tr>\n<td>📦 <strong>flows.json</strong></td>\n<td>Файл з описом усіх потоків (структура, з'єднання, налаштування)</td>\n</tr>\n<tr>\n<td>🧩 <strong>Ноди (modules)</strong></td>\n<td>Бібліотеки готових обробників, які можна додавати з палітри</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Важливо розуміти</strong> <p>Веб-редактор — це <strong>не сам Node-RED</strong>, а лише інтерфейс керування. Коли ви закриваєте браузер, потоки <strong>продовжують працювати</strong> на сервері. Це принципова відмінність від звичайних веб-додатків, де закриття вкладки часто означає зупинку роботи.</p>\n</div>\n\n\n\n\n\n<div class=\"note\"><strong>📝 Технологічна основа</strong> <p>Node-RED написано на <strong>Node.js</strong> — серверній JavaScript-платформі. Кожна нода — це Node.js-модуль. Логіка всередині Function-ноди виконується як звичайний JavaScript. Це означає, що знання JavaScript, отримані раніше у курсі, безпосередньо застосовуються при роботі з Node-RED.</p>\n</div>\n\n","<h1>💻 Встановлення Node-RED</h1>\n<p><strong>Головна ідея:</strong> Node-RED встановлюється через менеджер пакетів <strong>npm</strong> як глобальний пакет Node.js та запускається однією командою.</p>\n<h2>📋 Системні вимоги</h2>\n<table>\n<thead>\n<tr>\n<th>Компонент</th>\n<th>Мінімальна версія</th>\n<th>Рекомендована</th>\n<th>Як перевірити</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Node.js</td>\n<td>18.x</td>\n<td>22.x (LTS)</td>\n<td><code>node --version</code></td>\n</tr>\n<tr>\n<td>npm</td>\n<td>9.x</td>\n<td>10.x</td>\n<td><code>npm --version</code></td>\n</tr>\n<tr>\n<td>ОС</td>\n<td>Windows, macOS, Linux</td>\n<td>будь-яка сучасна</td>\n<td>—</td>\n</tr>\n<tr>\n<td>Браузер</td>\n<td>Chrome, Firefox, Edge</td>\n<td>сучасна версія</td>\n<td>—</td>\n</tr>\n</tbody></table>\n<h2>🔧 Покрокова інсталяція</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># 1. Перевірка наявності Node.js</span>\nnode --version\n<span class=\"hljs-comment\"># Очікуваний результат: v18.x.x або вище</span>\n\n<span class=\"hljs-comment\"># 2. Перевірка npm</span>\nnpm --version\n<span class=\"hljs-comment\"># Очікуваний результат: 9.x.x або вище</span>\n\n<span class=\"hljs-comment\"># 3. Глобальне встановлення Node-RED</span>\nnpm install -g --unsafe-perm node-red\n\n<span class=\"hljs-comment\"># 4. Перевірка встановлення</span>\nnode-red --version\n<span class=\"hljs-comment\"># Очікуваний результат: версія Node-RED</span></code></pre><div class=\"tip\"><strong>💡 Прапорець <code>--unsafe-perm</code></strong> <p>Прапорець <code>--unsafe-perm</code> потрібен для коректного збирання нативних модулів при глобальному встановленні. На Windows він не обов'язковий, але його присутність нічого не порушує. На Linux/macOS встановлення без нього іноді завершується помилками складання залежностей.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ Альтернативні способи</strong> <p>Існують також: офіційний Docker-образ (<code>nodered/node-red</code>), готові скрипти для Raspberry Pi, хмарні сервіси з готовим Node-RED. Для навчальних цілей рекомендується <strong>локальне встановлення через npm</strong> — це дає повний контроль і відповідає реальному робочому процесу інженера АС.</p>\n</div>\n\n","<h1>🚀 Запуск Node-RED</h1>\n<p><strong>Головна ідея:</strong> Після встановлення Node-RED запускається однією командою, після чого редактор стає доступним у браузері за адресою <code>http://localhost:1880</code>.</p>\n<h2>▶️ Команда запуску</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># Запуск Node-RED у поточному терміналі</span>\nnode-red</code></pre><p><strong>Що відбувається при запуску:</strong></p>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">Welcome to Node-RED\n===================\n\n11 Mar 14:23:01 - [info] Node-RED version: v4.1.10\n11 Mar 14:23:01 - [info] Node.js version: v22.11.0\n11 Mar 14:23:01 - [info] Loading palette nodes\n11 Mar 14:23:02 - [info] Settings file: /Users/anton/.node-red/settings.js\n11 Mar 14:23:02 - [info] Context store: 'default' [module=memory]\n11 Mar 14:23:02 - [info] User directory: /Users/anton/.node-red\n11 Mar 14:23:02 - [info] Flows file: /Users/anton/.node-red/flows.json\n11 Mar 14:23:02 - [info] Server now running at http://127.0.0.1:1880/\n11 Mar 14:23:02 - [info] Starting flows\n11 Mar 14:23:02 - [info] Started flows</code></pre><h2>📋 Що означають ключові рядки</h2>\n<table>\n<thead>\n<tr>\n<th>Рядок логу</th>\n<th>Що означає</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>Settings file</code></td>\n<td>Шлях до файлу конфігурації (порт, безпека, інше)</td>\n</tr>\n<tr>\n<td><code>User directory</code></td>\n<td>Папка з усіма даними Node-RED (потоки, ноди, налаштування)</td>\n</tr>\n<tr>\n<td><code>Flows file</code></td>\n<td>Файл <code>flows.json</code> з описом ваших потоків</td>\n</tr>\n<tr>\n<td><code>Server now running</code></td>\n<td>Адреса, за якою редактор доступний у браузері</td>\n</tr>\n<tr>\n<td><code>Started flows</code></td>\n<td>Потоки успішно завантажено та активовано</td>\n</tr>\n</tbody></table>\n<div class=\"danger\"><strong>🚫 Не закривайте термінал</strong> <p>Поки термінал з командою <code>node-red</code> відкритий — платформа працює. Закриття терміналу або натискання <strong>Ctrl+C</strong> зупиняє runtime, і всі потоки перестають виконуватись. Для постійної роботи в реальних системах Node-RED запускають як <strong>системний сервіс</strong> (наприклад, через <code>systemd</code> на Linux).</p>\n</div>\n\n\n\n\n\n<div class=\"tip\"><strong>💡 Доступ з браузера</strong> <p>Відкрийте <code>http://localhost:1880</code> у будь-якому браузері — побачите веб-редактор. Адреса <code>127.0.0.1</code> та <code>localhost</code> рівнозначні: це звернення до власного комп'ютера.</p>\n</div>\n\n","<h1>🖥️ Інтерфейс редактора: загальний огляд</h1>\n<p><strong>Головна ідея:</strong> Редактор Node-RED організовано у три ключові зони: палітра нод зліва, робоча область посередині та інформаційна панель справа.</p>\n<h2>📐 Структура інтерфейсу</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    subgraph EDITOR[&quot;🖥️ Редактор Node-RED&quot;]\n        PALETTE[&quot;🧩 Палітра&lt;br&gt;зліва&quot;]\n        WORKSPACE[&quot;📐 Робоча область&lt;br&gt;посередині&quot;]\n        SIDEBAR[&quo  class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-65.59375\" y=\"-36\" width=\"131.1875\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-41.59375, -24)\"><rect></rect><foreignObject width=\"83.1875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🧩 Палітра<br>зліва</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779170487848-8-0-flowchart-WORKSPACE-1\" data-look=\"classic\" transform=\"translate(138.90625, 250.5)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-95.90625\" y=\"-36\" width=\"191.8125\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-71.90625, -24)\"><rect></rect><foreignObject width=\"143.8125\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📐 Робоча область<br>посередині</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779170487848-8-0-flowchart-SIDEBAR-2\" data-look=\"classic\" transform=\"translate(138.90625, 419.5)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-63.9375\" y=\"-36\" width=\"127.875\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-39.9375, -24)\"><rect></rect><foreignObject width=\"79.875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📋 Sidebar<br>справа</p></span></div></foreignObject></g></g></g></g></g></g></g><defs><filter id=\"exp-1779170487848-8-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779170487848-8-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>📋 Призначення кожної зони</h2>\n<table>\n<thead>\n<tr>\n<th>Зона</th>\n<th>Що містить</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🧩 <strong>Палітра</strong></td>\n<td>Список доступних нод, згрупованих за категоріями</td>\n</tr>\n<tr>\n<td>📐 <strong>Робоча область</strong></td>\n<td>Полотно для розміщення нод та створення з'єднань між ними</td>\n</tr>\n<tr>\n<td>📋 <strong>Sidebar</strong></td>\n<td>Вкладки <code>info</code>, <code>help</code>, <code>debug</code>, <code>context</code> для деталей та логів</td>\n</tr>\n<tr>\n<td>🚀 <strong>Кнопка Deploy</strong></td>\n<td>Зверху справа — застосовує зміни та активує потоки</td>\n</tr>\n<tr>\n<td>🗂️ <strong>Вкладки потоків</strong></td>\n<td>Зверху по центру — кожен потік може бути в окремій вкладці</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Збереження стану</strong> <p>Коли ви перетягуєте ноду на робочу область — це <strong>ще не є запуск</strong>. Зміни залишаються лише у вашому браузері (як чернетка) до натискання <strong>Deploy</strong>. Це дозволяє редагувати потоки безпечно, не порушуючи роботу активних процесів.</p>\n</div>\n\n","<h1>🧩 Палітра нод</h1>\n<p><strong>Головна ідея:</strong> Палітра — це бібліотека готових блоків логіки. Кожна нода виконує одну конкретну задачу, а складна поведінка досягається з'єднанням нод у потоки.</p>\n<h2>📂 Базові категорії палітри</h2>\n<table>\n<thead>\n<tr>\n<th>Категорія</th>\n<th>Призначення</th>\n<th>Типові ноди</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🟢 <strong>common</strong></td>\n<td>Базові ноди для будь-якого потоку</td>\n<td><code>inject</code>, <code>debug</code>, <code>complete</code>, <code>comment</code></td>\n</tr>\n<tr>\n<td>🔧 <strong>function</strong></td>\n<td>Логіка та трансформація даних</td>\n<td><code>function</code>, <code>switch</code>, <code>change</code>, <code>template</code></td>\n</tr>\n<tr>\n<td>🌐 <strong>network</strong></td>\n<td>Мережева взаємодія</td>\n<td><code>http in</code>, <code>http response</code>, <code>http request</code>, <code>mqtt in</code>, <code>mqtt out</code></td>\n</tr>\n<tr>\n<td>📊 <strong>sequence</strong></td>\n<td>Робота з послідовностями повідомлень</td>\n<td><code>split</code>, <code>join</code>, <code>sort</code>, <code>batch</code></td>\n</tr>\n<tr>\n<td>🔄 <strong>parser</strong></td>\n<td>Розбір форматів</td>\n<td><code>json</code>, <code>xml</code>, <code>csv</code>, <code>yaml</code></td>\n</tr>\n<tr>\n<td>💾 <strong>storage</strong></td>\n<td>Робота з файлами та сховищем</td>\n<td><code>file in</code>, <code>file</code>, <code>watch</code></td>\n</tr>\n</tbody></table>\n<h2>🔍 Пошук ноди в палітрі</h2>\n<p>Зверху палітри є поле пошуку — швидко знаходить ноду за назвою або описом. Якщо потрібної ноди немає, її можна додати через меню:</p>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">Menu → Manage palette → Install → пошук → Install</code></pre><div class=\"tip\"><strong>💡 Розширення палітри</strong> <p>Спільнота Node-RED створила понад <strong>5000 додаткових модулів</strong> з нодами для всього: від керування 3D-принтерами до інтеграції з ChatGPT. Каталог доступний на <a href=\"https://flows.nodered.org/\">flows.nodered.org</a>. На цьому занятті обмежуємось вбудованими нодами — їх цілком достатньо для розуміння принципів.</p>\n</div>\n\n","<h1>📐 Робоча область та потоки</h1>\n<p><strong>Головна ідея:</strong> Робоча область (workspace) — це <strong>полотно</strong>, де ви розміщуєте ноди та з'єднуєте їх лініями (wires), формуючи <strong>потік</strong> (flow).</p>\n<h2>🔗 Анатомія ноди</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    INPUT((&quot;◉&quot;)) --- NODE[&quot;🟦 deLabel \"><p>◉</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779170487855-10-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779170487855-10-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<table>\n<thead>\n<tr>\n<th>Елемент</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>⚪ <strong>Вхідний порт</strong></td>\n<td>Зліва — приймає повідомлення від попередньої ноди</td>\n</tr>\n<tr>\n<td>🟦 <strong>Тіло ноди</strong></td>\n<td>Іконка, назва, статус виконання</td>\n</tr>\n<tr>\n<td>⚪ <strong>Вихідний порт</strong></td>\n<td>Справа — передає результат наступним нодам</td>\n</tr>\n<tr>\n<td>🔵 <strong>Точка статусу</strong></td>\n<td>Під нодою — поточний стан (підключено, помилка, чекає)</td>\n</tr>\n</tbody></table>\n<h2>🪡 Створення з'єднань</h2>\n<p>З'єднання (wire) створюється кліком та перетягуванням від вихідного порту однієї ноди до вхідного порту іншої. Одна нода може мати <strong>декілька з'єднань</strong>:</p>\n<ul>\n<li>🔀 <strong>Один вихід — багато входів:</strong> повідомлення дублюється для всіх отримувачів</li>\n<li>🔁 <strong>Багато виходів — один вхід:</strong> повідомлення від будь-якого джерела активує отримувача</li>\n</ul>\n<div class=\"warning\"><strong>⚠️ Вхідні та вихідні ноди</strong> <p>Деякі ноди мають лише вихідний порт (<code>inject</code>, <code>mqtt in</code>) — це <strong>джерела даних</strong>. Інші мають лише вхідний порт (<code>debug</code>, <code>http response</code>) — це <strong>приймачі</strong>. Більшість нод мають обидва порти і виступають <strong>обробниками</strong>.</p>\n</div>\n\n","<h1>📋 Sidebar: info, help, debug</h1>\n<p><strong>Головна ідея:</strong> Інформаційна панель справа має декілька вкладок, що супроводжують роботу: довідка по нодах, виведення налагодження та контекстні змінні.</p>\n<h2>📂 Основні вкладки sidebar</h2>\n<table>\n<thead>\n<tr>\n<th>Вкладка</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>ℹ️ <strong>info</strong></td>\n<td>Інформація про вибрану ноду або потік</td>\n</tr>\n<tr>\n<td>📖 <strong>help</strong></td>\n<td>Документація по типу ноди — пояснення параметрів та поведінки</td>\n</tr>\n<tr>\n<td>🐛 <strong>debug</strong></td>\n<td>Виведення повідомлень від <code>debug</code>-нод (для налагодження потоків)</td>\n</tr>\n<tr>\n<td>📦 <strong>context</strong></td>\n<td>Стан змінних у різних областях видимості (<code>node</code>, <code>flow</code>, <code>global</code>)</td>\n</tr>\n<tr>\n<td>⚙️ <strong>config</strong></td>\n<td>Список спільних конфігурацій (підключення до брокерів, БД тощо)</td>\n</tr>\n</tbody></table>\n<h2>🐛 Вкладка debug — головний інструмент розробника</h2>\n<p>Кожна <code>debug</code>-нода, додана в потік, виводить повідомлення саме сюди. Це аналог <code>console.log()</code> у браузерному JavaScript.</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    SRC[&quot;📥 Джерело даних&quot;] --&gt; PROC[&quot;⚙️ Обробка&quot;]\n    PROC --&gt; OUT[&quot;📤 Вихід&quot;]\n    PROC --&gt; DBG[&quot;🐛 debug&quot;]\n    DBG -.-&gt;|&quot;вивід&quot;| PANEL[&quot;📋 Sidebar debug&quot;]\n    style SRC fill:#e3f2fd,stroke:#1565c0\n    style PROC fill:#fff9c4,stroke:#f9a825\n    style OUT fill:#e8f5e9,stroke:#388e3c\n    style DBG fill:#fce4ec,stroke:#c2185b\n    style PANEL fill:#fff3e0,stroke:#ef6c00\"><svg id=\"exp-1779170487864-11-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 836.03125px;\" viewBox=\"0 0 836.03125 162\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1779170487864-11-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-anim ant;stroke:#1565c0 !important\" x=\"-62.3203125\" y=\"-36\" width=\"124.640625\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-38.3203125, -24)\"><rect></rect><foreignObject width=\"76.640625\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>⏱️ inject<br>timestamp</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779170487871-12-0-flowchart-DBG-1\" data-look=\"classic\" transform=\"translate(362.7421875, 44)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-70.2421875\" y=\"-36\" width=\"140.484375\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-46.2421875, -24)\"><rect></rect><foreignObject width=\"92.484375\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🐛 debug<br>msg.payload</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779170487871-12-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779170487871-12-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<p><strong>Кроки створення:</strong></p>\n<ol>\n<li>🖱️ Перетягнути ноду <strong>inject</strong> з палітри (категорія common) на робочу область</li>\n<li>🖱️ Перетягнути ноду <strong>debug</strong> з палітри на робочу область</li>\n<li>🪡 Створити з'єднання: клік на вихідний порт inject → перетягнути до вхідного порту debug</li>\n<li>🚀 Натиснути кнопку <strong>Deploy</strong> (зверху справа)</li>\n<li>🖱️ Клікнути на ліву частину ноди inject (квадратна кнопка) — згенерується повідомлення</li>\n<li>📋 Відкрити вкладку <strong>debug</strong> у sidebar — побачите виведене значення</li>\n</ol>\n<h2>📊 Що відбувається технічно</h2>\n<table>\n<thead>\n<tr>\n<th>Крок</th>\n<th>Дія</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Клік на inject</td>\n<td>Нода створює об'єкт <code>msg</code> з полем <code>payload</code> (за замовчуванням — timestamp)</td>\n</tr>\n<tr>\n<td>Передача wire</td>\n<td>Об'єкт <code>msg</code> передається наступній ноді через з'єднання</td>\n</tr>\n<tr>\n<td>Прийом debug</td>\n<td>Нода debug отримує <code>msg</code> та виводить вибране поле в sidebar</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Об'єкт <code>msg</code> — серце Node-RED</strong> <p>Усе спілкування між нодами відбувається через об'єкт <strong><code>msg</code></strong>. Поле <code>msg.payload</code> за замовченням містить корисне навантаження повідомлення (timestamp, текст, JSON, число). Це той самий об'єкт, що проходить через увесь потік, а ноди можуть додавати, змінювати або читати його поля. Детально msg-об'єкт буде розглянуто далі.</p>\n</div>\n\n","<h1>🚀 Розгортання потоків (Deploy)</h1>\n<p><strong>Головна ідея:</strong> Кнопка <strong>Deploy</strong> — це межа між <strong>чернеткою</strong> у браузері та <strong>активним потоком</strong> на сервері. До натискання Deploy жодні зміни не виконуються.</p>\n<h2>📋 Три режими Deploy</h2>\n<table>\n<thead>\n<tr>\n<th>Режим</th>\n<th>Що відбувається</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🚀 <strong>Full</strong></td>\n<td>Перезавантажуються <strong>усі</strong> потоки (за замовчуванням)</td>\n</tr>\n<tr>\n<td>🎯 <strong>Modified Flows</strong></td>\n<td>Перезавантажуються лише потоки, у яких є зміни</td>\n</tr>\n<tr>\n<td>🧩 <strong>Modified Nodes</strong></td>\n<td>Перезавантажуються лише змінені ноди (швидко, безпечно)</td>\n</tr>\n</tbody></table>\n<p>Режим обирається через випадаюче меню поряд з кнопкою Deploy.</p>\n<h2>🔄 Що відбувається при Deploy</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    BROWSER[&quot;🌐 Редактор&lt;br&gt;чернетка&quot;] --&gt;|&quot;HTTP POST&quot;| RUNTIME[&quot;🔴 Runtime&quot;]\n    RUNTIME --&gt;|&quot;оновити&quot;| FILE[&quot;📦 flows.json&quot;]\n    RUNTIME --&gt;|&quot;перезапуск&quot;| FLOWS[&quot;🌊 Активні потоки&quot;]\n    style BROWSER fill:#e3f2fd,stroke:#1565c0\n    style RUNTIME fill:#fff9c4,stroke:#f9a825\n    style FILE fill:#fce4ec,stroke:#c2185b\n    style FLOWS fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1779170487875-13-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 760.390625px;\" viewBox=\"0 0 760.390625 162\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1779170487875-13-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1779170487875-13-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1779170487875-13-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1779170487875-13-0 .error-icon{fill:#552222;}#exp-1779170487875-13-0 .error-text{fill:#552222;stroke:#552222;}#exp-1779170487875-13-0 .edge-thickness-normal{stroke-width:1px;}#exp-1779170487875-13-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1779170487875-13-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1779170487875-13-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1779170487875-13-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1779170487875-13-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1779170487875-13-0 .marker{fill:#333333;stroke:#333333;}#exp-1779170487875-13-0 .marker.cross{stroke:#333333;}#exp явиться <strong>синій кружечок зверху справа</strong>. Це візуальна підказка, що чернетка відрізняється від активного стану.</p>\n</div>\n\n","<h1>📦 Зберігання потоків: flows.json</h1>\n<p><strong>Головна ідея:</strong> Усі ваші потоки зберігаються в одному JSON-файлі <code>flows.json</code>, що дозволяє легко переносити рішення між системами та зберігати у системі контролю версій.</p>\n<h2>📂 Розташування файлів Node-RED</h2>\n<table>\n<thead>\n<tr>\n<th>Файл / папка</th>\n<th>Що містить</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>~/.node-red/flows.json</code></td>\n<td>Опис усіх потоків (ноди, з'єднання, налаштування)</td>\n</tr>\n<tr>\n<td><code>~/.node-red/flows_cred.json</code></td>\n<td>Зашифровані credentials (паролі, токени)</td>\n</tr>\n<tr>\n<td><code>~/.node-red/settings.js</code></td>\n<td>Конфігурація платформи (порт, безпека, контекст)</td>\n</tr>\n<tr>\n<td><code>~/.node-red/node_modules/</code></td>\n<td>Встановлені додаткові ноди з палітри</td>\n</tr>\n<tr>\n<td><code>~/.node-red/package.json</code></td>\n<td>Залежності проєкту</td>\n</tr>\n</tbody></table>\n<blockquote>\n<p>Символ <code>~</code> означає домашню директорію користувача (наприклад, <code>C:\\Users\\Anton\\</code> у Windows або <code>/home/anton/</code> у Linux).</p>\n</blockquote>\n<h2>💾 Що зберігається у flows.json</h2>\n<pre><code class=\"language-json hljs\" data-highlighted=\"yes\"><span class=\"hljs-punctuation\">[</span>\n  <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">\"id\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"a1b2c3d4\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"type\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"inject\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"name\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"Раз на хвилину\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"props\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-punctuation\">{</span> <span class=\"hljs-attr\">\"p\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"payload\"</span> <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">]</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"repeat\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"60\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"topic\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"payload\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"payloadType\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"date\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"wires\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-punctuation\">[</span><span class=\"hljs-string\">\"e5f6g7h8\"</span><span class=\"hljs-punctuation\">]</span><span class=\"hljs-punctuation\">]</span>\n  <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">\"id\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"e5f6g7h8\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"type\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"debug\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"name\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"Виведення часу\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"active\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-literal\"><span class=\"hljs-keyword\">true</span></span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"complete\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"payload\"</span>\n  <span class=\"hljs-punctuation\">}</span>\n<span class=\"hljs-punctuation\">]</span></code></pre><div class=\"tip\"><strong>💡 Імпорт та експорт потоків</strong> <p>Через меню <strong>Menu → Import / Export</strong> можна обмінюватись потоками: скопіювати JSON, вставити на іншому комп'ютері — і потік буде відновлено повністю. Це індустріальний стандарт обміну рішеннями в спільноті Node-RED.</p>\n</div>\n\n\n\n\n\n<div class=\"note\"><strong>📝 Контроль версій</strong> <p>Оскільки <code>flows.json</code> — звичайний JSON-файл, його можна додати до <strong>Git-репозиторію</strong> разом з рештою кодової бази проєкту. Це дозволяє відстежувати зміни та повертатись до попередніх версій потоків так само, як і до коду.</p>\n</div>\n\n","<h1>⚖️ Класичний код проти Node-RED</h1>\n<p><strong>Головна ідея:</strong> Та сама задача — приймання HTTP-запиту та повернення JSON-відповіді — у класичному коді та в Node-RED має різний обсяг роботи, але однаковий результат.</p>\n<h2>📝 Задача: REST endpoint який повертає час сервера</h2>\n<p><strong>Класичний Node.js (Express):</strong></p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> express = <span class=\"hljs-built_in\">require</span>(<span class=\"hljs-string\">\"express\"</span>);\n<span class=\"hljs-keyword\">const</span> app = <span class=\"hljs-title function_\">express</span>();\n\napp.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">\"/api/time\"</span>, <span class=\"hljs-function\">(<span class=\"hljs-params\">req, res</span>) =&gt;</span> {\n  <span class=\"hljs-keyword\">const</span> now = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>();\n  res.<span class=\"hljs-title function_\">json</span>({\n    <span class=\"hljs-attr\">timestamp</span>: now.<span class=\"hljs-title function_\">getTime</span>(),\n    <span class=\"hljs-attr\">iso</span>: now.<span class=\"hljs-title function_\">toISOString</span>(),\n    <span class=\"hljs-attr\">timezone</span>: <span class=\"hljs-string\">\"Europe/Kyiv\"</span>,\n  });\n});\n\napp.<span class=\"hljs-title function_\">listen</span>(<span class=\"hljs-number\">3000</span>, <span class=\"hljs-function\">() =&gt;</span> {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Server running on port 3000\"</span>);\n});</code></pre><p><strong>Node-RED:</strong></p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    IN[&quot;🌐 http in&lt;br&gt;GET /api/time&quot;] --&gt; FN[&quot;⚙️ function&lt;br&gt;побудувати JSON&quot;]\n    FN --&gt; OUT[&quot;📤 http response&quot;]\n    style IN fill:#e3f2fd,stroke:#1565c0\n    style FN fill:#fff9c4,stroke:#f9a825\n    style OUT fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1779170487881-15-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 615.96875px;\" viewBox=\"0 0 615.96875 88\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1779170487881-15-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1779170487881-15-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1779170487881-15-0 .edge-animation-fast{stroke-dasharray:9,5!impo ass=\"node default  \" id=\"exp-1779170487881-15-0-flowchart-FN-1\" data-look=\"classic\" transform=\"translate(294.140625, 44)\"><rect class=\"basic label-container\" style=\"fill:#fff9c4 !important;stroke:#f9a825 !important\" x=\"-90.953125\" y=\"-36\" width=\"181.90625\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-66.953125, -24)\"><rect></rect><foreignObject width=\"133.90625\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>⚙️ function<br>побудувати JSON</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779170487881-15-0-flowchart-OUT-3\" data-look=\"classic\" transform=\"translate(521.53125, 44)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-86.4375\" y=\"-24\" width=\"172.875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-62.4375, -12)\"><rect></rect><foreignObject width=\"124.875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📤 http response</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779170487881-15-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779170487881-15-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<p>Усередині function-ноди:</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\">msg.<span class=\"hljs-property\">payload</span> = {\n  <span class=\"hljs-attr\">timestamp</span>: <span class=\"hljs-title class_\">Date</span>.<span class=\"hljs-title function_\">now</span>(),\n  <span class=\"hljs-attr\">iso</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>().<span class=\"hljs-title function_\">toISOString</span>(),\n  <span class=\"hljs-attr\">timezone</span>: <span class=\"hljs-string\">\"Europe/Kyiv\"</span>,\n};\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>⚖️ Чесне порівняння</h2>\n<table>\n<thead>\n<tr>\n<th>Критерій</th>\n<th>Класичний Express</th>\n<th>Node-RED</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Обсяг коду</td>\n<td>~15 рядків</td>\n<td>~5 рядків + графічне з'єднання</td>\n</tr>\n<tr>\n<td>Швидкість прототипування</td>\n<td>Середня</td>\n<td>Висока</td>\n</tr>\n<tr>\n<td>Гнучкість тонкого налаштування</td>\n<td>Максимальна</td>\n<td>Обмежена шаблонами нод</td>\n</tr>\n<tr>\n<td>Управління залежностями</td>\n<td>Ручне через npm</td>\n<td>Через UI палітри</td>\n</tr>\n<tr>\n<td>Підходить для</td>\n<td>Складні бекенди, мікросервіси</td>\n<td>Інтеграція, прототипи, АС, IoT</td>\n</tr>\n</tbody></table>\n<div class=\"success\"><strong>✅ Висновок</strong> <p>Node-RED <strong>не замінює</strong> класичне програмування — він <strong>доповнює</strong> його для конкретного класу задач: інтеграційних рішень, потокової обробки та швидкого прототипування інтерфейсів АС. Знання класичного коду залишається необхідним: function-ноди в Node-RED використовують саме JavaScript, який ви вже опанували.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>Node-RED</strong> — це візуальне середовище програмування на базі Node.js для інтеграції систем, побудоване на парадигмі <strong>flow-based programming</strong></p>\n</li>\n<li><p><strong>Місце в АС</strong> — Node-RED виступає інтеграційним шаром між пристроями, базами даних, API та інтерфейсами користувача. Це <strong>low-code інструмент</strong> для конкретного класу задач, не заміна класичного програмування</p>\n</li>\n<li><p><strong>Архітектура</strong> — runtime (виконавчий рушій на Node.js) + редактор (веб-інтерфейс у браузері). Потоки зберігаються у файлі <code>flows.json</code> і працюють незалежно від відкритості браузера</p>\n</li>\n<li><p><strong>Встановлення</strong> — через <code>npm install -g --unsafe-perm node-red</code>, запуск однією командою <code>node-red</code>, доступ через <code>http://localhost:1880</code></p>\n</li>\n<li><p><strong>Інтерфейс редактора</strong> — три зони: палітра нод, робоча область з потоками, sidebar з info/help/debug/context. Кнопка <strong>Deploy</strong> активує зміни</p>\n</li>\n<li><p><strong>Перший потік</strong> — <code>inject → debug</code> демонструє ключовий патерн: ноди обмінюються об'єктом <code>msg</code>, що містить поле <code>payload</code> з корисним навантаженням</p>\n</li>\n<li><p><strong>Зберігання</strong> — потоки зберігаються як JSON, що дозволяє їх імпортувати, експортувати та керувати через Git</p>\n</li>\n<li><p><strong>Філософія</strong> — Node-RED розглядає програму як <strong>граф обробників повідомлень</strong>, а не як послідовність інструкцій. Це природньо для систем, де дані текуть від джерел до споживачів</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Що таке парадигма flow-based programming і чим вона відрізняється від класичного імперативного підходу?</p>\n</li>\n<li><p>🤔 З яких двох головних компонентів складається Node-RED і яку роль виконує кожен з них?</p>\n</li>\n<li><p>🤔 Що відбувається з активними потоками, якщо закрити вкладку браузера з редактором? Поясніть чому.</p>\n</li>\n<li><p>🤔 Яке призначення кнопки Deploy? Опишіть три режими Deploy та їх відмінності.</p>\n</li>\n<li><p>🤔 Що таке об'єкт <code>msg</code> в Node-RED? Яке значення має поле <code>msg.payload</code>?</p>\n</li>\n<li><p>🤔 Перерахуйте три зони інтерфейсу редактора Node-RED і поясніть призначення кожної.</p>\n</li>\n<li><p>🤔 У якому файлі і в якому форматі Node-RED зберігає потоки? Які переваги дає такий спосіб зберігання?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Потокове програмування</td>\n<td>Flow-based programming</td>\n<td>Парадигма, де програма представлена як граф обробників повідомлень</td>\n</tr>\n<tr>\n<td>Нода</td>\n<td>Node</td>\n<td>Базовий блок логіки в Node-RED, що виконує одну конкретну задачу</td>\n</tr>\n<tr>\n<td>Потік</td>\n<td>Flow</td>\n<td>Граф з'єднаних нод, що реалізує сценарій обробки даних</td>\n</tr>\n<tr>\n<td>Повідомлення</td>\n<td>Message (msg)</td>\n<td>Об'єкт даних, що передається між нодами через з'єднання</td>\n</tr>\n<tr>\n<td>З'єднання</td>\n<td>Wire</td>\n<td>Лінія між нодами, по якій передаються повідомлення</td>\n</tr>\n<tr>\n<td>Розгортання</td>\n<td>Deploy</td>\n<td>Процес застосування змін з редактора до активного runtime</td>\n</tr>\n<tr>\n<td>Корисне навантаження</td>\n<td>Payload</td>\n<td>Основне поле повідомлення (<code>msg.payload</code>), що містить дані</td>\n</tr>\n<tr>\n<td>Палітра</td>\n<td>Palette</td>\n<td>Бібліотека доступних типів нод у редакторі</td>\n</tr>\n<tr>\n<td>Робоча область</td>\n<td>Workspace</td>\n<td>Полотно редактора, де розміщуються ноди та створюються потоки</td>\n</tr>\n<tr>\n<td>Низькокодова розробка</td>\n<td>Low-code development</td>\n<td>Підхід до створення додатків з мінімальним обсягом ручного коду</td>\n</tr>\n<tr>\n<td>Інтеграційний шар</td>\n<td>Integration layer</td>\n<td>Компонент системи, що з'єднує різнорідні сервіси та пристрої</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>FBP</td>\n<td>Flow-Based Programming</td>\n<td>Потокове програмування</td>\n</tr>\n<tr>\n<td>АС</td>\n<td>Automated System</td>\n<td>Автоматизована система</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>REST</td>\n<td>Representational State Transfer</td>\n<td>Передача стану представлення</td>\n</tr>\n<tr>\n<td>HTTP</td>\n<td>HyperText Transfer Protocol</td>\n<td>Протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td>HMI</td>\n<td>Human-Machine Interface</td>\n<td>Людино-машинний інтерфейс</td>\n</tr>\n<tr>\n<td>IoT</td>\n<td>Internet of Things</td>\n<td>Інтернет речей</td>\n</tr>\n<tr>\n<td>MQTT</td>\n<td>Message Queuing Telemetry Transport</td>\n<td>Протокол телеметричної передачі повідомлень</td>\n</tr>\n<tr>\n<td>JSON</td>\n<td>JavaScript Object Notation</td>\n<td>Нотація об'єктів JavaScript</td>\n</tr>\n<tr>\n<td>UI</td>\n<td>User Interface</td>\n<td>Інтерфейс користувача</td>\n</tr>\n<tr>\n<td>npm</td>\n<td>Node Package Manager</td>\n<td>Менеджер пакетів Node.js</td>\n</tr>\n<tr>\n<td>ETL</td>\n<td>Extract, Transform, Load</td>\n<td>Витяг, трансформація, завантаження</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;

function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
