class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-58.15234375\" y=\"-36\" width=\"116.3046875\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-34.15234375, -24)\"><rect></rect><foreignObject width=\"68.3046875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🐞 Debug<br>Вихід 2</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779345189753-2-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779345189753-2-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>🧩 Анатомія ноди</h2>\n<table>\n<thead>\n<tr>\n<th>Елемент</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🟢 Вхідний порт</td>\n<td>Точка, куди надходить <code>msg</code> від попередньої ноди (зліва)</td>\n</tr>\n<tr>\n<td>🔵 Вихідний порт</td>\n<td>Точка, звідки <code>msg</code> йде далі (справа)</td>\n</tr>\n<tr>\n<td>🏷️ Назва (label)</td>\n<td>Текстове ім'я ноди, видиме на полотні</td>\n</tr>\n<tr>\n<td>⚙️ Конфігурація</td>\n<td>Параметри, що задають поведінку ноди</td>\n</tr>\n<tr>\n<td>📊 Індикатор статусу</td>\n<td>Маленький значок під нодою з її поточним станом</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Категорії нод у палітрі</strong> <p>Ноди в палітрі Node-RED згруповані за призначенням: <strong>common</strong> (базові), <strong>function</strong> (логіка), <strong>network</strong> (мережа), <strong>sequence</strong> (послідовності), <strong>parser</strong> (розбір форматів), <strong>storage</strong> (зберігання). У цій лекції ми зосередимось на категоріях <strong>common</strong> та <strong>function</strong>.</p>\n</div>\n\n","<h1>📦 Об'єкт повідомлення msg</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong><code>msg</code></strong> (message) — це звичайний JavaScript-об'єкт, який передається між нодами і несе всі дані потоку. Кожна нода отримує <code>msg</code> на вхід, може модифікувати його та передати далі.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Усе, що рухається в потоці, — це <code>msg</code>. Розуміння його структури — фундамент для роботи з Node-RED.</p>\n<h2>📋 Стандартна структура msg</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Типовий вигляд msg, який можна побачити на панелі Debug</span>\nmsg = {\n  <span class=\"hljs-attr\">payload</span>: <span class=\"hljs-string\">\"Привіт, світ!\"</span>, <span class=\"hljs-comment\">// Основний вміст (найважливіше поле)</span>\n  <span class=\"hljs-attr\">topic</span>: <span class=\"hljs-string\">\"sensor/temperature\"</span>, <span class=\"hljs-comment\">// Тематична мітка повідомлення</span>\n  <span class=\"hljs-attr\">_msgid</span>: <span class=\"hljs-string\">\"f1a2b3c4.d5e6f7\"</span>, <span class=\"hljs-comment\">// Унікальний ID (генерується автоматично)</span>\n  <span class=\"hljs-comment\">// ...будь-які додаткові поля, які додає розробник</span>\n};</code></pre><h2>🔑 Ключові поля msg</h2>\n<table>\n<thead>\n<tr>\n<th>Поле</th>\n<th>Тип</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>msg.payload</code></td>\n<td>будь-який</td>\n<td>Основний вміст повідомлення (число, рядок, об'єкт)</td>\n</tr>\n<tr>\n<td><code>msg.topic</code></td>\n<td>рядок</td>\n<td>Опціональна тема — для маршрутизації або групування</td>\n</tr>\n<tr>\n<td><code>msg._msgid</code></td>\n<td>рядок</td>\n<td>Унікальний ідентифікатор, генерується автоматично</td>\n</tr>\n<tr>\n<td>інші поля</td>\n<td>будь-які</td>\n<td>Розробник може додавати власні поля: <code>msg.user</code> тощо</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Аналогія з листом</strong> <p><code>msg</code> — це як поштовий конверт. <code>msg.payload</code> — це лист всередині (головний вміст). <code>msg.topic</code> — це позначка на конверті (наприклад, «терміново»). Ви можете додавати свої позначки (<code>msg.sender</code>, <code>msg.priority</code>), але <code>payload</code> — це основа.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ Поле payload не обов'язково має бути рядком</strong> <p><code>msg.payload</code> може містити будь-який тип даних: число (<code>42</code>), рядок (<code>\"text\"</code>), масив (<code>[1, 2, 3]</code>), об'єкт (<code>{ temp: 23.5, humidity: 65 }</code>) або булеве значення (<code>true</code>). Тип залежить від того, що згенерувала або сформувала попередня нода.</p>\n</div>\n\n","<h1>⚡ Нода Inject — джерело подій</h1>\n<p><strong>Головна ідея:</strong> Нода <code>Inject</code> ініціює потік даних: вручну (за натисканням кнопки) або автоматично (за розкладом / інтервалом).</p>\n<h2>🎯 Призначення</h2>\n<p>Inject використовується для трьох основних сценаріїв:</p>\n<ol>\n<li><strong>Ручний запуск</strong> потоку під час розробки та тестування</li>\n<li><strong>Періодичне виконання</strong> через заданий інтервал (наприклад, опитування датчика кожні 5 секунд)</li>\n<li><strong>Запуск за розкладом</strong> (наприклад, щодня о 8:00 ранку)</li>\n</ol>\n<h2>⚙️ Основні налаштування</h2>\n<table>\n<thead>\n<tr>\n<th>Поле</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>payload</code></td>\n<td>Значення, що буде підставлене в <code>msg.payload</code></td>\n</tr>\n<tr>\n<td><code>topic</code></td>\n<td>Значення, що буде підставлене в <code>msg.topic</code></td>\n</tr>\n<tr>\n<td><code>Repeat</code></td>\n<td>Періодичність: один раз, через інтервал, за розкладом cron</td>\n</tr>\n<tr>\n<td><code>Inject once after</code></td>\n<td>Запустити автоматично через N секунд після старту runtime</td>\n</tr>\n</tbody></table>\n<h2>💡 Приклад: ручний Inject</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Налаштування ноди Inject:</span>\n<span class=\"hljs-comment\">// payload: \"Привіт, Node-RED!\" (тип string)</span>\n<span class=\"hljs-comment\">// topic: \"greeting\"</span>\n\n<span class=\"hljs-comment\">// Що отримає наступна нода:</span>\nmsg = {\n  <span class=\"hljs-attr\">payload</span>: <span class=\"hljs-string\">\"Привіт, Node-RED!\"</span>,\n  <span class=\"hljs-attr\">topic</span>: <span class=\"hljs-string\">\"greeting\"</span>,\n  <span class=\"hljs-attr\">_msgid</span>: <span class=\"hljs-string\">\"...\"</span>, <span class=\"hljs-comment\">// згенерується автоматично</span>\n};</code></pre><h2>💡 Приклад: періодичний Inject</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Налаштування:</span>\n<span class=\"hljs-comment\">// payload: timestamp (поточний час у мілісекундах)</span>\n<span class=\"hljs-comment\">// Repeat: interval, every 5 seconds</span>\n\n<span class=\"hljs-comment\">// Кожні 5 секунд наступна нода отримуватиме:</span>\nmsg = {\n  <span class=\"hljs-attr\">payload</span>: <span class=\"hljs-number\">1716206400000</span>, <span class=\"hljs-comment\">// поточний Unix timestamp</span>\n  <span class=\"hljs-attr\">topic</span>: <span class=\"hljs-string\">\"\"</span>,\n  <span class=\"hljs-attr\">_msgid</span>: <span class=\"hljs-string\">\"...\"</span>,\n};</code></pre><div class=\"tip\"><strong>💡 Робота з кнопкою Inject</strong> <p>Зліва від ноди Inject на полотні є квадратна кнопка. Натискання на неї запускає Inject один раз — це найшвидший спосіб протестувати потік під час розробки.</p>\n</div>\n\n","<h1>🐞 Нода Debug — погляд всередину msg</h1>\n<p><strong>Головна ідея:</strong> Нода <code>Debug</code> показує вміст <code>msg</code> на спеціальній бічній панелі редактора. Без цієї ноди розробка в Node-RED була б майже сліпою.</p>\n<h2>🎯 Як використовувати Debug</h2>\n<ol>\n<li>Перетягніть ноду <code>debug</code> з палітри на полотно</li>\n<li>З'єднайте її з вихідним портом ноди, вміст якої хочете побачити</li>\n<li>Розгорніть бічну панель Debug (іконка з жуком 🐞 праворуч у редакторі)</li>\n<li>Натисніть <code>Deploy</code> (червона кнопка у правому верхньому куті)</li>\n<li>Запустіть потік — повідомлення з'являться на панелі</li>\n</ol>\n<h2>⚙️ Що показувати в Debug</h2>\n<table>\n<thead>\n<tr>\n<th>Налаштування</th>\n<th>Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>msg.payload</code></td>\n<td>За замовчуванням — показує лише основне поле</td>\n</tr>\n<tr>\n<td><code>complete msg object</code></td>\n<td>Показує весь об'єкт <code>msg</code> з усіма полями</td>\n</tr>\n<tr>\n<td>Конкретне поле</td>\n<td>Можна вказати, наприклад, <code>msg.topic</code> або <code>msg.user.name</code></td>\n</tr>\n</tbody></table>\n<h2>💡 Приклад інтерпретації виводу</h2>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">// Що видно на панелі Debug після спрацювання Inject:\n21.05.2026 14:30:15  node: debug 1\nmsg.payload : string[18]\n\"Привіт, Node-RED!\"\n\n// Якщо обрано \"complete msg object\":\n21.05.2026 14:30:15  node: debug 1\nmsg : Object\n  payload: \"Привіт, Node-RED!\"\n  topic: \"greeting\"\n  _msgid: \"f1a2b3c4.d5e6f7\"</code></pre><div class=\"warning\"><strong>⚠️ Не залишайте багато активних Debug-нод у робочому потоці</strong> <p>Кожна Debug-нода генерує запис у внутрішньому журналі редактора. Якщо у потоці десятки Debug-нод і потік працює часто, інтерфейс може стати повільним. Поряд із кожною Debug-нодою є зелений значок — клік по ньому <strong>тимчасово вимикає</strong> ноду, не видаляючи її з потоку.</p>\n</div>\n\n\n\n\n\n<div class=\"tip\"><strong>💡 Швидке копіювання значення</strong> <p>На панелі Debug можна навести курсор на будь-яке поле виводу — з'являться іконки для копіювання шляху (наприклад, <code>msg.user.name</code>) або значення. Це зручно при написанні Function-ноди.</p>\n</div>\n\n","<h1>🔧 Нода Function — JavaScript у потоці</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Function</strong> — нода, у якій розробник пише довільний JavaScript-код для перетворення <code>msg</code>. Це найгнучкіший інструмент Node-RED.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Якщо стандартні ноди не покривають потрібну логіку, її завжди можна реалізувати у Function-ноді — від простих обчислень до складних трансформацій даних.</p>\n<h2>📋 Базова структура Function-ноди</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Код всередині Function-ноди:</span>\n\n<span class=\"hljs-comment\">// 1. Прочитати дані з msg</span>\n<span class=\"hljs-keyword\">const</span> value = msg.<span class=\"hljs-property\">payload</span>;\n\n<span class=\"hljs-comment\">// 2. Виконати логіку</span>\n<span class=\"hljs-keyword\">const</span> result = value * <span class=\"hljs-number\">2</span>;\n\n<span class=\"hljs-comment\">// 3. Покласти результат назад у msg</span>\nmsg.<span class=\"hljs-property\">payload</span> = result;\n\n<span class=\"hljs-comment\">// 4. Обов'язково повернути msg, щоб він пішов далі</span>\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"danger\"><strong>🚫 Не забути return msg</strong> <p>Якщо у Function-ноді не написати <code>return msg;</code> — повідомлення не пройде далі, потік \"обірветься\". Це найпоширеніша помилка початківців.</p>\n</div>\n\n\n\n<h2>💡 Приклад 1: перетворення температури</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// На вхід приходить msg.payload з температурою у Цельсіях</span>\n<span class=\"hljs-comment\">// Завдання: перевести у Фаренгейти</span>\n\n<span class=\"hljs-keyword\">const</span> celsius = msg.<span class=\"hljs-property\">payload</span>;\n<span class=\"hljs-keyword\">const</span> fahrenheit = (celsius * <span class=\"hljs-number\">9</span>) / <span class=\"hljs-number\">5</span> + <span class=\"hljs-number\">32</span>;\n\nmsg.<span class=\"hljs-property\">payload</span> = fahrenheit;\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>💡 Приклад 2: формування об'єкта</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// На вхід приходить число (показання датчика)</span>\n<span class=\"hljs-comment\">// Завдання: загорнути його в структурований об'єкт</span>\n\n<span class=\"hljs-keyword\">const</span> reading = msg.<span class=\"hljs-property\">payload</span>;\n\nmsg.<span class=\"hljs-property\">payload</span> = {\n  <span class=\"hljs-attr\">sensor</span>: <span class=\"hljs-string\">\"T-001\"</span>,\n  <span class=\"hljs-attr\">temperature</span>: reading,\n  <span class=\"hljs-attr\">unit</span>: <span class=\"hljs-string\">\"°C\"</span>,\n  <span class=\"hljs-attr\">timestamp</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>().<span class=\"hljs-title function_\">toISOString</span>(),\n};\n\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>💡 Приклад 3: фільтрація — пропустити чи зупинити</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Пропустити повідомлення далі лише якщо payload &gt; 100</span>\n<span class=\"hljs-comment\">// Інакше — зупинити потік (нічого не повернути)</span>\n\n<span class=\"hljs-keyword\">if</span> (msg.<span class=\"hljs-property\">payload</span> &gt; <span class=\"hljs-number\">100</span>) {\n  <span class=\"hljs-keyword\">return</span> msg;\n}\n<span class=\"hljs-keyword\">return</span> <span class=\"hljs-literal\">null</span>; <span class=\"hljs-comment\">// null означає \"не передавати далі\"</span></code></pre>","<h1>🛠️ Function: робота з node та логування</h1>\n<p><strong>Головна ідея:</strong> Усередині Function-ноди доступний об'єкт <code>node</code>, який дозволяє виводити повідомлення в системний журнал та керувати статусом ноди.</p>\n<h2>📋 Методи об'єкта node</h2>\n<table>\n<thead>\n<tr>\n<th>Метод</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>node.log(\"текст\")</code></td>\n<td>Інформаційне повідомлення у системному журналі</td>\n</tr>\n<tr>\n<td><code>node.warn(\"текст\")</code></td>\n<td>Попередження — з'явиться на панелі Debug автоматично</td>\n</tr>\n<tr>\n<td><code>node.error(\"текст\", msg)</code></td>\n<td>Помилка — може бути спіймана нодою <code>Catch</code></td>\n</tr>\n<tr>\n<td><code>node.status({...})</code></td>\n<td>Відображає статус-мітку під нодою на полотні</td>\n</tr>\n</tbody></table>\n<h2>💡 Приклад: логування та статус</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> value = msg.<span class=\"hljs-property\">payload</span>;\n\n<span class=\"hljs-comment\">// Логування для розробника</span>\nnode.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Function отримала значення: \"</span> + value);\n\n<span class=\"hljs-comment\">// Попередження, якщо значення виходить за межі норми</span>\n<span class=\"hljs-keyword\">if</span> (value &gt; <span class=\"hljs-number\">100</span>) {\n  node.<span class=\"hljs-title function_\">warn</span>(<span class=\"hljs-string\">\"Значення перевищує допустиме: \"</span> + value);\n}\n\n<span class=\"hljs-comment\">// Відобразити статус під нодою (зелений кружечок + текст)</span>\nnode.<span class=\"hljs-title function_\">status</span>({\n  <span class=\"hljs-attr\">fill</span>: <span class=\"hljs-string\">\"green\"</span>,\n  <span class=\"hljs-attr\">shape</span>: <span class=\"hljs-string\">\"dot\"</span>,\n  <span class=\"hljs-attr\">text</span>: <span class=\"hljs-string\">\"Останнє: \"</span> + value,\n});\n\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>📊 Як виглядає статус під нодою</h2>\n<table>\n<thead>\n<tr>\n<th><code>fill</code></th>\n<th><code>shape</code></th>\n<th>Типове застосування</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>green</code>, <code>red</code>, <code>yellow</code>, <code>blue</code>, <code>grey</code></td>\n<td><code>dot</code>, <code>ring</code></td>\n<td>Колір та форма індикатора</td>\n</tr>\n<tr>\n<td><code>text</code></td>\n<td>будь-який рядок</td>\n<td>Підпис, що з'явиться під нодою</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Очищення статусу</strong> <p>Щоб прибрати статус-мітку під нодою, передайте порожній об'єкт: <code>node.status({});</code>.</p>\n</div>\n\n","<h1>✏️ Нода Change — модифікація без коду</h1>\n<p><strong>Головна ідея:</strong> Нода <code>Change</code> дозволяє змінювати, додавати або видаляти поля <code>msg</code> без написання JavaScript-коду. Це робить прості перетворення прозорішими для людей, що читають потік.</p>\n<h2>🎯 Чотири операції Change</h2>\n<table>\n<thead>\n<tr>\n<th>Операція</th>\n<th>Що робить</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>Set</code></td>\n<td>Встановити значення поля</td>\n</tr>\n<tr>\n<td><code>Change</code></td>\n<td>Замінити частину рядка за шаблоном (search → replace)</td>\n</tr>\n<tr>\n<td><code>Delete</code></td>\n<td>Видалити поле з <code>msg</code></td>\n</tr>\n<tr>\n<td><code>Move</code></td>\n<td>Перенести значення з одного поля в інше</td>\n</tr>\n</tbody></table>\n<h2>💡 Приклад 1: Set — задати поле</h2>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">Налаштування ноди Change:\n  Set     msg.payload     to     \"Hello from Change\"\n  Set     msg.topic       to     \"system/info\"\n\nНа вхід:                          На виході:\n{                                 {\n  payload: 42,                      payload: \"Hello from Change\",\n  topic: \"old\"                      topic: \"system/info\"\n}                                 }</code></pre><h2>💡 Приклад 2: Move — перенести значення</h2>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">Налаштування ноди Change:\n  Move    msg.payload   to     msg.data.value\n\nНа вхід:                          На виході:\n{                                 {\n  payload: 23.5                     data: { value: 23.5 }\n}                                 }</code></pre><h2>💡 Приклад 3: Delete — прибрати службове поле</h2>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">Налаштування ноди Change:\n  Delete    msg.topic\n\nНа вхід:                          На виході:\n{                                 {\n  payload: \"data\",                  payload: \"data\"\n  topic: \"internal\"               }\n}</code></pre><div class=\"note\"><strong>📝 Set vs Function для простих операцій</strong> <p>Якщо ви робите просту операцію (встановити значення, перенести поле) — Change-нода краща за Function: вона візуально показує намір без необхідності читати JavaScript-код. Function залишайте для дійсно складної логіки.</p>\n</div>\n\n","<h1>🔀 Нода Switch — розгалуження потоку</h1>\n<p><strong>Головна ідея:</strong> Нода <code>Switch</code> спрямовує <code>msg</code> в один або декілька вихідних портів залежно від значення обраного поля.</p>\n<h2>🎯 Принцип роботи</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    IN[&quot;📥 Вхід&lt;br&gt;msg.payload = ?&quot;] --&gt; SW{&quot;🔀 Switch&lt;br&gt;перевірка&quot;}\n    SW --&gt; O1[&quot;1️⃣ Вихід 1&lt;br&gt;якщо payload bigger than 100&quot;]\n    SW --&gt; O2[&quot;2️⃣ Вихід 2&lt;br&gt;якщо payload between 50 and 100&quot;]\n    SW --&gt; O3[&quot;3️⃣ Вихід 3&lt;br&gt;otherwise&quot;]\n    style IN fill:#e3f2fd,stroke:#1565c0\n    style SW fill:#fff9c4,stroke:#f9a825\n    style O1 fill:#fce4ec,stroke:#c2185b\n    style O2 fill:#fff3e0,stroke:#ef6c00\n    style O3 fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1779345189804-9-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 677.9453125px;\" viewB " style=\"\" transform=\"translate(-59.2578125, -24)\"><rect></rect><foreignObject width=\"118.515625\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📥 Вхід<br>msg.payload = ?</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779345189804-9-0-flowchart-SW-1\" data-look=\"classic\" transform=\"translate(298.23046875, 202)\"><polygon points=\"73.71484375,0 147.4296875,-73.71484375 73.71484375,-147.4296875 0,-73.71484375\" class=\"label-container\" transform=\"translate(-73.21484375, 73.71484375)\" style=\"fill:#fff9c4 !important;stroke:#f9a825 !important\"></polygon><g class=\"label\" style=\"\" transform=\"translate(-37.71484375, -24)\"><rect></rect><foreignObject width=\"75.4296875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🔀 Switch<br>перевірка</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779345189804-9-0-flowchart-O1-3\" data-look=\"classic\" transform=\"translate(545.9453125, 56)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-124\" y=\"-48\" width=\"248\" height=\"96\"></rect><g class=\"label\" style=\"\" transform=\"translate(-100, -36)\"><rect></rect><foreignObject width=\"200\" height=\"72\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>1️⃣ Вихід 1<br>якщо payload bigger than 100</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779345189804-9-0-flowchart-O2-5\" data-look=\"classic\" transform=\"translate(545.9453125, 202)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-124\" y=\"-48\" width=\"248\" height=\"96\"></rect><g class=\"label\" style=\"\" transform=\"translate(-100, -36)\"><rect></rect><foreignObject width=\"200\" height=\"72\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>2️⃣ Вихід 2<br>якщо payload between 50 and 100</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779345189804-9-0-flowchart-O3-7\" data-look=\"classic\" transform=\"translate(545.9453125, 336)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-61.67578125\" y=\"-36\" width=\"123.3515625\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-37.67578125, -24)\"><rect></rect><foreignObject width=\"75.3515625\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>3️⃣ Вихід 3<br>otherwise</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779345189804-9-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779345189804-9-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>📋 Доступні умови порівняння</h2>\n<table>\n<thead>\n<tr>\n<th>Умова</th>\n<th>Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>==</code>, <code>!=</code></td>\n<td>Дорівнює / не дорівнює</td>\n</tr>\n<tr>\n<td><code>&lt;</code>, <code>&lt;=</code>, <code>&gt;</code>, <code>&gt;=</code></td>\n<td>Числове порівняння</td>\n</tr>\n<tr>\n<td><code>is between</code></td>\n<td>Значення в діапазоні</td>\n</tr>\n<tr>\n<td><code>contains</code></td>\n<td>Рядок містить підрядок</td>\n</tr>\n<tr>\n<td><code>matches regex</code></td>\n<td>Відповідає регулярному виразу</td>\n</tr>\n<tr>\n<td><code>is true</code> / <code>is false</code></td>\n<td>Булеве значення</td>\n</tr>\n<tr>\n<td><code>is null</code> / <code>is not null</code></td>\n<td>Перевірка на null</td>\n</tr>\n<tr>\n<td><code>otherwise</code></td>\n<td>Виконується, якщо жодна попередня умова не співпала</td>\n</tr>\n</tbody></table>\n<h2>💡 Приклад: класифікація температури</h2>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">Налаштування ноди Switch (Property: msg.payload):\n\n  Правило 1:  &gt; 30        → Вихід 1 (Спека)\n  Правило 2:  &gt;= 20 and &lt;= 30 → Вихід 2 (Норма)\n  Правило 3:  &lt; 20        → Вихід 3 (Холодно)\n\nНа вхід:                    Куди піде msg:\nmsg.payload = 35      →     Вихід 1\nmsg.payload = 25      →     Вихід 2\nmsg.payload = 15      →     Вихід 3</code></pre><h2>⚙️ Режим зупинки vs продовження</h2>\n<table>\n<thead>\n<tr>\n<th>Налаштування</th>\n<th>Поведінка</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>stopping after first match</code></td>\n<td>Перевіряє правила по черзі, зупиняється на першому збігу</td>\n</tr>\n<tr>\n<td><code>checking all rules</code></td>\n<td>Перевіряє ВСІ правила — <code>msg</code> може піти у декілька виходів</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Уважно з пріоритетом правил</strong> <p>У режимі <code>stopping after first match</code> порядок правил має значення. Правило <code>&gt; 50</code> зловить значення 100 раніше, ніж правило <code>&gt; 99</code>. Розташовуйте правила від найбільш специфічного до найзагальнішого.</p>\n</div>\n\n","<h1>📝 Нода Template — формування шаблонів</h1>\n<p><strong>Головна ідея:</strong> Нода <code>Template</code> дозволяє побудувати рядок із вставками значень з <code>msg</code> — зручно для формування повідомлень, HTML-фрагментів або текстових файлів.</p>\n<h2>🎯 Синтаксис вставок</h2>\n<p>Шаблон використовує синтаксис <strong>Mustache</strong>: значення з <code>msg</code> вставляються через подвійні фігурні дужки.</p>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">Шаблон у налаштуваннях Template:\n─────────────────────────────────\nПривіт, {{payload.name}}!\nВаш баланс: {{payload.balance}} грн.\nДата операції: {{payload.date}}.\n─────────────────────────────────</code></pre><div class=\"info\"><strong>ℹ️ Як Mustache бачить msg</strong> <p>Контекстом для всіх вставок виступає <strong>весь об'єкт <code>msg</code></strong>. Тому <code>{{payload.name}}</code> означає «взяти <code>msg.payload.name</code>», а <code>{{topic}}</code> означає «взяти <code>msg.topic</code>». Це не залежить від того, у яке поле записується результат — контекст завжди починається з кореня <code>msg</code>.</p>\n</div>\n\n\n\n<h2>💡 Приклад: формування звіту</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// На вхід приходить msg такого вигляду:</span>\nmsg = {\n  <span class=\"hljs-attr\">payload</span>: {\n    <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">\"Олена\"</span>,\n    <span class=\"hljs-attr\">balance</span>: <span class=\"hljs-number\">1250.5</span>,\n    <span class=\"hljs-attr\">date</span>: <span class=\"hljs-string\">\"20.05.2026\"</span>,\n  },\n};</code></pre><pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">Налаштування Template:\n  Property: msg.payload          ← КУДИ записати результат\n  Format:   Mustache template\n  Template:\n    Шановна {{payload.name}}!     ← {{payload.name}} = msg.payload.name\n    Ваш баланс: {{payload.balance}} грн.\n    Дата: {{payload.date}}.</code></pre><pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">На виході msg.payload буде містити рядок:\n─────────────────────────────────\nШановна Олена!\nВаш баланс: 1250.5 грн.\nДата: 20.05.2026.\n─────────────────────────────────</code></pre><h2>📋 Куди записувати результат</h2>\n<table>\n<thead>\n<tr>\n<th>Налаштування <code>Property</code></th>\n<th>Результат</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>msg.payload</code></td>\n<td>Шаблон замінить весь payload (типово)</td>\n</tr>\n<tr>\n<td><code>msg.html</code></td>\n<td>Збереже шаблон у власне поле <code>msg.html</code></td>\n</tr>\n<tr>\n<td><code>msg.email.body</code></td>\n<td>Можна писати у вкладені поля</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Інша область застосування Template</strong> <p>Template також зручний для побудови HTML-фрагментів, JSON-структур (формат <code>JSON</code>) або YAML-конфігурацій. Це робить ноду універсальним інструментом для будь-якого форматування.</p>\n</div>\n\n","<h1>🔄 Збираємо все разом — приклад потоку</h1>\n<p><strong>Головна ідея:</strong> Реальні потоки складаються з 5–10 базових нод. Розгляньмо повний приклад, що використовує всі вивчені ноди.</p>\n<h2>🎯 Завдання</h2>\n<p>Кожні 10 секунд генерувати випадкову «температуру», класифікувати її та виводити різні повідомлення для нормальних та аварійних значень.</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    INJ[&quot;⚡ Inject&lt;br&gt;кожні 10 сек&quot;] --&gt; FN[&quot;🔧 Function&lt;br&gt;random temp&quot;]\n    FN --&gt; SW{&quot;🔀 Switch&lt;br&gt;payload&quot;}\n    SW --&gt; TPL1[&quot;📝 Template&lt;br&gt;норма&quot;]\n    SW --&gt; TPL2[&quot;📝 Template&lt;br&gt;тривога&quot;]\n    TPL1 --&gt; DBG[&quot;🐞 Debug&quot;]\n    TPL2 --&gt; DBG\n    style INJ fill:#e3f2fd,stroke:#1565c0\n    style FN fill:#fff3e0,stroke:#ef6c00\n    style SW fill:#fff9c4,stroke:#f9a825\n    style TPL1 fill:#e8f5e9,stroke:#388e3c\n    style TPL2 fill:#fce4ec,stroke:#c2185b\n    style DBG fill:#f3e5f5,stroke:#7b1fa2\"><svg id=\"exp-1779345189819-11-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowch x=\"-67.40234375\" y=\"-36\" width=\"134.8046875\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-43.40234375, -24)\"><rect></rect><foreignObject width=\"86.8046875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📝 Template<br>норма</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779345189819-11-0-flowchart-TPL2-7\" data-look=\"classic\" transform=\"translate(652.96484375, 166)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-67.40234375\" y=\"-36\" width=\"134.8046875\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-43.40234375, -24)\"><rect></rect><foreignObject width=\"86.8046875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📝 Template<br>тривога</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779345189819-11-0-flowchart-DBG-9\" data-look=\"classic\" transform=\"translate(828.51953125, 105)\"><rect class=\"basic label-container\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\" x=\"-58.15234375\" y=\"-24\" width=\"116.3046875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-34.15234375, -12)\"><rect></rect><foreignObject width=\"68.3046875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🐞 Debug</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779345189819-11-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779345189819-11-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>📋 Що робить кожна нода</h2>\n<table>\n<thead>\n<tr>\n<th>Нода</th>\n<th>Налаштування / код</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Inject</td>\n<td><code>Repeat: interval every 10 seconds</code>, payload = timestamp</td>\n</tr>\n<tr>\n<td>Function</td>\n<td>Генерує об'єкт <code>{ sensor, temperature }</code> (див. код нижче)</td>\n</tr>\n<tr>\n<td>Switch</td>\n<td>Property <code>msg.payload.temperature</code>, два правила: <code>&lt;= 80</code> та <code>&gt; 80</code></td>\n</tr>\n<tr>\n<td>Template (норма)</td>\n<td><code>Датчик {{payload.sensor}}: {{payload.temperature}}°C — норма</code></td>\n</tr>\n<tr>\n<td>Template (тривога)</td>\n<td><code>🚨 Датчик {{payload.sensor}}: {{payload.temperature}}°C — тривога</code></td>\n</tr>\n<tr>\n<td>Debug</td>\n<td>Показує <code>msg.payload</code> — фінальний рядок</td>\n</tr>\n</tbody></table>\n<h2>💻 Код Function-ноди</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Генеруємо випадкову температуру від 60 до 100</span>\n<span class=\"hljs-keyword\">const</span> temperature = <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-title function_\">round</span>(<span class=\"hljs-number\">60</span> + <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-title function_\">random</span>() * <span class=\"hljs-number\">40</span>);\n\n<span class=\"hljs-comment\">// Формуємо структурований payload</span>\nmsg.<span class=\"hljs-property\">payload</span> = {\n  <span class=\"hljs-attr\">sensor</span>: <span class=\"hljs-string\">\"T-001\"</span>,\n  <span class=\"hljs-attr\">temperature</span>: temperature,\n};\n\n<span class=\"hljs-comment\">// Відобразити поточне значення під нодою</span>\nnode.<span class=\"hljs-title function_\">status</span>({\n  <span class=\"hljs-attr\">fill</span>: temperature &gt; <span class=\"hljs-number\">80</span> ? <span class=\"hljs-string\">\"red\"</span> : <span class=\"hljs-string\">\"green\"</span>,\n  <span class=\"hljs-attr\">shape</span>: <span class=\"hljs-string\">\"dot\"</span>,\n  <span class=\"hljs-attr\">text</span>: <span class=\"hljs-string\">\"Темп: \"</span> + temperature + <span class=\"hljs-string\">\"°C\"</span>,\n});\n\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"success\"><strong>✅ Що дає такий потік</strong> <p>За 30 хвилин роботи студент отримує робочу мінімодель датчика з класифікацією та форматованим виводом — без жодного рядка серверного коду, лише на нодах Node-RED.</p>\n</div>\n\n","<h1>💾 Імпорт та експорт потоків у JSON</h1>\n<p><strong>Головна ідея:</strong> Будь-який потік Node-RED можна зберегти як JSON-текст, передати іншій людині, помістити в репозиторій або імпортувати в інший інстанс Node-RED.</p>\n<h2>📤 Експорт потоку</h2>\n<ol>\n<li>Виділити одну або декілька нод на полотні (рамкою або <code>Ctrl+A</code> для всього вкладки)</li>\n<li>Меню <code>≡</code> (зверху справа) → <strong>Export</strong></li>\n<li>У діалозі — копіювати JSON у буфер обміну або зберегти як файл</li>\n</ol>\n<h2>📥 Імпорт потоку</h2>\n<ol>\n<li>Меню <code>≡</code> → <strong>Import</strong></li>\n<li>Вставити JSON у текстове поле або обрати файл</li>\n<li>Натиснути <strong>Import</strong> → ноди з'являться на полотні</li>\n<li>Розмістити їх та натиснути <strong>Deploy</strong></li>\n</ol>\n<h2>📋 Приклад експортованого JSON</h2>\n<pre><code class=\"language-json hljs\" data-highlighted=\"yes\"><span class=\"hljs-punctuation\">[</span>\n  <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">\"id\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"f1a2b3c4d5e6f7\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"type\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"inject\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"name\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"Кожні 10 сек\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"props\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-punctuation\">{</span> <span class=\"hljs-attr\">\"p\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"payload\"</span> <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">]</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"repeat\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"10\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"payload\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"payloadType\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"date\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"wires\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-punctuation\">[</span><span class=\"hljs-string\">\"g8h9i0j1k2l3m4\"</span><span class=\"hljs-punctuation\">]</span><span class=\"hljs-punctuation\">]</span>\n  <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">\"id\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"g8h9i0j1k2l3m4\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"type\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"debug\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"name\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"Дебаг виводу\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"active\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-literal\"><span class=\"hljs-keyword\">true</span></span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"complete\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"payload\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"wires\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-punctuation\">]</span>\n  <span class=\"hljs-punctuation\">}</span>\n<span class=\"hljs-punctuation\">]</span></code></pre><table>\n<thead>\n<tr>\n<th>Поле</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>id</code></td>\n<td>Унікальний ідентифікатор ноди (генерується автоматично)</td>\n</tr>\n<tr>\n<td><code>type</code></td>\n<td>Тип ноди (<code>inject</code>, <code>debug</code>, <code>function</code>, ...)</td>\n</tr>\n<tr>\n<td><code>name</code></td>\n<td>Підпис на полотні</td>\n</tr>\n<tr>\n<td><code>wires</code></td>\n<td>Масив ID нод, у які йде з'єднання</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Контроль версій потоків</strong> <p>JSON-експорт ідеально підходить для зберігання в Git. Ви можете тримати папку <code>flows/</code> зі збереженими потоками поряд із кодом проєкту — і відстежувати зміни через стандартні інструменти контролю версій.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ Контекстні залежності</strong> <p>При експорті зберігаються лише ноди та їхня конфігурація. Якщо потік використовує <strong>глобальний контекст</strong> (<code>global.something</code>) або <strong>зовнішні налаштування</strong> (наприклад, креденшіали підключення), їх доведеться налаштовувати в новому інстансі окремо.</p>\n</div>\n\n","<h1>🧪 Налагодження потоків — поради</h1>\n<p><strong>Головна ідея:</strong> Системний підхід до налагодження економить години. Декілька простих практик роблять процес передбачуваним навіть для новачка.</p>\n<h2>📋 Чек-лист налагодження</h2>\n<ol>\n<li><strong>🐞 Розставити Debug-ноди</strong> після кожного критичного етапу — не лише наприкінці потоку</li>\n<li><strong>🏷️ Дати імена нодам</strong> — за замовчуванням всі Function-ноди мають однакову іконку, без імен у них легко загубитися</li>\n<li><strong>📊 Використовувати <code>node.status</code></strong> у Function-нодах, щоб бачити стан кожної ноди без розгортання Debug-панелі</li>\n<li><strong>🟢 Включати/вимикати</strong> Debug-ноди клацанням по зеленому значку — швидше, ніж видаляти і додавати знову</li>\n<li><strong>🔄 Перевіряти на простих даних</strong> — спершу запустіть Inject з простим значенням, переконайтесь, що логіка працює, лише потім переходьте до реальних даних</li>\n<li><strong>📝 Читати повний msg</strong> — якщо щось не працює, переключіть Debug на <code>complete msg object</code>, щоб побачити всі поля</li>\n</ol>\n<h2>💡 Типовий цикл налагодження</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    A[&quot;✏️ Зміна&lt;br&gt;у потоці&quot;] --&gt; B[&quot;🚀 Deploy&quot;]\n    B --&gt; C[&quot;▶️ Запуск&lt;br&gt;через Inject&quot;]\n    C --&gt; D[&quot;🐞 Аналіз&lt;br&gt;Debug-панелі&quot;]\n    D --&gt; E{Результат&lt;br&gt;очікуваний?}\n    E --&gt;|&quot;❌ Ні&quot;| A\n    E --&gt;|&quot;✅ Так&quot;| F[&quot;🎉 Готово&quot;]\n    style A fill:#fff3e0,stroke:#ef6c00\n    style B fill:#e3f2fd,stroke:#1565c0\n    style C fill:#fff9c4,stroke:#f9a825\n    style D fill:#fce4ec,stroke:#c2185b\n    style E fill:#f3e5f5,stroke:#7b1fa2\n    style F fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1779345189832-13-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1116.835937 )\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\"></polygon><g class=\"label\" style=\"\" transform=\"translate(-45.66015625, -24)\"><rect></rect><foreignObject width=\"91.3203125\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Результат<br>очікуваний?</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779345189832-13-0-flowchart-F-11\" data-look=\"classic\" transform=\"translate(1049.453125, 89.66015625)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-59.3828125\" y=\"-24\" width=\"118.765625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-35.3828125, -12)\"><rect></rect><foreignObject width=\"70.765625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🎉 Готово</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779345189832-13-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779345189832-13-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<div class=\"danger\"><strong>🚫 Найпоширеніша помилка — забутий Deploy</strong> <p>Будь-які зміни в редакторі Node-RED не діють, доки не натиснута червона кнопка <strong>Deploy</strong> у правому верхньому куті. Якщо потік поводиться \"не так, як я налаштував\" — спершу перевірте, чи зроблено Deploy.</p>\n</div>\n\n","<h1>⚠️ Типові помилки та як їх уникнути</h1>\n<table>\n<thead>\n<tr>\n<th>Помилка</th>\n<th>Симптом</th>\n<th>Рішення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Забутий <code>return msg</code> у Function</td>\n<td>Потік \"обривається\" на Function-ноді, далі нічого не йде</td>\n<td>Завжди завершувати Function-ноду <code>return msg;</code></td>\n</tr>\n<tr>\n<td>Не натиснутий Deploy</td>\n<td>Зміни не діють</td>\n<td>Натискати <strong>Deploy</strong> після кожної правки</td>\n</tr>\n<tr>\n<td>Дві ноди з однаковим <code>topic</code></td>\n<td>Складно зрозуміти, звідки прийшло повідомлення</td>\n<td>Давати кожному джерелу унікальний <code>msg.topic</code></td>\n</tr>\n<tr>\n<td>Switch у режимі \"all rules\"</td>\n<td><code>msg</code> неочікувано йде в декілька виходів</td>\n<td>Перевірити налаштування на <code>stopping after first match</code></td>\n</tr>\n<tr>\n<td>Помилкова перевірка <code>msg.payload.field</code></td>\n<td><code>TypeError: Cannot read property of undefined</code></td>\n<td>Перевіряти існування властивості перед зверненням</td>\n</tr>\n<tr>\n<td>Зміна <code>msg</code> в одній гілці впливає на іншу</td>\n<td>\"Загадкові\" зміни в інших Debug-нодах</td>\n<td>Робити копію об'єкта (deep clone) перед модифікацією</td>\n</tr>\n<tr>\n<td>Безкінечний цикл через Inject + Function</td>\n<td>Node-RED \"висне\" або починає сильно навантажувати CPU</td>\n<td>Уникати потоків, де нода відправляє сама в себе</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Спільний об'єкт msg між гілками</strong> <p>Якщо нода має кілька вихідних з'єднань, усі вони отримують <strong>посилання на той самий об'єкт <code>msg</code></strong>. Зміна <code>msg.payload</code> у одній гілці може вплинути на іншу. Для незалежної модифікації використовуйте <code>RED.util.cloneMessage(msg)</code> у Function-ноді.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>🔷 Нода</strong> — базовий будівельний блок Node-RED, що виконує одну операцію над <code>msg</code></p>\n</li>\n<li><p><strong>📦 <code>msg</code></strong> — JavaScript-об'єкт, який передається між нодами; ключове поле — <code>msg.payload</code></p>\n</li>\n<li><p><strong>⚡ Inject</strong> — джерело подій: ручний запуск, інтервали або розклад</p>\n</li>\n<li><p><strong>🐞 Debug</strong> — головний інструмент налагодження, що показує <code>msg</code> на бічній панелі</p>\n</li>\n<li><p><strong>🔧 Function</strong> — універсальна нода для JavaScript-логіки; обов'язково завершується <code>return msg;</code></p>\n</li>\n<li><p><strong>✏️ Change</strong> — модифікація <code>msg</code> без коду через операції Set, Move, Delete</p>\n</li>\n<li><p><strong>🔀 Switch</strong> — розгалуження потоку на основі значення поля</p>\n</li>\n<li><p><strong>📝 Template</strong> — формування рядків через Mustache-шаблони</p>\n</li>\n<li><p><strong>💾 Імпорт/експорт у JSON</strong> — стандартний спосіб обміну потоками та збереження в Git</p>\n</li>\n<li><p><strong>🛠️ Системне налагодження</strong> — Debug + <code>node.status</code> + іменування нод = передбачуваний потік</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Що таке нода в Node-RED і з яких елементів вона складається?</p>\n</li>\n<li><p>🤔 Опишіть структуру об'єкта <code>msg</code>. Чи може поле <code>msg.payload</code> містити об'єкт, а не лише рядок?</p>\n</li>\n<li><p>🤔 У яких трьох сценаріях використовується нода Inject? Наведіть приклад для кожного.</p>\n</li>\n<li><p>🤔 Що станеться, якщо у Function-ноді забути написати <code>return msg;</code>?</p>\n</li>\n<li><p>🤔 Яка різниця між операціями Set, Move та Delete в ноді Change?</p>\n</li>\n<li><p>🤔 Чим відрізняються режими <code>stopping after first match</code> та <code>checking all rules</code> у ноді Switch?</p>\n</li>\n<li><p>🤔 Поясніть синтаксис Mustache на прикладі вставки <code>{{payload.name}}</code> у ноді Template.</p>\n</li>\n<li><p>🤔 Що зберігається при експорті потоку в JSON, а що — ні? Чому це важливо?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Нода</td>\n<td>Node</td>\n<td>Базовий будівельний блок, що виконує одну операцію над повідомленням</td>\n</tr>\n<tr>\n<td>Повідомлення</td>\n<td>Message</td>\n<td>JavaScript-об'єкт <code>msg</code>, що передається між нодами</td>\n</tr>\n<tr>\n<td>Корисне навантаження</td>\n<td>Payload</td>\n<td>Основне поле повідомлення <code>msg.payload</code></td>\n</tr>\n<tr>\n<td>Тема</td>\n<td>Topic</td>\n<td>Опціональне поле <code>msg.topic</code> для маршрутизації або групування</td>\n</tr>\n<tr>\n<td>Потік</td>\n<td>Flow</td>\n<td>Сукупність з'єднаних між собою нод на одній вкладці редактора</td>\n</tr>\n<tr>\n<td>Провідник</td>\n<td>Wire</td>\n<td>З'єднання між вихідним портом однієї ноди та вхідним іншої</td>\n</tr>\n<tr>\n<td>Полотно</td>\n<td>Canvas</td>\n<td>Робоча область редактора, де розміщуються ноди</td>\n</tr>\n<tr>\n<td>Розгортання</td>\n<td>Deploy</td>\n<td>Застосування змін, зроблених у редакторі, до запущеного runtime</td>\n</tr>\n<tr>\n<td>Палітра</td>\n<td>Palette</td>\n<td>Бічна панель зі списком усіх доступних типів нод</td>\n</tr>\n<tr>\n<td>Шаблон</td>\n<td>Template</td>\n<td>Текст із плейсхолдерами, що замінюються значеннями з <code>msg</code></td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>JSON</td>\n<td>JavaScript Object Notation</td>\n<td>Текстовий формат обміну даними</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>ID</td>\n<td>Identifier</td>\n<td>Унікальний ідентифікатор</td>\n</tr>\n<tr>\n<td>UI</td>\n<td>User Interface</td>\n<td>Користувацький інтерфейс</td>\n</tr>\n<tr>\n<td>АС</td>\n<td>—</td>\n<td>Автоматизована система</td>\n</tr>\n<tr>\n<td>IoT</td>\n<td>Internet of Things</td>\n<td>Інтернет речей</td>\n</tr>\n<tr>\n<td>URL</td>\n<td>Uniform Resource Locator</td>\n<td>Уніфікований локатор ресурсу</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
