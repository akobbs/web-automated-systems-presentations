 <strong>HTTP Request</strong> — виклик зовнішніх API</li>\n<li>🔍 Робота з параметрами, заголовками та JSON</li>\n<li>🛡️ Базова валідація вхідних даних</li>\n<li>🛠️ Практичний приклад: REST API для моніторингу датчиків</li>\n</ol>\n","<h1>🌐 Що таке REST API</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>REST</strong> (Representational State Transfer) — архітектурний стиль побудови розподілених систем, у якому клієнт і сервер взаємодіють через HTTP-запити над <strong>ресурсами</strong>, що мають унікальні URL-адреси.</p>\n<p><strong>API</strong> (Application Programming Interface) — програмний інтерфейс, що описує правила обміну даними між компонентами системи.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> REST API дозволяє різним програмним системам (веб-сторінка, мобільний застосунок, контролер, SCADA-система) обмінюватися даними за єдиним стандартом — через HTTP-запити та JSON.</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    CLIENT[&quot;💻 Клієнт&lt;br&gt;браузер / HMI / контролер&quot;]\n    SERVER[&quot;🖥️ Сервер&lt;br&gt;Node-RED&quot;]\n    DATA[&quot;📊 Дані&lt;br&gt;датчики, БД, файли&quot;]\n    CLIENT --&gt;|&quot;HTTP-запит&quot;| SERVER\n    SERVER --&gt;|&quot;JSON-відповідь&quot;| CLIENT\n    SERVER &lt;--&gt;|&quot;читання/запис&quot;| DATA\n    style CLIENT fill:#e3f2fd,stroke:#1565c0\n    style SERVER fill:#e8f5e9,stroke:#388e3c\n    style DATA fill:#fff3e0,stroke:#ef6c00\"><svg id=\"exp-1779777444782-2-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 920.3125px;\" viewBox=\"0 0 920.3125 88\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1779777444782-2-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1779777444782-2-0 .edge-animation-slow{stroke-dasharray slate(489.609375, 44)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-62.5234375\" y=\"-36\" width=\"125.046875\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-38.5234375, -24)\"><rect></rect><foreignObject width=\"77.046875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🖥️ Сервер<br>Node-RED</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779777444782-2-0-flowchart-DATA-2\" data-look=\"classic\" transform=\"translate(814.13671875, 44)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-98.17578125\" y=\"-36\" width=\"196.3515625\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-74.17578125, -24)\"><rect></rect><foreignObject width=\"148.3515625\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📊 Дані<br>датчики, БД, файли</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779777444782-2-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779777444782-2-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<div class=\"note\"><strong>📝 Приклад з життя АС</strong> <p>Оператор відкриває веб-дашборд, що показує температуру в реакторі. Дашборд робить HTTP-запит до REST API, який повертає поточні значення з датчиків у JSON-форматі. Цей патерн — основа сучасних HMI-систем.</p>\n</div>\n\n","<h1>🎯 Принципи REST</h1>\n<p><strong>Головна ідея:</strong> REST не є протоколом — це набір принципів, дотримання яких робить API передбачуваним, масштабованим та зручним у використанні.</p>\n<h2>📋 Основні принципи</h2>\n<table>\n<thead>\n<tr>\n<th>Принцип</th>\n<th>Пояснення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🔗 <strong>Ресурс = URL</strong></td>\n<td>Кожен ресурс має унікальну адресу: <code>/sensors</code>, <code>/sensors/42</code>, <code>/devices/pump-01/status</code></td>\n</tr>\n<tr>\n<td>🎯 <strong>Семантика методів</strong></td>\n<td>HTTP-метод визначає дію: GET — читати, POST — створювати, PUT — оновлювати, DELETE — видаляти</td>\n</tr>\n<tr>\n<td>💾 <strong>Stateless</strong></td>\n<td>Сервер не зберігає стан клієнта між запитами — кожен запит самодостатній</td>\n</tr>\n<tr>\n<td>📦 <strong>JSON як формат</strong></td>\n<td>Дані передаються у форматі JSON (рідше — XML, CSV)</td>\n</tr>\n<tr>\n<td>📊 <strong>Коди статусу</strong></td>\n<td>Сервер повертає HTTP-код, що описує результат: 200, 201, 400, 404, 500</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Як виглядає правильний URL у REST</strong> <p>URL описує <strong>ресурс</strong> (іменник, у множині), а не <strong>дію</strong> (дієслово).</p>\n<ul>\n<li>✅ Добре: <code>GET /api/sensors</code>, <code>POST /api/sensors</code>, <code>DELETE /api/sensors/5</code></li>\n<li>❌ Погано: <code>GET /api/getSensors</code>, <code>POST /api/createSensor</code>, <code>POST /api/deleteSensor</code></li>\n</ul>\n</div>\n\n","<h1>🔄 HTTP-методи в контексті АС</h1>\n<p><strong>Головна ідея:</strong> Кожен HTTP-метод має чітко визначене призначення. Дотримання семантики методів робить API зрозумілим для будь-якого розробника.</p>\n<h2>📊 Чотири основні методи</h2>\n<table>\n<thead>\n<tr>\n<th>Метод</th>\n<th>Призначення</th>\n<th>Приклад в АС</th>\n<th>Чи має тіло запиту?</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🔍 <strong>GET</strong></td>\n<td>Отримати дані</td>\n<td>Прочитати показники температури</td>\n<td>❌ Ні</td>\n</tr>\n<tr>\n<td>➕ <strong>POST</strong></td>\n<td>Створити новий запис</td>\n<td>Додати нове журнальне повідомлення (alarm)</td>\n<td>✅ Так</td>\n</tr>\n<tr>\n<td>✏️ <strong>PUT</strong></td>\n<td>Оновити існуючий ресурс</td>\n<td>Змінити уставку (setpoint) клапана</td>\n<td>✅ Так</td>\n</tr>\n<tr>\n<td>🗑️ <strong>DELETE</strong></td>\n<td>Видалити ресурс</td>\n<td>Скинути архівне повідомлення</td>\n<td>❌ Зазвичай ні</td>\n</tr>\n</tbody></table>\n<h2>🏭 Приклади для системи моніторингу</h2>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">GET    /api/sensors              → Список усіх датчиків\nGET    /api/sensors/T-101        → Дані конкретного датчика T-101\nPOST   /api/sensors              → Зареєструвати новий датчик\nPUT    /api/sensors/T-101        → Оновити налаштування датчика T-101\nDELETE /api/sensors/T-101        → Видалити датчик з системи\n\nGET    /api/alarms               → Активні аварійні повідомлення\nPOST   /api/alarms/acknowledge   → Підтвердити (квитувати) аварію</code></pre><div class=\"warning\"><strong>⚠️ Безпека та ідемпотентність</strong> <p><strong>GET</strong> не повинен змінювати дані на сервері — лише читати. <strong>PUT</strong> та <strong>DELETE</strong> мають бути <strong>ідемпотентними</strong>: повторний виклик з тими самими параметрами не змінює результат. Це критично для надійності АС, де мережеві збої викликають повторні запити.</p>\n</div>\n\n","<h1>📊 HTTP-коди статусу</h1>\n<p><strong>Головна ідея:</strong> Код статусу — це коротке \"повідомлення\" сервера клієнту про результат обробки запиту. Правильне використання кодів робить API зрозумілим.</p>\n<h2>🎨 Категорії кодів</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    A[&quot;2xx ✅&lt;br&gt;Успіх&quot;] --&gt; A1[&quot;200 OK&lt;br&gt;201 Created&lt;br&gt;204 No Content&quot;]\n    B[&quot;4xx ⚠️&lt;br&gt;Помилка клієнта&quot;] --&gt; B1[&quot;400 Bad Request&lt;br&gt;401 Unauthorized&lt;br&gt;404 Not Found&quot;]\n    C[&quot;5xx ❌&lt;br&gt;Помилка сервера&quot;] --&gt; C1[&quot;500 Internal Error&lt;br&gt;503 Service Unavailable&quot;]\n    style A fill:#e8f5e9,stroke:#388e3c\n    style B fill:#fff3e0,stroke:#ef6c00\n    style C fill:#fce4ec,stroke:#c2185b\n    style A1 fill:#e8f5e9,stroke:#388e3c\n    style B1 fill:#fff3e0,stroke:#ef6c00\n    style C1 fill:#fce4ec,stroke:#c2185b\"><svg id=\"exp-1779777444821-5-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 471.6484375px;\" viewBox=\"0 0 471.6484375 380\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1779777444821-5-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1779777444821-5-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1779777444821-5-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1779777444821-5-0 .error-icon{fill:#552222;}#exp-1779777444821-5-0 .error-text{fill:#552222;stroke:#552222;}#exp-1779777444821-5-0 .edge-thickness-normal{stroke-width:1px;}#exp-1779777444821-5-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1779777444821-5-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1779777444821-5-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1779777444821-5-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1779777444821-5-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1779777444821-5-0 .marker{fill:#333333;stroke:#333333;}#exp-1779777444821-5-0 .marker.cross{stroke:#333333;}#exp-1779777444821-5-0 svg{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;}#exp-1779777444821-5-0 p{margin:0;}#exp-1779777444821-5-0 late(352.2890625, 56)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-82.10546875\" y=\"-48\" width=\"164.2109375\" height=\"96\"></rect><g class=\"label\" style=\"\" transform=\"translate(-58.10546875, -36)\"><rect></rect><foreignObject width=\"116.2109375\" height=\"72\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>200 OK<br>201 Created<br>204 No Content</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779777444821-5-0-flowchart-B-2\" data-look=\"classic\" transform=\"translate(99.46484375, 202)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-87.60546875\" y=\"-36\" width=\"175.2109375\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-63.60546875, -24)\"><rect></rect><foreignObject width=\"127.2109375\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>4xx ⚠️<br>Помилка клієнта</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779777444821-5-0-flowchart-B1-3\" data-look=\"classic\" transform=\"translate(352.2890625, 202)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-88.33984375\" y=\"-48\" width=\"176.6796875\" height=\"96\"></rect><g class=\"label\" style=\"\" transform=\"translate(-64.33984375, -36)\"><rect></rect><foreignObject width=\"128.6796875\" height=\"72\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>400 Bad Request<br>401 Unauthorized<br>404 Not Found</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779777444821-5-0-flowchart-C-4\" data-look=\"classic\" transform=\"translate(99.46484375, 336)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-91.46484375\" y=\"-36\" width=\"182.9296875\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-67.46484375, -24)\"><rect></rect><foreignObject width=\"134.9296875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>5xx ❌<br>Помилка сервера</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779777444821-5-0-flowchart-C1-5\" data-look=\"classic\" transform=\"translate(352.2890625, 336)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-111.359375\" y=\"-36\" width=\"222.71875\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-87.359375, -24)\"><rect></rect><foreignObject width=\"174.71875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>500 Internal Error<br>503 Service Unavailable</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779777444821-5-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779777444821-5-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>📋 Найважливіші коди</h2>\n<table>\n<thead>\n<tr>\n<th>Код</th>\n<th>Назва</th>\n<th>Коли використовувати</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>200</strong></td>\n<td>OK</td>\n<td>Запит успішно виконано (стандартна відповідь на GET)</td>\n</tr>\n<tr>\n<td><strong>201</strong></td>\n<td>Created</td>\n<td>Створено новий ресурс (відповідь на POST)</td>\n</tr>\n<tr>\n<td><strong>204</strong></td>\n<td>No Content</td>\n<td>Успіх, але тіло відповіді порожнє (часто на DELETE)</td>\n</tr>\n<tr>\n<td><strong>400</strong></td>\n<td>Bad Request</td>\n<td>Запит некоректний (наприклад, невалідний JSON)</td>\n</tr>\n<tr>\n<td><strong>401</strong></td>\n<td>Unauthorized</td>\n<td>Потрібна автентифікація</td>\n</tr>\n<tr>\n<td><strong>404</strong></td>\n<td>Not Found</td>\n<td>Ресурс за вказаним URL не існує</td>\n</tr>\n<tr>\n<td><strong>500</strong></td>\n<td>Internal Server Error</td>\n<td>Помилка на сервері (виняток у коді, недоступна БД)</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Правило вибору коду</strong> <p>Якщо запит не вдався — спочатку запитайте себе: <strong>чий це винен?</strong> Якщо клієнт надіслав щось неправильне → код 4xx. Якщо сервер сам не зміг обробити коректний запит → код 5xx.</p>\n</div>\n\n","<h1>📥 Нода HTTP In — приймання запитів</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>HTTP In</strong> — нода Node-RED, що створює HTTP-endpoint (точку входу) для приймання запитів від клієнтів. Кожна нода HTTP In відповідає одному URL та одному HTTP-методу.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> HTTP In — це \"вхідні двері\" вашого REST API. Вона стартує потік щоразу, коли клієнт надсилає запит на вказаний URL.</p>\n<h2>⚙️ Основні налаштування</h2>\n<table>\n<thead>\n<tr>\n<th>Параметр</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Method</strong></td>\n<td>HTTP-метод: GET, POST, PUT, DELETE, PATCH</td>\n</tr>\n<tr>\n<td><strong>URL</strong></td>\n<td>Шлях ендпоінту, наприклад <code>/api/sensors</code> або <code>/api/sensors/:id</code></td>\n</tr>\n<tr>\n<td><strong>Name</strong></td>\n<td>Опціональна назва ноди (для зручності в редакторі)</td>\n</tr>\n</tbody></table>\n<h2>🔗 Структура msg-об'єкта на виході</h2>\n<p>Після спрацювання HTTP In у msg з'являються нові властивості:</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\">msg.<span class=\"hljs-property\">payload</span>      <span class=\"hljs-comment\">// Головне місце з даними запиту:</span>\n                 <span class=\"hljs-comment\">//   - для GET: об'єкт з query-параметрами</span>\n                 <span class=\"hljs-comment\">//   - для POST/PUT: тіло запиту (вже розпарсений JSON)</span>\nmsg.<span class=\"hljs-property\">req</span>          <span class=\"hljs-comment\">// Повний об'єкт запиту з усіма деталями</span>\nmsg.<span class=\"hljs-property\">req</span>.<span class=\"hljs-property\">query</span>    <span class=\"hljs-comment\">// Query-параметри: ?name=value</span>\nmsg.<span class=\"hljs-property\">req</span>.<span class=\"hljs-property\">params</span>   <span class=\"hljs-comment\">// Path-параметри: /sensors/:id → params.id</span>\nmsg.<span class=\"hljs-property\">req</span>.<span class=\"hljs-property\">headers</span>  <span class=\"hljs-comment\">// HTTP-заголовки запиту</span>\nmsg.<span class=\"hljs-property\">res</span>          <span class=\"hljs-comment\">// Об'єкт відповіді — передається в HTTP Response</span></code></pre><div class=\"warning\"><strong>⚠️ Обов'язково: HTTP In завжди йде в парі з HTTP Response</strong> <p>Якщо ви забудете додати ноду <strong>HTTP Response</strong> в кінці потоку — клієнт ніколи не отримає відповіді, і його запит \"зависне\" доки не спрацює timeout.</p>\n</div>\n\n","<h1>📤 Нода HTTP Response — формування відповіді</h1>\n<p><strong>Головна ідея:</strong> HTTP Response завершує обробку запиту і повертає результат клієнту. Без цієї ноди REST API не працює.</p>\n<h2>⚙️ Основні налаштування</h2>\n<table>\n<thead>\n<tr>\n<th>Параметр</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Status code</strong></td>\n<td>HTTP-код статусу (200, 201, 400, 404, 500 тощо)</td>\n</tr>\n<tr>\n<td><strong>Headers</strong></td>\n<td>HTTP-заголовки відповіді (Content-Type, CORS-заголовки)</td>\n</tr>\n</tbody></table>\n<h2>📦 Що повертається клієнту</h2>\n<table>\n<thead>\n<tr>\n<th>Властивість msg</th>\n<th>Що це</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>msg.payload</code></td>\n<td>Тіло відповіді (об'єкт автоматично серіалізується в JSON)</td>\n</tr>\n<tr>\n<td><code>msg.statusCode</code></td>\n<td>HTTP-код статусу (якщо не задано в налаштуваннях)</td>\n</tr>\n<tr>\n<td><code>msg.headers</code></td>\n<td>HTTP-заголовки відповіді</td>\n</tr>\n</tbody></table>\n<h2>💡 Приклад: формування відповіді через Function-ноду</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Перед HTTP Response ставимо Function-ноду, що формує відповідь</span>\nmsg.<span class=\"hljs-property\">payload</span> = {\n    <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">\"ok\"</span>,\n    <span class=\"hljs-attr\">timestamp</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>().<span class=\"hljs-title function_\">toISOString</span>(),\n    <span class=\"hljs-attr\">data</span>: {\n        <span class=\"hljs-attr\">sensorId</span>: <span class=\"hljs-string\">\"T-101\"</span>,\n        <span class=\"hljs-attr\">temperature</span>: <span class=\"hljs-number\">23.5</span>,\n        <span class=\"hljs-attr\">unit</span>: <span class=\"hljs-string\">\"°C\"</span>\n    }\n};\nmsg.<span class=\"hljs-property\">statusCode</span> = <span class=\"hljs-number\">200</span>;\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"note\"><strong>📝 Серіалізація JSON автоматична</strong> <p>Якщо <code>msg.payload</code> — це JavaScript-об'єкт, Node-RED автоматично перетворить його на JSON-рядок та встановить заголовок <code>Content-Type: application/json</code>. Вручну робити <code>JSON.stringify()</code> не потрібно.</p>\n</div>\n\n","<h1>🔍 Параметри URL та query-параметри</h1>\n<p><strong>Головна ідея:</strong> Клієнт може передавати дані через URL двома способами: <strong>path-параметри</strong> (частина шляху) та <strong>query-параметри</strong> (після знака <code>?</code>).</p>\n<h2>📍 Path-параметри: <code>/sensors/:id</code></h2>\n<p>Динамічні частини URL позначаються двокрапкою у налаштуваннях HTTP In:</p>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">URL у налаштуваннях: /api/sensors/:id\nРеальний запит:      GET /api/sensors/T-101\n\n→ msg.req.params.id === \"T-101\"</code></pre><h2>🔎 Query-параметри: <code>?key=value</code></h2>\n<p>Передаються після <code>?</code> у URL і використовуються для фільтрації, сортування, пагінації:</p>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">Запит: GET /api/sensors?type=temperature&amp;limit=10\n\n→ msg.req.query.type  === \"temperature\"\n→ msg.req.query.limit === \"10\"</code></pre><h2>🆚 Порівняння</h2>\n<table>\n<thead>\n<tr>\n<th>Тип параметра</th>\n<th>Коли використовувати</th>\n<th>Приклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Path</strong></td>\n<td>Ідентифікація конкретного ресурсу</td>\n<td><code>/sensors/T-101</code>, <code>/users/42</code></td>\n</tr>\n<tr>\n<td><strong>Query</strong></td>\n<td>Фільтрація, сортування, опції</td>\n<td><code>?type=temperature&amp;limit=10&amp;sort=asc</code></td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Query-параметри завжди є рядками</strong> <p>Навіть <code>?limit=10</code> дає <code>msg.req.query.limit === \"10\"</code> (рядок, не число). Щоб отримати число, використовуйте <code>Number(msg.req.query.limit)</code> або <code>parseInt(...)</code>.</p>\n</div>\n\n","<h1>📦 Робота з JSON та тілом запиту</h1>\n<p><strong>Головна ідея:</strong> Для POST та PUT запитів дані передаються в тілі запиту у форматі JSON. Node-RED автоматично парсить JSON, якщо в HTTP-заголовках клієнта вказано <code>Content-Type: application/json</code>.</p>\n<h2>📨 Приклад POST-запиту від клієнта</h2>\n<pre><code class=\"language-bash hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\"># Клієнт надсилає POST-запит</span>\ncurl -X POST http://localhost:1880/api/sensors \\\n  -H <span class=\"hljs-string\">\"Content-Type: application/json\"</span> \\\n  -d <span class=\"hljs-string\">'{\"id\": \"P-205\", \"type\": \"pressure\", \"value\": 4.2}'</span></code></pre><h2>🔧 Обробка на стороні Node-RED</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// У Function-ноді після HTTP In</span>\n<span class=\"hljs-keyword\">const</span> data = msg.<span class=\"hljs-property\">payload</span>;\n\n<span class=\"hljs-comment\">// data === { id: \"P-205\", type: \"pressure\", value: 4.2 }</span>\nnode.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Отримано датчик: \"</span> + data.<span class=\"hljs-property\">id</span>);\nnode.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Тип: \"</span> + data.<span class=\"hljs-property\">type</span> + <span class=\"hljs-string\">\", значення: \"</span> + data.<span class=\"hljs-property\">value</span>);\n\n<span class=\"hljs-comment\">// Формуємо відповідь</span>\nmsg.<span class=\"hljs-property\">payload</span> = {\n    <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">\"created\"</span>,\n    <span class=\"hljs-attr\">received</span>: data\n};\nmsg.<span class=\"hljs-property\">statusCode</span> = <span class=\"hljs-number\">201</span>;\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"warning\"><strong>⚠️ Автоматичний парсинг JSON</strong> <p>Якщо у HTTP-заголовках запиту вказано <code>Content-Type: application/json</code>, нода HTTP In <strong>автоматично</strong> розпарсить тіло запиту і покладе результат в <code>msg.payload</code> як JavaScript-об'єкт. Якщо заголовок не вказано — <code>msg.payload</code> буде рядком, і його доведеться парсити вручну через <code>JSON.parse()</code> або додаткову ноду <strong>JSON</strong>.</p>\n</div>\n\n","<h1>📡 Нода HTTP Request — виклик зовнішніх API</h1>\n<p><strong>Головна ідея:</strong> HTTP Request — це нода-<strong>клієнт</strong>, що дозволяє Node-RED самому викликати інші HTTP-сервіси: зовнішні API, інші вузли мережі, хмарні сервіси.</p>\n<h2>⚙️ Основні налаштування</h2>\n<table>\n<thead>\n<tr>\n<th>Параметр</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Method</strong></td>\n<td>HTTP-метод: GET, POST, PUT, DELETE</td>\n</tr>\n<tr>\n<td><strong>URL</strong></td>\n<td>Адреса зовнішнього сервісу</td>\n</tr>\n<tr>\n<td><strong>Return</strong></td>\n<td>Формат відповіді: рядок (UTF-8 string), розпарсений JSON або бінарні дані</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Налаштування \"Return\" критично важливе</strong> <p>За замовчуванням HTTP Request повертає відповідь як <strong>рядок</strong>, навіть якщо це JSON. Щоб одразу отримати об'єкт у <code>msg.payload</code> — виберіть у налаштуваннях ноди <strong>Return: a parsed JSON object</strong>. Інакше доведеться парсити вручну: <code>msg.payload = JSON.parse(msg.payload);</code></p>\n</div>\n\n\n\n<h2>🔄 Потік даних</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    INJ[&quot;⏱️ Inject&lt;br&gt;щохвилини&quot;] --&gt; REQ[&quot;📡 HTTP Request&lt;br&gt;GET зовнішній API&quot;]\n    REQ --&gt; FUNC[&quot;⚙️ Function&lt;br&gt;обробка даних&quot;]\n    FUNC --&gt; DEBUG[&quot;🐛 Debug&lt;br&gt;результат&quot;]\n    style INJ fill:#e3f2fd,stroke:#1565c0\n    style REQ fill:#fff3e0,stroke:#ef6c00\n    style FUNC fill:#e8f5e9,stroke:#388e3c\n    style DEBUG fill:#fce4ec,stroke:#c2185b\"><svg id=\"exp-1779777444844-10-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 768.3046875px;\" viewBox=\"0 0 768.3046875 88\" role=\"graphics-document document\" aria-roledescription s=\"background\" style=\"stroke: none\"></rect></g><g class=\"edgeLabel\"><g class=\"label\" data-id=\"L_REQ_FUNC_0\" transform=\"translate(0, 0)\"><text y=\"-10.1\" text-anchor=\"middle\"><tspan class=\"text-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"></tspan></text></g></g><g><rect class=\"background\" style=\"stroke: none\"></rect></g><g class=\"edgeLabel\"><g class=\"label\" data-id=\"L_FUNC_DEBUG_0\" transform=\"translate(0, 0)\"><text y=\"-10.1\" text-anchor=\"middle\"><tspan class=\"text-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"></tspan></text></g></g><g><rect class=\"background\" style=\"stroke: none\"></rect></g></g><g class=\"nodes\"><g class=\"node default  \" id=\"exp-1779777444844-10-0-flowchart-INJ-0\" data-look=\"classic\" transform=\"translate(74.58984375, 44)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-66.58984375\" y=\"-36\" width=\"133.1796875\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-42.58984375, -24)\"><rect></rect><foreignObject width=\"85.1796875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>⏱️ Inject<br>щохвилини</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779777444844-10-0-flowchart-REQ-1\" data-look=\"classic\" transform=\"translate(283.859375, 44)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-92.6796875\" y=\"-36\" width=\"185.359375\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-68.6796875, -24)\"><rect></rect><foreignObject width=\"137.359375\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📡 HTTP Request<br>GET зовнішній API</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779777444844-10-0-flowchart-FUNC-3\" data-look=\"classic\" transform=\"translate(507.03125, 44)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-80.4921875\" y=\"-36\" width=\"160.984375\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-56.4921875, -24)\"><rect></rect><foreignObject width=\"112.984375\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>⚙️ Function<br>обробка даних</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779777444844-10-0-flowchart-DEBUG-5\" data-look=\"classic\" transform=\"translate(698.9140625, 44)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-61.390625\" y=\"-36\" width=\"122.78125\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-37.390625, -24)\"><rect></rect><foreignObject width=\"74.78125\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🐛 Debug<br>результат</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779777444844-10-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779777444844-10-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>💻 Приклад: отримання даних з публічного API</h2>\n<p>У ноді <strong>HTTP Request</strong> задаємо в налаштуваннях:</p>\n<ul>\n<li><strong>Method:</strong> <code>GET</code></li>\n<li><strong>URL:</strong> <code>https://jsonplaceholder.typicode.com/posts/1</code></li>\n<li><strong>Return:</strong> <code>a parsed JSON object</code></li>\n</ul>\n<p>Далі <strong>Function</strong> після HTTP Request обробляє відповідь:</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// msg.payload містить розпарсений JSON-об'єкт</span>\n<span class=\"hljs-keyword\">const</span> post = msg.<span class=\"hljs-property\">payload</span>;\nmsg.<span class=\"hljs-property\">payload</span> = {\n    <span class=\"hljs-attr\">title</span>: post.<span class=\"hljs-property\">title</span>,\n    <span class=\"hljs-attr\">excerpt</span>: post.<span class=\"hljs-property\">body</span>.<span class=\"hljs-title function_\">slice</span>(<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">50</span>) + <span class=\"hljs-string\">\"...\"</span>\n};\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"tip\"><strong>💡 Динамічне налаштування через msg</strong> <p>URL та метод можна задавати не у самій ноді, а в попередній Function-ноді через <code>msg.url</code> та <code>msg.method</code> — це переоприділить статичні налаштування. Зручно, коли URL формується на льоту (наприклад, ID ресурсу береться з іншого джерела).</p>\n</div>\n\n","<h1>🛡️ Базова валідація вхідних даних</h1>\n<p><strong>Головна ідея:</strong> Будь-які дані, що приходять від клієнта, потенційно небезпечні. Перевірка вхідних даних — мінімальна вимога надійного API.</p>\n<h2>❓ Що перевіряти</h2>\n<table>\n<thead>\n<tr>\n<th>Перевірка</th>\n<th>Приклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>📌 <strong>Наявність полів</strong></td>\n<td>Чи присутні всі обов'язкові поля у тілі запиту?</td>\n</tr>\n<tr>\n<td>🔢 <strong>Тип даних</strong></td>\n<td>Чи <code>value</code> справді є числом, а не рядком?</td>\n</tr>\n<tr>\n<td>📏 <strong>Діапазон значень</strong></td>\n<td>Чи температура в межах -50..150°C?</td>\n</tr>\n<tr>\n<td>📝 <strong>Формат рядків</strong></td>\n<td>Чи <code>id</code> відповідає шаблону <code>^[A-Z]-\\d+$</code>?</td>\n</tr>\n<tr>\n<td>🚫 <strong>Заборонені символи</strong></td>\n<td>Чи немає у вхідних даних HTML-тегів, лапок, апострофів?</td>\n</tr>\n</tbody></table>\n<h2>💻 Приклад валідації у Function-ноді</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> data = msg.<span class=\"hljs-property\">payload</span>;\n<span class=\"hljs-keyword\">const</span> errors = [];\n\n<span class=\"hljs-comment\">// Перевірка наявності</span>\n<span class=\"hljs-keyword\">if</span> (!data || !data.<span class=\"hljs-property\">id</span>)    errors.<span class=\"hljs-title function_\">push</span>(<span class=\"hljs-string\">\"Поле 'id' обов'язкове\"</span>);\n<span class=\"hljs-keyword\">if</span> (!data || !data.<span class=\"hljs-property\">value</span>) errors.<span class=\"hljs-title function_\">push</span>(<span class=\"hljs-string\">\"Поле 'value' обов'язкове\"</span>);\n\n<span class=\"hljs-comment\">// Перевірка типу</span>\n<span class=\"hljs-keyword\">if</span> (data &amp;&amp; data.<span class=\"hljs-property\">value</span> !== <span class=\"hljs-literal\">undefined</span> &amp;&amp; <span class=\"hljs-keyword\">typeof</span> data.<span class=\"hljs-property\">value</span> !== <span class=\"hljs-string\">\"number\"</span>) {\n    errors.<span class=\"hljs-title function_\">push</span>(<span class=\"hljs-string\">\"Поле 'value' повинно бути числом\"</span>);\n}\n\n<span class=\"hljs-comment\">// Перевірка діапазону</span>\n<span class=\"hljs-keyword\">if</span> (data &amp;&amp; <span class=\"hljs-keyword\">typeof</span> data.<span class=\"hljs-property\">value</span> === <span class=\"hljs-string\">\"number\"</span> &amp;&amp; (data.<span class=\"hljs-property\">value</span> &lt; -<span class=\"hljs-number\">50</span> || data.<span class=\"hljs-property\">value</span> &gt; <span class=\"hljs-number\">150</span>)) {\n    errors.<span class=\"hljs-title function_\">push</span>(<span class=\"hljs-string\">\"Значення 'value' має бути в діапазоні -50..150\"</span>);\n}\n\n<span class=\"hljs-comment\">// Якщо є помилки — повертаємо 400 Bad Request</span>\n<span class=\"hljs-keyword\">if</span> (errors.<span class=\"hljs-property\">length</span> &gt; <span class=\"hljs-number\">0</span>) {\n    msg.<span class=\"hljs-property\">statusCode</span> = <span class=\"hljs-number\">400</span>;\n    msg.<span class=\"hljs-property\">payload</span> = { <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">\"error\"</span>, <span class=\"hljs-attr\">errors</span>: errors };\n    <span class=\"hljs-keyword\">return</span> msg;\n}\n\n<span class=\"hljs-comment\">// Якщо все добре — продовжуємо обробку</span>\nmsg.<span class=\"hljs-property\">statusCode</span> = <span class=\"hljs-number\">200</span>;\nmsg.<span class=\"hljs-property\">payload</span> = { <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">\"ok\"</span>, <span class=\"hljs-attr\">received</span>: data };\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"danger\"><strong>🚫 Ніколи не довіряйте клієнту</strong> <p>Навіть якщо у вашій документації написано \"поле value повинно бути числом\" — клієнт може надіслати рядок, <code>null</code>, об'єкт або взагалі нічого. Сервер зобов'язаний перевірити все самостійно.</p>\n</div>\n\n","<h1>🛠️ Практичний приклад: API для датчиків</h1>\n<p><strong>Головна ідея:</strong> Зберемо повний потік REST API для системи моніторингу датчиків, що підтримує читання та запис даних.</p>\n<h2>📋 Архітектура потоків</h2>\n\n<div class=\"mermaid\" data-source=\"graph TB\n    subgraph GET_FLOW[&quot;GET /api/sensors&quot;]\n        IN1[&quot;📥 HTTP In&lt;br&gt;GET /api/sensors&quot;] --&gt; F1[&quot;⚙️ Function&lt;br&gt;читання з context&qu br>200 OK</p></span></div></foreignObject></g></g></g></g></g></g></g><defs><filter id=\"exp-1779777444854-12-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779777444854-12-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>💻 Function: GET /api/sensors (список усіх датчиків)</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Тестові дані датчиків (у реальній системі — приходять із бази даних)</span>\n<span class=\"hljs-keyword\">const</span> sensors = [\n    { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-string\">\"T-101\"</span>, <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"temperature\"</span>, <span class=\"hljs-attr\">value</span>: <span class=\"hljs-number\">23.5</span>, <span class=\"hljs-attr\">unit</span>: <span class=\"hljs-string\">\"°C\"</span> },\n    { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-string\">\"P-205\"</span>, <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"pressure\"</span>,    <span class=\"hljs-attr\">value</span>: <span class=\"hljs-number\">4.2</span>,  <span class=\"hljs-attr\">unit</span>: <span class=\"hljs-string\">\"bar\"</span> },\n    { <span class=\"hljs-attr\">id</span>: <span class=\"hljs-string\">\"F-310\"</span>, <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"flow\"</span>,        <span class=\"hljs-attr\">value</span>: <span class=\"hljs-number\">12.7</span>, <span class=\"hljs-attr\">unit</span>: <span class=\"hljs-string\">\"m³/h\"</span> }\n];\n\nmsg.<span class=\"hljs-property\">payload</span> = {\n    <span class=\"hljs-attr\">count</span>: sensors.<span class=\"hljs-property\">length</span>,\n    <span class=\"hljs-attr\">data</span>: sensors\n};\nmsg.<span class=\"hljs-property\">statusCode</span> = <span class=\"hljs-number\">200</span>;\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>💻 Function: POST /api/sensors (додавання датчика)</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> data = msg.<span class=\"hljs-property\">payload</span>;\n\n<span class=\"hljs-comment\">// Валідація</span>\n<span class=\"hljs-keyword\">if</span> (!data || !data.<span class=\"hljs-property\">id</span> || <span class=\"hljs-keyword\">typeof</span> data.<span class=\"hljs-property\">value</span> !== <span class=\"hljs-string\">\"number\"</span>) {\n    msg.<span class=\"hljs-property\">statusCode</span> = <span class=\"hljs-number\">400</span>;\n    msg.<span class=\"hljs-property\">payload</span> = {\n        <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">\"error\"</span>,\n        <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">\"Очікувано {id, value:number}\"</span>\n    };\n    <span class=\"hljs-keyword\">return</span> msg;\n}\n\n<span class=\"hljs-comment\">// У реальній системі тут було б збереження в базу даних.</span>\n<span class=\"hljs-comment\">// Повертаємо клієнту підтвердження прийняття.</span>\nmsg.<span class=\"hljs-property\">statusCode</span> = <span class=\"hljs-number\">201</span>;\nmsg.<span class=\"hljs-property\">payload</span> = {\n    <span class=\"hljs-attr\">status</span>: <span class=\"hljs-string\">\"created\"</span>,\n    <span class=\"hljs-attr\">sensor</span>: {\n        <span class=\"hljs-attr\">id</span>: data.<span class=\"hljs-property\">id</span>,\n        <span class=\"hljs-attr\">value</span>: data.<span class=\"hljs-property\">value</span>,\n        <span class=\"hljs-attr\">timestamp</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>().<span class=\"hljs-title function_\">toISOString</span>()\n    }\n};\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"tip\"><strong>💡 Тестування з curl</strong> <p>Можна перевірити API командами в терміналі:<br><code>curl http://localhost:1880/api/sensors</code> — отримати список.<br><code>curl -X POST -H \"Content-Type: application/json\" -d '{\"id\":\"T-1\",\"value\":25}' http://localhost:1880/api/sensors</code> — додати датчик.</p>\n</div>\n\n","<h1>🔄 Повний приклад потоку — імпорт у Node-RED</h1>\n<p><strong>Головна ідея:</strong> Node-RED дозволяє експортувати готові потоки у форматі JSON та імпортувати їх в інший проєкт. Це зручно для обміну прикладами та резервного копіювання.</p>\n<h2>📥 Як імпортувати потік</h2>\n<ol>\n<li>Скопіюйте JSON-код потоку</li>\n<li>У редакторі Node-RED: меню (☰) → <strong>Import</strong> → вставте JSON → <strong>Import</strong></li>\n</ol>\n<h2>💻 Готовий потік для імпорту (фрагмент)</h2>\n<pre><code class=\"language-json hljs\" data-highlighted=\"yes\"><span class=\"hljs-punctuation\">[</span>\n  <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">\"id\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"in-get-sensors\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"type\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"http in\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"url\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"/api/sensors\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"method\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"get\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"name\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"GET /api/sensors\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"wires\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-punctuation\">[</span><span class=\"hljs-string\">\"fn-get-sensors\"</span><span class=\"hljs-punctuation\">]</span><span class=\"hljs-punctuation\">]</span>\n  <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">\"id\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"fn-get-sensors\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"type\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"function\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"name\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"Читання датчиків\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"func\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"const sensors = [\\n  { id: 'T-101', value: 23.5 },\\n  { id: 'P-205', value: 4.2 }\\n];\\nmsg.payload = { count: sensors.length, data: sensors };\\nmsg.statusCode = 200;\\nreturn msg;\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"wires\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-punctuation\">[</span><span class=\"hljs-punctuation\">[</span><span class=\"hljs-string\">\"resp-sensors\"</span><span class=\"hljs-punctuation\">]</span><span class=\"hljs-punctuation\">]</span>\n  <span class=\"hljs-punctuation\">}</span><span class=\"hljs-punctuation\">,</span>\n  <span class=\"hljs-punctuation\">{</span>\n    <span class=\"hljs-attr\">\"id\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"resp-sensors\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"type\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"http response\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"name\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"Відповідь\"</span><span class=\"hljs-punctuation\">,</span>\n    <span class=\"hljs-attr\">\"statusCode\"</span><span class=\"hljs-punctuation\">:</span> <span class=\"hljs-string\">\"\"</span>\n  <span class=\"hljs-punctuation\">}</span>\n<span class=\"hljs-punctuation\">]</span></code></pre><div class=\"note\"><strong>📝 Експорт власних потоків</strong> <p>Виділіть ноди → меню (☰) → <strong>Export</strong> → <strong>Selected nodes</strong> → отримаєте JSON, готовий до імпорту. Це стандартний спосіб ділитися рішеннями у спільноті Node-RED.</p>\n</div>\n\n","<h1>⚠️ Типові помилки початківців</h1>\n<p><strong>Головна ідея:</strong> Розуміння типових помилок економить години налагодження. Розгляньмо найпоширеніші з них при роботі з HTTP-нодами.</p>\n<h2>📋 Топ помилок</h2>\n<table>\n<thead>\n<tr>\n<th>Помилка</th>\n<th>Причина</th>\n<th>Рішення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🕐 Запит \"зависає\" і не отримує відповіді</td>\n<td>Забута нода <strong>HTTP Response</strong></td>\n<td>Додати HTTP Response в кінці потоку</td>\n</tr>\n<tr>\n<td>🚫 404 Not Found</td>\n<td>Неправильний URL або не натиснуто <strong>Deploy</strong></td>\n<td>Перевірити URL у налаштуваннях, натиснути Deploy</td>\n</tr>\n<tr>\n<td>📦 <code>msg.payload</code> порожнє при POST-запиті</td>\n<td>Клієнт не вказав <code>Content-Type: application/json</code></td>\n<td>Додати заголовок у клієнтський запит</td>\n</tr>\n<tr>\n<td>🔢 <code>msg.req.query.limit</code> — рядок замість числа</td>\n<td>Query-параметри завжди приходять рядками</td>\n<td><code>Number(msg.req.query.limit)</code></td>\n</tr>\n<tr>\n<td>🌐 CORS-помилка у браузері</td>\n<td>Браузер блокує запит з іншого домену</td>\n<td>Додати заголовки CORS у HTTP Response</td>\n</tr>\n<tr>\n<td>🔒 Помилка <code>port 1880 already in use</code></td>\n<td>Інший Node-RED або процес уже зайняв порт</td>\n<td>Зупинити інший процес або змінити порт у settings.js</td>\n</tr>\n<tr>\n<td>❌ Internal Server Error 500</td>\n<td>Виняток у Function-ноді</td>\n<td>Подивитись лог Node-RED, перевірити синтаксис коду</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Завжди натискайте Deploy</strong> <p>Будь-які зміни в потоках (додавання ноди, зміна URL, редагування коду) не застосовуються, доки ви не натиснете кнопку <strong>Deploy</strong> у правому верхньому куті редактора. Це найпоширеніша причина \"чому нічого не працює\".</p>\n</div>\n\n","<h1>🌐 Базова підтримка CORS</h1>\n<p><strong>Головна ідея:</strong> Якщо ваш REST API буде викликатися з браузера (з іншого домену або порту), браузер за замовчуванням заблокує запит через політику <strong>CORS</strong> (Cross-Origin Resource Sharing).</p>\n<h2>❓ Що таке CORS</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    BROWSER[&quot;🌐 Браузер&lt;br&gt;http://localhost:3000&quot;] --&gt;|&quot;запит&quot;| API[&quot;🖥️ Node-RED API&lt;br&gt;http://localhost:1880&quot;]\n    API --&gt;|&quot;відповідь без CORS&quot;| BLOCK[&quot;🚫 Браузер блокує&quot;]\n    API -.-&gt;|&quot;відповідь з CORS&quot;| ALLOW[&quot;✅ Браузер пропускає&quot;]\n    style BROWSER fill:#e3f2fd,stroke:#1565c0\n    style API fill:#e8f5e9,stroke:#388e3c\n    style BLOCK fill:#fce4ec,stroke:#c2185b\n    style ALLOW fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1779777444869-15-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 927.9296875px;\" viewBox=\"0 0 927.9296875 162\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1779777444869-15-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-17797 7.1640625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>✅ Браузер пропускає</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779777444869-15-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779777444869-15-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>💻 Додавання CORS-заголовків</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// У Function-ноді перед HTTP Response</span>\nmsg.<span class=\"hljs-property\">headers</span> = {\n    <span class=\"hljs-string\">\"Access-Control-Allow-Origin\"</span>: <span class=\"hljs-string\">\"*\"</span>,\n    <span class=\"hljs-string\">\"Access-Control-Allow-Methods\"</span>: <span class=\"hljs-string\">\"GET, POST, PUT, DELETE\"</span>,\n    <span class=\"hljs-string\">\"Access-Control-Allow-Headers\"</span>: <span class=\"hljs-string\">\"Content-Type\"</span>\n};\nmsg.<span class=\"hljs-property\">payload</span> = { <span class=\"hljs-attr\">data</span>: <span class=\"hljs-string\">\"...\"</span> };\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"tip\"><strong>💡 Глобальне налаштування CORS</strong> <p>Для всього API одразу можна увімкнути CORS у файлі <code>settings.js</code> Node-RED:</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-attr\">httpNodeCors</span>: {\n    <span class=\"hljs-attr\">origin</span>: <span class=\"hljs-string\">\"*\"</span>,\n    <span class=\"hljs-attr\">methods</span>: <span class=\"hljs-string\">\"GET,PUT,POST,DELETE\"</span>\n}</code></pre><p>Після збереження файлу — перезапустити Node-RED.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>REST API</strong> — стандартний спосіб обміну даними між клієнтом і сервером через HTTP та JSON</p>\n</li>\n<li><p><strong>HTTP-методи</strong> мають семантику: <strong>GET</strong> — читати, <strong>POST</strong> — створювати, <strong>PUT</strong> — оновлювати, <strong>DELETE</strong> — видаляти</p>\n</li>\n<li><p><strong>HTTP-коди статусу</strong> інформують клієнта про результат: <strong>2xx</strong> — успіх, <strong>4xx</strong> — помилка клієнта, <strong>5xx</strong> — помилка сервера</p>\n</li>\n<li><p><strong>HTTP In</strong> створює endpoint API; <strong>HTTP Response</strong> обов'язково завершує обробку запиту</p>\n</li>\n<li><p><strong>Параметри URL</strong> бувають двох видів: <strong>path-параметри</strong> (<code>/sensors/:id</code>) та <strong>query-параметри</strong> (<code>?type=temp</code>)</p>\n</li>\n<li><p><strong>Тіло запиту</strong> для POST/PUT приходить у <code>msg.payload</code> як JavaScript-об'єкт (за умови <code>Content-Type: application/json</code>)</p>\n</li>\n<li><p><strong>HTTP Request</strong> дозволяє Node-RED самому викликати зовнішні API — це робить його повноцінним учасником мережевої взаємодії</p>\n</li>\n<li><p><strong>Валідація вхідних даних</strong> обов'язкова: перевіряйте наявність, типи, діапазони та формати</p>\n</li>\n<li><p><strong>CORS-заголовки</strong> потрібні, коли API викликається з браузера з іншого домену</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Що таке REST API та які п'ять ключових принципів його побудови?</p>\n</li>\n<li><p>🤔 Поясніть семантику HTTP-методів GET, POST, PUT, DELETE. Наведіть приклади їх використання в АС.</p>\n</li>\n<li><p>🤔 Які HTTP-коди статусу слід повертати у відповідь на: успішне створення ресурсу, відсутність ресурсу, невалідні дані запиту, помилку на сервері?</p>\n</li>\n<li><p>🤔 У чому різниця між path-параметрами та query-параметрами? Як отримати кожен з них у Node-RED?</p>\n</li>\n<li><p>🤔 Що станеться, якщо в потоці після HTTP In не буде ноди HTTP Response?</p>\n</li>\n<li><p>🤔 Як отримати тіло POST-запиту у форматі JSON? Які умови потрібні для автоматичного парсингу?</p>\n</li>\n<li><p>🤔 Чим відрізняються ноди HTTP In та HTTP Request? Коли яку використовувати?</p>\n</li>\n<li><p>🤔 Чому валідація вхідних даних на сервері є обов'язковою, навіть якщо клієнт уже їх перевірив?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Архітектурний стиль</td>\n<td>Architectural Style</td>\n<td>Набір принципів побудови розподілених систем</td>\n</tr>\n<tr>\n<td>Ресурс</td>\n<td>Resource</td>\n<td>Об'єкт у REST, до якого здійснюється доступ через URL</td>\n</tr>\n<tr>\n<td>Ендпоінт</td>\n<td>Endpoint</td>\n<td>Конкретна URL-адреса API, що приймає запити</td>\n</tr>\n<tr>\n<td>Запит</td>\n<td>Request</td>\n<td>Повідомлення від клієнта до сервера</td>\n</tr>\n<tr>\n<td>Відповідь</td>\n<td>Response</td>\n<td>Повідомлення від сервера до клієнта</td>\n</tr>\n<tr>\n<td>Код статусу</td>\n<td>Status Code</td>\n<td>Тризначне число, що описує результат обробки запиту</td>\n</tr>\n<tr>\n<td>Тіло запиту</td>\n<td>Request Body</td>\n<td>Дані, що передаються від клієнта в HTTP-запиті (для POST/PUT)</td>\n</tr>\n<tr>\n<td>Заголовки</td>\n<td>Headers</td>\n<td>Метадані HTTP-запиту чи відповіді (Content-Type, Authorization тощо)</td>\n</tr>\n<tr>\n<td>Path-параметр</td>\n<td>Path Parameter</td>\n<td>Динамічна частина URL у вигляді <code>/resource/:id</code></td>\n</tr>\n<tr>\n<td>Query-параметр</td>\n<td>Query Parameter</td>\n<td>Параметр у URL після знака <code>?</code>, наприклад <code>?type=temperature</code></td>\n</tr>\n<tr>\n<td>Ідемпотентність</td>\n<td>Idempotency</td>\n<td>Властивість методу, при якій повторний виклик не змінює результат</td>\n</tr>\n<tr>\n<td>Валідація</td>\n<td>Validation</td>\n<td>Перевірка коректності вхідних даних перед обробкою</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>REST</td>\n<td>Representational State Transfer</td>\n<td>Передача стану представлення</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>HTTP</td>\n<td>HyperText Transfer Protocol</td>\n<td>Протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td>HTTPS</td>\n<td>HTTP Secure</td>\n<td>Захищений HTTP</td>\n</tr>\n<tr>\n<td>JSON</td>\n<td>JavaScript Object Notation</td>\n<td>Об'єктна нотація JavaScript</td>\n</tr>\n<tr>\n<td>URL</td>\n<td>Uniform Resource Locator</td>\n<td>Уніфікований локатор ресурсу</td>\n</tr>\n<tr>\n<td>CORS</td>\n<td>Cross-Origin Resource Sharing</td>\n<td>Спільне використання ресурсів між джерелами</td>\n</tr>\n<tr>\n<td>HMI</td>\n<td>Human-Machine Interface</td>\n<td>Людино-машинний інтерфейс</td>\n</tr>\n<tr>\n<td>АС</td>\n<td>Автоматизована система</td>\n<td>—</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
