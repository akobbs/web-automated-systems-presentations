 для трансформації без коду</li>\n<li>📝 Template-нода для побудови текстових структур</li>\n<li>⚠️ Обробка помилок: ноди Catch і Status</li>\n<li>🛠️ Практичний сценарій: обробка даних з датчика</li>\n</ol>\n","<h1>🔧 Function-нода: JavaScript у потоці</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Function-нода</strong> — нода, що виконує довільний JavaScript-код над повідомленням. Це найгнучкіший інструмент Node-RED, який дозволяє реалізувати будь-яку логіку, що не покривається готовими нодами.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Function — це \"програмована\" нода. Усе, що ми вивчали в JavaScript (умови, цикли, масиви, об'єкти), застосовується тут безпосередньо. Реальні АС рідко обмежуються \"взяв — передав\": дані треба перевіряти, перетворювати, порівнювати з порогами та маршрутизувати — і Function-нода є центральним інструментом для цього.</p>\n<h2>📊 Три рівні складності потоку</h2>\n<table>\n<thead>\n<tr>\n<th>Рівень</th>\n<th>Що робить потік</th>\n<th>Які ноди використовуються</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🟢 Базовий</td>\n<td>Генерує та виводить дані без змін</td>\n<td>Inject → Debug</td>\n</tr>\n<tr>\n<td>🟡 Середній</td>\n<td>Перетворює дані, маршрутизує за умовами</td>\n<td>+ Function, Change, Switch</td>\n</tr>\n<tr>\n<td>🔴 Виробничий</td>\n<td>Зберігає стан, обробляє помилки, реагує на зміни оточення</td>\n<td>+ контекст, Catch, Status</td>\n</tr>\n</tbody></table>\n<h2>🧩 Структура коду у Function-ноді</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// 1. msg вже доступний — це поточне повідомлення</span>\n<span class=\"hljs-comment\">// 2. Можна читати та змінювати будь-які його поля</span>\n<span class=\"hljs-comment\">// 3. Обов'язково повернути msg (або null, або масив msg)</span>\n\nmsg.<span class=\"hljs-property\">payload</span> = msg.<span class=\"hljs-property\">payload</span> * <span class=\"hljs-number\">2</span>;\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>⚙️ Три закладки у налаштуваннях</h2>\n<table>\n<thead>\n<tr>\n<th>Закладка</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>On Start</strong></td>\n<td>Код, що виконується одноразово при старті runtime</td>\n</tr>\n<tr>\n<td><strong>On Message</strong></td>\n<td>Основний код — виконується щоразу при надходженні <code>msg</code></td>\n</tr>\n<tr>\n<td><strong>On Stop</strong></td>\n<td>Код, що виконується при зупинці runtime або повторному Deploy</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Коли потрібен On Start</strong> <p>Якщо у Function-ноді потрібно ініціалізувати масив, лічильник чи з'єднання з зовнішнім сервісом — це робиться у блоці On Start. Інакше ініціалізація виконувалася б при кожному надходженні повідомлення, що зайве та неефективно.</p>\n</div>\n\n","<h1>💡 Прості приклади Function-ноди</h1>\n<p><strong>Головна ідея:</strong> Function використовується для трьох категорій задач: обчислення, валідація, перетворення формату.</p>\n<h2>🧮 Приклад 1: Обчислення похідного значення</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Датчик передає температуру у Фаренгейтах</span>\n<span class=\"hljs-comment\">// Перетворюємо на Цельсій</span>\n<span class=\"hljs-keyword\">const</span> fahrenheit = msg.<span class=\"hljs-property\">payload</span>;\n<span class=\"hljs-keyword\">const</span> celsius = ((fahrenheit - <span class=\"hljs-number\">32</span>) * <span class=\"hljs-number\">5</span>) / <span class=\"hljs-number\">9</span>;\n\nmsg.<span class=\"hljs-property\">payload</span> = {\n  <span class=\"hljs-attr\">original</span>: fahrenheit,\n  <span class=\"hljs-attr\">celsius</span>: <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-title function_\">round</span>(celsius * <span class=\"hljs-number\">10</span>) / <span class=\"hljs-number\">10</span>,\n  <span class=\"hljs-attr\">unit</span>: <span class=\"hljs-string\">\"C\"</span>,\n};\n\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>✅ Приклад 2: Перевірка перед передачею далі</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Пропускаємо лише валідні числові значення в діапазоні</span>\n<span class=\"hljs-keyword\">const</span> value = <span class=\"hljs-title class_\">Number</span>(msg.<span class=\"hljs-property\">payload</span>);\n\n<span class=\"hljs-keyword\">if</span> (<span class=\"hljs-title class_\">Number</span>.<span class=\"hljs-built_in\">isNaN</span>(value) || value &lt; -<span class=\"hljs-number\">50</span> || value &gt; <span class=\"hljs-number\">150</span>) {\n  <span class=\"hljs-comment\">// Невалідне значення — припиняємо потік</span>\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-literal\">null</span>;\n}\n\nmsg.<span class=\"hljs-property\">payload</span> = value;\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>🔄 Приклад 3: Перетворення формату</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// З масиву датчиків формуємо плаский об'єкт</span>\n<span class=\"hljs-keyword\">const</span> sensors = msg.<span class=\"hljs-property\">payload</span>;\n<span class=\"hljs-keyword\">const</span> result = {};\n\n<span class=\"hljs-keyword\">for</span> (<span class=\"hljs-keyword\">const</span> sensor <span class=\"hljs-keyword\">of</span> sensors) {\n  result[sensor.<span class=\"hljs-property\">id</span>] = sensor.<span class=\"hljs-property\">value</span>;\n}\n\nmsg.<span class=\"hljs-property\">payload</span> = result;\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"warning\"><strong>⚠️ Завжди return msg</strong> <p>Якщо забути <code>return msg;</code>, потік \"обірветься\" на цій ноді — наступні ноди не отримають нічого. Це найпоширеніша помилка початківців.</p>\n</div>\n\n","<h1>🚦 Множинні виходи Function-ноди</h1>\n<p><strong>Головна ідея:</strong> Function-нода може мати декілька вихідних портів. Це дозволяє маршрутизувати повідомлення на різні гілки потоку залежно від результату обчислень.</p>\n<h2>🔢 Як задати кількість виходів</h2>\n<p>У налаштуваннях ноди є поле <strong>Outputs</strong> — задайте число більше 1, з'явиться відповідна кількість вихідних портів.</p>\n<h2>📤 Спосіб 1: Масив повідомлень</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Нода має 2 виходи</span>\n<span class=\"hljs-comment\">// [msg, null] — піде у перший вихід</span>\n<span class=\"hljs-comment\">// [null, msg] — піде у другий вихід</span>\n<span class=\"hljs-comment\">// [msg, msg] — піде в обидва</span>\n\n<span class=\"hljs-keyword\">const</span> temperature = msg.<span class=\"hljs-property\">payload</span>;\n\n<span class=\"hljs-keyword\">if</span> (temperature &gt; <span class=\"hljs-number\">80</span>) {\n  <span class=\"hljs-comment\">// Аварійне значення — у вихід \"alarm\"</span>\n  <span class=\"hljs-keyword\">return</span> [<span class=\"hljs-literal\">null</span>, msg];\n}\n\n<span class=\"hljs-comment\">// Нормальне значення — у вихід \"normal\"</span>\n<span class=\"hljs-keyword\">return</span> [msg, <span class=\"hljs-literal\">null</span>];</code></pre><h2>📤 Спосіб 2: Окремі повідомлення для кожного виходу</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Розділяємо одне повідомлення на два різних</span>\n<span class=\"hljs-keyword\">const</span> msgLog = { <span class=\"hljs-attr\">payload</span>: <span class=\"hljs-string\">`Запис: <span class=\"hljs-subst\">${msg.payload}</span>`</span>, <span class=\"hljs-attr\">topic</span>: <span class=\"hljs-string\">\"log\"</span> };\n<span class=\"hljs-keyword\">const</span> msgAlert = { <span class=\"hljs-attr\">payload</span>: msg.<span class=\"hljs-property\">payload</span>, <span class=\"hljs-attr\">topic</span>: <span class=\"hljs-string\">\"alert\"</span> };\n\n<span class=\"hljs-keyword\">return</span> [msgLog, msgAlert];</code></pre>\n<div class=\"mermaid\" data-source=\"graph LR\n    IN[&quot;📥 Вхідне msg&lt;br&gt;payload: 95&quot;] --&gt; FN[&quot;🔧 Function&lt;br&gt;перевірка порогу&quot;]\n    FN --&gt;|&quot;вихід 1&quot;| NORMAL[&quot;🟢 Звичайна гілка&quot;]\n    FN --&gt;|&quot;вихід 2&quot;| ALARM[&quot;🔴 Аварійна гілка&quot;]\n    style IN fill:#e3f2fd,stroke:#1565c0\n    style FN fill:#fff9c4,stroke:#f9a825\n    style NORMAL fill:#e8f5e9,stroke:#388e3c\n    style ALARM fill:#fce4ec,stroke:#c2185b\"><svg id=\"exp-1779950647203-4-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 696.25px;\" viewBox=\"0 0 696.25 162\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1779950647203-4-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1779950647203-4-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1779950647203-4-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1779950647203-4-0 .error-icon{fill:#552222;}#exp-1779950647203-4-0 .error-text{fill:#552222;stroke:#552222;}#exp-1779950647203-4-0 .edge-thickness-normal{stroke-width:1px;}#exp-1779950647203-4-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1779950647203-4-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1779950647203-4-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1779950647203-4-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1779950647203-4-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1779950647203-4-0 .marker{fill:#333333;stroke:#333333;}#exp-1779950647203-4-0 .marker — то обережніше слід її використовувати.</p>\n</div>\n\n","<h1>💾 Робота з контекстом у Function-ноді</h1>\n<p><strong>Головна ідея:</strong> Контекст має два методи: <code>get(key)</code> для читання та <code>set(key, value)</code> для запису. Це працює для всіх трьох рівнів.</p>\n<h2>🔷 Контекст ноди — лічильник звернень</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Зчитуємо поточне значення лічильника (або 0, якщо ще не задано)</span>\n<span class=\"hljs-keyword\">let</span> counter = context.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">\"counter\"</span>) ?? <span class=\"hljs-number\">0</span>;\ncounter = counter + <span class=\"hljs-number\">1</span>;\ncontext.<span class=\"hljs-title function_\">set</span>(<span class=\"hljs-string\">\"counter\"</span>, counter);\n\nmsg.<span class=\"hljs-property\">payload</span> = {\n  <span class=\"hljs-attr\">value</span>: msg.<span class=\"hljs-property\">payload</span>,\n  <span class=\"hljs-attr\">callNumber</span>: counter,\n};\n\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>📄 Контекст потоку — попереднє значення</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Порівнюємо поточне значення з попереднім</span>\n<span class=\"hljs-keyword\">const</span> current = msg.<span class=\"hljs-property\">payload</span>;\n<span class=\"hljs-keyword\">const</span> previous = flow.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">\"lastValue\"</span>);\n\nflow.<span class=\"hljs-title function_\">set</span>(<span class=\"hljs-string\">\"lastValue\"</span>, current);\n\n<span class=\"hljs-keyword\">if</span> (previous === <span class=\"hljs-literal\">undefined</span>) {\n  msg.<span class=\"hljs-property\">payload</span> = { current, <span class=\"hljs-attr\">delta</span>: <span class=\"hljs-number\">0</span>, <span class=\"hljs-attr\">isFirst</span>: <span class=\"hljs-literal\">true</span> };\n} <span class=\"hljs-keyword\">else</span> {\n  msg.<span class=\"hljs-property\">payload</span> = {\n    current,\n    previous,\n    <span class=\"hljs-attr\">delta</span>: current - previous,\n    <span class=\"hljs-attr\">isFirst</span>: <span class=\"hljs-literal\">false</span>,\n  };\n}\n\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>🌍 Глобальний контекст — конфігурація додатку</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Записуємо налаштування один раз (наприклад, у блоці On Start)</span>\n<span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-title function_\">set</span>(<span class=\"hljs-string\">\"thresholds\"</span>, {\n  <span class=\"hljs-attr\">tempMin</span>: -<span class=\"hljs-number\">20</span>,\n  <span class=\"hljs-attr\">tempMax</span>: <span class=\"hljs-number\">80</span>,\n  <span class=\"hljs-attr\">pressureMax</span>: <span class=\"hljs-number\">10</span>,\n});\n\n<span class=\"hljs-comment\">// Зчитуємо у будь-якій ноді будь-якого потоку</span>\n<span class=\"hljs-comment\">// Припустимо, msg.payload — числове значення температури</span>\n<span class=\"hljs-keyword\">const</span> limits = <span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">\"thresholds\"</span>);\n<span class=\"hljs-keyword\">const</span> temperature = msg.<span class=\"hljs-property\">payload</span>;\n\n<span class=\"hljs-keyword\">if</span> (temperature &gt; limits.<span class=\"hljs-property\">tempMax</span>) {\n  msg.<span class=\"hljs-property\">topic</span> = <span class=\"hljs-string\">\"alarm/temperature\"</span>;\n}\n\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"warning\"><strong>⚠️ Контекст у пам'яті</strong> <p>За замовчуванням контекст зберігається <strong>в оперативній пам'яті</strong>. При перезапуску Node-RED усі значення скидаються. Для постійного зберігання потрібно налаштувати <strong>persistent context</strong> у <code>settings.js</code> — але це тема для самостійного опрацювання.</p>\n</div>\n\n","<h1>🔀 Поглиблена робота зі Switch</h1>\n<p><strong>Головна ідея:</strong> Switch-нода — це декларативний спосіб розгалуження потоку без написання JavaScript. Її гнучкість дозволяє покривати більшість сценаріїв маршрутизації.</p>\n<h2>📊 Категорії правил у Switch</h2>\n<table>\n<thead>\n<tr>\n<th>Категорія</th>\n<th>Приклади умов</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🔢 Числові</td>\n<td><code>==</code>, <code>!=</code>, <code>&lt;</code>, <code>&lt;=</code>, <code>&gt;</code>, <code>&gt;=</code>, <code>is between</code></td>\n</tr>\n<tr>\n<td>📝 Рядкові</td>\n<td><code>contains</code>, <code>starts with</code>, <code>ends with</code>, regex</td>\n</tr>\n<tr>\n<td>❓ Тип значення</td>\n<td><code>is true</code>, <code>is false</code>, <code>is null</code>, <code>is empty</code></td>\n</tr>\n<tr>\n<td>🎯 Спеціальні</td>\n<td><code>has key</code>, <code>JSONata expression</code>, <code>otherwise</code></td>\n</tr>\n</tbody></table>\n<h2>💡 Приклад: маршрутизація за рівнем критичності</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    IN[&quot;📥 Вхідне msg&lt;br&gt;payload.severity&quot;] --&gt; SW[&quot;🔀 Switch&quot;]\n    SW --&gt;|&quot;= critical&quot;| OUT1[&quot;🚨 Виклик чергового&quot;]\n    SW --&gt;|&quot;= warning&quot;| OUT2[&quot;📧 Email&quot;]\n    SW --&gt;|&quot;= info&quot;| OUT3[&quot;💾 Лог&quot;]\n    SW --&gt;|&quot;otherwise&quot;| OUT4[&quot;🗑️ Ігнорування&quot;]\n    style IN fill:#e3f2fd,stroke:#1565c0\n    style SW fill:#fff9c4,stroke:#f9a825\n    style OUT1 fill:#fce4ec,stroke:#c2185b\n    style OUT2 fill:#fff3e0,stroke:#ef6c00\n    style OUT3 fill:#e8f5e9,stroke:#388e3c\n    style OUT4 fill:#f3e5f5,stroke:#7b1fa2\"><svg id=\"exp-1779950647224-7-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-wi ight=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📥 Вхідне msg<br>payload.severity</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779950647224-7-0-flowchart-SW-1\" data-look=\"classic\" transform=\"translate(284.7421875, 179)\"><rect class=\"basic label-container\" style=\"fill:#fff9c4 !important;stroke:#f9a825 !important\" x=\"-60.4609375\" y=\"-24\" width=\"120.921875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-36.4609375, -12)\"><rect></rect><foreignObject width=\"72.921875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🔀 Switch</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779950647224-7-0-flowchart-OUT1-3\" data-look=\"classic\" transform=\"translate(574.7890625, 32)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-104.2109375\" y=\"-24\" width=\"208.421875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-80.2109375, -12)\"><rect></rect><foreignObject width=\"160.421875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🚨 Виклик чергового</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779950647224-7-0-flowchart-OUT2-5\" data-look=\"classic\" transform=\"translate(574.7890625, 130)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-55.453125\" y=\"-24\" width=\"110.90625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-31.453125, -12)\"><rect></rect><foreignObject width=\"62.90625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📧 Email</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779950647224-7-0-flowchart-OUT3-7\" data-look=\"classic\" transform=\"translate(574.7890625, 228)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-49.7890625\" y=\"-24\" width=\"99.578125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-25.7890625, -12)\"><rect></rect><foreignObject width=\"51.578125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>💾 Лог</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779950647224-7-0-flowchart-OUT4-9\" data-look=\"classic\" transform=\"translate(574.7890625, 326)\"><rect class=\"basic label-container\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\" x=\"-81.8125\" y=\"-24\" width=\"163.625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-57.8125, -12)\"><rect></rect><foreignObject width=\"115.625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🗑️ Ігнорування</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779950647224-7-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779950647224-7-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>⚙️ Два режими роботи</h2>\n<table>\n<thead>\n<tr>\n<th>Режим</th>\n<th>Поведінка</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Stopping after first match</strong></td>\n<td>Перевіряє правила послідовно; зупиняється на першому, що спрацював</td>\n</tr>\n<tr>\n<td><strong>Checking all rules</strong></td>\n<td>Перевіряє всі правила; повідомлення може піти у кілька виходів водночас</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Otherwise як \"запобіжник\"</strong> <p>Завжди додавайте правило <strong>otherwise</strong> в кінці — воно ловить усе, що не підійшло під попередні умови. Без нього невідповідні повідомлення \"загубляться\" без сліду, і налагоджувати такий потік буде непросто.</p>\n</div>\n\n","<h1>📐 Switch на властивостях складних об'єктів</h1>\n<p><strong>Головна ідея:</strong> Switch працює не лише з <code>msg.payload</code>, а з будь-яким полем <code>msg</code>. Це дозволяє маршрутизувати за метаданими (<code>msg.topic</code>), параметрами запиту або власними прапорцями.</p>\n<h2>💡 Приклад: маршрутизація HTTP-запитів за методом</h2>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">Властивість: msg.req.method\n\nПравило 1: == GET   → потік читання\nПравило 2: == POST  → потік створення\nПравило 3: == PUT   → потік оновлення\nПравило 4: == DELETE → потік видалення</code></pre><h2>💡 Приклад: маршрутизація за типом датчика</h2>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">Властивість: msg.payload.type\n\nПравило 1: == \"temperature\"  → обробка температури\nПравило 2: == \"pressure\"     → обробка тиску\nПравило 3: == \"humidity\"     → обробка вологості\nПравило 4: otherwise          → лог невідомого типу</code></pre><h2>🎯 Доступ до вкладених полів</h2>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">msg.payload          → весь об'єкт\nmsg.payload.value    → конкретне поле\nmsg.payload.meta.id  → вкладене поле\nmsg.req.query.limit  → query-параметр HTTP-запиту</code></pre><div class=\"note\"><strong>📝 Switch проти Function: коли що обирати</strong> <p><strong>Switch</strong> — коли логіка проста і чітко декларативна (значення поля → вихід). <strong>Function</strong> — коли потрібні обчислення, складні умови з кількома полями або водночас і трансформація, і маршрутизація.</p>\n</div>\n\n","<h1>✏️ Change-нода: трансформація без коду</h1>\n<p><strong>Головна ідея:</strong> Change-нода змінює <code>msg</code> через послідовність декларативних операцій. Це найшвидший спосіб виконати типові задачі без написання JavaScript.</p>\n<h2>📋 Чотири операції Change</h2>\n<table>\n<thead>\n<tr>\n<th>Операція</th>\n<th>Що робить</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🟢 <strong>Set</strong></td>\n<td>Присвоїти полю значення</td>\n</tr>\n<tr>\n<td>🔄 <strong>Change</strong></td>\n<td>Замінити підрядок у значенні (працює як find-and-replace)</td>\n</tr>\n<tr>\n<td>↔️ <strong>Move</strong></td>\n<td>Перенести значення з одного поля в інше</td>\n</tr>\n<tr>\n<td>❌ <strong>Delete</strong></td>\n<td>Видалити поле з <code>msg</code></td>\n</tr>\n</tbody></table>\n<h2>💡 Приклад послідовності Change</h2>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">Операція 1: Set    msg.topic         = \"sensors/temperature\"\nОперація 2: Move   msg.payload.value → msg.payload\nОперація 3: Set    msg.timestamp     = Date.now()\nОперація 4: Delete msg.req</code></pre><h2>🎯 Звідки брати значення для Set</h2>\n<table>\n<thead>\n<tr>\n<th>Тип джерела</th>\n<th>Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>string</strong></td>\n<td>Звичайний текстовий рядок</td>\n</tr>\n<tr>\n<td><strong>number</strong></td>\n<td>Числове значення</td>\n</tr>\n<tr>\n<td><strong>boolean</strong></td>\n<td>true або false</td>\n</tr>\n<tr>\n<td><strong>JSON</strong></td>\n<td>Об'єкт або масив у JSON-форматі</td>\n</tr>\n<tr>\n<td><strong>msg.</strong></td>\n<td>Значення з іншого поля поточного <code>msg</code></td>\n</tr>\n<tr>\n<td><strong>flow.</strong></td>\n<td>Значення з контексту потоку</td>\n</tr>\n<tr>\n<td><strong>global.</strong></td>\n<td>Значення з глобального контексту</td>\n</tr>\n<tr>\n<td><strong>env</strong></td>\n<td>Змінна оточення (environment variable)</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Коли обрати Change замість Function</strong> <p>Якщо задача — це 2–3 простих присвоєння без обчислень, <strong>Change є нагляднішим вибором у редакторі</strong>: видно одразу, що саме змінюється. Function потрібен, коли є умови, цикли або складні вирази.</p>\n</div>\n\n","<h1>📝 Template-нода: формування текстових структур</h1>\n<p><strong>Головна ідея:</strong> Template-нода будує текст за шаблоном, підставляючи значення з <code>msg</code>. Це інструмент для формування HTML, SQL, повідомлень для месенджерів та інших текстових форматів.</p>\n<h2>🎨 Синтаксис Mustache</h2>\n<pre><code class=\"language-mustache\">{{payload.value}}       — підставити значення поля\n{{#payload.items}}      — початок циклу по масиву\n  {{name}}: {{price}}\n{{/payload.items}}      — кінець циклу\n{{^payload.error}}      — блок виконується, якщо поля немає\n  Все добре\n{{/payload.error}}</code></pre><h2>💡 Приклад 1: повідомлення для оператора</h2>\n<pre><code class=\"language-mustache\">🚨 Аварія на лінії {{payload.line}}\n\nДатчик:    {{payload.sensorId}}\nЗначення:  {{payload.value}} {{payload.unit}}\nПоріг:     {{payload.threshold}}\nЧас:       {{payload.timestamp}}\n\nПотрібна перевірка чергового.</code></pre><h2>💡 Приклад 2: формування HTML-сторінки</h2>\n<pre><code class=\"language-mustache\">&lt;!DOCTYPE html&gt;\n&lt;html&gt;\n&lt;head&gt;&lt;title&gt;Звіт за {{payload.date}}&lt;/title&gt;&lt;/head&gt;\n&lt;body&gt;\n  &lt;h1&gt;Показники датчиків&lt;/h1&gt;\n  &lt;ul&gt;\n    {{#payload.sensors}}\n    &lt;li&gt;{{id}}: {{value}}&lt;/li&gt;\n    {{/payload.sensors}}\n  &lt;/ul&gt;\n&lt;/body&gt;\n&lt;/html&gt;</code></pre><h2>💡 Приклад 3: SQL-запит з підстановкою</h2>\n<pre><code class=\"language-mustache\">INSERT INTO measurements (sensor_id, value, ts)\nVALUES ('{{payload.id}}', {{payload.value}}, '{{payload.timestamp}}');</code></pre><div class=\"warning\"><strong>⚠️ Template не виконує код</strong> <p>Template — це лише підстановка значень. Усередині неї не можна писати умови чи обчислення (окрім примітивних блоків Mustache). Для складної логіки спочатку обробіть дані у Function, а вже потім передайте у Template.</p>\n</div>\n\n","<h1>⚠️ Обробка помилок: нода Catch</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Catch</strong> — нода, що <strong>перехоплює помилки</strong>, які виникли в інших нодах поточного потоку. Без неї помилка лише записується у лог Node-RED і не запускає жодних дій.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> В АС не можна \"просто проігнорувати\" помилку. Catch дозволяє побудувати окрему гілку реакції на збої — від логування до автоматичного відновлення.</p>\n<h2>🔧 Як працює Catch</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    INJ[&quot;⚡ Inject&quot;] --&gt; FN[&quot;🔧 Function&lt;br&gt;можлива помилка&quot;]\n    FN --&gt; NEXT[&quot;✅ Звичайна гілка&quot;]\n    FN -.-&gt;|&quot;помилка&quot;| CATCH[&quot;🪤 Catch&quot;]\n    CATCH --&gt; LOG[&quot;📝 Логування&quot;]\n    CATCH --&gt; ALERT[&quot;📧 Сповіщення&quot;]\n    style INJ fill:#e3f2fd,stroke:#1565c0\n    style FN fill:#fff9c4,stroke:#f9a825\n    style NEXT fill:#e8f5e9,stroke:#388e3c\n    style CATCH fill:#fce4ec,stroke:#c2185b\n    style LOG fill:#fff3e0,stroke:#ef6c00\n    style ALERT fill:#fff3e0,stroke:#ef6c00\"><svg id=\"exp-1779950647236-11-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 881.125px;\" viewBox=\"0 0 881.125 211\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1779950647236-11-0{font-family:system-ui,-apple-system,Bl ign: center;\"><span class=\"nodeLabel \"><p>📝 Логування</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779950647236-11-0-flowchart-ALERT-9\" data-look=\"classic\" transform=\"translate(791.578125, 179)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-81.546875\" y=\"-24\" width=\"163.09375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-57.546875, -12)\"><rect></rect><foreignObject width=\"115.09375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📧 Сповіщення</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779950647236-11-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779950647236-11-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>⚙️ Налаштування Catch</h2>\n<table>\n<thead>\n<tr>\n<th>Параметр</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>Catch errors from all nodes</strong></td>\n<td>Перехоплення з усіх нод поточного потоку</td>\n</tr>\n<tr>\n<td><strong>Catch errors from selected nodes</strong></td>\n<td>Перехоплення лише з вибраних нод</td>\n</tr>\n<tr>\n<td><strong>Catch uncaught errors only</strong></td>\n<td>Перехоплення лише тих помилок, що не опрацьовані іншими Catch</td>\n</tr>\n</tbody></table>\n<h2>📋 Структура msg після Catch</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\">msg.<span class=\"hljs-property\">error</span> = {\n  <span class=\"hljs-attr\">message</span>: <span class=\"hljs-string\">\"Cannot read property 'value' of undefined\"</span>,\n  <span class=\"hljs-attr\">source</span>: {\n    <span class=\"hljs-attr\">id</span>: <span class=\"hljs-string\">\"abc123\"</span>, <span class=\"hljs-comment\">// ID ноди, де сталася помилка</span>\n    <span class=\"hljs-attr\">type</span>: <span class=\"hljs-string\">\"function\"</span>, <span class=\"hljs-comment\">// Тип ноди</span>\n    <span class=\"hljs-attr\">name</span>: <span class=\"hljs-string\">\"Обробка даних\"</span>, <span class=\"hljs-comment\">// Назва ноди</span>\n  },\n};\n<span class=\"hljs-comment\">// msg.payload — оригінальний payload, що спричинив помилку</span></code></pre><div class=\"tip\"><strong>💡 Свідоме генерування помилки</strong> <p>У Function-ноді можна явно сигналізувати про помилку викликом <code>node.error(\"Опис помилки\", msg)</code>. Це активує Catch і запустить гілку обробки збою — корисно для централізованої реакції на помилки прикладної логіки.</p>\n</div>\n\n","<h1>📊 Нода Status: моніторинг стану нод</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Status</strong> — нода, що <strong>реагує на зміни статусу</strong> інших нод. Статус — це маленький значок з текстом, що з'являється під нодою (наприклад, \"connected\", \"error\", \"передача в процесі\").</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Catch ловить <strong>помилки</strong>, Status стежить за <strong>загальним станом</strong>. Разом вони дають повну картину здоров'я системи.</p>\n<h2>🎨 Типові комбінації статусу</h2>\n<p>Статус задається об'єктом з трьох полів: <code>fill</code> (колір), <code>shape</code> (форма) та <code>text</code> (короткий текст до 20 символів). Допустимі значення: <code>fill</code> — <code>red</code>, <code>green</code>, <code>yellow</code>, <code>blue</code>, <code>grey</code>; <code>shape</code> — <code>ring</code> або <code>dot</code>.</p>\n<table>\n<thead>\n<tr>\n<th>Комбінація</th>\n<th>Типове призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🟢 <code>green</code> + <code>dot</code></td>\n<td>Активне підключення, успішна обробка</td>\n</tr>\n<tr>\n<td>🔴 <code>red</code> + <code>ring</code></td>\n<td>Втрачено зв'язок, помилка</td>\n</tr>\n<tr>\n<td>🟡 <code>yellow</code> + <code>ring</code></td>\n<td>Підключення в процесі</td>\n</tr>\n<tr>\n<td>🔵 <code>blue</code> + <code>dot</code></td>\n<td>Виконується тривала операція</td>\n</tr>\n<tr>\n<td>⚪ <code>grey</code> + <code>ring</code></td>\n<td>Нода не активна, очікування</td>\n</tr>\n</tbody></table>\n<p>Щоб <strong>очистити</strong> статус, нода передає порожній об'єкт <code>{}</code> — піктограма зникає під нодою.</p>\n<h2>💡 Приклад: лог змін стану підключення</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    MQTT[&quot;📡 MQTT In&lt;br&gt;підключення&quot;] --&gt; DATA[&quot;💾 Дані&quot;]\n    MQTT -.-&gt;|&quot;зміна статусу&quot;| STAT[&quot;📊 Status&quot;]\n    STAT --&gt; LOG[&quot;📝 Лог стану&quot;]\n    style MQTT fill:#e3f2fd,stroke:#1565c0\n    style DATA fill:#e8f5e9,stroke:#388e3c\n    style STAT fill:#fff9c4,stroke:#f9a825\n    style LOG fill:#fff3e0,stroke:#ef6c00\"><svg id=\"exp-1779950647246-12-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 632.828125px;\" viewBox=\"0 0 632.828125 162\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1779950647246-12-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1779950647246-12-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1779950647246-12-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1779950647246-12-0 .error-icon{fill:#552222;}#exp-1779950647246-12-0 .error-text{fill:#552222;stroke:#5 "><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📝 Template<br>аварія</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779950647253-13-0-flowchart-DBG-11\" data-look=\"classic\" transform=\"translate(1032, 166)\"><rect class=\"basic label-container\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\" x=\"-60.15625\" y=\"-24\" width=\"120.3125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-36.15625, -12)\"><rect></rect><foreignObject width=\"72.3125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🐞 Debug</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779950647253-13-0-flowchart-CATCH-17\" data-look=\"classic\" transform=\"translate(580.0078125, 398)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-57.484375\" y=\"-24\" width=\"114.96875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-33.484375, -12)\"><rect></rect><foreignObject width=\"66.96875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🪤 Catch</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1779950647253-13-0-flowchart-ERRLOG-19\" data-look=\"classic\" transform=\"translate(836.8671875, 398)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-84.9765625\" y=\"-24\" width=\"169.953125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-60.9765625, -12)\"><rect></rect><foreignObject width=\"121.953125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📝 Лог помилок</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1779950647253-13-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1779950647253-13-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>🔧 Код Function-ноди валідації</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Вхідні дані: msg.payload = { sensorId: \"T-101\", value: 67.3 }</span>\n<span class=\"hljs-keyword\">const</span> data = msg.<span class=\"hljs-property\">payload</span>;\n\n<span class=\"hljs-comment\">// 1. Валідація структури</span>\n<span class=\"hljs-keyword\">if</span> (!data || <span class=\"hljs-keyword\">typeof</span> data.<span class=\"hljs-property\">value</span> !== <span class=\"hljs-string\">\"number\"</span>) {\n  node.<span class=\"hljs-title function_\">error</span>(<span class=\"hljs-string\">\"Невалідна структура даних\"</span>, msg);\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-literal\">null</span>;\n}\n\n<span class=\"hljs-comment\">// 2. Робота з контекстом — зберігаємо попереднє значення</span>\n<span class=\"hljs-keyword\">const</span> previous = context.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">\"lastValue\"</span>) ?? data.<span class=\"hljs-property\">value</span>;\ncontext.<span class=\"hljs-title function_\">set</span>(<span class=\"hljs-string\">\"lastValue\"</span>, data.<span class=\"hljs-property\">value</span>);\n\n<span class=\"hljs-comment\">// 3. Класифікація за порогами</span>\n<span class=\"hljs-keyword\">const</span> limits = <span class=\"hljs-variable language_\">global</span>.<span class=\"hljs-title function_\">get</span>(<span class=\"hljs-string\">\"thresholds\"</span>) ?? { <span class=\"hljs-attr\">warn</span>: <span class=\"hljs-number\">60</span>, <span class=\"hljs-attr\">alarm</span>: <span class=\"hljs-number\">80</span> };\n<span class=\"hljs-keyword\">let</span> level = <span class=\"hljs-string\">\"normal\"</span>;\n<span class=\"hljs-keyword\">if</span> (data.<span class=\"hljs-property\">value</span> &gt;= limits.<span class=\"hljs-property\">alarm</span>) level = <span class=\"hljs-string\">\"alarm\"</span>;\n<span class=\"hljs-keyword\">else</span> <span class=\"hljs-keyword\">if</span> (data.<span class=\"hljs-property\">value</span> &gt;= limits.<span class=\"hljs-property\">warn</span>) level = <span class=\"hljs-string\">\"warning\"</span>;\n\n<span class=\"hljs-comment\">// 4. Формування результату</span>\nmsg.<span class=\"hljs-property\">payload</span> = {\n  <span class=\"hljs-attr\">sensorId</span>: data.<span class=\"hljs-property\">sensorId</span>,\n  <span class=\"hljs-attr\">value</span>: data.<span class=\"hljs-property\">value</span>,\n  <span class=\"hljs-attr\">delta</span>: <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-title function_\">round</span>((data.<span class=\"hljs-property\">value</span> - previous) * <span class=\"hljs-number\">10</span>) / <span class=\"hljs-number\">10</span>,\n  <span class=\"hljs-attr\">level</span>: level,\n  <span class=\"hljs-attr\">timestamp</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>().<span class=\"hljs-title function_\">toISOString</span>(),\n};\n\n<span class=\"hljs-comment\">// 5. Оновлення статусу самої ноди</span>\nnode.<span class=\"hljs-title function_\">status</span>({\n  <span class=\"hljs-attr\">fill</span>: level === <span class=\"hljs-string\">\"alarm\"</span> ? <span class=\"hljs-string\">\"red\"</span> : level === <span class=\"hljs-string\">\"warning\"</span> ? <span class=\"hljs-string\">\"yellow\"</span> : <span class=\"hljs-string\">\"green\"</span>,\n  <span class=\"hljs-attr\">shape</span>: <span class=\"hljs-string\">\"dot\"</span>,\n  <span class=\"hljs-attr\">text</span>: <span class=\"hljs-string\">`<span class=\"hljs-subst\">${data.sensorId}</span>: <span class=\"hljs-subst\">${data.value}</span>`</span>,\n});\n\n<span class=\"hljs-keyword\">return</span> msg;</code></pre>","<h1>📝 Шаблони відповідей для кожного рівня</h1>\n<p><strong>Головна ідея:</strong> Кожна гілка потоку (normal/warning/alarm) формує власне повідомлення через Template-ноду. Це робить вихідні дані однаково структурованими за форматом, але різними за змістом і тоном.</p>\n<h2>🟢 Template для рівня normal</h2>\n<pre><code class=\"language-mustache\">[OK] {{payload.sensorId}}\nПоточне значення: {{payload.value}}°C\nЗміна: {{payload.delta}}°C\nЧас: {{payload.timestamp}}</code></pre><h2>🟡 Template для рівня warning</h2>\n<pre><code class=\"language-mustache\">⚠️ ПОПЕРЕДЖЕННЯ: {{payload.sensorId}}\n\nЗначення {{payload.value}}°C перевищує робочий діапазон.\nРекомендована дія: перевірити роботу системи охолодження.\n\nЧас: {{payload.timestamp}}</code></pre><h2>🔴 Template для рівня alarm</h2>\n<pre><code class=\"language-mustache\">🚨🚨🚨 АВАРІЯ: {{payload.sensorId}}\n\nКритичне значення: {{payload.value}}°C\nЗміна за крок: {{payload.delta}}°C\n\nНегайно повідомити чергового!\nЧас: {{payload.timestamp}}</code></pre><h2>🛡️ Гілка обробки помилок</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Function-нода після Catch</span>\n<span class=\"hljs-keyword\">const</span> errInfo = msg.<span class=\"hljs-property\">error</span>;\n\n<span class=\"hljs-keyword\">const</span> logEntry = {\n  <span class=\"hljs-attr\">level</span>: <span class=\"hljs-string\">\"ERROR\"</span>,\n  <span class=\"hljs-attr\">timestamp</span>: <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Date</span>().<span class=\"hljs-title function_\">toISOString</span>(),\n  <span class=\"hljs-attr\">source</span>: errInfo.<span class=\"hljs-property\">source</span>.<span class=\"hljs-property\">name</span> || errInfo.<span class=\"hljs-property\">source</span>.<span class=\"hljs-property\">id</span>,\n  <span class=\"hljs-attr\">message</span>: errInfo.<span class=\"hljs-property\">message</span>,\n  <span class=\"hljs-attr\">originalPayload</span>: msg.<span class=\"hljs-property\">payload</span>,\n};\n\nmsg.<span class=\"hljs-property\">payload</span> = logEntry;\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"success\"><strong>✅ Результат</strong> <p>Один потік виконує валідацію, зберігає історію між викликами, маршрутизує дані за рівнем критичності, формує спеціалізовані повідомлення та обробляє виняткові ситуації. Усе це реалізовано засобами стандартних нод Node-RED, без необхідності розгортати окремий веб-сервер на Express чи іншому фреймворку.</p>\n</div>\n\n","<h1>⚠️ Типові помилки при роботі з логікою потоку</h1>\n<table>\n<thead>\n<tr>\n<th>Помилка</th>\n<th>Симптом</th>\n<th>Рішення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Забутий <code>return msg</code></td>\n<td>Потік \"обривається\" на Function</td>\n<td>Завжди завершувати функцію <code>return msg;</code></td>\n</tr>\n<tr>\n<td>Запис у <code>flow</code> замість <code>node</code> без потреби</td>\n<td>\"Загадковий\" обмін станом між нодами</td>\n<td>Обирати найменш широку область контексту</td>\n</tr>\n<tr>\n<td>Звернення до неіснуючого поля</td>\n<td><code>TypeError: Cannot read property of undefined</code></td>\n<td>Перевіряти існування поля перед використанням</td>\n</tr>\n<tr>\n<td>Switch без правила <code>otherwise</code></td>\n<td>Деякі повідомлення зникають без сліду</td>\n<td>Завжди додавати <code>otherwise</code> як запобіжник</td>\n</tr>\n<tr>\n<td>Зміна <code>msg</code> в одній гілці впливає на іншу</td>\n<td>\"Магічні\" зміни в Debug сусідньої гілки</td>\n<td>Використовувати <code>RED.util.cloneMessage(msg)</code></td>\n</tr>\n<tr>\n<td>Відсутність Catch у виробничому потоці</td>\n<td>Помилки лише записуються у системний лог без реакції</td>\n<td>Хоча б одна Catch-нода на кожному критичному потоці</td>\n</tr>\n<tr>\n<td>Контекст в пам'яті скидається при перезапуску</td>\n<td>Втрата стану після Deploy або рестарту</td>\n<td>Налаштувати persistent context або зберігати у файл/БД</td>\n</tr>\n</tbody></table>\n<div class=\"danger\"><strong>🚫 Спільне посилання на msg</strong> <p>Якщо нода має кілька вихідних з'єднань (наприклад, після Switch у режимі \"all rules\"), усі вони отримують <strong>посилання на той самий об'єкт <code>msg</code></strong>. Зміна <code>msg.payload</code> в одній гілці змінить його у всіх інших. Для незалежної модифікації обов'язково клонуйте: <code>const newMsg = RED.util.cloneMessage(msg);</code>.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>🔧 Function-нода</strong> виконує довільний JavaScript над <code>msg</code>; має блоки On Start, On Message, On Stop та може мати декілька виходів</p>\n</li>\n<li><p><strong>🗂️ Контекст</strong> — сховище стану між повідомленнями; три рівні (node / flow / global) з різною областю видимості</p>\n</li>\n<li><p><strong>🔀 Switch</strong> — декларативне розгалуження; підтримує числові, рядкові, типові та регулярні умови; правило <code>otherwise</code> обов'язкове</p>\n</li>\n<li><p><strong>✏️ Change</strong> — швидка модифікація <code>msg</code> без коду через операції Set, Move, Delete, Change</p>\n</li>\n<li><p><strong>📝 Template</strong> — формування текстових структур (HTML, SQL, повідомлення) за синтаксисом Mustache</p>\n</li>\n<li><p><strong>🪤 Catch</strong> — перехоплення помилок з нод потоку; без нього виняткові ситуації не запускають жодних дій</p>\n</li>\n<li><p><strong>📊 Status</strong> — реакція на зміни стану нод; разом з Catch формує повну картину \"здоров'я\" системи</p>\n</li>\n<li><p><strong>🛠️ Комплексний потік</strong> — поєднання валідації (Function), маршрутизації (Switch), форматування (Template) та обробки збоїв (Catch) дозволяє реалізувати виробничу логіку без класичного бекенду</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Чим відрізняються блоки On Start, On Message та On Stop у Function-ноді? У якому з них доречно ініціалізувати лічильник або з'єднання?</p>\n</li>\n<li><p>🤔 Як Function-нода може повернути повідомлення в один конкретний вихід з декількох? Який синтаксис використовується?</p>\n</li>\n<li><p>🤔 Які три рівні контексту існують у Node-RED? Наведіть приклад задачі, для якої доречний кожен рівень.</p>\n</li>\n<li><p>🤔 У чому різниця між режимами \"stopping after first match\" та \"checking all rules\" у ноді Switch? Коли який обирати?</p>\n</li>\n<li><p>🤔 Які чотири операції підтримує нода Change і чим Change відрізняється від Function за призначенням?</p>\n</li>\n<li><p>🤔 Який синтаксис використовується у Template-ноді? Як вставити значення вкладеного поля об'єкта та як ітерувати по масиву?</p>\n</li>\n<li><p>🤔 Що робить нода Catch і які поля з'являються у <code>msg</code> після її спрацювання?</p>\n</li>\n<li><p>🤔 Чим відрізняється призначення нод Catch та Status? Чи можуть вони працювати разом у одному потоці?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Логіка потоку</td>\n<td>Flow Logic</td>\n<td>Сукупність нод, що обробляють та маршрутизують повідомлення</td>\n</tr>\n<tr>\n<td>Контекст</td>\n<td>Context</td>\n<td>Сховище стану, що зберігається між надходженнями повідомлень</td>\n</tr>\n<tr>\n<td>Контекст ноди</td>\n<td>Node Context</td>\n<td>Контекст, доступний лише в межах однієї ноди</td>\n</tr>\n<tr>\n<td>Контекст потоку</td>\n<td>Flow Context</td>\n<td>Контекст, доступний усім нодам однієї вкладки</td>\n</tr>\n<tr>\n<td>Глобальний контекст</td>\n<td>Global Context</td>\n<td>Контекст, доступний усім потокам runtime</td>\n</tr>\n<tr>\n<td>Декларативність</td>\n<td>Declarative Style</td>\n<td>Опис \"що зробити\", без явного \"як\" (приклад — Change, Switch)</td>\n</tr>\n<tr>\n<td>Розгалуження</td>\n<td>Branching</td>\n<td>Маршрутизація <code>msg</code> на різні гілки потоку за умовами</td>\n</tr>\n<tr>\n<td>Шаблон</td>\n<td>Template</td>\n<td>Текст із плейсхолдерами, які замінюються значеннями з <code>msg</code></td>\n</tr>\n<tr>\n<td>Mustache</td>\n<td>Mustache</td>\n<td>Мова шаблонів, що використовується у Template-ноді</td>\n</tr>\n<tr>\n<td>Перехоплення помилок</td>\n<td>Error Handling</td>\n<td>Реакція на виняткові ситуації за допомогою ноди Catch</td>\n</tr>\n<tr>\n<td>Статус ноди</td>\n<td>Node Status</td>\n<td>Текст і піктограма під нодою, що відображає її поточний стан</td>\n</tr>\n<tr>\n<td>Клонування msg</td>\n<td>Message Cloning</td>\n<td>Створення незалежної копії об'єкта <code>msg</code> для безпечної модифікації</td>\n</tr>\n<tr>\n<td>Виняткова ситуація</td>\n<td>Exception</td>\n<td>Подія, що порушує нормальний хід обробки повідомлення</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>АС</td>\n<td>Automated System</td>\n<td>Автоматизована система</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>JSON</td>\n<td>JavaScript Object Notation</td>\n<td>Об'єктна нотація JavaScript</td>\n</tr>\n<tr>\n<td>HTTP</td>\n<td>HyperText Transfer Protocol</td>\n<td>Протокол передачі гіпертексту</td>\n</tr>\n<tr>\n<td>ID</td>\n<td>Identifier</td>\n<td>Унікальний ідентифікатор</td>\n</tr>\n<tr>\n<td>SQL</td>\n<td>Structured Query Language</td>\n<td>Мова структурованих запитів</td>\n</tr>\n<tr>\n<td>HTML</td>\n<td>HyperText Markup Language</td>\n<td>Мова розмітки гіпертексту</td>\n</tr>\n<tr>\n<td>HMI</td>\n<td>Human-Machine Interface</td>\n<td>Людино-машинний інтерфейс</td>\n</tr>\n<tr>\n<td>MQTT</td>\n<td>Message Queuing Telemetry Transport</td>\n<td>Протокол телеметричної передачі повідомлень</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
