#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 20</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>Node-RED Dashboard: побудова HMI</h1>\n<p><strong>Web-технології в автоматизованих системах</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🖥️ Людино-машинний інтерфейс (HMI) — призначення та роль в АС</li>\n<li>🌐 Веб-HMI та місце платформи Node-RED Dashboard</li>\n<li>🏗️ Архітектура Dashboard: ієрархія «база — сторінка — група — віджет»</li>\n<li>📦 Встановлення Dashboard-палітри</li>\n<li>🔁 Як віджети обмінюються даними через <code>msg.payload</code></li>\n<li>📊 Віджети відображення: <code>ui-text</code>, <code>ui-gauge</code>, <code>ui-chart</code></li>\n<li>🎛️ Віджети керування: <code>ui-button</code>, <code>ui-switch</code>, <code>ui-slider</code></li>\n<li>🧩 Компоновка інтерфейсу: сторінки, групи та розкладки</li>\n<li>⚡ Інтерактивність та реакція на дані в реальному часі</li>\n<li>🏭 Практичний приклад: HMI моніторингу температури</li>\n</ol>\n","<h1>🖥️ HMI — людино-машинний інтерфейс</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>HMI</strong> (Human-Machine Interface / людино-машинний інтерфейс) — програмно-апаратний засіб, що забезпечує взаємодію людини-оператора з автоматизованою системою: відображає поточний стан процесу та приймає команди керування.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> HMI перетворює потоки сирих даних від датчиків та контролерів на зрозумілу візуальну картину, а дії оператора — на команди для системи.</p>\n<h2>🎯 Типові завдання HMI</h2>\n<table>\n<thead>\n<tr>\n<th>Завдання</th>\n<th>Приклад в АС</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>📈 Моніторинг</td>\n<td>Відображення температури, тиску, рівня заповнення</td>\n</tr>\n<tr>\n<td>🚦 Сигналізація</td>\n<td>Індикація аварій та виходу параметрів за межі</td>\n</tr>\n<tr>\n<td>🎛️ Керування</td>\n<td>Запуск/зупинка обладнання, зміна уставок</td>\n</tr>\n<tr>\n<td>🗂️ Архівування</td>\n<td>Накопичення історії значень для аналізу</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Контекст</strong> <p>Класично HMI реалізовували на спеціалізованих операторських панелях та SCADA-системах. Сьогодні дедалі частіше інтерфейс оператора будують як <strong>веб-додаток</strong>, доступний з будь-якого пристрою через браузер — це і є предмет цієї лекції.</p>\n</div>\n\n","<h1>🌐 Веб-HMI та платформа Node-RED Dashboard</h1>\n<p><strong>Головна ідея:</strong> Node-RED Dashboard — це набір вузлів, що дозволяють побудувати повноцінний веб-інтерфейс безпосередньо у середовищі Node-RED, не пишучи окремий клієнтський застосунок вручну.</p>\n<h2>⚖️ Чому веб-HMI</h2>\n<ul>\n<li>🌍 <strong>Доступність</strong> — інтерфейс відкривається у звичайному браузері, без встановлення спеціального ПЗ</li>\n<li>🔄 <strong>Єдине середовище</strong> — логіка обробки даних і візуалізація живуть в одному потоці</li>\n<li>📱 <strong>Адаптивність</strong> — той самий дашборд працює на моніторі диспетчера і на смартфоні</li>\n</ul>\n<div class=\"warning\"><strong>⚠️ Дві версії Dashboard</strong> <p>Існує <strong>застарілий</strong> пакет <code>node-red-dashboard</code> (Dashboard 1.0), що ґрунтувався на AngularJS і більше не підтримується. Актуальною є <strong>FlowFuse Dashboard</strong> (Dashboard 2.0) — пакет <code>@flowfuse/node-red-dashboard</code>, побудований на Vue.js. У цій лекції використовується саме версія 2.0.</p>\n</div>\n\n\n\n\n<div class=\"mermaid\" data-source=\"graph LR\n    SENSOR[&quot;📟 Датчики / контролери&quot;] --&gt;|&quot;дані&quot;| NR[&quot;⚙️ Node-RED: обробка потоку&quot;]\n    NR --&gt;|&quot;візуалізація&quot;| DASH[&quot;🖥️ Dashboard у браузері&quot;]\n    DASH --&gt;|&quot;команди оператора&quot;| NR\n    style SENSOR fill:#e3f2fd,stroke:#1565c0\n    style NR fill:#fff3e0,stroke:#ef6c00\n    style DASH fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1780552259729-3-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1019.53125px;\" viewBox=\"0 0 1019.53125 88\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1780552259729-3-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1780552259729-3-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1780552259729-3-0 .edge-ani ne-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🔘 ui-button</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552259768-4-0-flowchart-W4-13\" data-look=\"classic\" transform=\"translate(616.60546875, 422)\"><rect class=\"basic label-container\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\" x=\"-63.82421875\" y=\"-24\" width=\"127.6484375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-39.82421875, -12)\"><rect></rect><foreignObject width=\"79.6484375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🎚️ ui-slider</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1780552259768-4-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1780552259768-4-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<table>\n<thead>\n<tr>\n<th>Рівень</th>\n<th>Вузол</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🌐 База</td>\n<td><code>ui-base</code></td>\n<td>Базовий маршрут дашборду (наприклад, <code>/dashboard</code>)</td>\n</tr>\n<tr>\n<td>📄 Сторінка</td>\n<td><code>ui-page</code></td>\n<td>Окрема навігаційна сторінка; має власну тему</td>\n</tr>\n<tr>\n<td>🗂️ Група</td>\n<td><code>ui-group</code></td>\n<td>Контейнер, що групує віджети на сторінці</td>\n</tr>\n<tr>\n<td>🧩 Віджет</td>\n<td><code>ui-*</code></td>\n<td>Окремий елемент: індикатор, кнопка, графік</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Автоматичне створення</strong> <p>Коли ви перетягуєте перший віджет у потік, редактор сам пропонує створити для нього групу, сторінку, тему та базу. Надалі цю структуру зручно редагувати на бічній панелі <strong>Dashboard 2.0</strong> у редакторі.</p>\n</div>\n\n","<h1>📦 Встановлення Dashboard-палітри</h1>\n<p><strong>Головна ідея:</strong> Dashboard не входить до ядра Node-RED — його встановлюють як додаткову палітру вузлів через менеджер палітри.</p>\n<h2>🔧 Послідовність дій</h2>\n<ol>\n<li>Відкрити меню (☰) у правому верхньому куті редактора</li>\n<li>Обрати <strong>Manage palette</strong> (Керування палітрою)</li>\n<li>Перейти на вкладку <strong>Install</strong> (Встановлення)</li>\n<li>У полі пошуку ввести <code>node-red-dashboard</code></li>\n<li>Встановити пакет <strong><code>@flowfuse/node-red-dashboard</code></strong></li>\n</ol>\n<div class=\"danger\"><strong>🚫 Уважно з вибором пакета</strong> <p>У результатах пошуку буде кілька збігів. Обирайте саме <code>@flowfuse/node-red-dashboard</code>, а <strong>не</strong> застарілий <code>node-red-dashboard</code> від проєкту <code>node-red</code>. Помилковий вибір призведе до встановлення непідтримуваної версії 1.0.</p>\n</div>\n\n\n\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">Manage palette → Install → \"node-red-dashboard\"\n   ✅ @flowfuse/node-red-dashboard   (актуальна версія 2.0)\n   ❌ node-red-dashboard             (застаріла, deprecated)</code></pre><div class=\"note\"><strong>📝 Результат</strong> <p>Після встановлення у лівій палітрі редактора з'являться нові вузли з префіксом <code>ui-</code>: конфігураційні (<code>ui-base</code>, <code>ui-page</code>, <code>ui-group</code>) та десятки віджетів. У редакторі також додається бічна панель <strong>Dashboard 2.0</strong> для керування сторінками, групами й темами. Дашборд буде доступний за адресою <code>http://localhost:1880/dashboard</code>.</p>\n</div>\n\n","<h1>🔁 Як віджети обмінюються даними</h1>\n<p><strong>Головна ідея:</strong> взаємодія з усіма віджетами зводиться до знайомого об'єкта <code>msg</code>: значення передаються через властивість <code>msg.payload</code>. За напрямком обміну віджети поділяють на дві групи.</p>\n<h2>↔️ Дві категорії віджетів</h2>\n<table>\n<thead>\n<tr>\n<th>Категорія</th>\n<th>Напрям даних</th>\n<th>Приклади</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>📥 Відображення</td>\n<td>Потік → віджет (вхід <code>msg.payload</code>)</td>\n<td><code>ui-text</code>, <code>ui-gauge</code>, <code>ui-chart</code></td>\n</tr>\n<tr>\n<td>📤 Керування</td>\n<td>Віджет → потік (вихід <code>msg.payload</code>)</td>\n<td><code>ui-button</code>, <code>ui-switch</code>, <code>ui-slider</code></td>\n</tr>\n</tbody></table>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    SRC[&quot;🌡️ Джерело даних&lt;br&gt;Inject / Function&quot;] --&gt;|&quot;msg.payload&quot;| WID[&quot;📊 Віджет відображення&lt;br&gt;ui-gauge&quot;]\n    USER[&quot;👤 Користувач&quot;] --&gt;|&quot;клік / рух&quot;| INP[&quot;🎛️ Віджет керування&lt;br&gt;ui-button / ui-slider&quot;]\n    INP --&gt;|&quot;msg.payload&quot;| FLOW[&quot;⚙️ Подальша логіка потоку&quot;]\n    style SRC fill:#e3f2fd,stroke:#1565c0\n    style WID fill:#e8f5e9,stroke:#388e3c\n    style USER fill:#fff9c4,stroke:#f9a825\n    style INP fill:#fff3e0,stroke:#ef6c00\n    style FLOW fill:#f3e5f5,stroke:#7b1fa2\"><svg id=\"exp-1780552259788-6-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 974.203125px;\" viewBox=\"0 0 974.203125 210\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1780552259788-6-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1780552259788-6-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1780552259788-6-0 .edge-animation-fast{stroke-dasharray:9,5!important ext-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"><tspan font-style=\"normal\" class=\"text-inner-tspan\" font-weight=\"normal\">клік</tspan><tspan font-style=\"normal\" class=\"text-inner-tspan\" font-weight=\"normal\"> /</tspan><tspan font-style=\"normal\" class=\"text-inner-tspan\" font-weight=\"normal\"> рух</tspan></tspan></text></g></g></g><g class=\"edgeLabel\" transform=\"translate(644.9609375, 166)\"><g class=\"label\" data-id=\"L_INP_FLOW_0\" transform=\"translate(0, -10)\"><g><rect class=\"background\" style=\"\" x=\"-48.2421875\" y=\"-1.5\" width=\"96.484375\" height=\"23\"></rect><text y=\"-10.1\" text-anchor=\"middle\" style=\"\"><tspan class=\"text-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"><tspan font-style=\"normal\" class=\"text-inner-tspan\" font-weight=\"normal\">msg.payload</tspan></tspan></text></g></g></g></g><g class=\"nodes\"><g class=\"node default  \" id=\"exp-1780552259788-6-0-flowchart-SRC-0\" data-look=\"classic\" transform=\"translate(101.3515625, 44)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-93.3515625\" y=\"-36\" width=\"186.703125\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-69.3515625, -24)\"><rect></rect><foreignObject width=\"138.703125\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🌡️ Джерело даних<br>Inject / Function</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552259788-6-0-flowchart-WID-1\" data-look=\"classic\" transform=\"translate(456.453125, 44)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-115.265625\" y=\"-36\" width=\"230.53125\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-91.265625, -24)\"><rect></rect><foreignObject width=\"182.53125\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📊 Віджет відображення<br>ui-gauge</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552259788-6-0-flowchart-USER-2\" data-look=\"classic\" transform=\"translate(101.3515625, 166)\"><rect class=\"basic label-container\" style=\"fill:#fff9c4 !important;stroke:#f9a825 !important\" x=\"-78.3671875\" y=\"-24\" width=\"156.734375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-54.3671875, -12)\"><rect></rect><foreignObject width=\"108.734375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>👤 Користувач</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552259788-6-0-flowchart-INP-3\" data-look=\"classic\" transform=\"translate(456.453125, 166)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-101.3828125\" y=\"-36\" width=\"202.765625\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-77.3828125, -24)\"><rect></rect><foreignObject width=\"154.765625\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🎛️ Віджет керування<br>ui-button / ui-slider</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552259788-6-0-flowchart-FLOW-5\" data-look=\"classic\" transform=\"translate(842.203125, 166)\"><rect class=\"basic label-container\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\" x=\"-124\" y=\"-36\" width=\"248\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-100, -24)\"><rect></rect><foreignObject width=\"200\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>⚙️ Подальша логіка потоку</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1780552259788-6-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1780552259788-6-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<div class=\"tip\"><strong>💡 Вже знайомі інструменти</strong> <p>Щоб «годувати» віджети даними, ви застосовуєте вже відомі вузли: <code>Inject</code> для генерації подій за таймером, <code>Function</code> для формування значень, <code>Change</code> для трансформації <code>msg.payload</code>, <code>Switch</code> для розгалуження. Dashboard лише додає до них візуальний шар.</p>\n</div>\n\n","<h1>📊 Віджети відображення: <code>ui-text</code> та <code>ui-gauge</code></h1>\n<p><strong>Головна ідея:</strong> найпростіші засоби індикації — текстове поле та шкальний індикатор; обидва оновлюються щоразу, коли отримують нове значення в <code>msg.payload</code>.</p>\n<h2>📝 <code>ui-text</code> — текстовий показник</h2>\n<p>Відображає <strong>нередаговане</strong> значення поряд із підписом (label). Кожне отримане <code>msg.payload</code> оновлює текст.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Function: формуємо значення для текстового поля</span>\nmsg.<span class=\"hljs-property\">payload</span> = <span class=\"hljs-string\">\"Лінія А: працює\"</span>;\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>🌡️ <code>ui-gauge</code> — шкальний індикатор</h2>\n<p>Приймає <strong>числове</strong> значення в <code>msg.payload</code> і відображає його на шкалі (півколо, чверть, стрілка тощо). Для коректного масштабу задають мінімум і максимум у налаштуваннях.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Function: симуляція показника датчика температури (°C)</span>\n<span class=\"hljs-keyword\">const</span> temperature = <span class=\"hljs-number\">20</span> + <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-title function_\">random</span>() * <span class=\"hljs-number\">10</span>;       <span class=\"hljs-comment\">// діапазон 20–30</span>\nmsg.<span class=\"hljs-property\">payload</span> = <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-title function_\">round</span>(temperature * <span class=\"hljs-number\">10</span>) / <span class=\"hljs-number\">10</span>;    <span class=\"hljs-comment\">// округлення до 0.1</span>\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"warning\"><strong>⚠️ Тип даних має значення</strong> <p><code>ui-gauge</code> очікує саме <strong>число</strong>. Якщо передати рядок або об'єкт, індикатор не оновиться або покаже некоректне значення. Перевіряйте тип <code>msg.payload</code> перед подачею на шкалу.</p>\n</div>\n\n","<h1>📈 Віджет <code>ui-chart</code> — графіки</h1>\n<p><strong>Головна ідея:</strong> <code>ui-chart</code> будує лінійні, точкові та стовпчикові графіки, накопичуючи точки даних із вхідних повідомлень — це основний інструмент відображення динаміки процесу.</p>\n<h2>⚙️ Ключові налаштування</h2>\n<table>\n<thead>\n<tr>\n<th>Параметр</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Chart Type</td>\n<td>Тип графіка: <code>Line</code> (лінійний), <code>Scatter</code> (точковий), <code>Bar</code> (стовпчиковий)</td>\n</tr>\n<tr>\n<td>X-Axis Type</td>\n<td>Тип осі X: <code>Timescale</code> (час), <code>Linear</code> (числа), <code>Categorical</code> (категорії)</td>\n</tr>\n<tr>\n<td>X / Y</td>\n<td>Звідки брати значення для осей (поле <code>msg</code>, ключ об'єкта, мітка часу)</td>\n</tr>\n</tbody></table>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Function: точка для графіка в реальному часі</span>\n<span class=\"hljs-comment\">// За типу осі X = Timescale час підставляється автоматично</span>\nmsg.<span class=\"hljs-property\">payload</span> = <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-title function_\">round</span>((<span class=\"hljs-number\">20</span> + <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-title function_\">random</span>() * <span class=\"hljs-number\">10</span>) * <span class=\"hljs-number\">10</span>) / <span class=\"hljs-number\">10</span>;\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"tip\"><strong>💡 Очищення графіка</strong> <p>Щоб <strong>повністю стерти</strong> дані з графіка, надішліть на його вхід порожній масив: <code>msg.payload = []</code>. Часто для цього до <code>ui-chart</code> під'єднують окрему кнопку <code>ui-button</code>, налаштовану на відправлення <code>[]</code>.</p>\n</div>\n\n\n\n\n\n<div class=\"danger\"><strong>🚫 Нескінченне накопичення</strong> <p>Якщо не обмежити кількість точок або часовий діапазон у налаштуваннях графіка, дані накопичуватимуться безмежно, поступово сповільнюючи браузер. Завжди задавайте часове вікно (наприклад, останні 10 хвилин) для потоків реального часу.</p>\n</div>\n\n","<h1>🎛️ Віджети керування: <code>ui-button</code> та <code>ui-switch</code></h1>\n<p><strong>Головна ідея:</strong> елементи керування генерують повідомлення у відповідь на дію користувача — їхній вихід під'єднують до подальшої логіки потоку.</p>\n<h2>🔘 <code>ui-button</code> — кнопка</h2>\n<p>Під час натискання відправляє у потік заздалегідь налаштований <code>msg.payload</code> (наприклад, рядок <code>\"START\"</code> або число).</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Function після кнопки: реагуємо на команду</span>\n<span class=\"hljs-keyword\">if</span> (msg.<span class=\"hljs-property\">payload</span> === <span class=\"hljs-string\">\"START\"</span>) {\n    msg.<span class=\"hljs-property\">payload</span> = <span class=\"hljs-string\">\"Команду запуску прийнято\"</span>;\n}\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>🔀 <code>ui-switch</code> — перемикач</h2>\n<p>Має два стани і відправляє різні значення для увімкнення та вимкнення (за замовчуванням <code>true</code> / <code>false</code>). Стан перемикача можна задати й програмно, надіславши на його вхід <code>msg.payload</code>.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Function після перемикача: формуємо текст стану для ui-text</span>\nmsg.<span class=\"hljs-property\">payload</span> = msg.<span class=\"hljs-property\">payload</span> === <span class=\"hljs-literal\">true</span> ? <span class=\"hljs-string\">\"Насос: УВІМКНЕНО\"</span> : <span class=\"hljs-string\">\"Насос: ВИМКНЕНО\"</span>;\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"note\"><strong>📝 Двонаправленість</strong> <p><code>ui-switch</code> працює в обидва боки: користувач змінює стан кліком, але й сам потік може встановити стан перемикача. Це зручно, коли реальний стан обладнання має відображатися в інтерфейсі автоматично.</p>\n</div>\n\n","<h1>🎚️ Віджети керування: <code>ui-slider</code> та введення</h1>\n<p><strong>Головна ідея:</strong> повзунок і поля введення дозволяють оператору задавати числові та текстові параметри (уставки, пороги, назви).</p>\n<h2>🎚️ <code>ui-slider</code> — повзунок</h2>\n<p>Відправляє числове значення в <code>msg.payload</code> щоразу, коли користувач змінює положення. Значення можна задати й програмно — надіславши число на вхід.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Function після повзунка: повзунок задає уставку яскравості (0–100)</span>\nmsg.<span class=\"hljs-property\">payload</span> = <span class=\"hljs-string\">`Уставка: <span class=\"hljs-subst\">${msg.payload}</span>%`</span>;\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><h2>⌨️ Інші елементи введення</h2>\n<table>\n<thead>\n<tr>\n<th>Віджет</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>ui-text-input</code></td>\n<td>Однорядкове текстове поле введення</td>\n</tr>\n<tr>\n<td><code>ui-number-input</code></td>\n<td>Введення числового значення</td>\n</tr>\n<tr>\n<td><code>ui-dropdown</code></td>\n<td>Випадаючий список варіантів</td>\n</tr>\n<tr>\n<td><code>ui-form</code></td>\n<td>Форма з кількох полів; на відправлення дає об'єкт <code>msg.payload</code></td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Зв'язування віджетів напряму</strong> <p>Вихід одного віджета можна під'єднати до входу іншого без проміжної логіки. Наприклад, <code>ui-slider</code> → <code>ui-gauge</code>: рух повзунка одразу відображається на шкалі. Це найпростіший спосіб побудувати інтерактивний елемент.</p>\n</div>\n\n","<h1>🧩 Компоновка: сторінки та групи</h1>\n<p><strong>Головна ідея:</strong> зрозумілий інтерфейс будується не лише з віджетів, а й із продуманого їх розташування за сторінками та групами.</p>\n<h2>📄 Сторінки (<code>ui-page</code>)</h2>\n<ul>\n<li>Кожна сторінка має <strong>власний маршрут</strong> (<code>/dashboard/monitoring</code>, <code>/dashboard/control</code>)</li>\n<li>Між сторінками користувач переходить через бічну навігацію</li>\n<li>Сторінка може мати <strong>окрему тему</strong> оформлення</li>\n</ul>\n<h2>🗂️ Групи (<code>ui-group</code>)</h2>\n<ul>\n<li>Об'єднують логічно пов'язані віджети в єдиний візуальний блок із заголовком</li>\n<li>Кожному віджету <strong>обов'язково</strong> призначається група — інакше він не відобразиться</li>\n<li>Ширина групи задається в умовних колонках (від 1 до 12 у сітковій розкладці)</li>\n</ul>\n<div class=\"danger\"><strong>🚫 Поширена помилка</strong> <p>Найчастіша причина «зниклого» віджета — він <strong>не прив'язаний до групи</strong>. Якщо після розгортання елемент не видно на дашборді, перевірте поле <strong>Group</strong> у його налаштуваннях.</p>\n</div>\n\n\n\n\n\n<div class=\"note\"><strong>📝 Приклад структури</strong> <p>Сторінка «Моніторинг» → група «Температура» (<code>ui-gauge</code> + <code>ui-chart</code>) і група «Статус» (<code>ui-text</code>). Сторінка «Керування» → група «Обладнання» (<code>ui-switch</code> + <code>ui-button</code> + <code>ui-slider</code>).</p>\n</div>\n\n","<h1>📐 Розкладки сторінки та навігація</h1>\n<p><strong>Головна ідея:</strong> Dashboard пропонує кілька типів автоматичної розкладки груп на сторінці та режимів бічної навігації — від них залежить адаптивність інтерфейсу.</p>\n<h2>🗺️ Типи розкладки (Page Layout)</h2>\n<table>\n<thead>\n<tr>\n<th>Розкладка</th>\n<th>Поведінка</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>Grid</code></td>\n<td>Сітка з 12 колонок, повністю адаптивна (за замовчуванням)</td>\n</tr>\n<tr>\n<td><code>Fixed</code></td>\n<td>Кожен елемент має фіксовану ширину незалежно від екрана</td>\n</tr>\n<tr>\n<td><code>Notebook</code></td>\n<td>Колонка завширшки до 1024px, вирівняна по центру (для звітів)</td>\n</tr>\n<tr>\n<td><code>Tabs</code></td>\n<td>Контент розкладається за вкладками всередині однієї сторінки</td>\n</tr>\n</tbody></table>\n<h2>🧭 Режими бічної навігації</h2>\n<ul>\n<li><strong>Collapsing</strong> — панель згортається, контент підлаштовується під ширину (за замовчуванням)</li>\n<li><strong>Fixed</strong> — панель завжди розгорнута</li>\n<li><strong>Collapse to Icons</strong> — у згорнутому стані лишаються лише іконки сторінок</li>\n<li><strong>Appear over Content</strong> — панель відкривається поверх контенту як накладка</li>\n<li><strong>Always Hide</strong> — панель прихована, навігація через вузол <code>ui-control</code></li>\n</ul>\n<div class=\"tip\"><strong>💡 Адаптивність «з коробки»</strong> <p>Розкладка <code>Grid</code> сама перерозподіляє групи під розмір екрана: те, що на моніторі диспетчера лежить у три колонки, на смартфоні автоматично стане одним стовпчиком. Це звільняє від ручного написання media queries.</p>\n</div>\n\n","<h1>⚡ Інтерактивність та реакція в реальному часі</h1>\n<p><strong>Головна ідея:</strong> Dashboard підтримує постійне з'єднання з браузером, тому нові дані з'являються на екрані миттєво, без перезавантаження сторінки.</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    DEV[&quot;📟 Пристрій / API&quot;] --&gt;|&quot;нові дані&quot;| NR[&quot;⚙️ Node-RED runtime&quot;]\n    NR --&gt;|&quot;WebSocket&quot;| UI[&quot;🖥️ Браузер: Dashboard&quot;]\n    UI --&gt;|&quot;дія користувача&quot;| NR\n    style DEV fill:#e3f2fd,stroke:#1565c0\n    style NR fill:#fff3e0,stroke:#ef6c00\n    style UI fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1780552259806-13-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 909.96875px;\" viewBox=\"0 0 909.96875 81.9977798461914\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1780552259806-13-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1780552259806-13-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1780552259806-13-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1780552259806-13-0 .error-icon{fill:#552222;}#exp-1780552259806-13-0 .error-text{fill:#552222;stroke:#552222;}#exp-1780552259806-13-0 .edge-thickness-normal{st \" text-anchor=\"middle\" style=\"\"><tspan class=\"text-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"><tspan font-style=\"normal\" class=\"text-inner-tspan\" font-weight=\"normal\">WebSocket</tspan></tspan></text></g></g></g><g class=\"edgeLabel\" transform=\"translate(595.40226, 62.49778)\"><g class=\"label\" data-id=\"L_UI_NR_0\" transform=\"translate(0, -10)\"><g><rect class=\"background\" style=\"\" x=\"-62.6015625\" y=\"-1.5\" width=\"125.203125\" height=\"23\"></rect><text y=\"-10.1\" text-anchor=\"middle\" style=\"\"><tspan class=\"text-outer-tspan row\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\" text-anchor=\"middle\"><tspan font-style=\"normal\" class=\"text-inner-tspan\" font-weight=\"normal\">дія</tspan><tspan font-style=\"normal\" class=\"text-inner-tspan\" font-weight=\"normal\"> користувача</tspan></tspan></text></g></g></g></g><g class=\"nodes\"><g class=\"node default  \" id=\"exp-1780552259806-13-0-flowchart-DEV-0\" data-look=\"classic\" transform=\"translate(95.44140625, 41)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-87.44140625\" y=\"-24\" width=\"174.8828125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-63.44140625, -12)\"><rect></rect><foreignObject width=\"126.8828125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📟 Пристрій / API</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552259806-13-0-flowchart-NR-1\" data-look=\"classic\" transform=\"translate(405.453125, 41)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-102.3671875\" y=\"-24\" width=\"204.734375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-78.3671875, -12)\"><rect></rect><foreignObject width=\"156.734375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>⚙️ Node-RED runtime</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552259806-13-0-flowchart-UI-3\" data-look=\"classic\" transform=\"translate(792.49609375, 41)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-109.47265625\" y=\"-24\" width=\"218.9453125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-85.47265625, -12)\"><rect></rect><foreignObject width=\"170.9453125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🖥️ Браузер: Dashboard</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1780552259806-13-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1780552259806-13-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>🔗 Єдине джерело істини (Single Source of Truth)</h2>\n<p>За замовчуванням усі підключені клієнти бачать <strong>однакові</strong> дані. Якщо один оператор пересуне повзунок, це значення синхронізується на дашбордах усіх інших користувачів. Така модель природно підходить для систем промислового моніторингу, де всі диспетчери мають спостерігати однаковий стан процесу.</p>\n<div class=\"warning\"><strong>⚠️ Контекст потоку та <code>ui-template</code></strong> <p>Сховища <code>flow context</code> та <code>global context</code> <strong>недоступні безпосередньо</strong> всередині віджета <code>ui-template</code>. Щоб скористатися значенням із контексту, спершу перенесіть його у <code>msg</code> за допомогою вузла <code>Change</code>, а вже потім подавайте у віджет.</p>\n</div>\n\n","<h1>🏭 Практичний приклад: HMI моніторингу температури</h1>\n<p><strong>Завдання:</strong> побудувати дашборд, що в реальному часі показує температуру на шкалі та графіку і виводить текстовий статус («Норма» / «Перегрів»).</p>\n<h2>🧱 Структура потоку</h2>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">[Inject ⏱ кожні 3 с] → [Function: симуляція датчика] ┬→ [ui-gauge: поточна t°]\n                                                     ├→ [ui-chart: історія t°]\n                                                     └→ [Switch: payload &gt; 26 ?]\n                                                            ├(так)→ [Change → \"Перегрів\"] → [ui-text]\n                                                            └(ні) → [Change → \"Норма\"]    → [ui-text]</code></pre><h2>💻 Вузол <code>Function</code> (симуляція датчика)</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Симуляція показника датчика температури (°C)</span>\n<span class=\"hljs-keyword\">const</span> temperature = <span class=\"hljs-number\">20</span> + <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-title function_\">random</span>() * <span class=\"hljs-number\">10</span>;        <span class=\"hljs-comment\">// діапазон 20–30</span>\nmsg.<span class=\"hljs-property\">payload</span> = <span class=\"hljs-title class_\">Math</span>.<span class=\"hljs-title function_\">round</span>(temperature * <span class=\"hljs-number\">10</span>) / <span class=\"hljs-number\">10</span>;    <span class=\"hljs-comment\">// округлення до 0.1</span>\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"success\"><strong>✅ Що демонструє приклад</strong> <p>Один числовий потік одночасно живить три віджети: <code>ui-gauge</code> показує миттєве значення, <code>ui-chart</code> — динаміку, а гілка <code>Switch</code> + <code>Change</code> перетворює число на текстовий статус для <code>ui-text</code>. Тут поєднано вже відомі вузли обробки з новими візуальними елементами.</p>\n</div>\n\n\n\n\n\n<div class=\"tip\"><strong>💡 Розширення</strong> <p>Додайте <code>ui-slider</code> «Поріг спрацювання» і вузлом <code>Change</code> зберігайте його значення у <code>flow context</code>. Тоді вузол симуляції зможе читати поточний поріг через <code>flow.get(...)</code>, і оператор керуватиме логікою сигналізації прямо з інтерфейсу.</p>\n</div>\n\n","<h1>🛠️ Типові помилки та найкращі практики</h1>\n<div class=\"danger\"><strong>🚫 Поширені помилки</strong> <ol>\n<li><p><strong>Встановлено застарілий пакет</strong> — <code>node-red-dashboard</code> замість <code>@flowfuse/node-red-dashboard</code>. Видаліть версію 1.0 та встановіть актуальну.</p>\n</li>\n<li><p><strong>Віджет не призначено групі</strong> — елемент не відображається. Перевірте поле <strong>Group</strong>.</p>\n</li>\n<li><p><strong>Невідповідний тип <code>msg.payload</code></strong> — <code>ui-gauge</code> і <code>ui-chart</code> потребують числа; рядок або об'єкт ламає індикацію.</p>\n</li>\n<li><p><strong>Не задано межі шкали</strong> — без мінімуму та максимуму <code>ui-gauge</code> показує некоректний масштаб.</p>\n</li>\n<li><p><strong>Безмежне накопичення точок</strong> на <code>ui-chart</code> — задавайте часове вікно або ліміт точок.</p>\n</li>\n</ol>\n</div>\n\n\n\n\n\n<div class=\"success\"><strong>✅ Найкращі практики</strong> <ul>\n<li>🗂️ Групуйте віджети <strong>логічно</strong>: окремі групи для моніторингу та для керування</li>\n<li>🧭 Розбивайте складний інтерфейс на <strong>сторінки</strong> замість однієї перевантаженої</li>\n<li>🔢 Перевіряйте та форматуйте <code>msg.payload</code> у вузлі <code>Function</code> <strong>до</strong> подачі на віджет</li>\n<li>🛡️ Для безпечного формату тексту (префікси, одиниці) використовуйте вузол <code>Template</code>, а не сирий HTML у віджеті</li>\n</ul>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>HMI</strong> — інтерфейс взаємодії оператора з АС: відображення стану та подача команд керування</p>\n</li>\n<li><p><strong>Node-RED Dashboard 2.0</strong> (<code>@flowfuse/node-red-dashboard</code>) дозволяє побудувати веб-HMI безпосередньо у потоці; застаріла версія 1.0 більше не підтримується</p>\n</li>\n<li><p><strong>Ієрархія</strong> дашборду: база → сторінка → група → віджет; кожен віджет обов'язково належить групі</p>\n</li>\n<li><p><strong>Обмін даними</strong> з усіма віджетами відбувається через <code>msg.payload</code>; віджети поділяють на відображення та керування</p>\n</li>\n<li><p><strong>Віджети відображення</strong> — <code>ui-text</code>, <code>ui-gauge</code>, <code>ui-chart</code> — приймають значення на вхід; <strong>віджети керування</strong> — <code>ui-button</code>, <code>ui-switch</code>, <code>ui-slider</code> — генерують значення на вихід</p>\n</li>\n<li><p><strong>Компоновка</strong> керується сторінками, групами та типами розкладки (<code>Grid</code>, <code>Fixed</code>, <code>Notebook</code>, <code>Tabs</code>)</p>\n</li>\n<li><p><strong>Реальний час</strong> забезпечується постійним з'єднанням і моделлю єдиного джерела істини: усі клієнти бачать синхронізовані дані</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Що таке HMI і які основні завдання він виконує в автоматизованій системі?</p>\n</li>\n<li><p>🤔 Чим відрізняється пакет <code>@flowfuse/node-red-dashboard</code> від застарілого <code>node-red-dashboard</code>? Який слід встановлювати?</p>\n</li>\n<li><p>🤔 З яких рівнів складається ієрархія дашборду? Яку роль виконує кожен з вузлів <code>ui-base</code>, <code>ui-page</code>, <code>ui-group</code>?</p>\n</li>\n<li><p>🤔 Через яку властивість об'єкта <code>msg</code> віджети отримують і передають значення? Чим відрізняються віджети відображення від віджетів керування?</p>\n</li>\n<li><p>🤔 Які типи графіків і типи осі X підтримує <code>ui-chart</code>? Як повністю очистити графік від накопичених даних?</p>\n</li>\n<li><p>🤔 Які типи розкладки сторінки існують у Dashboard? У чому перевага розкладки <code>Grid</code> для адаптивності?</p>\n</li>\n<li><p>🤔 Що означає модель «єдине джерело істини» (Single Source of Truth) і для яких систем вона природно підходить?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Людино-машинний інтерфейс</td>\n<td>Human-Machine Interface</td>\n<td>Засіб взаємодії оператора з АС: відображення стану та керування</td>\n</tr>\n<tr>\n<td>Інформаційна панель</td>\n<td>Dashboard</td>\n<td>Веб-інтерфейс, зібраний із віджетів для моніторингу та керування</td>\n</tr>\n<tr>\n<td>Віджет</td>\n<td>Widget</td>\n<td>Окремий візуальний елемент інтерфейсу (індикатор, кнопка, графік)</td>\n</tr>\n<tr>\n<td>Палітра</td>\n<td>Palette</td>\n<td>Набір вузлів у редакторі Node-RED, що встановлюється як пакет</td>\n</tr>\n<tr>\n<td>Сторінка</td>\n<td>Page</td>\n<td>Окрема навігаційна одиниця дашборду з власним маршрутом</td>\n</tr>\n<tr>\n<td>Група</td>\n<td>Group</td>\n<td>Контейнер, що об'єднує пов'язані віджети на сторінці</td>\n</tr>\n<tr>\n<td>Розкладка</td>\n<td>Layout</td>\n<td>Спосіб автоматичного розташування груп на сторінці</td>\n</tr>\n<tr>\n<td>Шкальний індикатор</td>\n<td>Gauge</td>\n<td>Віджет, що відображає числове значення на шкалі</td>\n</tr>\n<tr>\n<td>Єдине джерело істини</td>\n<td>Single Source of Truth</td>\n<td>Модель, за якої всі клієнти бачать однакові синхронізовані дані</td>\n</tr>\n<tr>\n<td>Реальний час</td>\n<td>Real-time</td>\n<td>Режим, за якого дані оновлюються в інтерфейсі миттєво, без перезавантаження</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>HMI</strong></td>\n<td>Human-Machine Interface</td>\n<td>Людино-машинний інтерфейс</td>\n</tr>\n<tr>\n<td><strong>АС</strong></td>\n<td>Автоматизована система</td>\n<td>Automated System</td>\n</tr>\n<tr>\n<td><strong>UI</strong></td>\n<td>User Interface</td>\n<td>Інтерфейс користувача</td>\n</tr>\n<tr>\n<td><strong>API</strong></td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td><strong>URL</strong></td>\n<td>Uniform Resource Locator</td>\n<td>Уніфікований локатор ресурсу</td>\n</tr>\n<tr>\n<td><strong>IoT</strong></td>\n<td>Internet of Things</td>\n<td>Інтернет речей</td>\n</tr>\n<tr>\n<td><strong>JSON</strong></td>\n<td>JavaScript Object Notation</td>\n<td>Об'єктна нотація JavaScript</td>\n</tr>\n<tr>\n<td><strong>HTML</strong></td>\n<td>HyperText Markup Language</td>\n<td>Мова розмітки гіпертексту</td>\n</tr>\n<tr>\n<td><strong>CSS</strong></td>\n<td>Cascading Style Sheets</td>\n<td>Каскадні таблиці стилів</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
