ування — QoS</li>\n<li>🧩 Спеціальні механізми: Retained, LWT, Keep Alive</li>\n<li>🔌 MQTT-ноди в Node-RED: підписка та публікація</li>\n<li>🛠️ Практичні сценарії інтеграції та безпека</li>\n</ol>\n","<h1>🌐 Виклики IoT та обмеження HTTP</h1>\n<div class=\"info\"><strong>ℹ️ Контекст</strong> <p><strong>IoT</strong> (Internet of Things / Інтернет речей) — мережа фізичних пристроїв (датчиків, контролерів, виконавчих механізмів), що обмінюються даними через інтернет без постійного втручання людини.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Типовий обмін «запит — відповідь» через HTTP погано підходить для тисяч маломіжних пристроїв, які працюють у ненадійних мережах.</p>\n<h2>⚠️ Чому HTTP незручний для IoT</h2>\n<table>\n<thead>\n<tr>\n<th>Обмеження HTTP</th>\n<th>Наслідок для IoT</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Модель «запит — відповідь»</td>\n<td>Пристрій не може отримати дані, поки сам не запитає (polling)</td>\n</tr>\n<tr>\n<td>Значний обсяг заголовків</td>\n<td>Зайвий трафік для датчика, що надсилає кілька байтів</td>\n</tr>\n<tr>\n<td>Накладні витрати на з'єднання та рукостискання</td>\n<td>Витрати енергії й часу, особливо за частих коротких запитів</td>\n</tr>\n<tr>\n<td>Жорстка прив'язка клієнт-сервер</td>\n<td>Складно розсилати дані одразу багатьом отримувачам</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Приклад проблеми</strong> <p>Уявіть 1000 датчиків, кожен з яких раз на секунду має дізнатися нове значення уставки. За HTTP кожен робив би окремий запит — це 1000 запитів щосекунди лише заради можливого оновлення. MQTT натомість працює за моделлю push: публікатор сам надсилає дані, коли настає подія (наприклад, змінюється значення), і споживачам не потрібно постійно опитувати джерело.</p>\n</div>\n\n","<h1>📨 MQTT — що це таке</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>MQTT</strong> — легкий мережевий протокол передавання повідомлень за моделлю «видавець — підписник», розроблений для пристроїв з обмеженими ресурсами та мереж із низькою пропускною здатністю.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> MQTT мінімізує обсяг службових даних і дозволяє пристроям обмінюватися повідомленнями асинхронно через посередника.</p>\n<h2>🔑 Ключові характеристики</h2>\n<ul>\n<li>🪶 <strong>Легкість</strong> — мінімальний заголовок (від 2 байтів), економія трафіку та енергії</li>\n<li>🔗 <strong>Працює поверх TCP/IP</strong> — стандартний порт <code>1883</code>, захищений (TLS) — <code>8883</code></li>\n<li>📭 <strong>Асинхронність</strong> — пристрій надсилає дані, не очікуючи на відповідь конкретного отримувача</li>\n<li>🔀 <strong>Розв'язаність</strong> — видавець і підписник нічого не знають один про одного</li>\n<li>📡 <strong>Багатоадресність</strong> — одне повідомлення може отримати багато підписників одночасно</li>\n</ul>\n<div class=\"note\"><strong>📝 Походження назви</strong> <p>Протокол створили Енді Стенфорд-Кларк (IBM) та Арлен Ніппер у 1999 році. Абревіатура історично походить від «MQ Telemetry Transport» (за назвою продукту IBM MQ); у сучасному стандарті OASIS MQTT розглядається вже як власна назва протоколу, а не абревіатура. Актуальні версії — MQTT 3.1.1 та MQTT 5.0.</p>\n</div>\n\n","<h1>🔁 Модель Publish/Subscribe</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Publish/Subscribe</strong> (видавець — підписник) — архітектурний шаблон, у якому відправники повідомлень (<strong>publishers</strong>) і отримувачі (<strong>subscribers</strong>) не взаємодіють напряму, а обмінюються даними через посередника — <strong>брокера</strong>.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Видавець публікує повідомлення у певну тему, а брокер пересилає його всім, хто на цю тему підписаний.</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    PUB1[&quot;📡 Датчик температури&lt;br&gt;Publisher&quot;] --&gt;|&quot;publish&lt;br&gt;sensors/temp&quot;| BROKER[&quot;🖥️ MQTT-брокер&quot;]\n    PUB2[&quot;📡 Датчик вологості&lt;br&gt;Publisher&quot;] --&gt;|&quot;publish&lt;br&gt;sensors/hum&quot;| BROKER\n    BROKER --&gt;|&quot;sensors/temp&quot;| SUB1[&quot;📊 Дашборд&lt;br&gt;Subscriber&quot;]\n    BROKER --&gt;|&quot;sensors/temp&quot;| SUB2[&quot;💾 База даних&lt;br&gt;Subscriber&quot;]\n    style BROKER fill:#fff9c4,stroke:#f9a825\n    style PUB1 fill:#e3f2fd,stroke:#1565c0\n    style PUB2 fill:#e3f2fd,stroke:#1565c0\n    style SUB1 fill:#e8f5e9,stroke:#388e3c\n    style SUB2 fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1780552356768-4-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 874.65625px;\" viewBox=\"0 0 874.65625 210\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1780552356768-4-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1780552356768-4-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1780552356768-4-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1780552356768-4-0 .error-icon{fill:#552222;}#exp-1780552356768-4-0 .error-text{fill:#552222;stroke:#552222;}#exp-1780552356768-4-0 .edge-thickness-normal{stroke-width:1px;}#exp-1780552356768-4-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1780552356768-4-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1780552356768-4-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1780552356768-4-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1780552356768-4-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1780552356768-4-0 .marker{fill:#333333;stroke:#333333;}#exp-1780552356768-4-0 .marker.cross{stroke:#333333;}#exp-1780552356768-4-0 svg{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-s ><foreignObject width=\"178.734375\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📡 Датчик температури<br>Publisher</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552356768-4-0-flowchart-BROKER-1\" data-look=\"classic\" transform=\"translate(474.37890625, 105)\"><rect class=\"basic label-container\" style=\"fill:#fff9c4 !important;stroke:#f9a825 !important\" x=\"-87.00390625\" y=\"-24\" width=\"174.0078125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-63.00390625, -12)\"><rect></rect><foreignObject width=\"126.0078125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🖥️ MQTT-брокер</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552356768-4-0-flowchart-PUB2-2\" data-look=\"classic\" transform=\"translate(121.3671875, 166)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-99.42578125\" y=\"-36\" width=\"198.8515625\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-75.42578125, -24)\"><rect></rect><foreignObject width=\"150.8515625\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📡 Датчик вологості<br>Publisher</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552356768-4-0-flowchart-SUB1-5\" data-look=\"classic\" transform=\"translate(790.33984375, 44)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-69.4453125\" y=\"-36\" width=\"138.890625\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-45.4453125, -24)\"><rect></rect><foreignObject width=\"90.890625\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📊 Дашборд<br>Subscriber</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552356768-4-0-flowchart-SUB2-7\" data-look=\"classic\" transform=\"translate(790.33984375, 166)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-76.31640625\" y=\"-36\" width=\"152.6328125\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-52.31640625, -24)\"><rect></rect><foreignObject width=\"104.6328125\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>💾 База даних<br>Subscriber</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1780552356768-4-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1780552356768-4-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<div class=\"success\"><strong>✅ Перевага розв'язаності</strong> <p>Один датчик температури може публікувати дані, навіть не знаючи, що їх одночасно споживають дашборд оператора, система журналювання та модуль сигналізації. Щоб додати нового споживача, не потрібно змінювати датчик — достатньо підписатися на ту саму тему.</p>\n</div>\n\n","<h1>🖥️ Брокер — серце MQTT-системи</h1>\n<p><strong>Головна ідея:</strong> Брокер — це центральний сервер, який приймає всі повідомлення, фільтрує їх за темами та доставляє відповідним підписникам.</p>\n<h2>🔧 Функції брокера</h2>\n<table>\n<thead>\n<tr>\n<th>Функція</th>\n<th>Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>📥 Приймання повідомлень</td>\n<td>Отримує дані від усіх підключених видавців</td>\n</tr>\n<tr>\n<td>🗂️ Маршрутизація за темами</td>\n<td>Зіставляє тему повідомлення з підписками клієнтів</td>\n</tr>\n<tr>\n<td>📤 Доставка підписникам</td>\n<td>Надсилає копію повідомлення кожному відповідному підписнику</td>\n</tr>\n<tr>\n<td>🔐 Автентифікація та доступ</td>\n<td>Перевіряє облікові дані та права на теми</td>\n</tr>\n<tr>\n<td>💾 Збереження стану</td>\n<td>Зберігає retained-повідомлення та сесії клієнтів</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Популярні брокери</strong> <p><strong>Eclipse Mosquitto</strong> — легкий брокер з відкритим кодом, найчастіший вибір для навчання та невеликих систем. <strong>EMQX</strong> та <strong>HiveMQ</strong> — масштабовані брокери для промислових навантажень. Для швидких експериментів існують публічні тестові брокери, наприклад <code>test.mosquitto.org</code> та <code>broker.hivemq.com</code>.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ Точка відмови</strong> <p>Оскільки весь обмін проходить через брокер, він є критичним компонентом: якщо брокер недоступний, обмін повідомленнями припиняється. У промислових системах брокери резервують (кластеризація, відмовостійкі конфігурації).</p>\n</div>\n\n","<h1>🗂️ Структура тем — Topics</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Topic</strong> (тема) — текстовий ідентифікатор каналу, до якого прив'язується повідомлення. Теми мають <strong>ієрархічну структуру</strong> з рівнів, розділених символом <code>/</code>.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Продумана ієрархія тем робить систему зрозумілою та дозволяє гнучко підписуватися на потрібні групи даних.</p>\n\n<div class=\"mermaid\" data-source=\"graph TD\n    ROOT[&quot;factory&quot gt;/&lt;пристрій&gt;/&lt;параметр&gt;</code>.</p>\n</div>\n\n","<h1>🃏 Символи підстановки у підписках</h1>\n<p><strong>Головна ідея:</strong> Підписники можуть підписуватися не лише на конкретну тему, а й на цілі групи тем за допомогою символів підстановки (<strong>wildcards</strong>).</p>\n<h2>🔣 Два символи підстановки</h2>\n<table>\n<thead>\n<tr>\n<th>Символ</th>\n<th>Назва</th>\n<th>Дія</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>+</code></td>\n<td>Один рівень</td>\n<td>Замінює рівно один рівень ієрархії</td>\n</tr>\n<tr>\n<td><code>#</code></td>\n<td>Багато рівнів</td>\n<td>Замінює всі рівні нижче; має бути останнім символом теми</td>\n</tr>\n</tbody></table>\n<pre><code class=\"language-text hljs language-plaintext\" data-highlighted=\"yes\">factory/+/temperature   ← температура на БУДЬ-ЯКІЙ лінії:\n                           factory/line1/temperature ✅\n                           factory/line2/temperature ✅\n                           factory/line1/pressure    ❌ (інший параметр)\n\nfactory/line1/#         ← УСІ параметри лінії 1:\n                           factory/line1/temperature ✅\n                           factory/line1/pressure    ✅\n\nfactory/#               ← геть усе, що публікується під factory</code></pre><div class=\"warning\"><strong>⚠️ Важливі обмеження</strong> <p>Символи підстановки можна використовувати <strong>лише у підписках</strong>, а не під час публікації — видавець завжди вказує повну конкретну тему. Символ <code>#</code> дозволяється тільки в кінці теми (<code>factory/#</code>), а не всередині (<code>factory/#/temp</code> — помилка).</p>\n</div>\n\n","<h1>🎯 Рівні якості обслуговування — QoS</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>QoS</strong> (Quality of Service / Якість обслуговування) — параметр, що визначає, з якою гарантією повідомлення буде доставлене від відправника до отримувача.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Вищий рівень QoS дає надійнішу доставку, але потребує більше обміну службовими пакетами.</p>\n<h2>📊 Три рівні</h2>\n<table>\n<thead>\n<tr>\n<th>QoS</th>\n<th>Назва</th>\n<th>Гарантія</th>\n<th>Поведінка</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>0</code></td>\n<td>At most once</td>\n<td>Не більше одного разу</td>\n<td>«Надіслав і забув» — без підтвердження, можлива втрата</td>\n</tr>\n<tr>\n<td><code>1</code></td>\n<td>At least once</td>\n<td>Принаймні один раз</td>\n<td>З підтвердженням, але повідомлення може дублюватися</td>\n</tr>\n<tr>\n<td><code>2</code></td>\n<td>Exactly once</td>\n<td>Рівно один раз</td>\n<td>Чотириетапне підтвердження, без втрат і дублів</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Як обрати рівень</strong> <p><strong>QoS 0</strong> — для частих оновлень, де втрата окремого значення некритична (температура щосекунди). <strong>QoS 1</strong> — коли втрата неприпустима, а дублі обробляються (команди з ідемпотентною логікою). <strong>QoS 2</strong> — для критичних команд, які не можна ні втратити, ні виконати двічі (наприклад, фінансова операція). На практиці QoS 2 застосовують рідко через накладні витрати.</p>\n</div>\n\n","<h1>🧩 Спеціальні механізми MQTT</h1>\n<p><strong>Головна ідея:</strong> Окрім базового обміну, MQTT має механізми для надійної роботи у нестабільних мережах.</p>\n<h2>🔧 Ключові можливості</h2>\n<ul>\n<li>📌 <strong>Retained message</strong> (збережене повідомлення) — брокер запам'ятовує <strong>останнє</strong> повідомлення з цієї теми. Новий підписник одразу отримує актуальне значення, не чекаючи наступної публікації.</li>\n<li>⚰️ <strong>Last Will and Testament (LWT)</strong> — повідомлення, яке брокер публікує <strong>замість клієнта</strong>, якщо той несподівано відключився. Дозволяє іншим дізнатися про втрату зв'язку з пристроєм.</li>\n<li>💓 <strong>Keep Alive</strong> — інтервал, протягом якого клієнт має подати «ознаку життя» (<code>PINGREQ</code>). Якщо мовчить довше — брокер вважає його відключеним.</li>\n<li>🧹 <strong>Clean Session</strong> — визначає, чи зберігати підписки та неотримані повідомлення клієнта між підключеннями.</li>\n</ul>\n<div class=\"note\"><strong>📝 Практичний сценарій LWT</strong> <p>Датчик публікує статус <code>online</code> (retained) під час підключення та реєструє LWT-повідомлення <code>offline</code> для тієї самої теми. Якщо живлення датчика зникне, брокер автоматично опублікує <code>offline</code> — і оператор на дашборді миттєво побачить, що пристрій недоступний, навіть якщо сам датчик не встиг нічого надіслати.</p>\n</div>\n\n","<h1>⚖️ MQTT проти HTTP</h1>\n<p><strong>Головна ідея:</strong> MQTT і HTTP не конкурують, а доповнюють одне одного: кожен оптимальний для своїх задач.</p>\n<h2>📊 Порівняння</h2>\n<table>\n<thead>\n<tr>\n<th>Критерій</th>\n<th>MQTT</th>\n<th>HTTP</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Модель взаємодії</td>\n<td>Publish/Subscribe (через брокер)</td>\n<td>Запит — відповідь (напряму)</td>\n</tr>\n<tr>\n<td>Ініціатор обміну</td>\n<td>Будь-яка сторона (push)</td>\n<td>Лише клієнт (pull/polling)</td>\n</tr>\n<tr>\n<td>Обсяг службових даних</td>\n<td>Мінімальний (від 2 байтів)</td>\n<td>Значний (текстові заголовки)</td>\n</tr>\n<tr>\n<td>Багатоадресність</td>\n<td>Природна (один → багато)</td>\n<td>Складна, потребує надбудов</td>\n</tr>\n<tr>\n<td>Типове застосування</td>\n<td>Телеметрія, IoT, потоки даних</td>\n<td>Веб-сторінки, REST API</td>\n</tr>\n</tbody></table>\n<div class=\"success\"><strong>✅ Коли що обирати</strong> <p>Для <strong>періодичної телеметрії</strong>, подій реального часу та обміну з маломіжними пристроями обирають <strong>MQTT</strong>. Для <strong>запиту структурованих ресурсів на вимогу</strong> (отримати список, надіслати форму, викликати REST-метод) — <strong>HTTP</strong>. У реальних автоматизованих системах вони часто співіснують: дані з пристроїв надходять через MQTT, а зовнішні застосунки звертаються до системи через REST API.</p>\n</div>\n\n","<h1>🔌 MQTT у Node-RED: конфігурація брокера</h1>\n<p><strong>Головна ідея:</strong> Для роботи з MQTT у Node-RED використовують пару нод — <code>MQTT in</code> та <code>MQTT out</code>, які спираються на спільний <strong>конфігураційний вузол брокера</strong>.</p>\n<h2>⚙️ Налаштування вузла брокера (MQTT broker config)</h2>\n<table>\n<thead>\n<tr>\n<th>Параметр</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>Server</code> / <code>Port</code></td>\n<td>Адреса брокера та порт (<code>1883</code> — звичайний, <code>8883</code> — TLS)</td>\n</tr>\n<tr>\n<td><code>Client ID</code></td>\n<td>Унікальний ідентифікатор клієнта (або генерується автоматично)</td>\n</tr>\n<tr>\n<td><code>Keep Alive</code></td>\n<td>Інтервал підтримки з'єднання у секундах</td>\n</tr>\n<tr>\n<td><code>Use clean session</code></td>\n<td>Чи скидати збережений стан сесії при підключенні</td>\n</tr>\n<tr>\n<td><code>Security</code></td>\n<td>Ім'я користувача та пароль для автентифікації</td>\n</tr>\n<tr>\n<td><code>Will message</code></td>\n<td>Налаштування LWT — теми та повідомлення при втраті зв'язку</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Один брокер — багато нод</strong> <p>Конфігураційний вузол брокера створюється один раз і може використовуватися одночасно багатьма нодами <code>MQTT in</code> та <code>MQTT out</code>. Це означає одне фізичне з'єднання з брокером для всіх потоків, що звертаються до нього.</p>\n</div>\n\n","<h1>📥 Нода MQTT In — підписка</h1>\n<p><strong>Головна ідея:</strong> Нода <code>MQTT in</code> підписується на задану тему і генерує нове повідомлення (<code>msg</code>) щоразу, коли брокер надсилає дані з цієї теми.</p>\n<h2>🔧 Що отримуємо на виході</h2>\n<p>Нода формує об'єкт <code>msg</code> із заповненими полями:</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Приклад msg, що надходить від MQTT in</span>\n{\n  <span class=\"hljs-attr\">topic</span>: <span class=\"hljs-string\">\"factory/line1/temperature\"</span>, <span class=\"hljs-comment\">// тема повідомлення</span>\n  <span class=\"hljs-attr\">payload</span>: <span class=\"hljs-string\">\"23.5\"</span>,                     <span class=\"hljs-comment\">// корисне навантаження</span>\n  <span class=\"hljs-attr\">qos</span>: <span class=\"hljs-number\">0</span>,                              <span class=\"hljs-comment\">// рівень QoS</span>\n  <span class=\"hljs-attr\">retain</span>: <span class=\"hljs-literal\">false</span>                        <span class=\"hljs-comment\">// ознака retained-повідомлення</span>\n}</code></pre><table>\n<thead>\n<tr>\n<th>Налаштування ноди</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>Topic</code></td>\n<td>Тема для підписки (можна з <code>+</code> та <code>#</code>)</td>\n</tr>\n<tr>\n<td><code>QoS</code></td>\n<td>Бажаний рівень якості доставки</td>\n</tr>\n<tr>\n<td><code>Output</code></td>\n<td>Формат <code>payload</code>: рядок, буфер або автоматичний розбір JSON</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Автоматичний розбір JSON</strong> <p>Якщо обрати вивід «a parsed JSON object», нода спробує перетворити текстовий <code>payload</code> на об'єкт JavaScript. Тоді у наступних нодах одразу доступні поля, наприклад <code>msg.payload.temperature</code>, без ручного виклику <code>JSON.parse()</code>.</p>\n</div>\n\n","<h1>📤 Нода MQTT Out — публікація</h1>\n<p><strong>Головна ідея:</strong> Нода <code>MQTT out</code> бере вміст <code>msg.payload</code> і публікує його у задану тему на брокері.</p>\n<h2>🔧 Як задати тему та параметри</h2>\n<p>Тему можна вказати <strong>у самій ноді</strong> або <strong>динамічно</strong> через <code>msg.topic</code>:</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Function-нода перед MQTT out: формуємо команду</span>\n<span class=\"hljs-comment\">// (Function-ноду ви вже використовували для логіки в потоці)</span>\nmsg.<span class=\"hljs-property\">topic</span> = <span class=\"hljs-string\">\"factory/line1/command\"</span>;\nmsg.<span class=\"hljs-property\">payload</span> = <span class=\"hljs-title class_\">JSON</span>.<span class=\"hljs-title function_\">stringify</span>({ <span class=\"hljs-attr\">action</span>: <span class=\"hljs-string\">\"stop\"</span> });\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><table>\n<thead>\n<tr>\n<th>Налаштування ноди</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>Topic</code></td>\n<td>Тема публікації (порожнє — береться з <code>msg.topic</code>)</td>\n</tr>\n<tr>\n<td><code>QoS</code></td>\n<td>Рівень якості доставки</td>\n</tr>\n<tr>\n<td><code>Retain</code></td>\n<td>Чи зберегти повідомлення як retained на брокері</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Тип payload</strong> <p>Якщо <code>msg.payload</code> є об'єктом JavaScript, нода <code>MQTT out</code> автоматично перетворює його на рядок JSON перед публікацією. Явний виклик <code>JSON.stringify()</code> не є обов'язковим — він лише дає повний контроль над форматом серіалізації. Рядки публікуються як є, а буфери — як двійкові дані.</p>\n</div>\n\n","<h1>🏗️ Практичний приклад: моніторинг температури</h1>\n<p><strong>Головна ідея:</strong> Поєднання MQTT-нод із вже знайомими <code>Function</code> та <code>Switch</code> дозволяє побудувати реальний сценарій моніторингу з реакцією на перевищення порогу.</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    A[&quot;🌡️ MQTT In&lt;br&gt;factory/line1/temperature&quot;] --&gt; B[&quot;⚙️ Function&lt;br&gt;розбір значення&quot;]\n    B --&gt; C[&quot;🔀 Switch&lt;br&gt;значення більше 80?&quot;]\n    C --&gt;|&quot;так&quot;| D[&quot;📤 MQTT Out&lt;br&gt;factory/line1/alert&quot;]\n    C --&gt;|&quot;ні&quot;| E[&quot;📊 Debug&quot;]\n    style A fill:#e3f2fd,stroke:#1565c0\n    style B fill:#fff3e0,stroke:#ef6c00\n    style C fill:#f3e5f5,stroke:#7b1fa2\n    style D fill:#fce4ec,stroke:#c2185b\n    style E fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1780552356793-14-0\" width=\"100%\" xm xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🔀 Switch<br>значення більше 80?</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552356793-14-0-flowchart-D-5\" data-look=\"classic\" transform=\"translate(880.68359375, 44)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-86.21484375\" y=\"-36\" width=\"172.4296875\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-62.21484375, -24)\"><rect></rect><foreignObject width=\"124.4296875\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📤 MQTT Out<br>factory/line1/alert</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1780552356793-14-0-flowchart-E-7\" data-look=\"classic\" transform=\"translate(880.68359375, 154)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-58.15234375\" y=\"-24\" width=\"116.3046875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-34.15234375, -12)\"><rect></rect><foreignObject width=\"68.3046875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📊 Debug</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1780552356793-14-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1780552356793-14-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Function-нода: перетворюємо текст на число для подальшого порівняння</span>\n<span class=\"hljs-keyword\">const</span> temperature = <span class=\"hljs-title class_\">Number</span>(msg.<span class=\"hljs-property\">payload</span>);\n\n<span class=\"hljs-comment\">// Якщо дані некоректні — припиняємо обробку</span>\n<span class=\"hljs-keyword\">if</span> (<span class=\"hljs-title class_\">Number</span>.<span class=\"hljs-built_in\">isNaN</span>(temperature)) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-literal\">null</span>;\n}\n\nmsg.<span class=\"hljs-property\">payload</span> = temperature; <span class=\"hljs-comment\">// далі Switch порівнює число з порогом 80</span>\n<span class=\"hljs-keyword\">return</span> msg;</code></pre><div class=\"success\"><strong>✅ Що демонструє приклад</strong> <p>Дані надходять через <code>MQTT in</code>, нормалізуються у <code>Function</code>, перевіряються у <code>Switch</code>, і за перевищення порогу публікується сигнал тривоги через <code>MQTT out</code>. Такий самий потік легко доповнити вузлами дашборду, щоб оператор бачив значення та попередження у реальному часі.</p>\n</div>\n\n","<h1>🛰️ Типові сценарії інтеграції з IoT</h1>\n<p><strong>Головна ідея:</strong> MQTT у поєднанні з Node-RED покриває більшість задач збирання даних і керування в автоматизованих системах.</p>\n<h2>🔧 Поширені сценарії</h2>\n<ul>\n<li>📈 <strong>Збирання телеметрії</strong> — датчики публікують показники (температура, вологість, тиск), Node-RED агрегує їх та відображає на дашборді</li>\n<li>🎛️ <strong>Дистанційне керування</strong> — оператор натискає елемент дашборду, Node-RED публікує команду в тему пристрою через <code>MQTT out</code></li>\n<li>🔔 <strong>Сигналізація за подіями</strong> — потік аналізує дані та публікує сповіщення в окрему тему <code>alerts/...</code> при відхиленнях</li>\n<li>🌉 <strong>Шлюз між протоколами</strong> — Node-RED приймає дані по MQTT і пересилає їх у зовнішній REST API (та навпаки)</li>\n<li>💾 <strong>Журналювання</strong> — підписник зберігає всі повідомлення з теми у файл або базу даних для подальшого аналізу</li>\n</ul>\n<div class=\"note\"><strong>📝 Роль Node-RED у цих сценаріях</strong> <p>В усіх випадках Node-RED виступає <strong>інтеграційним вузлом</strong>: він одночасно є MQTT-клієнтом (підписником і видавцем), обробником логіки та джерелом веб-інтерфейсу. Це робить його зручним «клеєм» між польовими пристроями та застосунками верхнього рівня.</p>\n</div>\n\n","<h1>🔐 Безпека MQTT-з'єднань</h1>\n<p><strong>Головна ідея:</strong> За замовчуванням MQTT передає дані у відкритому вигляді, тому у реальних системах застосовують кілька рівнів захисту.</p>\n<h2>🛡️ Базові механізми захисту</h2>\n<table>\n<thead>\n<tr>\n<th>Механізм</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🔑 Автентифікація</td>\n<td>Ім'я користувача та пароль для підключення до брокера</td>\n</tr>\n<tr>\n<td>🔒 Шифрування TLS</td>\n<td>Захищене з'єднання через порт <code>8883</code> замість відкритого <code>1883</code></td>\n</tr>\n<tr>\n<td>📋 Контроль доступу (ACL)</td>\n<td>Обмеження прав клієнтів на публікацію/підписку для певних тем</td>\n</tr>\n<tr>\n<td>✅ Валідація вхідних даних</td>\n<td>Перевірка <code>payload</code> у <code>Function</code>-ноді перед використанням</td>\n</tr>\n</tbody></table>\n<div class=\"danger\"><strong>🚫 Поширена помилка</strong> <p>Підключення до брокера через відкритий порт <code>1883</code> без автентифікації допустиме лише для навчальних експериментів у локальній мережі. У будь-якій реальній системі обов'язкові автентифікація та TLS — інакше дані та команди можуть бути перехоплені або підроблені.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ Не довіряйте вхідним даним</strong> <p>Повідомлення з MQTT надходять із зовнішніх пристроїв, тому їх слід вважати ненадійними так само, як і дані HTTP-запитів. Перед використанням значення обов'язково перевіряють: тип, діапазон, наявність обов'язкових полів. Це захищає логіку потоку від некоректних або шкідливих даних.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>MQTT</strong> — легкий протокол для IoT, що працює поверх TCP/IP (порти <code>1883</code> та <code>8883</code>) і мінімізує службовий трафік</p>\n</li>\n<li><p><strong>Publish/Subscribe</strong> — видавці й підписники не взаємодіють напряму, а обмінюються через <strong>брокера</strong>, що забезпечує розв'язаність компонентів</p>\n</li>\n<li><p><strong>Брокер</strong> — центральний посередник, який маршрутизує повідомлення за темами; популярний приклад — Eclipse Mosquitto</p>\n</li>\n<li><p><strong>Topics</strong> — ієрархічні теми з рівнями через <code>/</code>; символи підстановки <code>+</code> (один рівень) та <code>#</code> (багато рівнів) застосовуються лише у підписках</p>\n</li>\n<li><p><strong>QoS</strong> — три рівні гарантії доставки (<code>0</code>, <code>1</code>, <code>2</code>) з компромісом між надійністю та накладними витратами</p>\n</li>\n<li><p><strong>Спеціальні механізми</strong> — retained-повідомлення, LWT, Keep Alive дають надійність у нестабільних мережах</p>\n</li>\n<li><p><strong>Node-RED</strong> — ноди <code>MQTT in</code> і <code>MQTT out</code> зі спільним вузлом брокера дозволяють будувати потоки збирання даних і керування</p>\n</li>\n<li><p><strong>Безпека</strong> — TLS, автентифікація та валідація вхідних даних є обов'язковими у реальних системах</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Чому модель «запит — відповідь» HTTP погано підходить для систем з тисячами IoT-пристроїв? Які переваги дає MQTT?</p>\n</li>\n<li><p>🤔 Поясніть модель Publish/Subscribe. Яку роль виконує брокер і чому видавець не знає своїх підписників?</p>\n</li>\n<li><p>🤔 Як побудована ієрархія тем у MQTT? Чим відрізняються символи підстановки <code>+</code> та <code>#</code> і де їх можна застосовувати?</p>\n</li>\n<li><p>🤔 Опишіть три рівні QoS. У яких ситуаціях доцільно обирати кожен з них?</p>\n</li>\n<li><p>🤔 Що таке retained-повідомлення та LWT? Який практичний сценарій вирішує кожен з цих механізмів?</p>\n</li>\n<li><p>🤔 Які поля об'єкта <code>msg</code> формує нода <code>MQTT in</code>? Як опублікувати повідомлення у динамічно задану тему через <code>MQTT out</code>?</p>\n</li>\n<li><p>🤔 Які заходи безпеки слід застосувати під час підключення до MQTT-брокера у реальній автоматизованій системі?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Брокер</td>\n<td>Broker</td>\n<td>Центральний сервер, що приймає та маршрутизує повідомлення за темами</td>\n</tr>\n<tr>\n<td>Видавець</td>\n<td>Publisher</td>\n<td>Клієнт, який надсилає (публікує) повідомлення у тему</td>\n</tr>\n<tr>\n<td>Підписник</td>\n<td>Subscriber</td>\n<td>Клієнт, який отримує повідомлення з тем, на які підписаний</td>\n</tr>\n<tr>\n<td>Тема</td>\n<td>Topic</td>\n<td>Ієрархічний ідентифікатор каналу, до якого прив'язане повідомлення</td>\n</tr>\n<tr>\n<td>Корисне навантаження</td>\n<td>Payload</td>\n<td>Власне вміст (дані) повідомлення MQTT</td>\n</tr>\n<tr>\n<td>Символ підстановки</td>\n<td>Wildcard</td>\n<td>Символ (<code>+</code> або <code>#</code>), що дозволяє підписку на групу тем</td>\n</tr>\n<tr>\n<td>Збережене повідомлення</td>\n<td>Retained message</td>\n<td>Останнє повідомлення теми, яке брокер зберігає для нових підписників</td>\n</tr>\n<tr>\n<td>Останнє волевиявлення</td>\n<td>Last Will (LWT)</td>\n<td>Повідомлення, яке брокер публікує при несподіваному відключенні клієнта</td>\n</tr>\n<tr>\n<td>Підтримка з'єднання</td>\n<td>Keep Alive</td>\n<td>Інтервал, протягом якого клієнт має підтвердити активність з'єднання</td>\n</tr>\n<tr>\n<td>Чиста сесія</td>\n<td>Clean Session</td>\n<td>Режим, що визначає збереження стану клієнта між підключеннями</td>\n</tr>\n<tr>\n<td>Якість обслуговування</td>\n<td>Quality of Service</td>\n<td>Рівень гарантії доставки повідомлення (<code>0</code>, <code>1</code>, <code>2</code>)</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>MQTT</td>\n<td>MQ Telemetry Transport</td>\n<td>Назва протоколу передавання повідомлень</td>\n</tr>\n<tr>\n<td>IoT</td>\n<td>Internet of Things</td>\n<td>Інтернет речей</td>\n</tr>\n<tr>\n<td>QoS</td>\n<td>Quality of Service</td>\n<td>Якість обслуговування</td>\n</tr>\n<tr>\n<td>LWT</td>\n<td>Last Will and Testament</td>\n<td>Останнє волевиявлення</td>\n</tr>\n<tr>\n<td>TCP</td>\n<td>Transmission Control Protocol</td>\n<td>Протокол керування передаванням</td>\n</tr>\n<tr>\n<td>IP</td>\n<td>Internet Protocol</td>\n<td>Міжмережевий протокол</td>\n</tr>\n<tr>\n<td>TLS</td>\n<td>Transport Layer Security</td>\n<td>Протокол захисту транспортного рівня</td>\n</tr>\n<tr>\n<td>ACL</td>\n<td>Access Control List</td>\n<td>Список контролю доступу</td>\n</tr>\n<tr>\n<td>HMI</td>\n<td>Human-Machine Interface</td>\n<td>Людино-машинний інтерфейс</td>\n</tr>\n<tr>\n<td>АС</td>\n<td>—</td>\n<td>Автоматизована система</td>\n</tr>\n<tr>\n<td>JSON</td>\n<td>JavaScript Object Notation</td>\n<td>Об'єктна нотація JavaScript</td>\n</tr>\n<tr>\n<td>HTTP</td>\n<td>HyperText Transfer Protocol</td>\n<td>Протокол передавання гіпертексту</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
