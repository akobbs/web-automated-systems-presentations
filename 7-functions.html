<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Функції в JavaScript</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"><style>* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            height: 100vh;
        }

        #editor-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;

        #editor-container.hidden {

        #editor-header {

            align-items: center;
        }

        #editor-header h2 {
            color: white;
            font-size: 1.2rem;
        }

        #editor-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #4a5568;
            color: white;
        }

        .btn-secondary:hover {
            background: #2d3748;
        }

        #markdown-input {
            flex: 1;
            padding: 2rem;
            background: #1a202c;
            color: #e2e8f0;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
        }

        #markdown-input:focus {
            outline: none;
        }

        .slide-container {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .slide {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 3rem;
            position: relative;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide::-webkit-scrollbar {
            width: 8px;
        }

        .slide::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .slide::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .slide h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #667eea;
            padding-bottom: 0.5rem;
        }

        .slide h2 {
            color: #764ba2;
            font-size: 2rem;
            margin: 2rem 0 1rem 0;
        }

        .slide h3 {
            color: #4a5568;
            font-size: 1.5rem;
            margin: 1.5rem 0 1rem 0;
        }

        .slide p {
            color: #2d3748;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .slide ul, .slide ol {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }

        .slide li {
            color: #2d3748;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 0.5rem;
        }

        .slide pre {

            border-radius: 10px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            overflow-x: auto;
        }

        .slide pre code {
            background: transparent;
            color: #abb2bf;
        }

        .slide code {

            font-size: 0.95em;
            line-height: 1.5;
        }

        .slide h1 code, .slide h2 code, .slide h3 code {

            padding: 0.1em 0.3em;
            border-radius: 3px;
        }

        .slide p code {
            background: #edf2f7;
            color: #e53e3e;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-size: 0.9em;
        }

        .slide blockquote {
            border-left: 4px solid #667eea;
            padding-left: 1.5rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: #4a5568;
        }

        .slide img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 1.5rem 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .slide table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
        }

        .slide th, .slide td {
            border: 1px solid #e2e8f0;
            padding: 0.75rem;
            text-align: left;
        }

        .slide th {
            background: #667eea;
            color: white;

        }

        .slide tr:nth-child(even) {
            background: #f7fafc;
        }

        .note {

            border-left: 4px solid #fc8181;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;
        }

        .note strong {
            color: #c53030;
        }

        .warning {
            background: #fffaf0;
            border-left: 4px solid #f6ad55;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;
        }

        .warning strong {
            color: #c05621;
        }

        .info {
            background: #ebf8ff;
            border-left: 4px solid #4299e1;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;
        }

        .info strong {
            color: #2c5282;
        }

        .success {
            background: #f0fff4;
            border-left: 4px solid #48bb78;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;
        }

        .success strong {
            color: #22543d;
        }

        .danger {
            background: #fff5f5;
            border-left: 4px solid #f56565;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;
        }

        .danger strong {
            color: #742a2a;
        }

        .tip {

            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 5px;
        }

        .tip strong {
            color: #744210;
        }

        .controls {

            gap: 1rem;
            z-index: 100;
        }

        .control-btn {

            width: 50px;

            cursor: pointer;

            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .progress {
            position: fixed;

            left: 0;
            width: 100%;

            background: rgba(255, 255, 255, 0.3);

        .progress-bar {
            height: 100%;
            background: white;
            transition: width 0.3s;
        }

        .slide-number {

        .slide-thumbnail-title {

            color: #667eea;
            margin-bottom: 0.25rem;
        }

        }

            top: 1rem;

            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

        }

        .mermaid-error pre {
            margin-top: 0.5rem;
            font-size: 0.75rem;

        }

        #presentation-container:-moz-full-screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        #presentation-container:-ms-fullscreen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

м</li>\n<li>🔄 Повернення значень — <code>return</code></li>\n<li>🔭 Область видимості — Scope</li>\n<li>🔒 Замикання — Closure</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🧩 Що таке функція?</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Функція</strong> — це іменований блок коду, що виконує конкретне завдання і може бути викликаний багаторазово з різними вхідними даними.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Функції дозволяють уникнути повторення коду, розбити програму на логічні частини та зробити її читабельною і зручною для підтримки.</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    IN[&quot;📥 Вхідні дані (аргументи)&quot;] --&gt; FN[&quot;⚙️ Функція (блок коду)&quot;]\n    FN --&gt; OUT[&quot;📤 Результат (return)&quot;]\n    style IN fill:#e3f2fd,stroke:#1565c0\n    style FN fill:#fff9c4,stroke:#f9a825\n    style OUT fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1773080056761-2-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 784.0546875px;\" viewBox=\"0 0 784.0546875 64\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1773080056761-2-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1773080056761-2-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1773080056761-2-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1773080056761-2-0 .error-icon{fill:#552222;}#exp-1773080056761-2-0 .error-text{fill:#552222;stroke:#552222;}#exp-1773080056761-2-0 .edge-thickness-normal{stroke-width:1px;}#exp-1773080056761-2-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1773080056761-2-0 t-align: center;\"><span class=\"nodeLabel \"><p>📥 Вхідні дані (аргументи)</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-FN-1\" transform=\"translate(413.26171875, 32)\"><rect class=\"basic label-container\" style=\"fill:#fff9c4 !important;stroke:#f9a825 !important\" x=\"-109.94140625\" y=\"-24\" width=\"219.8828125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-85.94140625, -12)\"><rect></rect><foreignObject width=\"171.8828125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>⚙️ Функція (блок коду)</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-OUT-3\" transform=\"translate(674.62890625, 32)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-101.42578125\" y=\"-24\" width=\"202.8515625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-77.42578125, -12)\"><rect></rect><foreignObject width=\"154.8515625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📤 Результат (return)</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<h2>🎯 Навіщо потрібні функції?</h2>\n<table>\n<thead>\n<tr>\n<th>Принцип</th>\n<th>Пояснення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🔁 DRY (Don't Repeat Yourself)</td>\n<td>Написати код один раз і викликати скільки завгодно разів</td>\n</tr>\n<tr>\n<td>📦 Інкапсуляція</td>\n<td>Приховати деталі реалізації за зрозумілою назвою</td>\n</tr>\n<tr>\n<td>🧪 Тестованість</td>\n<td>Кожну функцію можна перевірити окремо</td>\n</tr>\n<tr>\n<td>🔧 Повторне використання</td>\n<td>Та сама функція — в різних частинах програми</td>\n</tr>\n</tbody></table>\n","<h1>📝 Function Declaration</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Function Declaration</strong> (оголошення функції) — класичний спосіб оголосити функцію за допомогою ключового слова <code>function</code>. Така функція доступна <strong>до</strong> рядка свого оголошення завдяки механізму <strong>hoisting</strong>.</p>\n</div>\n\n\n\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Оголошення функції</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">greet</span>(<span class=\"hljs-params\">name</span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-string\">\"Привіт, \"</span> + name + <span class=\"hljs-string\">\"!\"</span>;\n}\n\n<span class=\"hljs-comment\">// Виклик функції</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">greet</span>(<span class=\"hljs-string\">\"Олена\"</span>)); <span class=\"hljs-comment\">// \"Привіт, Олена!\"</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">greet</span>(<span class=\"hljs-string\">\"Максим\"</span>)); <span class=\"hljs-comment\">// \"Привіт, Максим!\"</span></code></pre><h2>🔼 Hoisting — підняття оголошення</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ✅ Можна викликати ДО оголошення — hoisting працює</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">square</span>(<span class=\"hljs-number\">5</span>)); <span class=\"hljs-comment\">// 25</span>\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">square</span>(<span class=\"hljs-params\">n</span>) {\n  <span class=\"hljs-keyword\">return</span> n * n;\n}</code></pre><div class=\"note\"><strong>📝 Як влаштовано hoisting</strong> <p>Перед виконанням коду JavaScript «піднімає» всі Function Declaration на початок своєї області видимості. Функція вже існує в пам'яті на момент запуску коду — тому її можна викликати до рядка, де вона написана.</p>\n</div>\n\n\n\n\n\n<div class=\"tip\"><strong>💡 Синтаксис оголошення</strong> <p><code>function</code> → ім'я → <code>(параметри)</code> → <code>{ тіло функції }</code>. Ім'я функції — це дієслово або фраза, що описує дію: <code>calculateSum</code>, <code>getUserName</code>, <code>isValid</code>.</p>\n</div>\n\n","<h1>🔤 Function Expression</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Function Expression</strong> (функціональний вираз) — функція, що оголошується як частина виразу та присвоюється змінній. На відміну від Function Declaration, <strong>hoisting не діє</strong> — функцію можна викликати лише після її оголошення.</p>\n</div>\n\n\n\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Функція присвоюється змінній</span>\n<span class=\"hljs-keyword\">const</span> multiply = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">a, b</span>) {\n  <span class=\"hljs-keyword\">return</span> a * b;\n};\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">multiply</span>(<span class=\"hljs-number\">4</span>, <span class=\"hljs-number\">5</span>)); <span class=\"hljs-comment\">// 20</span>\n\n<span class=\"hljs-comment\">// ❌ Виклик ДО оголошення — помилка!</span>\n<span class=\"hljs-comment\">// console.log(divide(10, 2)); // ReferenceError</span>\n\n<span class=\"hljs-keyword\">const</span> divide = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">a, b</span>) {\n  <span class=\"hljs-keyword\">return</span> a / b;\n};</code></pre><h2>⚖️ Declaration vs Expression</h2>\n<table>\n<thead>\n<tr>\n<th>Характеристика</th>\n<th>Function Declaration</th>\n<th>Function Expression</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Синтаксис</td>\n<td><code>function name() {}</code></td>\n<td><code>const name = function() {}</code></td>\n</tr>\n<tr>\n<td>Hoisting</td>\n<td>✅ Так</td>\n<td>❌ Ні</td>\n</tr>\n<tr>\n<td>Виклик до оголошення</td>\n<td>✅ Можна</td>\n<td>❌ Помилка</td>\n</tr>\n<tr>\n<td>Передача як аргумент</td>\n<td>✅ Можна</td>\n<td>✅ Можна</td>\n</tr>\n<tr>\n<td>Типове застосування</td>\n<td>Основні функції</td>\n<td>Колбеки, умовне створення</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Поширена помилка</strong> <p>Спроба викликати Function Expression до її оголошення призведе до <code>ReferenceError</code> (якщо використано <code>const</code>/<code>let</code>) або поверне <code>undefined</code> (якщо використано <code>var</code>). Завжди оголошуйте Function Expression перед першим використанням.</p>\n</div>\n\n","<h1>➡️ Arrow Function — стрілкові функції</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Arrow Function</strong> (стрілкова функція) — скорочений синтаксис Function Expression, введений у ES6. Замість ключового слова <code>function</code> використовується символ <code>=&gt;</code>.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Стрілкові функції — лаконічний сучасний запис, особливо зручний для коротких перетворень та колбеків.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Function Expression — класичний запис</span>\n<span class=\"hljs-keyword\">const</span> addV1 = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\">a, b</span>) {\n  <span class=\"hljs-keyword\">return</span> a + b;\n};\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">addV1</span>(<span class=\"hljs-number\">3</span>, <span class=\"hljs-number\">7</span>)); <span class=\"hljs-comment\">// 10</span>\n\n<span class=\"hljs-comment\">// Arrow Function — скорочений запис</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">addV2</span> = (<span class=\"hljs-params\">a, b</span>) =&gt; {\n  <span class=\"hljs-keyword\">return</span> a + b;\n};\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">addV2</span>(<span class=\"hljs-number\">3</span>, <span class=\"hljs-number\">7</span>)); <span class=\"hljs-comment\">// 10</span>\n\n<span class=\"hljs-comment\">// Arrow Function — ультракороткий запис (один вираз)</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">addV3</span> = (<span class=\"hljs-params\">a, b</span>) =&gt; a + b;\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">addV3</span>(<span class=\"hljs-number\">3</span>, <span class=\"hljs-number\">7</span>)); <span class=\"hljs-comment\">// 10</span></code></pre><h2>✂️ Правила скорочення запису</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// 1️⃣ Один параметр — дужки можна опустити</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">double</span> = n =&gt; n * <span class=\"hljs-number\">2</span>;\n\n<span class=\"hljs-comment\">// 2️⃣ Без параметрів — порожні дужки обов'язкові</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">greet</span> = (<span class=\"hljs-params\"></span>) =&gt; <span class=\"hljs-string\">\"Привіт!\"</span>;\n\n<span class=\"hljs-comment\">// 3️⃣ Тіло з кількох рядків — потрібні {} та return</span>\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">clamp</span> = (<span class=\"hljs-params\">value, min, max</span>) =&gt; {\n  <span class=\"hljs-keyword\">if</span> (value &lt; min) <span class=\"hljs-keyword\">return</span> min;\n  <span class=\"hljs-keyword\">if</span> (value &gt; max) <span class=\"hljs-keyword\">return</span> max;\n  <span class=\"hljs-keyword\">return</span> value;\n};</code></pre><div class=\"tip\"><strong>💡 Де найчастіше зустрічаються стрілкові функції</strong> <p>Масиви (<code>map</code>, <code>filter</code>, <code>reduce</code>), обробники подій, setTimeout, Promise — скрізь, де функція передається як аргумент. Стрілкові функції стали стандартом сучасного JavaScript-коду.</p>\n</div>\n\n","<h1>📥 Параметри та аргументи</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Параметри</strong> — імена змінних у визначенні функції. <strong>Аргументи</strong> — конкретні значення, що передаються під час виклику. Параметр — це «слот», аргумент — це те, що в нього вкладається.</p>\n</div>\n\n\n\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">//         параметри</span>\n<span class=\"hljs-comment\">//            ↓  ↓</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">power</span>(<span class=\"hljs-params\">base, exponent</span>) {\n  <span class=\"hljs-keyword\">return</span> base ** exponent; <span class=\"hljs-comment\">// ** — оператор піднесення до степеня (ES2016)</span>\n}\n<span class=\"hljs-comment\">//                аргументи</span>\n<span class=\"hljs-comment\">//                  ↓   ↓</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">power</span>(<span class=\"hljs-number\">2</span>,  <span class=\"hljs-number\">10</span>)); <span class=\"hljs-comment\">// 1024</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">power</span>(<span class=\"hljs-number\">3</span>,   <span class=\"hljs-number\">3</span>)); <span class=\"hljs-comment\">// 27</span></code></pre><h2>🎛️ Значення за замовчуванням (Default Parameters)</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Якщо аргумент не передано або передано undefined —</span>\n<span class=\"hljs-comment\">// використовується значення за замовчуванням</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">createUser</span>(<span class=\"hljs-params\">name, role = <span class=\"hljs-string\">\"student\"</span>, active = <span class=\"hljs-literal\">true</span></span>) {\n  <span class=\"hljs-keyword\">return</span> { name, role, active };\n}\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">createUser</span>(<span class=\"hljs-string\">\"Олена\"</span>));\n<span class=\"hljs-comment\">// { name: \"Олена\", role: \"student\", active: true }</span>\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">createUser</span>(<span class=\"hljs-string\">\"Іван\"</span>, <span class=\"hljs-string\">\"admin\"</span>));\n<span class=\"hljs-comment\">// { name: \"Іван\", role: \"admin\", active: true }</span>\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">createUser</span>(<span class=\"hljs-string\">\"Марко\"</span>, <span class=\"hljs-string\">\"moderator\"</span>, <span class=\"hljs-literal\">false</span>));\n<span class=\"hljs-comment\">// { name: \"Марко\", role: \"moderator\", active: false }</span></code></pre><div class=\"warning\"><strong>⚠️ Порядок параметрів зі значеннями за замовчуванням</strong> <p>Параметри зі значеннями за замовчуванням завжди розміщуються <strong>після</strong> обов'язкових. Якщо розмістити їх першими, обійти їх під час виклику стане неможливо без передачі <code>undefined</code>.</p>\n</div>\n\n","<h1>🔄 Оператор <code>return</code></h1>\n<p><strong>Головна ідея:</strong> <code>return</code> завершує виконання функції та повертає значення. Функція без <code>return</code> повертає <code>undefined</code> — це не помилка, але частий початок багів.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// ✅ Функція з явним return</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">celsiusToFahrenheit</span>(<span class=\"hljs-params\">celsius</span>) {\n  <span class=\"hljs-keyword\">return</span> celsius * <span class=\"hljs-number\">9</span> / <span class=\"hljs-number\">5</span> + <span class=\"hljs-number\">32</span>;\n}\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">celsiusToFahrenheit</span>(<span class=\"hljs-number\">0</span>));   <span class=\"hljs-comment\">// 32</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">celsiusToFahrenheit</span>(<span class=\"hljs-number\">100</span>)); <span class=\"hljs-comment\">// 212</span>\n\n<span class=\"hljs-comment\">// ⚠️ Функція без return — повертає undefined</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">logMessage</span>(<span class=\"hljs-params\">msg</span>) {\n  <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(msg);\n  <span class=\"hljs-comment\">// return undefined — неявно</span>\n}\n<span class=\"hljs-keyword\">const</span> result = <span class=\"hljs-title function_\">logMessage</span>(<span class=\"hljs-string\">\"Тест\"</span>); <span class=\"hljs-comment\">// виводить \"Тест\"</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(result); <span class=\"hljs-comment\">// undefined</span></code></pre><h2>🛑 <code>return</code> як ранній вихід</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// return можна використовувати для раннього виходу</span>\n<span class=\"hljs-comment\">// замість глибокої вкладеності умов (guard clauses)</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">divide</span>(<span class=\"hljs-params\">a, b</span>) {\n  <span class=\"hljs-keyword\">if</span> (b === <span class=\"hljs-number\">0</span>) {\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-string\">\"Помилка: ділення на нуль\"</span>);\n    <span class=\"hljs-keyword\">return</span>; <span class=\"hljs-comment\">// Ранній вихід — далі код не виконується</span>\n  }\n  <span class=\"hljs-keyword\">return</span> a / b;\n}\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">divide</span>(<span class=\"hljs-number\">10</span>, <span class=\"hljs-number\">2</span>)); <span class=\"hljs-comment\">// 5</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">divide</span>(<span class=\"hljs-number\">10</span>, <span class=\"hljs-number\">0</span>)); <span class=\"hljs-comment\">// Помилка: ділення на нуль → undefined</span></code></pre><div class=\"tip\"><strong>💡 Guard Clauses</strong> <p>Перевірки некоректних умов на початку функції з раннім <code>return</code> — це патерн <strong>Guard Clauses</strong>. Він зменшує вкладеність <code>if-else</code> і робить код лінійним та читабельним.</p>\n</div>\n\n","<h1>🔭 Область видимості — Scope</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Scope</strong> (область видимості) — частина програми, де змінна є доступною. JavaScript має три типи scope: <strong>global</strong>, <strong>function</strong> та <strong>block</strong>.</p>\n</div>\n\n\n\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> globalVar = <span class=\"hljs-string\">\"Я глобальна\"</span>; <span class=\"hljs-comment\">// 🌍 Доступна скрізь</span>\n\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">outerFunction</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">const</span> outerVar = <span class=\"hljs-string\">\"Я в outer\"</span>; <span class=\"hljs-comment\">// Доступна в outer та inner</span>\n\n  <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">innerFunction</span>(<span class=\"hljs-params\"></span>) {\n    <span class=\"hljs-keyword\">const</span> innerVar = <span class=\"hljs-string\">\"Я в inner\"</span>; <span class=\"hljs-comment\">// Доступна тільки в inner</span>\n\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(globalVar); <span class=\"hljs-comment\">// ✅ \"Я глобальна\"</span>\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(outerVar);  <span class=\"hljs-comment\">// ✅ \"Я в outer\"</span>\n    <span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(innerVar);  <span class=\"hljs-comment\">// ✅ \"Я в inner\"</span>\n  }\n\n  <span class=\"hljs-title function_\">innerFunction</span>();\n  <span class=\"hljs-comment\">// console.log(innerVar); // ❌ ReferenceError — недоступна ззовні</span>\n}</code></pre><h2>🗂️ Три рівні видимості</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    G[&quot;🌍 Global Scope&lt;br&gt;поза функціями та блоками&quot;]\n    F[&quot;🏠 Function Scope&lt;br&gt;всередині функції&quot;]\n    B[&quot;📦 Block Scope&lt;br&gt;всередині if, for тощо&quot;]\n    style G fill:#fff3e0,stroke:#ef6c00\n    style F fill:#e3f2fd,stroke:#1565c0\n    style B fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1773080056775-8-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 264px;\" viewBox=\"0 0 264 356\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1773080056775-8-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1773080056775-8-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1773080056775-8-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1773080056775-8-0 .error-icon{fill:#552222;}#exp-1773080056775-8-0 .error-text{fill:#552222;stroke:#552222;}#exp-1773080056775-8-0 .edge-thickness-normal{stroke-width:1px;}#exp-1773080056775-8-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1773080056775-8-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1773080056775-8-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1773080056775-8-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1773080056775-8-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1773080056775-8-0 .marker{fill:#333333;stroke:#333333;}#exp-1773080056775-8-0 .marker.cross{stroke:#333333;}#exp-1773080056775-8-0 svg{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;}#exp-1773080056775-8-0 p{margin:0;}#exp-1773080056775-8-0 .label{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;color:#333;}#exp-1773080056775-8-0 .cluster-label text{fill:#333;}#exp-1773080056775-8-0 .cluster-label span{color:#333;}#exp-177308005677 ius:2px;pointer-events:none;z-index:100;}#exp-1773080056775-8-0 .flowchartTitleText{text-anchor:middle;font-size:18px;fill:#333;}#exp-1773080056775-8-0 rect.text{fill:none;stroke-width:0;}#exp-1773080056775-8-0 .icon-shape,#exp-1773080056775-8-0 .image-shape{background-color:rgba(232,232,232, 0.8);text-align:center;}#exp-1773080056775-8-0 .icon-shape p,#exp-1773080056775-8-0 .image-shape p{background-color:rgba(232,232,232, 0.8);padding:2px;}#exp-1773080056775-8-0 .icon-shape rect,#exp-1773080056775-8-0 .image-shape rect{opacity:0.5;background-color:rgba(232,232,232, 0.8);fill:rgba(232,232,232, 0.8);}#exp-1773080056775-8-0 .label-icon{display:inline-block;height:1em;overflow:visible;vertical-align:-0.125em;}#exp-1773080056775-8-0 .node .label-icon path{fill:currentColor;stroke:revert;stroke-width:revert;}#exp-1773080056775-8-0 :root{--mermaid-font-family:\"trebuchet ms\",verdana,arial,sans-serif;}</style><g><marker id=\"exp-1773080056775-8-0_flowchart-v2-pointEnd\" class=\"marker flowchart-v2\" viewBox=\"0 0 10 10\" refX=\"5\" refY=\"5\" markerUnits=\"userSpaceOnUse\" markerWidth=\"8\" markerHeight=\"8\" orient=\"auto\"><path d=\"M 0 0 L 10 5 L 0 10 z\" class=\"arrowMarkerPath\" style=\"stroke-width: 1; stroke-dasharray: 1, 0;\"></path></marker><marker id=\"exp-1773080056775-8-0_flowchart-v2-pointStart\" class=\"marker flowchart-v2\" viewBox=\"0 0 10 10\" refX=\"4.5\" refY=\"5\" markerUnits=\"userSpaceOnUse\" markerWidth=\"8\" markerHeight=\"8\" orient=\"auto\"><path d=\"M 0 5 L 10 10 L 10 0 z\" class=\"arrowMarkerPath\" style=\"stroke-width: 1; stroke-dasharray: 1, 0;\"></path></marker><marker id=\"exp-1773080056775-8-0_flowchart-v2-circleEnd\" class=\"marker flowchart-v2\" viewBox=\"0 0 10 10\" refX=\"11\" refY=\"5\" markerUnits=\"userSpaceOnUse\" markerWidth=\"11\" markerHeight=\"11\" orient=\"auto\"><circle cx=\"5\" cy=\"5\" r=\"5\" class=\"arrowMarkerPath\" style=\"stroke-width: 1; stroke-dasharray: 1, 0;\"></circle></marker><marker id=\"exp-1773080056775-8-0_flowchart-v2-circleStart\" class=\"marker flowchart-v2\" viewBox=\"0 0 10 10\" refX=\"-1\" refY=\"5\" markerUnits=\"userSpaceOnUse\" markerWidth=\"11\" markerHeight=\"11\" orient=\"auto\"><circle cx=\"5\" cy=\"5\" r=\"5\" class=\"arrowMarkerPath\" style=\"stroke-width: 1; stroke-dasharray: 1, 0;\"></circle></marker><marker id=\"exp-1773080056775-8-0_flowchart-v2-crossEnd\" class=\"marker cross flowchart-v2\" viewBox=\"0 0 11 11\" refX=\"12\" refY=\"5.2\" markerUnits=\"userSpaceOnUse\" markerWidth=\"11\" markerHeight=\"11\" orient=\"auto\"><path d=\"M 1,1 l 9,9 M 10,1 l -9,9\" class=\"arrowMarkerPath\" style=\"stroke-width: 2; stroke-dasharray: 1, 0;\"></path></marker><marker id=\"exp-1773080056775-8-0_flowchart-v2-crossStart\" class=\"marker cross flowchart-v2\" viewBox=\"0 0 11 11\" refX=\"-1\" refY=\"5.2\" markerUnits=\"userSpaceOnUse\" markerWidth=\"11\" markerHeight=\"11\" orient=\"auto\"><path d=\"M 1,1 l 9,9 M 10,1 l -9,9\" class=\"arrowMarkerPath\" style=\"stroke-width: 2; stroke-dasharray: 1, 0;\"></path></marker><g class=\"root\"><g class=\"clusters\"></g><g class=\"edgePaths\"></g><g class=\"edgeLabels\"></g><g class=\"nodes\"><g class=\"node default  \" id=\"flowchart-G-0\" transform=\"translate(132, 56)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-124\" y=\"-48\" width=\"248\" height=\"96\"></rect><g class=\"label\" style=\"\" transform=\"translate(-100, -36)\"><rect></rect><foreignObject width=\"200\" height=\"72\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>🌍 Global Scope<br>поза функціями та блоками</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-F-1\" transform=\"translate(132, 190)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-91.67578125\" y=\"-36\" width=\"183.3515625\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-67.67578125, -24)\"><rect></rect><foreignObject width=\"135.3515625\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🏠 Function Scope<br>всередині функції</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-B-2\" transform=\"translate(132, 312)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-104.5703125\" y=\"-36\" width=\"209.140625\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-80.5703125, -24)\"><rect></rect><foreignObject width=\"161.140625\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📦 Block Scope<br>всередині if, for тощо</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<table>\n<thead>\n<tr>\n<th>Тип scope</th>\n<th>Де діє</th>\n<th>Як створити</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🌍 Global</td>\n<td>Весь файл</td>\n<td><code>const</code>/<code>let</code> поза функціями та блоками</td>\n</tr>\n<tr>\n<td>🏠 Function</td>\n<td>Тіло функції</td>\n<td>Будь-яка змінна, оголошена всередині <code>function</code></td>\n</tr>\n<tr>\n<td>📦 Block</td>\n<td>Блок <code>{}</code></td>\n<td><code>const</code>/<code>let</code> всередині <code>if</code>, <code>for</code>, <code>{}</code> тощо</td>\n</tr>\n</tbody></table>\n<div class=\"danger\"><strong>🚫 Забруднення глобального scope</strong> <p>Оголошення змінних у глобальній області видимості без необхідності — погана практика. Це призводить до конфліктів імен, важковловимих багів та ускладнення тестування. Оголошуйте змінні у найвужчій можливій області видимості.</p>\n</div>\n\n","<h1>🔒 Замикання — Closure</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Closure</strong> (замикання) — це функція, яка «запам'ятовує» змінні з навколишнього scope і зберігає доступ до них навіть після того, як зовнішня функція завершила своє виконання.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Завдяки замиканням внутрішня функція не копіює значення змінних — вона зберігає <strong>прямий доступ до самих змінних</strong> навколишнього scope. Тому зміни цих змінних відображаються при кожному виклику.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">makeCounter</span>(<span class=\"hljs-params\"></span>) {\n  <span class=\"hljs-keyword\">let</span> count = <span class=\"hljs-number\">0</span>; <span class=\"hljs-comment\">// Ця змінна \"живе\" в замиканні</span>\n\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n    count++; <span class=\"hljs-comment\">// Внутрішня функція має доступ до count</span>\n    <span class=\"hljs-keyword\">return</span> count;\n  };\n}\n\n<span class=\"hljs-keyword\">const</span> counter = <span class=\"hljs-title function_\">makeCounter</span>();\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">counter</span>()); <span class=\"hljs-comment\">// 1</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">counter</span>()); <span class=\"hljs-comment\">// 2</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">counter</span>()); <span class=\"hljs-comment\">// 3</span>\n\n<span class=\"hljs-comment\">// Кожен виклик makeCounter() — нове незалежне замикання</span>\n<span class=\"hljs-keyword\">const</span> counter2 = <span class=\"hljs-title function_\">makeCounter</span>();\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">counter2</span>()); <span class=\"hljs-comment\">// 1 (свій власний count)</span></code></pre><h2>🏭 Практичний патерн: фабрика функцій</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Замикання дозволяє створювати спеціалізовані функції</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">makeMultiplier</span>(<span class=\"hljs-params\">factor</span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-function\">(<span class=\"hljs-params\">number</span>) =&gt;</span> number * factor; <span class=\"hljs-comment\">// factor \"замкнено\"</span>\n}\n\n<span class=\"hljs-keyword\">const</span> double  = <span class=\"hljs-title function_\">makeMultiplier</span>(<span class=\"hljs-number\">2</span>);\n<span class=\"hljs-keyword\">const</span> triple  = <span class=\"hljs-title function_\">makeMultiplier</span>(<span class=\"hljs-number\">3</span>);\n<span class=\"hljs-keyword\">const</span> times10 = <span class=\"hljs-title function_\">makeMultiplier</span>(<span class=\"hljs-number\">10</span>);\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">double</span>(<span class=\"hljs-number\">5</span>));   <span class=\"hljs-comment\">// 10</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">triple</span>(<span class=\"hljs-number\">5</span>));   <span class=\"hljs-comment\">// 15</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">times10</span>(<span class=\"hljs-number\">5</span>));  <span class=\"hljs-comment\">// 50</span></code></pre><div class=\"note\"><strong>📝 Замикання під капотом</strong> <p>Кожна функція зберігає посилання на своє <strong>лексичне оточення</strong> (Lexical Environment) — об'єкт, що містить усі локальні змінні. Саме це лексичне оточення і є «замиканням». Воно не знищується після завершення зовнішньої функції, якщо внутрішня функція ще десь зберігається.</p>\n</div>\n\n","<h1>🏗️ Функції як значення першого класу</h1>\n<p><strong>Головна ідея:</strong> У JavaScript функції є <strong>об'єктами першого класу</strong> (first-class functions) — їх можна присвоювати змінним, передавати як аргументи, повертати з інших функцій та зберігати у структурах даних.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// 1️⃣ Функція як аргумент (callback)</span>\n<span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">applyOperation</span>(<span class=\"hljs-params\">a, b, operation</span>) {\n  <span class=\"hljs-keyword\">return</span> <span class=\"hljs-title function_\">operation</span>(a, b);\n}\n\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">sum</span>  = (<span class=\"hljs-params\">x, y</span>) =&gt; x + y;\n<span class=\"hljs-keyword\">const</span> <span class=\"hljs-title function_\">diff</span> = (<span class=\"hljs-params\">x, y</span>) =&gt; x - y;\n\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">applyOperation</span>(<span class=\"hljs-number\">10</span>, <span class=\"hljs-number\">3</span>, sum));  <span class=\"hljs-comment\">// 13</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(<span class=\"hljs-title function_\">applyOperation</span>(<span class=\"hljs-number\">10</span>, <span class=\"hljs-number\">3</span>, diff)); <span class=\"hljs-comment\">// 7</span>\n\n<span class=\"hljs-comment\">// 2️⃣ Функції у масиві — список операцій</span>\n<span class=\"hljs-keyword\">const</span> validators = [\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">v</span>) =&gt;</span> v.<span class=\"hljs-property\">length</span> &gt;= <span class=\"hljs-number\">3</span>,        <span class=\"hljs-comment\">// мінімум 3 символи</span>\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">v</span>) =&gt;</span> v === v.<span class=\"hljs-title function_\">toLowerCase</span>(), <span class=\"hljs-comment\">// тільки малі літери</span>\n  <span class=\"hljs-function\">(<span class=\"hljs-params\">v</span>) =&gt;</span> !v.<span class=\"hljs-title function_\">includes</span>(<span class=\"hljs-string\">\" \"</span>),     <span class=\"hljs-comment\">// без пробілів</span>\n];\n\n<span class=\"hljs-keyword\">const</span> username = <span class=\"hljs-string\">\"john\"</span>;\n<span class=\"hljs-keyword\">const</span> allValid = validators.<span class=\"hljs-title function_\">every</span>(<span class=\"hljs-function\"><span class=\"hljs-params\">fn</span> =&gt;</span> <span class=\"hljs-title function_\">fn</span>(username));\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(allValid); <span class=\"hljs-comment\">// true</span></code></pre><div class=\"tip\"><strong>💡 Callback — функція зворотного виклику</strong> <p>Функція, яка передається як аргумент і буде викликана пізніше, називається <strong>callback</strong>. Це фундаментальний патерн JavaScript: обробники подій, setTimeout, методи масивів — всі вони приймають callbacks.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>Функція</strong> — іменований блок коду для виконання конкретного завдання; усуває повторення та структурує програму</p>\n</li>\n<li><p><strong>Function Declaration</strong> — класичне оголошення з hoisting: функцію можна викликати до рядка її оголошення</p>\n</li>\n<li><p><strong>Function Expression</strong> — функція як значення змінної; hoisting не діє, виклик тільки після оголошення</p>\n</li>\n<li><p><strong>Arrow Function</strong> — лаконічний ES6-синтаксис: <code>(a, b) =&gt; a + b</code>; стандарт для коротких функцій та колбеків</p>\n</li>\n<li><p><strong>Параметри та default values</strong> — функція може приймати будь-яку кількість аргументів; значення за замовчуванням задаються через <code>=</code> у сигнатурі</p>\n</li>\n<li><p><strong><code>return</code></strong> — завершує функцію та повертає значення; без <code>return</code> функція повертає <code>undefined</code></p>\n</li>\n<li><p><strong>Scope</strong> — три рівні: global, function, block; змінні видимі в поточному та вкладених scope, але не в зовнішніх</p>\n</li>\n<li><p><strong>Closure</strong> — функція «запам'ятовує» scope свого створення; дозволяє будувати фабрики функцій та приватний стан</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Чим відрізняється <strong>Function Declaration</strong> від <strong>Function Expression</strong>? Що таке hoisting і як він впливає на доступність функції?</p>\n</li>\n<li><p>🤔 Запишіть функцію <code>square(n)</code>, що повертає квадрат числа, трьома способами: Declaration, Expression та Arrow Function.</p>\n</li>\n<li><p>🤔 Що поверне функція, якщо в ній відсутній оператор <code>return</code>? Наведіть приклад ситуації, коли це може стати джерелом помилки.</p>\n</li>\n<li><p>🤔 Що таке область видимості (scope)? Поясніть різницю між global, function та block scope.</p>\n</li>\n<li><p>🤔 Що таке замикання (closure)? Чому внутрішня функція зберігає доступ до змінних зовнішньої після завершення її виконання?</p>\n</li>\n<li><p>🤔 Що означає термін «функція першого класу» (first-class function)? Наведіть приклад передачі функції як аргументу.</p>\n</li>\n<li><p>🤔 Що таке callback-функція? У яких ситуаціях вона використовується?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Функція</td>\n<td>Function</td>\n<td>Іменований блок коду, що виконує завдання та може бути викликаний повторно</td>\n</tr>\n<tr>\n<td>Оголошення функції</td>\n<td>Function Declaration</td>\n<td>Спосіб оголошення функції з hoisting через ключове слово <code>function</code></td>\n</tr>\n<tr>\n<td>Функціональний вираз</td>\n<td>Function Expression</td>\n<td>Функція, присвоєна змінній; hoisting не діє</td>\n</tr>\n<tr>\n<td>Стрілкова функція</td>\n<td>Arrow Function</td>\n<td>Скорочений синтаксис функції через <code>=&gt;</code>, введений у ES6</td>\n</tr>\n<tr>\n<td>Параметр</td>\n<td>Parameter</td>\n<td>Змінна у визначенні функції, що приймає вхідне значення</td>\n</tr>\n<tr>\n<td>Аргумент</td>\n<td>Argument</td>\n<td>Конкретне значення, передане у функцію при виклику</td>\n</tr>\n<tr>\n<td>Область видимості</td>\n<td>Scope</td>\n<td>Частина програми, де змінна є доступною</td>\n</tr>\n<tr>\n<td>Замикання</td>\n<td>Closure</td>\n<td>Функція разом із лексичним оточенням свого створення</td>\n</tr>\n<tr>\n<td>Підняття</td>\n<td>Hoisting</td>\n<td>Механізм, що переміщує Function Declaration на початок scope перед виконанням</td>\n</tr>\n<tr>\n<td>Колбек</td>\n<td>Callback</td>\n<td>Функція, передана як аргумент і викликана пізніше</td>\n</tr>\n<tr>\n<td>Фабрика функцій</td>\n<td>Function Factory</td>\n<td>Функція, що повертає іншу функцію з налаштованою поведінкою</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>ES6</strong></td>\n<td>ECMAScript 2015</td>\n<td>Стандарт JavaScript 2015 року</td>\n</tr>\n<tr>\n<td><strong>ES</strong></td>\n<td>ECMAScript</td>\n<td>Офіційний стандарт мови JavaScript</td>\n</tr>\n<tr>\n<td><strong>DRY</strong></td>\n<td>Don't Repeat Yourself</td>\n<td>Не повторюй себе (принцип проєктування)</td>\n</tr>\n<tr>\n<td><strong>JS</strong></td>\n<td>JavaScript</td>\n<td>Мова програмування JavaScript</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
