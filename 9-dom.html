t><foreignObject width=\"28.984375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>&lt;p&gt;</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-BTN-15\" transform=\"translate(415.22265625, 424)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-57.5625\" y=\"-24\" width=\"115.125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-33.5625, -12)\"><rect></rect><foreignObject width=\"67.125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>&lt;button&gt;</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<div class=\"note\"><strong>📝 Ключова роль <code>document</code></strong> <p>Глобальний об'єкт <code>document</code> — це точка входу до всього DOM. Саме через нього JavaScript отримує доступ до будь-якого елемента сторінки.</p>\n</div>\n\n","<h1>🔍 Пошук елементів — основні методи</h1>\n<p><strong>Головна ідея:</strong> Перш ніж маніпулювати елементом, його потрібно знайти. Існує кілька методів пошуку — вони відрізняються за критерієм пошуку та типом результату.</p>\n<h2>📊 Методи вибору</h2>\n<table>\n<thead>\n<tr>\n<th>Метод</th>\n<th>Критерій пошуку</th>\n<th>Повертає</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>getElementById('id')</code></td>\n<td>Атрибут <code>id</code></td>\n<td>Один елемент або <code>null</code></td>\n</tr>\n<tr>\n<td><code>getElementsByClassName('cls')</code></td>\n<td>Клас</td>\n<td>HTMLCollection (живий список)</td>\n</tr>\n<tr>\n<td><code>getElementsByTagName('tag')</code></td>\n<td>Тег</td>\n<td>HTMLCollection (живий список)</td>\n</tr>\n<tr>\n<td><code>querySelector('selector')</code></td>\n<td>CSS-селектор</td>\n<td>Перший збіг або <code>null</code></td>\n</tr>\n<tr>\n<td><code>querySelectorAll('selector')</code></td>\n<td>CSS-селектор</td>\n<td>NodeList (статичний список)</td>\n</tr>\n</tbody></table>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Пошук за id — найшвидший метод</span>\n<span class=\"hljs-keyword\">const</span> title = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">'main-title'</span>);\n\n<span class=\"hljs-comment\">// Пошук за CSS-селектором — найуніверсальніший</span>\n<span class=\"hljs-keyword\">const</span> btn = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'.btn-primary'</span>);\n<span class=\"hljs-keyword\">const</span> inputs = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelectorAll</span>(<span class=\"hljs-string\">'input[type=\"text\"]'</span>);\n\n<span class=\"hljs-comment\">// Пошук в межах конкретного елемента</span>\n<span class=\"hljs-keyword\">const</span> form = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#registration-form'</span>);\n<span class=\"hljs-keyword\">const</span> fields = form.<span class=\"hljs-title function_\">querySelectorAll</span>(<span class=\"hljs-string\">'input'</span>); <span class=\"hljs-comment\">// тільки input всередині форми</span></code></pre><div class=\"tip\"><strong>💡 Рекомендація</strong> <p>У сучасному коді переважно використовують <code>querySelector</code> та <code>querySelectorAll</code> — вони підтримують будь-які CSS-селектори і роблять код більш читабельним.</p>\n</div>\n\n","<h1>📝 Читання та зміна вмісту</h1>\n<p><strong>Головна ідея:</strong> DOM-елементи мають властивості для роботи з текстовим і HTML-вмістом. Вибір правильної властивості важливий і для зручності, і для безпеки.</p>\n<h2>🔑 Ключові властивості</h2>\n<table>\n<thead>\n<tr>\n<th>Властивість</th>\n<th>Що робить</th>\n<th>Безпека</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>textContent</code></td>\n<td>Читає/встановлює текст вузла та всіх нащадків</td>\n<td>✅ Безпечна</td>\n</tr>\n<tr>\n<td><code>innerHTML</code></td>\n<td>Читає/встановлює HTML-розмітку всередині елемента</td>\n<td>⚠️ Обережно</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 <code>textContent</code> vs <code>innerText</code></strong> <p>Існує ще властивість <code>innerText</code>, яка враховує CSS і повертає лише <strong>видимий</strong> текст. Через це вона значно повільніша і менш передбачувана — у практиці майже завжди використовують <code>textContent</code>.</p>\n</div>\n\n\n\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> heading = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'h1'</span>);\n\n<span class=\"hljs-comment\">// Читання тексту</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(heading.<span class=\"hljs-property\">textContent</span>); <span class=\"hljs-comment\">// \"Привіт, світ!\"</span>\n\n<span class=\"hljs-comment\">// Зміна тексту — безпечно</span>\nheading.<span class=\"hljs-property\">textContent</span> = <span class=\"hljs-string\">'Новий заголовок'</span>;\n\n<span class=\"hljs-comment\">// Вставка HTML — лише з перевіреними даними!</span>\n<span class=\"hljs-keyword\">const</span> list = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#menu'</span>);\nlist.<span class=\"hljs-property\">innerHTML</span> = <span class=\"hljs-string\">'&lt;li&gt;Пункт 1&lt;/li&gt;&lt;li&gt;Пункт 2&lt;/li&gt;'</span>;\n\n<span class=\"hljs-comment\">// Небезпечний приклад — ніколи так не робити з даними користувача:</span>\n<span class=\"hljs-comment\">// element.innerHTML = userInput; // XSS-вразливість!</span></code></pre><div class=\"danger\"><strong>🚫 XSS через innerHTML</strong> <p>Якщо вставляти в <code>innerHTML</code> рядок, що містить дані від користувача, зловмисник може впровадити шкідливий <code>&lt;script&gt;</code>. Для тексту завжди використовуйте <code>textContent</code>.</p>\n</div>\n\n","<h1>🎨 Зміна стилів та атрибутів</h1>\n<p><strong>Головна ідея:</strong> JavaScript дозволяє змінювати як CSS-стилі безпосередньо, так і атрибути HTML-елементів — включно з класами.</p>\n<h2>🖌️ Робота зі стилями</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> box = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'.card'</span>);\n\n<span class=\"hljs-comment\">// Прямий стиль через властивість style</span>\nbox.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">backgroundColor</span> = <span class=\"hljs-string\">'#e3f2fd'</span>;\nbox.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">fontSize</span> = <span class=\"hljs-string\">'18px'</span>;\nbox.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">display</span> = <span class=\"hljs-string\">'none'</span>; <span class=\"hljs-comment\">// приховати елемент</span>\n\n<span class=\"hljs-comment\">// Читання поточного стилю (з урахуванням CSS)</span>\n<span class=\"hljs-keyword\">const</span> styles = <span class=\"hljs-variable language_\">window</span>.<span class=\"hljs-title function_\">getComputedStyle</span>(box);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(styles.<span class=\"hljs-property\">fontSize</span>); <span class=\"hljs-comment\">// \"18px\"</span></code></pre><h2>🏷️ Робота з класами — <code>classList</code></h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> btn = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'.btn'</span>);\n\nbtn.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">add</span>(<span class=\"hljs-string\">'active'</span>);       <span class=\"hljs-comment\">// Додати клас</span>\nbtn.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">remove</span>(<span class=\"hljs-string\">'disabled'</span>);  <span class=\"hljs-comment\">// Видалити клас</span>\nbtn.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">toggle</span>(<span class=\"hljs-string\">'hidden'</span>);    <span class=\"hljs-comment\">// Додати/видалити залежно від наявності</span>\nbtn.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">contains</span>(<span class=\"hljs-string\">'active'</span>);  <span class=\"hljs-comment\">// true або false</span></code></pre><h2>🔧 Робота з атрибутами</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> img = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'img'</span>);\n\n<span class=\"hljs-comment\">// Читання та запис атрибутів</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(img.<span class=\"hljs-title function_\">getAttribute</span>(<span class=\"hljs-string\">'alt'</span>)); <span class=\"hljs-comment\">// \"Фото товару\"</span>\nimg.<span class=\"hljs-title function_\">setAttribute</span>(<span class=\"hljs-string\">'alt'</span>, <span class=\"hljs-string\">'Новий опис'</span>);\nimg.<span class=\"hljs-title function_\">removeAttribute</span>(<span class=\"hljs-string\">'disabled'</span>);\n\n<span class=\"hljs-comment\">// Спеціальні атрибути — доступні як властивості</span>\n<span class=\"hljs-keyword\">const</span> input = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'input'</span>);\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(input.<span class=\"hljs-property\">value</span>);    <span class=\"hljs-comment\">// поточне значення поля</span>\n<span class=\"hljs-variable language_\">console</span>.<span class=\"hljs-title function_\">log</span>(input.<span class=\"hljs-property\">disabled</span>); <span class=\"hljs-comment\">// true або false</span>\ninput.<span class=\"hljs-property\">value</span> = <span class=\"hljs-string\">'Новий текст'</span>;</code></pre><div class=\"tip\"><strong>💡 classList замість className</strong> <p>Перевага <code>classList</code> над прямою заміною <code>className</code> — він не стирає інші класи елемента. <code>element.className = 'active'</code> видалить усі наявні класи.</p>\n</div>\n\n","<h1>➕ Створення елементів</h1>\n<p><strong>Головна ідея:</strong> DOM дозволяє динамічно створювати нові елементи та додавати їх на сторінку — без перезавантаження і без заміни всього HTML.</p>\n<h2>🏗️ Три кроки створення елемента</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// 1. Створити елемент</span>\n<span class=\"hljs-keyword\">const</span> card = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">'div'</span>);\n\n<span class=\"hljs-comment\">// 2. Налаштувати</span>\ncard.<span class=\"hljs-property\">className</span> = <span class=\"hljs-string\">'product-card'</span>;\ncard.<span class=\"hljs-property\">textContent</span> = <span class=\"hljs-string\">'Новий товар'</span>;\n\n<span class=\"hljs-comment\">// Або через innerHTML (дані перевірені — не від користувача)</span>\n<span class=\"hljs-keyword\">const</span> li = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">'li'</span>);\nli.<span class=\"hljs-property\">innerHTML</span> = <span class=\"hljs-string\">'&lt;strong&gt;Назва:&lt;/strong&gt; Смартфон'</span>;\n\n<span class=\"hljs-comment\">// 3. Додати на сторінку</span>\n<span class=\"hljs-keyword\">const</span> list = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#product-list'</span>);\nlist.<span class=\"hljs-title function_\">appendChild</span>(card);          <span class=\"hljs-comment\">// в кінець контейнера</span>\nlist.<span class=\"hljs-title function_\">prepend</span>(li);                 <span class=\"hljs-comment\">// на початок контейнера</span></code></pre><h2>📌 Методи вставки</h2>\n<table>\n<thead>\n<tr>\n<th>Метод</th>\n<th>Куди вставляє</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>appendChild(el)</code></td>\n<td>Останньою дочірньою</td>\n</tr>\n<tr>\n<td><code>prepend(el)</code></td>\n<td>Першою дочірньою</td>\n</tr>\n<tr>\n<td><code>before(el)</code></td>\n<td>Перед елементом (сусід)</td>\n</tr>\n<tr>\n<td><code>after(el)</code></td>\n<td>Після елемента (сусід)</td>\n</tr>\n<tr>\n<td><code>replaceWith(el)</code></td>\n<td>Замінює елемент</td>\n</tr>\n</tbody></table>\n","<h1>🗑️ Видалення елементів</h1>\n<p><strong>Головна ідея:</strong> Видалення елемента з DOM повністю прибирає його зі сторінки. Для тимчасового приховання краще використовувати CSS.</p>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Сучасний спосіб — remove()</span>\n<span class=\"hljs-keyword\">const</span> outdatedCard = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'.old-card'</span>);\noutdatedCard.<span class=\"hljs-title function_\">remove</span>();\n\n<span class=\"hljs-comment\">// Видалення дочірнього елемента</span>\n<span class=\"hljs-keyword\">const</span> list = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'ul'</span>);\n<span class=\"hljs-keyword\">const</span> firstItem = list.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'li'</span>);\nlist.<span class=\"hljs-title function_\">removeChild</span>(firstItem);\n\n<span class=\"hljs-comment\">// Очищення всього вмісту контейнера</span>\n<span class=\"hljs-keyword\">const</span> container = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'#results'</span>);\ncontainer.<span class=\"hljs-property\">innerHTML</span> = <span class=\"hljs-string\">''</span>; <span class=\"hljs-comment\">// Очищає всі дочірні елементи</span></code></pre><h2>⚖️ Видалити vs приховати</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// Приховати (залишається в DOM, можна повернути)</span>\nelement.<span class=\"hljs-property\">style</span>.<span class=\"hljs-property\">display</span> = <span class=\"hljs-string\">'none'</span>;\nelement.<span class=\"hljs-property\">classList</span>.<span class=\"hljs-title function_\">add</span>(<span class=\"hljs-string\">'hidden'</span>); <span class=\"hljs-comment\">// через CSS: .hidden { display: none }</span>\n\n<span class=\"hljs-comment\">// Видалити (повністю прибирається з DOM)</span>\nelement.<span class=\"hljs-title function_\">remove</span>();</code></pre><div class=\"warning\"><strong>⚠️ Коли видаляти, а коли приховувати</strong> <p>Якщо елемент може знадобитись знову — краще приховати через клас. Видаляти варто тоді, коли елемент більше ніколи не знадобиться або коли він буде заново створений з новими даними.</p>\n</div>\n\n","<h1>🧭 Навігація по DOM-дереву</h1>\n<p><strong>Головна ідея:</strong> Знайшовши один елемент, можна переміщатись по дереву до сусідніх або батьківських вузлів без нового пошуку.</p>\n<h2>🗺️ Властивості навігації</h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-keyword\">const</span> item = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'.selected'</span>);\n\n<span class=\"hljs-comment\">// Батьківський елемент</span>\n<span class=\"hljs-keyword\">const</span> parent = item.<span class=\"hljs-property\">parentElement</span>;\n\n<span class=\"hljs-comment\">// Дочірні елементи</span>\n<span class=\"hljs-keyword\">const</span> children = item.<span class=\"hljs-property\">children</span>;          <span class=\"hljs-comment\">// HTMLCollection лише елементів</span>\n<span class=\"hljs-keyword\">const</span> first = item.<span class=\"hljs-property\">firstElementChild</span>;\n<span class=\"hljs-keyword\">const</span> last  = item.<span class=\"hljs-property\">lastElementChild</span>;\n\n<span class=\"hljs-comment\">// Сусідні елементи</span>\n<span class=\"hljs-keyword\">const</span> next = item.<span class=\"hljs-property\">nextElementSibling</span>;    <span class=\"hljs-comment\">// наступний сусід</span>\n<span class=\"hljs-keyword\">const</span> prev = item.<span class=\"hljs-property\">previousElementSibling</span>; <span class=\"hljs-comment\">// попередній сусід</span></code></pre><h2>🔎 Пошук найближчого предка — <code>closest()</code></h2>\n<pre><code class=\"language-javascript hljs\" data-highlighted=\"yes\"><span class=\"hljs-comment\">// closest() піднімається вгору по DOM і шукає перший збіг з селектором</span>\n<span class=\"hljs-keyword\">const</span> btn = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">querySelector</span>(<span class=\"hljs-string\">'.delete-btn'</span>);\n<span class=\"hljs-keyword\">const</span> card = btn.<span class=\"hljs-title function_\">closest</span>(<span class=\"hljs-string\">'.product-card'</span>); <span class=\"hljs-comment\">// знаходить батьківську картку</span>\n\n<span class=\"hljs-keyword\">if</span> (card) {\n  card.<span class=\"hljs-title function_\">remove</span>(); <span class=\"hljs-comment\">// видаляємо всю картку</span>\n}</code></pre><div class=\"note\"><strong>📝 <code>children</code> vs <code>childNodes</code></strong> <p><code>children</code> повертає лише дочірні <strong>елементи</strong> (теги). <code>childNodes</code> повертає всі вузли, включно з текстовими вузлами та коментарями. У роботі з DOM майже завжди використовують <code>children</code>.</p>\n</div>\n\n","<h1>🛠️ Практичний приклад: динамічний список завдань</h1>\n<p><strong>Головна ідея:</strong> Поєднання пошуку, створення та видалення елементів дозволяє будувати інтерактивні інтерфейси без перезавантаження сторінки.</p>\n<pre><code class=\"language-html hljs language-xml\" data-highlighted=\"yes\"><span class=\"hljs-meta\">&lt;!DOCTYPE <span class=\"hljs-keyword\">html</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">html</span> <span class=\"hljs-attr\">lang</span>=<span class=\"hljs-string\">\"uk\"</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">head</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">meta</span> <span class=\"hljs-attr\">charset</span>=<span class=\"hljs-string\">\"UTF-8\"</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">title</span>&gt;</span>Список завдань<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">title</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">head</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">body</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">h2</span>&gt;</span>📋 Мої завдання<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">h2</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">input</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"task-input\"</span> <span class=\"hljs-attr\">type</span>=<span class=\"hljs-string\">\"text\"</span> <span class=\"hljs-attr\">placeholder</span>=<span class=\"hljs-string\">\"Нове завдання...\"</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">button</span> <span class=\"hljs-attr\">onclick</span>=<span class=\"hljs-string\">\"addTask()\"</span>&gt;</span>➕ Додати<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">button</span>&gt;</span>\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">ul</span> <span class=\"hljs-attr\">id</span>=<span class=\"hljs-string\">\"task-list\"</span>&gt;</span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">ul</span>&gt;</span>\n\n  <span class=\"hljs-tag\">&lt;<span class=\"hljs-name\">script</span>&gt;</span><span class=\"language-javascript\">\n    <span class=\"hljs-keyword\">function</span> <span class=\"hljs-title function_\">addTask</span>(<span class=\"hljs-params\"></span>) {\n      <span class=\"hljs-keyword\">const</span> input = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">'task-input'</span>);\n      <span class=\"hljs-keyword\">const</span> list  = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">getElementById</span>(<span class=\"hljs-string\">'task-list'</span>);\n\n      <span class=\"hljs-keyword\">const</span> text = input.<span class=\"hljs-property\">value</span>.<span class=\"hljs-title function_\">trim</span>();\n      <span class=\"hljs-keyword\">if</span> (!text) <span class=\"hljs-keyword\">return</span>; <span class=\"hljs-comment\">// порожній рядок — ігноруємо</span>\n\n      <span class=\"hljs-comment\">// 1. Створити елемент списку</span>\n      <span class=\"hljs-keyword\">const</span> li = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">'li'</span>);\n      li.<span class=\"hljs-property\">textContent</span> = text;\n\n      <span class=\"hljs-comment\">// 2. Створити кнопку видалення</span>\n      <span class=\"hljs-keyword\">const</span> removeBtn = <span class=\"hljs-variable language_\">document</span>.<span class=\"hljs-title function_\">createElement</span>(<span class=\"hljs-string\">'button'</span>);\n      removeBtn.<span class=\"hljs-property\">textContent</span> = <span class=\"hljs-string\">'🗑️'</span>;\n      removeBtn.<span class=\"hljs-property\">onclick</span> = <span class=\"hljs-keyword\">function</span>(<span class=\"hljs-params\"></span>) {\n        li.<span class=\"hljs-title function_\">remove</span>();\n      };\n\n      <span class=\"hljs-comment\">// 3. Зібрати та додати на сторінку</span>\n      li.<span class=\"hljs-title function_\">appendChild</span>(removeBtn);\n      list.<span class=\"hljs-title function_\">appendChild</span>(li);\n      input.<span class=\"hljs-property\">value</span> = <span class=\"hljs-string\">''</span>; <span class=\"hljs-comment\">// очищаємо поле вводу</span>\n    }\n  </span><span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">script</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">body</span>&gt;</span>\n<span class=\"hljs-tag\">&lt;/<span class=\"hljs-name\">html</span>&gt;</span></code></pre><div class=\"note\"><strong>📝 Атрибут <code>onclick</code></strong> <p>У прикладі використовується <code>onclick</code> — найпростіший спосіб прив'язати дію до кнопки. Він задається прямо в HTML (<code>onclick=\"addTask()\"</code>) або як властивість елемента (<code>element.onclick = function() {...}</code>). Більш гнучкий механізм обробки подій буде розглянутий на наступній лекції.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p><strong>DOM</strong> — деревоподібна модель HTML-документа, через яку JavaScript взаємодіє зі сторінкою; точка входу — об'єкт <code>document</code></p>\n</li>\n<li><p><strong>Пошук елементів</strong> — <code>getElementById</code> для пошуку за id, <code>querySelector</code>/<code>querySelectorAll</code> — для будь-якого CSS-селектора</p>\n</li>\n<li><p><strong>Вміст</strong> — <code>textContent</code> для безпечної роботи з текстом, <code>innerHTML</code> — тільки для перевіреного HTML без даних від користувача</p>\n</li>\n<li><p><strong>Стилі та класи</strong> — <code>element.style</code> для прямих змін, <code>classList.add/remove/toggle</code> — для управління класами</p>\n</li>\n<li><p><strong>Атрибути</strong> — <code>getAttribute</code>/<code>setAttribute</code>/<code>removeAttribute</code>, а також прямий доступ через властивості (<code>value</code>, <code>disabled</code>)</p>\n</li>\n<li><p><strong>Створення</strong> — <code>createElement</code> → налаштування → <code>appendChild</code>/<code>prepend</code>/<code>after</code></p>\n</li>\n<li><p><strong>Видалення</strong> — <code>element.remove()</code> для видалення з DOM, <code>display: none</code> / CSS-клас — для тимчасового приховання</p>\n</li>\n<li><p><strong>Навігація</strong> — <code>parentElement</code>, <code>children</code>, <code>nextElementSibling</code>, <code>closest()</code> для переміщення по дереву</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Що таке DOM і яку роль відіграє об'єкт <code>document</code>?</p>\n</li>\n<li><p>🤔 Яка різниця між <code>querySelector</code> та <code>querySelectorAll</code>? Що вони повертають?</p>\n</li>\n<li><p>🤔 Чим відрізняється <code>textContent</code> від <code>innerHTML</code>? Коли небезпечно використовувати <code>innerHTML</code>?</p>\n</li>\n<li><p>🤔 Що таке <code>classList</code>? Назвіть три методи та поясніть кожен.</p>\n</li>\n<li><p>🤔 Як динамічно створити новий елемент і додати його в кінець списку?</p>\n</li>\n<li><p>🤔 Яка різниця між <code>element.remove()</code> та <code>element.style.display = 'none'</code>?</p>\n</li>\n<li><p>🤔 Для чого використовується метод <code>closest()</code>? Як він шукає елемент?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Об'єктна модель документа</td>\n<td>Document Object Model</td>\n<td>Представлення HTML-документа у вигляді дерева об'єктів</td>\n</tr>\n<tr>\n<td>Вузол</td>\n<td>Node</td>\n<td>Базова одиниця DOM-дерева (елемент, текст, коментар)</td>\n</tr>\n<tr>\n<td>Елемент</td>\n<td>Element</td>\n<td>Вузол, що відповідає HTML-тегу</td>\n</tr>\n<tr>\n<td>Батьківський елемент</td>\n<td>Parent Element</td>\n<td>Елемент, що безпосередньо містить даний елемент</td>\n</tr>\n<tr>\n<td>Дочірній елемент</td>\n<td>Child Element</td>\n<td>Елемент, що безпосередньо вкладений в інший</td>\n</tr>\n<tr>\n<td>Сусідній елемент</td>\n<td>Sibling Element</td>\n<td>Елемент на тому ж рівні вкладеності</td>\n</tr>\n<tr>\n<td>Список класів</td>\n<td>Class List</td>\n<td>Інтерфейс для управління класами елемента</td>\n</tr>\n<tr>\n<td>Обчислений стиль</td>\n<td>Computed Style</td>\n<td>Фактичний стиль елемента з урахуванням усіх CSS-правил</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>DOM</td>\n<td>Document Object Model</td>\n<td>Об'єктна модель документа</td>\n</tr>\n<tr>\n<td>API</td>\n<td>Application Programming Interface</td>\n<td>Програмний інтерфейс застосунку</td>\n</tr>\n<tr>\n<td>HTML</td>\n<td>HyperText Markup Language</td>\n<td>Мова розмітки гіпертексту</td>\n</tr>\n<tr>\n<td>CSS</td>\n<td>Cascading Style Sheets</td>\n<td>Каскадні таблиці стилів</td>\n</tr>\n<tr>\n<td>XSS</td>\n<td>Cross-Site Scripting</td>\n<td>Міжсайтовий скриптинг</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
